# =========================
# Ansible Connection
# =========================
ansible_connection: local
ansible_user: "{{ lookup('env', 'USER') }}"
ansible_host: "{{ inventory_hostname }}.{{ k8s_namespace | default('default') }}.svc.cluster.local"
# OpenShift Route hosts use the cluster ingress domain.
openshift_apps_domain: >-
  {{
    lookup('pipe', "kubectl get ingresses.config/cluster -o jsonpath='{.spec.domain}' 2>/dev/null || true") | default('apps-crc.testing')
  }}
# Keep actual_host as localhost for control-node tasks that do not use routes.
actual_host: localhost

# =========================
# Remote Node Paths
# =========================
remote_deploy_dir: "{{ out_dir }}/openshift-deployment"
remote_node_dir: "{{ remote_deploy_dir }}/{{ inventory_hostname }}"
remote_config_dir: "{{ remote_node_dir }}/config"
remote_data_dir: "{{ remote_node_dir }}/data"

# =========================
# OpenShift
# =========================
k8s_namespace: default
k8s_storage_size: 500Mi
