# =========================
# Ansible Connection
# =========================
ansible_connection: local
ansible_user: "{{ lookup('env', 'USER') }}"
ansible_host: "{{ inventory_hostname }}.{{ k8s_namespace | default('default') }}.svc.cluster.local"
# actual_host resolves to localhost normally, but NodePorts on remote k8s nodes
# (e.g. kind in CI, k3s, etc.) are only reachable at the node IP — override via K8S_NODE_IP.
actual_host: "{{ lookup('env', 'K8S_NODE_IP') or 'localhost' }}"

# =========================
# Remote Node Paths
# =========================
remote_deploy_dir: "{{ out_dir }}/local-deployment"
remote_node_dir: "{{ remote_deploy_dir }}/{{ inventory_hostname }}"
remote_config_dir: "{{ remote_node_dir }}/config"
remote_data_dir: "{{ remote_node_dir }}/data"

# =========================
# Kubernetes
# =========================
k8s_namespace: default
k8s_storage_size: 500Mi
k8s_image_pull_policy: IfNotPresent
# k8s_storage_class:        # omit to use the cluster default storage class
# k8s_image_pull_secret:    # e.g. regcred
