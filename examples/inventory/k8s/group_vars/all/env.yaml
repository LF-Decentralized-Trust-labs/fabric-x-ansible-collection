# =========================
# Ansible Connection
# =========================
ansible_connection: local
ansible_user: "{{ lookup('env', 'USER') }}"
ansible_host: "{{ inventory_hostname }}.{{ k8s_namespace | default('default') }}.svc.cluster.local"
# actual_host resolves to localhost normally. For NodePort, set K8S_NODE_IP to
# the Kubernetes node IP when the node is remote.
# For LoadBalancer services, override actual_host on the exposed host with
# the assigned LoadBalancer IP or hostname.
actual_host: "{{ lookup('env', 'K8S_NODE_IP') or 'localhost' }}"

# =========================
# Remote Node Paths
# =========================
remote_deploy_dir: "{{ out_dir }}/k8s-deployment"
remote_node_dir: "{{ remote_deploy_dir }}/{{ inventory_hostname }}"
remote_config_dir: "{{ remote_node_dir }}/config"
remote_data_dir: "{{ remote_node_dir }}/data"

# =========================
# Kubernetes
# =========================
k8s_namespace: default
k8s_storage_size: 500Mi
