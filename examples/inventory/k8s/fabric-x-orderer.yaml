# This inventory deploys the Hyperledger Fabric-X orderer components as Kubernetes workloads.
# Crypto material and configuration are generated on the control node (ansible_connection: local)
# and shipped to the cluster via ConfigMaps and Secrets.
#
# Prerequisites on the control node:
#   pip install kubernetes
#   ansible-galaxy collection install kubernetes.core
#
# Set KUBECONFIG or use k8s_kubeconfig / k8s_context in group_vars.

all:
  vars:
    # =========================
    # Organizations
    # =========================
    organizations:
      orderer_org_1: &OrdererOrg1
        name: OrdererOrg1
        domain: ordererorg1.example.com
      orderer_org_2: &OrdererOrg2
        name: OrdererOrg2
        domain: ordererorg2.example.com
      orderer_org_3: &OrdererOrg3
        name: OrdererOrg3
        domain: ordererorg3.example.com
      orderer_org_4: &OrdererOrg4
        name: OrdererOrg4
        domain: ordererorg4.example.com
    # -------------------------------------------------------
    # Kubernetes settings
    # -------------------------------------------------------
    k8s_namespace: "fabricx"
    k8s_storage_class: "standard"
    k8s_storage_size: "10Gi"
    k8s_image_pull_policy: "IfNotPresent"
    # k8s_image_pull_secret: "regcred"
    # k8s_kubeconfig: "/path/to/kubeconfig"
    # k8s_context: "my-context"
  children:
    fabric_x_orderers:
      vars:
        # -------------------------------------------------------
        # Orderer deployment mode
        # -------------------------------------------------------
        orderer_use_tls: true
        orderer_use_mtls: true
        orderer_use_k8s: true
      children:
        fabric_x_orderer_1:
          vars:
            organization:
              <<: *OrdererOrg1
              role: orderer
              orderer:
                name: "{{ inventory_hostname }}"
            orderer_group: 1
          hosts:
            orderer-router-1:
              orderer_component_type: router
              orderer_rpc_port: 7050
              orderer_metrics_port: 7060
            orderer-consenter-1:
              orderer_component_type: consenter
              orderer_rpc_port: 7051
              orderer_metrics_port: 7061
            orderer-assembler-1:
              orderer_component_type: assembler
              orderer_rpc_port: 7052
              orderer_metrics_port: 7062
            orderer-batcher-1:
              orderer_component_type: batcher
              orderer_shard_id: 1
              orderer_rpc_port: 7053
              orderer_metrics_port: 7063
        fabric_x_orderer_2:
          vars:
            organization:
              <<: *OrdererOrg2
              role: orderer
              orderer:
                name: "{{ inventory_hostname }}"
            orderer_group: 2
          hosts:
            orderer-router-2:
              orderer_component_type: router
              orderer_rpc_port: 7150
              orderer_metrics_port: 7160
            orderer-consenter-2:
              orderer_component_type: consenter
              orderer_rpc_port: 7151
              orderer_metrics_port: 7161
            orderer-assembler-2:
              orderer_component_type: assembler
              orderer_rpc_port: 7152
              orderer_metrics_port: 7162
            orderer-batcher-2:
              orderer_component_type: batcher
              orderer_shard_id: 1
              orderer_rpc_port: 7153
              orderer_metrics_port: 7163
        fabric_x_orderer_3:
          vars:
            organization:
              <<: *OrdererOrg3
              role: orderer
              orderer:
                name: "{{ inventory_hostname }}"
            orderer_group: 3
          hosts:
            orderer-router-3:
              orderer_component_type: router
              orderer_rpc_port: 7250
              orderer_metrics_port: 7260
            orderer-consenter-3:
              orderer_component_type: consenter
              orderer_rpc_port: 7251
              orderer_metrics_port: 7261
            orderer-assembler-3:
              orderer_component_type: assembler
              orderer_rpc_port: 7252
              orderer_metrics_port: 7262
            orderer-batcher-3:
              orderer_component_type: batcher
              orderer_shard_id: 1
              orderer_rpc_port: 7253
              orderer_metrics_port: 7263
        fabric_x_orderer_4:
          vars:
            organization:
              <<: *OrdererOrg4
              role: orderer
              orderer:
                name: "{{ inventory_hostname }}"
            orderer_group: 4
          hosts:
            orderer-router-4:
              orderer_component_type: router
              orderer_rpc_port: 7350
              orderer_metrics_port: 7360
            orderer-consenter-4:
              orderer_component_type: consenter
              orderer_rpc_port: 7351
              orderer_metrics_port: 7361
            orderer-assembler-4:
              orderer_component_type: assembler
              orderer_rpc_port: 7352
              orderer_metrics_port: 7362
            orderer-batcher-4:
              orderer_component_type: batcher
              orderer_shard_id: 1
              orderer_rpc_port: 7353
              orderer_metrics_port: 7363
