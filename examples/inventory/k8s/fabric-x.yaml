# This inventory runs a full Hyperledger Fabric-X network (orderers + committer + postgres DB)
# entirely on Kubernetes. All services are deployed as k8s workloads.
#
# NodePort services are opt-in per component via <role>_k8s_use_node_port.
# Only externally-reachable components (orderer-routers, committer-sidecar,
# committer-query-service, fabric-ca servers, grafana) enable NodePort.
# Internal components communicate via in-cluster ClusterIP services.
#
# Prerequisites:
#   - A running Kubernetes cluster reachable from the control node
#   - kubectl configured and pointing at the target cluster
#   - cryptogen artifacts available under {{ cryptogen_artifacts_dir }}
#
# To use a remote k8s node (e.g. kind in CI, k3s), set K8S_NODE_IP to the node's IP address:
#   export K8S_NODE_IP=<node-ip>

all:
  vars:
    # =========================
    # Organizations
    # =========================
    organizations:
      orderer_org_1: &OrdererOrg1
        name: OrdererOrg1
        domain: ordererorg1.example.com
      orderer_org_2: &OrdererOrg2
        name: OrdererOrg2
        domain: ordererorg2.example.com
      orderer_org_3: &OrdererOrg3
        name: OrdererOrg3
        domain: ordererorg3.example.com
      orderer_org_4: &OrdererOrg4
        name: OrdererOrg4
        domain: ordererorg4.example.com
      org1: &Org1
        name: Org1
        domain: org1.example.com
  children:
    # =========================
    # Network (HLFX)
    # =========================
    network:
      children:
        # =========================
        # Hyperledger Fabric CAs (k8s)
        # =========================
        fabric_cas:
          children:
            # =========================
            # Hyperledger Fabric CA DBs (k8s)
            # =========================
            fabric_ca_dbs:
              vars:
                postgres_user: postgres
                postgres_password: example
                postgres_use_k8s: true
                postgres_use_tls: true
              hosts:
                fca-orderer-org1-db:
                  postgres_db: ordererOrg1DB
                  postgres_port: 9120
                fca-orderer-org2-db:
                  postgres_db: ordererOrg2DB
                  postgres_port: 9130
                fca-orderer-org3-db:
                  postgres_db: ordererOrg3DB
                  postgres_port: 9140
                fca-orderer-org4-db:
                  postgres_db: ordererOrg4DB
                  postgres_port: 9150
                fca-org1-db:
                  postgres_db: Org1DB
                  postgres_port: 9170
            # =========================
            # Hyperledger Fabric CA Servers (k8s)
            # =========================
            fabric_ca_servers:
              vars:
                fabric_ca_server_use_k8s: true
                fabric_ca_server_k8s_use_node_port: true
                fabric_ca_use_tls: true
                fabric_ca_name: "{{ inventory_hostname }}"
                fabric_ca_admin:
                  name: admin
                  secret: adminPWD
                  attrs:
                    hf.Registrar.Roles: "*"
                    hf.Registrar.Attributes: "*"
                    hf.GenCRL: "true"
                    hf.Revoker: "true"
              hosts:
                fca-orderer-org1:
                  fabric_ca_port: 9019
                  fabric_ca_operations_port: 9020
                  fabric_ca_server_k8s_port_node_port: 30919
                  organization: *OrdererOrg1
                  postgres_db_host: fca-orderer-org1-db
                fca-orderer-org2:
                  fabric_ca_port: 9029
                  fabric_ca_operations_port: 9030
                  fabric_ca_server_k8s_port_node_port: 30929
                  organization: *OrdererOrg2
                  postgres_db_host: fca-orderer-org2-db
                fca-orderer-org3:
                  fabric_ca_port: 9039
                  fabric_ca_operations_port: 9040
                  fabric_ca_server_k8s_port_node_port: 30939
                  organization: *OrdererOrg3
                  postgres_db_host: fca-orderer-org3-db
                fca-orderer-org4:
                  fabric_ca_port: 9049
                  fabric_ca_operations_port: 9050
                  fabric_ca_server_k8s_port_node_port: 30949
                  organization: *OrdererOrg4
                  postgres_db_host: fca-orderer-org4-db
                fca-org1:
                  fabric_ca_port: 9069
                  fabric_ca_operations_port: 9070
                  fabric_ca_server_k8s_port_node_port: 30969
                  organization: *Org1
                  postgres_db_host: fca-org1-db

        # =========================
        # Hyperledger Fabric-X
        # =========================
        fabric_x:
          children:
            # =========================
            # HLFX Orderers (k8s)
            # =========================
            fabric_x_orderers:
              vars:
                # -------------------------------------------------------
                # Orderer deployment mode
                # -------------------------------------------------------
                orderer_use_tls: true
                orderer_use_mtls: true
                orderer_use_k8s: true
              children:
                fabric_x_orderer_1:
                  vars:
                    organization:
                      <<: *OrdererOrg1
                      fabric_ca_host: fca-orderer-org1
                      role: orderer
                      orderer:
                        name: "{{ inventory_hostname }}"
                        secret: "{{ inventory_hostname }}PWD"
                    orderer_group: 1
                  hosts:
                    orderer-router-1:
                      orderer_component_type: router
                      orderer_rpc_port: 7050
                      orderer_metrics_port: 7060
                      orderer_k8s_use_node_port: true
                      orderer_k8s_rpc_node_port: 30050
                    orderer-consenter-1:
                      orderer_component_type: consensus
                      orderer_rpc_port: 7051
                      orderer_metrics_port: 7061
                    orderer-assembler-1:
                      orderer_component_type: assembler
                      orderer_rpc_port: 7052
                      orderer_metrics_port: 7062
                    orderer-batcher-1:
                      orderer_component_type: batcher
                      orderer_shard_id: 1
                      orderer_rpc_port: 7053
                      orderer_metrics_port: 7063
                fabric_x_orderer_2:
                  vars:
                    organization:
                      <<: *OrdererOrg2
                      fabric_ca_host: fca-orderer-org2
                      role: orderer
                      orderer:
                        name: "{{ inventory_hostname }}"
                        secret: "{{ inventory_hostname }}PWD"
                    orderer_group: 2
                  hosts:
                    orderer-router-2:
                      orderer_component_type: router
                      orderer_rpc_port: 7150
                      orderer_metrics_port: 7160
                      orderer_k8s_use_node_port: true
                      orderer_k8s_rpc_node_port: 30150
                    orderer-consenter-2:
                      orderer_component_type: consensus
                      orderer_rpc_port: 7151
                      orderer_metrics_port: 7161
                    orderer-assembler-2:
                      orderer_component_type: assembler
                      orderer_rpc_port: 7152
                      orderer_metrics_port: 7162
                    orderer-batcher-2:
                      orderer_component_type: batcher
                      orderer_shard_id: 1
                      orderer_rpc_port: 7153
                      orderer_metrics_port: 7163
                fabric_x_orderer_3:
                  vars:
                    organization:
                      <<: *OrdererOrg3
                      fabric_ca_host: fca-orderer-org3
                      role: orderer
                      orderer:
                        name: "{{ inventory_hostname }}"
                        secret: "{{ inventory_hostname }}PWD"
                    orderer_group: 3
                  hosts:
                    orderer-router-3:
                      orderer_component_type: router
                      orderer_rpc_port: 7250
                      orderer_metrics_port: 7260
                      orderer_k8s_use_node_port: true
                      orderer_k8s_rpc_node_port: 30250
                    orderer-consenter-3:
                      orderer_component_type: consensus
                      orderer_rpc_port: 7251
                      orderer_metrics_port: 7261
                    orderer-assembler-3:
                      orderer_component_type: assembler
                      orderer_rpc_port: 7252
                      orderer_metrics_port: 7262
                    orderer-batcher-3:
                      orderer_component_type: batcher
                      orderer_shard_id: 1
                      orderer_rpc_port: 7253
                      orderer_metrics_port: 7263
                fabric_x_orderer_4:
                  vars:
                    organization:
                      <<: *OrdererOrg4
                      fabric_ca_host: fca-orderer-org4
                      role: orderer
                      orderer:
                        name: "{{ inventory_hostname }}"
                        secret: "{{ inventory_hostname }}PWD"
                    orderer_group: 4
                  hosts:
                    orderer-router-4:
                      orderer_component_type: router
                      orderer_rpc_port: 7350
                      orderer_metrics_port: 7360
                      orderer_k8s_use_node_port: true
                      orderer_k8s_rpc_node_port: 30350
                    orderer-consenter-4:
                      orderer_component_type: consensus
                      orderer_rpc_port: 7351
                      orderer_metrics_port: 7361
                    orderer-assembler-4:
                      orderer_component_type: assembler
                      orderer_rpc_port: 7352
                      orderer_metrics_port: 7362
                    orderer-batcher-4:
                      orderer_component_type: batcher
                      orderer_shard_id: 1
                      orderer_rpc_port: 7353
                      orderer_metrics_port: 7363

            # =========================
            # HLFX Committer (k8s)
            # =========================
            fabric_x_committer:
              vars:
                committer_use_k8s: true
                committer_use_tls: true
                committer_use_mtls: true
                organization:
                  <<: *Org1
                  fabric_ca_host: fca-org1
                  role: peer
                  peer:
                    name: "{{ inventory_hostname }}"
                    secret: "{{ inventory_hostname }}PWD"
              hosts:
                committer-db:
                  postgres_user: sc_user
                  postgres_password: sc_secret_pwd
                  postgres_db: sc_db
                  postgres_port: 5150
                  postgres_use_k8s: true
                  postgres_use_tls: true
                committer-validator:
                  committer_component_type: validator
                  committer_rpc_port: 5100
                  committer_metrics_port: 5200
                  postgres_db_host: committer-db
                committer-verifier:
                  committer_component_type: verifier
                  committer_rpc_port: 5110
                  committer_metrics_port: 5210
                committer-coordinator:
                  committer_component_type: coordinator
                  committer_rpc_port: 5120
                  committer_metrics_port: 5220
                committer-sidecar:
                  committer_component_type: sidecar
                  committer_rpc_port: 5130
                  committer_metrics_port: 5230
                  committer_k8s_use_node_port: true
                  committer_k8s_rpc_node_port: 30560
                committer-query-service:
                  committer_component_type: query-service
                  committer_rpc_port: 5140
                  committer_metrics_port: 5240
                  committer_k8s_use_node_port: true
                  committer_k8s_rpc_node_port: 30580
                  postgres_db_host: committer-db

    # =========================
    # HLFX LoadGens
    # =========================
    load_generators:
      hosts:
        orderer-loadgen:
          loadgen_use_k8s: true
          organization:
            <<: *Org1
            fabric_ca_host: fca-org1
            role: peer
            peer:
              name: "{{ inventory_hostname }}"
              secret: "{{ inventory_hostname }}PWD"
            users:
              - name: orderer-loadgen
                secret: "{{ inventory_hostname }}PWD"
            namespaces:
              - id: 0
                policy: threshold
          loadgen_use_tls: true
          loadgen_type: orderer-client
          loadgen_metrics_port: 12010
          loadgen_web_port: 12000
          loadgen_rpc_port: 12020
          loadgen_k8s_use_node_port: true
          loadgen_k8s_web_node_port: 30610
          loadgen_k8s_metrics_node_port: 30600

    # =========================
    # Monitoring Infra
    # =========================
    monitoring:
      hosts:
        node-exporter:
          node_exporter_port: 9111
          node_exporter_use_tls: true
          node_exporter_use_k8s: true
        committer-db-exporter:
          postgres_db_host: committer-db
          postgres_exporter_port: 2110
          postgres_exporter_use_tls: true
          postgres_exporter_use_k8s: true
        prometheus:
          prometheus_port: 9090
          prometheus_use_tls: true
          prometheus_use_k8s: true
        grafana:
          grafana_username: admin
          grafana_password: adminPWD
          grafana_web_port: 3000
          prometheus_host: prometheus
          grafana_use_tls: true
          grafana_use_k8s: true
          grafana_k8s_use_node_port: true
          grafana_k8s_web_node_port: 30300
