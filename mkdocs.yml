---
site_name: Hyperledger Fabric-X Ansible Collection
site_description: Ansible collection for deploying and managing Hyperledger Fabric-X networks
site_url: https://lf-decentralized-trust-labs.github.io/fabric-x-ansible-collection/
repo_url: https://github.com/LF-Decentralized-Trust-labs/fabric-x-ansible-collection
repo_name: LF-Decentralized-Trust-labs/fabric-x-ansible-collection
docs_dir: docs/mkdocs

theme:
  name: material
  favicon: examples/images/lf-dec-trust-icon.png
  logo: examples/images/lf-dec-trust-icon.png
  palette:
    - scheme: default
      primary: light blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Top-level nav items rendered as horizontal tabs.
    - navigation.tabs
    # Render nav groups as expandable sections in the sidebar.
    - navigation.sections
    # Show a "Back to top" button when scrolling up.
    - navigation.top
    # Show autocomplete suggestions while typing in the search box.
    - search.suggest
    # Highlight matching terms in search results.
    - search.highlight
    # Add a one-click copy button to every code block.
    - content.code.copy

markdown_extensions:
  # GitHub-Flavored Markdown tables.
  - tables
  # Note/warning/tip/etc. admonition blocks (!!! note syntax).
  - admonition
  # Collapsible admonition blocks (??? note syntax).
  - pymdownx.details
  # Allows adding HTML attributes and CSS classes to Markdown elements.
  - attr_list
  # Allows embedding Markdown inside raw HTML blocks.
  - md_in_html
  # Tabbed content blocks (=== "Tab label" syntax).
  - pymdownx.tabbed:
      alternate_style: true
  # Adds a permalink anchor (¶) to every heading.
  - toc:
      permalink: true
  # Syntax highlighting for code blocks; anchor_linenums adds per-line anchors.
  - pymdownx.highlight:
      anchor_linenums: true
  # Allows arbitrary fenced blocks, including Mermaid diagrams rendered client-side.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  # Built-in full-text search index.
  - search
  # Converts GitHub/Obsidian-style callouts (> [!NOTE]) to MkDocs admonition
  # blocks at build time, so the same source renders correctly on both GitHub
  # and the MkDocs site.
  # aliases: map Obsidian callout type aliases to their canonical MkDocs types.
  # breakless_lists: auto-insert blank lines between list items and callout blocks.
  - callouts:
      aliases: true
      breakless_lists: true

# Additional JavaScript loaded on every page.
extra_javascript:
  # Binds Cmd+K / Ctrl+K to open the MkDocs search overlay.
  - assets/search-hotkeys.js

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.com/channels/905194001349627914/1427642480504999976
      name: Discord
    - icon: fontawesome/brands/github
      link: https://github.com/LF-Decentralized-Trust-labs/fabric-x-ansible-collection
      name: GitHub

nav:
  - Home:
      - Overview: index.md
      - Examples: examples/index.md
      - Collection:
          - Inventories: examples/inventory/index.md
          - Playbooks: playbooks/index.md
          - Roles: roles/index.md
  - Inventories:
      - Overview: examples/inventory/index.md
      - Local:
          - fabric-x: examples/inventory/docs/local/fabric-x.md
          - fabric-x-yugabyte: examples/inventory/docs/local/fabric-x-yugabyte.md
          - fabric-x-bin: examples/inventory/docs/local/fabric-x-bin.md
          - fabric-x-cryptogen: examples/inventory/docs/local/fabric-x-cryptogen.md
          - fabric-x-no-mtls: examples/inventory/docs/local/fabric-x-no-mtls.md
          - fabric-x-no-tls: examples/inventory/docs/local/fabric-x-no-tls.md
      - Kubernetes:
          - fabric-x: examples/inventory/docs/k8s/fabric-x.md
          - fabric-x-yugabyte: examples/inventory/docs/k8s/fabric-x-yugabyte.md
          - fabric-x-cryptogen: examples/inventory/docs/k8s/fabric-x-cryptogen.md
          - fabric-x-no-mtls: examples/inventory/docs/k8s/fabric-x-no-mtls.md
          - fabric-x-no-tls: examples/inventory/docs/k8s/fabric-x-no-tls.md
      - Distributed:
          - fabric-x: examples/inventory/docs/distributed/fabric-x.md
  - Playbooks:
      - Overview: playbooks/index.md
      - artifacts: playbooks/artifacts/index.md
      - committer: playbooks/committer/index.md
      - fabric_ca_client: playbooks/fabric_ca_client/index.md
      - fabric_ca_server: playbooks/fabric_ca_server/index.md
      - fxconfig: playbooks/fxconfig/index.md
      - loadgen: playbooks/loadgen/index.md
      - monitoring: playbooks/monitoring/index.md
      - orderer: playbooks/orderer/index.md
      - yugabyte: playbooks/yugabyte/index.md
  - Roles:
      - Overview: roles/index.md
      - armageddon: roles/armageddon/index.md
      - bin: roles/bin/index.md
      - committer: roles/committer/index.md
      - configtxgen: roles/configtxgen/index.md
      - container: roles/container/index.md
      - cryptogen: roles/cryptogen/index.md
      - elasticsearch: roles/elasticsearch/index.md
      - fabric_ca: roles/fabric_ca/index.md
      - fxconfig: roles/fxconfig/index.md
      - git: roles/git/index.md
      - go: roles/go/index.md
      - grafana: roles/grafana/index.md
      - idemixgen: roles/idemixgen/index.md
      - jaeger: roles/jaeger/index.md
      - k8s: roles/k8s/index.md
      - loadgen: roles/loadgen/index.md
      - node_exporter: roles/node_exporter/index.md
      - openssl: roles/openssl/index.md
      - orderer: roles/orderer/index.md
      - package: roles/package/index.md
      - postgres: roles/postgres/index.md
      - postgres_exporter: roles/postgres_exporter/index.md
      - prometheus: roles/prometheus/index.md
      - tmux: roles/tmux/index.md
