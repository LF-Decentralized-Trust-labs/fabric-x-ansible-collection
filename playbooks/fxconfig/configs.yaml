- name: Transfer the fxconfig configuration files
  hosts: "{{ target_hosts | default('all') }}"
  tasks:
    - name: Transfer the configuration files for fxconfig on nodes declaring namespaces
      vars:
        # We default for now to the first in the list as the MSP
        # to use for fxconfig endorsement.
        # We may later decide to add an extra-property in the user
        # object to identify a specific one having endorsing powers.
        endorser_users: >-
          {{
            organization.users
            | selectattr('endorser', 'defined')
            | selectattr('endorser', 'eq', true)
            | list
          }}
        has_endorser_users: "{{ endorser_users | length > 0 }}"
        fxconfig_user: "{{ (endorser_users | first) if has_endorser_users else (organization.users | first) }}"
        fxconfig_msp_config_path: "{{ remote_config_dir }}/users/{{ fxconfig_user.name }}@{{ organization.domain }}/msp"
        fxconfig_msp_id: "{{ organization.name }}MSP"
        orderer_router_host: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('orderer_component_type', 'defined')
            | selectattr('orderer_component_type', '==', 'router')
            | map(attribute='inventory_hostname')
            | sort
            | first
          }}
        committer_query_service_host: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('committer_component_type', 'defined')
            | selectattr('committer_component_type', '==', 'query-service')
            | map(attribute='inventory_hostname')
            | sort
            | first
          }}
        committer_sidecar_host: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('committer_component_type', 'defined')
            | selectattr('committer_component_type', '==', 'sidecar')
            | map(attribute='inventory_hostname')
            | sort
            | first
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.fxconfig
        tasks_from: config/transfer
      when:
        - organization is defined
        - organization.namespaces is defined
        - organization.users is defined
