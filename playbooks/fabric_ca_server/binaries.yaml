- name: Build the Fabric CA binaries on the control node
  hosts: localhost
  vars:
    targeted_hosts: >-
      {{
        groups[target_hosts]
        if target_hosts in groups
        else [target_hosts]
      }}
    # Base list with common filters - used as input for task-level bin_hosts
    base_bin_hosts: >-
      {{
        targeted_hosts
        | default(groups['fabric_ca_servers'])
        | intersect(groups['fabric_ca_servers'])
        | map('extract', hostvars)
        | selectattr("bin_build_on_control_node", 'defined')
        | selectattr("bin_build_on_control_node", 'eq', true)
        | selectattr("fabric_ca_server_use_bin", 'defined')
        | selectattr("fabric_ca_server_use_bin", 'eq', true)
        | map(attribute='inventory_hostname')
        | list
      }}
  tasks:
    - name: Install the Fabric CA server binaries on the control node
      vars:
        # Task-level bin_hosts filters base list for install (build_bin undefined)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("fabric_ca_server_build_bin", 'undefined')
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.fabric_ca
        tasks_from: server/bin/install
      when:
        - "'fabric_ca_servers' in groups"
        - bin_hosts | length > 0
    - name: Build the Fabric CA server binaries on the control node
      vars:
        # Task-level bin_hosts filters base list for build (build_bin defined and true)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("fabric_ca_server_build_bin", 'defined')
            | selectattr("fabric_ca_server_build_bin", 'eq', true)
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.fabric_ca
        tasks_from: server/bin/build
      when:
        - "'fabric_ca_servers' in groups"
        - bin_hosts | length > 0

- name: Ensure Fabric CA server binaries are on remote nodes
  hosts: "{{ target_hosts | default('fabric_ca_servers') }}:&fabric_ca_servers"
  tasks:
    - name: Setup Fabric CA server binary on the remote nodes
      when:
        - fabric_ca_server_use_bin is defined
        - fabric_ca_server_use_bin
      block:
        - name: Setup Fabric CA server binary using appropriate method
          vars:
            # Determine the operation based on flags
            bin_operation: >-
              {{
                'transfer' if (bin_build_on_control_node is defined and bin_build_on_control_node)
                else ('build' if (fabric_ca_build_bin is defined and fabric_ca_build_bin)
                else 'install')
              }}
          block:
            - name: "{{ bin_operation | capitalize }} Fabric CA server binaries on the remote nodes"
              ansible.builtin.include_role:
                name: hyperledger.fabricx.fabric_ca
                tasks_from: "server/bin/{{ bin_operation }}"
