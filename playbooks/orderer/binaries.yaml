- name: Build the Fabric-X Orderer binaries on the control node
  hosts: localhost
  vars:
    targeted_hosts: >-
      {{
        groups[target_hosts]
        if target_hosts in groups
        else [target_hosts]
      }}
    # Base list with common filters - used as input for task-level bin_hosts
    base_bin_hosts: >-
      {{
        targeted_hosts
        | default(groups['fabric_x_orderers'])
        | intersect(groups['fabric_x_orderers'])
        | map('extract', hostvars)
        | selectattr("bin_build_on_control_node", 'defined')
        | selectattr("bin_build_on_control_node", 'eq', true)
        | selectattr("orderer_use_bin", 'defined')
        | selectattr("orderer_use_bin", '==', true)
        | map(attribute='inventory_hostname')
        | list
      }}
  tasks:
    # =========================
    # Install on the control node
    # =========================
    - name: Install the Fabric-X Orderer binaries on the control node
      vars:
        # Task-level bin_hosts filters base list for install (build_bin undefined)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("orderer_build_bin", 'undefined')
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: bin/install
      when:
        - "'fabric_x_orderers' in groups"
        - bin_hosts | length > 0
    # =========================
    # Build on the control node
    # =========================
    - name: Build the Fabric-X Orderer binaries on the control node
      vars:
        # Task-level bin_hosts filters base list for build (build_bin defined and true)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("orderer_build_bin", 'defined')
            | selectattr("orderer_build_bin", '==', true)
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: bin/build
      when:
        - "'fabric_x_orderers' in groups"
        - bin_hosts | length > 0

- name: Ensure Fabric-X Orderer binaries are on remote nodes
  hosts: "{{ target_hosts | default('fabric_x_orderers') }}:&fabric_x_orderers"
  tasks:
    - name: Build/Install Fabric-X Orderer directly on the remote nodes
      block:
        # =========================
        # Install on the remote node
        # =========================
        - name: Install Fabric-X Orderer binaries on the remote nodes
          ansible.builtin.include_role:
            name: hyperledger.fabricx.orderer
            tasks_from: bin/install
          when:
            - orderer_build_bin is undefined or not orderer_build_bin
        # =========================
        # Build on the remote node
        # =========================
        - name: Build Fabric-X Orderer binaries on the remote nodes
          ansible.builtin.include_role:
            name: hyperledger.fabricx.orderer
            tasks_from: bin/build
          when:
            - orderer_build_bin is defined
            - orderer_build_bin
      when:
        - bin_build_on_control_node is undefined or not bin_build_on_control_node
        - orderer_use_bin is defined
        - orderer_use_bin
    # =========================
    # Transfer from the control node
    # =========================
    - name: Transfer Fabric-X Orderer binaries built on the Control Node
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: bin/transfer
      when:
        - bin_build_on_control_node is defined
        - bin_build_on_control_node
        - orderer_use_bin is defined
        - orderer_use_bin
