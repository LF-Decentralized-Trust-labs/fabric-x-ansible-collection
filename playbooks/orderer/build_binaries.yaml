- name: Build the Fabric-X Orderer binaries
  hosts: localhost
  vars:
    targeted_hosts: >-
      {{
        groups[target_hosts]
        if target_hosts in groups
        else [target_hosts]
      }}
    # Base list with common filters - used as input for task-level bin_hosts
    base_bin_hosts: >-
      {{
        targeted_hosts
        | default(groups['fabric_x_orderers'])
        | intersect(groups['fabric_x_orderers'])
        | map('extract', hostvars)
        | selectattr("orderer_use_bin", 'defined')
        | selectattr("orderer_use_bin", '==', true)
        | map(attribute='inventory_hostname')
        | list
      }}
  tasks:
    - name: Install the Fabric-X Orderer binaries for the not dockerized Fabric-X Orderer hosts
      vars:
        # Task-level bin_hosts filters base list for install (build_bin undefined)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("orderer_build_bin", 'undefined')
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: bin/install
      when:
        - "'fabric_x_orderers' in groups"
        - bin_hosts | length > 0
    - name: Build the Fabric-X Orderer binaries for the not dockerized Fabric-X Orderer hosts
      vars:
        # Task-level bin_hosts filters base list for build (build_bin defined and true)
        bin_hosts: >-
          {{
            base_bin_hosts
            | map('extract', hostvars)
            | selectattr("orderer_build_bin", 'defined')
            | selectattr("orderer_build_bin", '==', true)
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: bin/build
      when:
        - "'fabric_x_orderers' in groups"
        - bin_hosts | length > 0
