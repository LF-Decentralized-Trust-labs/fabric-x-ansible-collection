- name: Start the Monitoring services
  hosts: "{{ target_hosts | default('monitoring') }}:&monitoring"
  tasks:
    # =========================
    # Node Exporter
    # =========================
    - name: Start Node Exporter nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.node_exporter
        tasks_from: start
      when:
        - node_exporter_port is defined
    # =========================
    # Postgres Exporter
    # =========================
    - name: Start Postgres Exporter nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.postgres_exporter
        tasks_from: start
      when:
        - postgres_exporter_port is defined
    # =========================
    # Prometheus
    # =========================
    - name: Start the Prometheus service
      ansible.builtin.include_role:
        name: hyperledger.fabricx.prometheus
        tasks_from: start
      when:
        - prometheus_port is defined
    # =========================
    # Loki
    # =========================
    - name: Start the Loki service
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loki
        tasks_from: start
      when:
        - loki_port is defined
    # =========================
    # Alloy
    # =========================
    - name: Start the Alloy service
      ansible.builtin.include_role:
        name: hyperledger.fabricx.alloy
        tasks_from: start
      when:
        - alloy_port is defined
    # =========================
    # Grafana
    # =========================
    - name: Start the Grafana service
      ansible.builtin.include_role:
        name: hyperledger.fabricx.grafana
        tasks_from: start
      when:
        - grafana_web_port is defined

    - name: Apply OpenShift platform monitoring reader ServiceAccount
      kubernetes.core.k8s:
        state: present
        namespace: "{{ k8s_namespace | default('default') }}"
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "{{ openshift_platform_monitoring_service_account }}"
            namespace: "{{ k8s_namespace | default('default') }}"
            labels:
              app.kubernetes.io/name: "{{ openshift_platform_monitoring_service_account }}"
              app.kubernetes.io/component: "{{ openshift_platform_monitoring_service_account }}"
              app.kubernetes.io/part-of: monitoring
      when:
        - grafana_web_port is defined
        - grafana_use_openshift | default(false)
    - name: Apply OpenShift platform monitoring ClusterRoleBinding
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: "{{ openshift_platform_monitoring_service_account }}-{{ k8s_namespace | default('default') }}"
            labels:
              app.kubernetes.io/name: "{{ openshift_platform_monitoring_service_account }}"
              app.kubernetes.io/component: "{{ openshift_platform_monitoring_service_account }}"
              app.kubernetes.io/part-of: monitoring
          subjects:
            - kind: ServiceAccount
              name: "{{ openshift_platform_monitoring_service_account }}"
              namespace: "{{ k8s_namespace | default('default') }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: "{{ openshift_platform_monitoring_cluster_role }}"
      when:
        - grafana_web_port is defined
        - grafana_use_openshift | default(false)

    - name: Use metrics-reader ServiceAccount for Grafana
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        api_version: apps/v1
        name: "{{ grafana_k8s_resource_name | default(inventory_hostname) }}"
        namespace: "{{ k8s_namespace | default('default') }}"
        definition:
          spec:
            template:
              spec:
                serviceAccountName: "{{ openshift_platform_monitoring_service_account }}"
        wait: true
        wait_timeout: "{{ grafana_k8s_wait_timeout | default(120) }}"
      when:
        - grafana_web_port is defined
        - grafana_use_openshift | default(false)
    # =========================
    # ElasticSearch
    # =========================
    - name: Start ElasticSearch
      ansible.builtin.include_role:
        name: hyperledger.fabricx.elasticsearch
        tasks_from: start
      when:
        - elasticsearch_http_port is defined
    # =========================
    # Jaeger
    # =========================
    - name: Start the Jaeger service
      ansible.builtin.include_role:
        name: hyperledger.fabricx.jaeger
        tasks_from: start
      when:
        - jaeger_collector_port is defined
