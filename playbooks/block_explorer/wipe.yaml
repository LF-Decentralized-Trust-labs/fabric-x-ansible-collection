- name: Wipe the Fabric-X Block Explorer
  hosts: "{{ target_hosts | default('fabric_x_block_explorer') }}:&fabric_x_block_explorer"
  tasks:
    # =========================
    # Block Explorer server and UI
    # =========================
    - name: Wipe the Fabric-X Block Explorer server and UI
      ansible.builtin.include_role:
        name: hyperledger.fabricx.block_explorer
        tasks_from: wipe
      when:
        - block_explorer_port is defined
    # =========================
    # Postgres
    # =========================
    - name: Wipe the Fabric-X Block Explorer Postgres DB
      ansible.builtin.include_role:
        name: hyperledger.fabricx.postgres
        tasks_from: wipe
      when:
        - postgres_port is defined
