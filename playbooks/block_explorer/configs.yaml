- name: Transfer the Fabric-X Block Explorer config files
  hosts: "{{ target_hosts | default('fabric_x_block_explorer') }}:&fabric_x_block_explorer"
  tasks:
    - name: Transfer the Fabric-X Block Explorer server config files
      ansible.builtin.include_role:
        name: hyperledger.fabricx.block_explorer
        tasks_from: config/transfer
      when:
        - block_explorer_port is defined
