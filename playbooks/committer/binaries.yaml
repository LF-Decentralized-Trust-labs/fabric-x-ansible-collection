- name: Build the Fabric-X Committer binaries on the control node
  hosts: localhost
  vars:
    targeted_hosts: >-
      {{
        groups[target_hosts]
        if target_hosts in groups
        else [target_hosts]
      }}
    # Base list with common filters - used as input for task-level bin_hosts
    base_bin_hosts: >-
      {{
        targeted_hosts
        | default(groups['fabric_x_committer'])
        | intersect(groups['fabric_x_committer'])
        | map('extract', hostvars)
        | selectattr("bin_build_on_control_node", 'defined')
        | selectattr("bin_build_on_control_node", 'eq', true)
        | selectattr("committer_component_type", 'defined')
        | selectattr("committer_use_bin", 'defined')
        | selectattr("committer_use_bin", '==', true)
        | map(attribute='inventory_hostname')
        | list
      }}
  tasks:
    - name: Build/Install the Fabric-X Committer binaries on the control node
      when:
        - "'fabric_x_committer' in groups"
      block:
        # =========================
        # Install on the control node
        # =========================
        - name: Install the Fabric-X Committer binaries on the control node
          vars:
            # Task-level bin_hosts filters base list for install (build_bin undefined)
            bin_hosts: >-
              {{
                base_bin_hosts
                | map('extract', hostvars)
                | selectattr("committer_build_bin", 'undefined')
                | map(attribute='inventory_hostname')
                | list
              }}
          ansible.builtin.include_role:
            name: hyperledger.fabricx.committer
            tasks_from: bin/install
          when:
            - bin_hosts | length > 0
        # =========================
        # Build on the control node
        # =========================
        - name: Build the Fabric-X Committer binaries on the control node
          vars:
            # Task-level bin_hosts filters base list for build (build_bin defined and true)
            bin_hosts: >-
              {{
                base_bin_hosts
                | map('extract', hostvars)
                | selectattr("committer_build_bin", 'defined')
                | selectattr("committer_build_bin", '==', true)
                | map(attribute='inventory_hostname')
                | list
              }}
          ansible.builtin.include_role:
            name: hyperledger.fabricx.committer
            tasks_from: bin/build
          when:
            - bin_hosts | length > 0

- name: Ensure Fabric-X Committer binaries are on remote nodes
  hosts: "{{ target_hosts | default('fabric_x_committer') }}:&fabric_x_committer"
  tasks:
    - name: Setup Fabric-X Committer binary on the remote nodes
      when:
        - committer_component_type is defined
        - committer_use_bin is defined
        - committer_use_bin
      block:
        - name: Setup Fabric-X Committer binary using appropriate method
          vars:
            # Determine the operation based on flags
            bin_operation: >-
              {{
                'transfer' if (bin_build_on_control_node is defined and bin_build_on_control_node)
                else ('build' if (committer_build_bin is defined and committer_build_bin)
                else 'install')
              }}
          block:
            - name: "{{ bin_operation | capitalize }} Fabric-X Committer binaries on the remote nodes"
              ansible.builtin.include_role:
                name: hyperledger.fabricx.committer
                tasks_from: "bin/{{ bin_operation }}"
