- name: Start Hyperledger Fabric-X Committer
  hosts: "{{ target_hosts | default('fabric_x_committers') }}:&fabric_x_committers"
  tasks:
    # =========================
    # Postgres
    # =========================
    - name: Start Hyperledger Fabric-X Committer Postgres DB
      ansible.builtin.include_role:
        name: hyperledger.fabricx.postgres
        tasks_from: start
      when:
        - postgres_port is defined
    # =========================
    # Yugabyte
    # =========================
    - name: Start Hyperledger Fabric-X Committer Yugabyte DB
      vars:
        yugabyte_cluster: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('yugabyte_component_type', 'defined')
            | selectattr('yugabyte_cluster_id', 'defined')
            | selectattr('yugabyte_cluster_id', '==', yugabyte_cluster_id)
            | map(attribute='inventory_hostname')
            | list
          }}
      ansible.builtin.include_role:
        name: hyperledger.fabricx.yugabyte
        tasks_from: start
      when:
        - yugabyte_component_type is defined
    # =========================
    # HLFX Committer
    # =========================
    - name: Start Hyperledger Fabric-X Committer services
      vars:
        reference_committer_hosts: >-
          {{
            (
              groups['fabric_x_committers']
              | map('extract', hostvars)
              | selectattr('organization', 'defined')
              | selectattr('organization.domain', 'defined')
              | selectattr('organization.domain', '==', organization.domain)
              | map(attribute='inventory_hostname')
              | list
            )
            or groups['fabric_x_committers']
          }}
        orderer_assemblers: >-
          {{
            groups['fabric_x_orderers']
            | default([])
            | map('extract', hostvars)
            | selectattr('orderer_component_type', '==', 'assembler')
            | map(attribute='inventory_hostname')
            | list
          }}
      when:
        - committer_component_type is defined
      block:
        - name: Start Hyperledger Fabric-X Committer services
          vars:
            committer_verifiers: >-
              {{
                reference_committer_hosts
                | map('extract', hostvars)
                | selectattr('committer_component_type', 'defined')
                | selectattr('committer_component_type', '==', 'verifier')
                | map(attribute='inventory_hostname')
                | list
              }}
            committer_validators: >-
              {{
                reference_committer_hosts
                | map('extract', hostvars)
                | selectattr('committer_component_type', 'defined')
                | selectattr('committer_component_type', '==', 'validator')
                | map(attribute='inventory_hostname')
                | list
              }}
            committer_coordinator: >-
              {{
                reference_committer_hosts
                | map('extract', hostvars)
                | selectattr('committer_component_type', 'defined')
                | selectattr('committer_component_type', '==', 'coordinator')
                | map(attribute='inventory_hostname')
                | list
                | first
              }}
          ansible.builtin.include_role:
            name: hyperledger.fabricx.committer
            tasks_from: start
