- name: Start Fabric-X Loadgen
  hosts: "{{ target_hosts | default('load_generators') }}:&load_generators"
  tasks:
    - name: Start Fabric-X Loadgen
      vars:
        reference_committer_hosts: >-
          {{
            (
              groups['fabric_x_committers']
              | default([])
              | map('extract', hostvars)
              | selectattr('organization', 'defined')
              | selectattr('organization.domain', 'defined')
              | selectattr('organization.domain', '==', organization.domain)
              | map(attribute='inventory_hostname')
              | list
            )
            or groups['fabric_x_committers'] | default([])
          }}
        orderer_hosts: "{{ groups['fabric_x_orderers'] | default([]) }}"
      block:
        - name: Start Fabric-X Loadgen
          vars:
            committer_hosts: "{{ reference_committer_hosts }}"
          ansible.builtin.include_role:
            name: hyperledger.fabricx.loadgen
            tasks_from: start
