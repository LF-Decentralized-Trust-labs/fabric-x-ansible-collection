---
argument_specs:
  role-options:
    short_description: Shared Armageddon option catalog
    description:
      - Shared option definitions reused by the Armageddon entry points.
    options:
      armageddon_registry_endpoint: &armageddon_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'ARMAGEDDON_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - Registry endpoint for the Armageddon image.
      armageddon_image_name: &armageddon_image_name
        type: str
        required: false
        default: "fabric-x-orderer"
        description:
          - Armageddon image name.
      armageddon_image_tag: &armageddon_image_tag
        type: str
        required: false
        default: "0.0.21-1"
        description:
          - Armageddon image tag.
      armageddon_image: &armageddon_image
        type: str
        required: false
        default: "{{ armageddon_registry_endpoint }}/{{ armageddon_image_name }}:{{ armageddon_image_tag }}"
        description:
          - Fully qualified Armageddon image reference.
      armageddon_container_name: &armageddon_container_name
        type: str
        required: false
        default: "armageddon"
        description:
          - Armageddon container name.
      armageddon_git_hub_url: &armageddon_git_hub_url
        type: str
        required: false
        default: "github.com"
        description:
          - Git host used for the Armageddon source repository.
      armageddon_git_repo: &armageddon_git_repo
        type: str
        required: false
        default: "hyperledger/fabric-x-orderer"
        description:
          - Armageddon source repository path.
      armageddon_git_commit: &armageddon_git_commit
        type: str
        required: false
        default: "v0.0.23"
        description:
          - Git ref used for Armageddon builds and installs.
      armageddon_source_code_package: &armageddon_source_code_package
        type: str
        required: false
        default: "cmd/armageddon"
        description:
          - Go package that builds the Armageddon binary.
      armageddon_bin_package: &armageddon_bin_package
        type: str
        required: false
        default: "{{ armageddon_git_hub_url }}/{{ armageddon_git_repo }}/{{ armageddon_source_code_package }}"
        description:
          - Go module path used to install Armageddon.
      armageddon_bin_name: &armageddon_bin_name
        type: str
        required: false
        default: "armageddon"
        description:
          - Armageddon executable name.
      armageddon_use_bin: &armageddon_use_bin
        type: bool
        required: false
        default: false
        description:
          - Run Armageddon as a local binary instead of a container.
      config_build_dir: &config_build_dir
        type: path
        required: false
        description:
          - Base directory for C(armageddon_artifacts_dir).
      armageddon_artifacts_dir: &armageddon_artifacts_dir
        type: path
        required: false
        default: "{{ config_build_dir }}/armageddon-artifacts"
        description:
          - Directory for rendered Armageddon config and generated protobuf output.
      armageddon_container_output_dir: &armageddon_container_output_dir
        type: path
        required: false
        default: "/tmp/out"
        description:
          - Container directory for generated protobuf output.
      armageddon_container_config_dir: &armageddon_container_config_dir
        type: path
        required: false
        default: "/tmp/config"
        description:
          - Container directory for the rendered shared config file.
      armageddon_container_crypto_artifacts_dir:
        &armageddon_container_crypto_artifacts_dir
        type: path
        required: false
        default: "/tmp/crypto"
        description:
          - Container directory for mounted crypto artifacts.
      armageddon_config_file: &armageddon_config_file
        type: str
        required: false
        default: armageddon.yaml
        description:
          - Armageddon config filename.
      armageddon_shared_config_file: &armageddon_shared_config_file
        type: str
        required: false
        default: shared_config.yaml
        description:
          - Shared-config filename.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - Host directory with fetched crypto artifacts.
          - The config build flow reads it in binary mode and the container flow mounts it read-only.
      cli_bin_dir: &cli_bin_dir
        type: path
        required: true
        description:
          - Directory where the Armageddon binary is installed or executed.
          - The binary helper roles use this as the local or remote binary directory.
      armageddon_orderer_hosts: &armageddon_orderer_hosts
        type: list
        elements: str
        required: true
        description:
          - Inventory hosts that form the Fabric-X orderer topology.
          - Each host must expose `orderer_group`, `orderer_component_type`, `organization`, `ansible_host`, and `orderer_rpc_port`.

  config/build:
    short_description: Render the shared Armageddon config
    description:
      - Render `shared_config.yaml` for the Fabric-X orderer topology.
      - When C(armageddon_use_bin) is true, the template reads C(fetched_artifacts_dir); otherwise it uses C(armageddon_container_crypto_artifacts_dir).
    options:
      armageddon_orderer_hosts: *armageddon_orderer_hosts
      armageddon_use_bin: *armageddon_use_bin
      config_build_dir: *config_build_dir
      armageddon_artifacts_dir: *armageddon_artifacts_dir
      fetched_artifacts_dir: *fetched_artifacts_dir
      armageddon_container_crypto_artifacts_dir: *armageddon_container_crypto_artifacts_dir
      armageddon_config_file: *armageddon_config_file
      armageddon_shared_config_file: *armageddon_shared_config_file

  create_shared_config:
    short_description: Dispatch shared-config generation
    description:
      - Dispatch shared-config generation to the binary or container flow.
      - C(armageddon_use_bin) selects which sub-entry point runs.
    options:
      armageddon_use_bin: *armageddon_use_bin

  bin/install:
    short_description: Install the Armageddon binary
    description:
      - Install Armageddon through the shared binary helper.
    options:
      armageddon_bin_name: *armageddon_bin_name
      armageddon_bin_package: *armageddon_bin_package
      armageddon_git_hub_url: *armageddon_git_hub_url
      armageddon_git_repo: *armageddon_git_repo
      armageddon_source_code_package: *armageddon_source_code_package
      armageddon_git_commit: *armageddon_git_commit
      cli_bin_dir: *cli_bin_dir

  bin/build:
    short_description: Build the Armageddon binary from source
    description:
      - Build Armageddon from source through the shared Go helper.
      - The Go source package comes from C(armageddon_source_code_package).
    options:
      armageddon_bin_name: *armageddon_bin_name
      armageddon_git_hub_url: *armageddon_git_hub_url
      armageddon_git_repo: *armageddon_git_repo
      armageddon_git_commit: *armageddon_git_commit
      armageddon_source_code_package: *armageddon_source_code_package
      cli_bin_dir: *cli_bin_dir

  bin/create_shared_config:
    short_description: Generate shared-config protobuf with the binary
    description:
      - Run the installed Armageddon binary to generate `shared_config.binpb`.
      - The input config is read from C(armageddon_artifacts_dir)/C(armageddon_shared_config_file) and the output is written back to C(armageddon_artifacts_dir).
    options:
      armageddon_bin_name: *armageddon_bin_name
      config_build_dir: *config_build_dir
      armageddon_artifacts_dir: *armageddon_artifacts_dir
      armageddon_config_file: *armageddon_config_file
      armageddon_shared_config_file: *armageddon_shared_config_file
      cli_bin_dir: *cli_bin_dir

  container/create_shared_config:
    short_description: Generate shared-config protobuf with a container
    description:
      - Run the Armageddon container to generate `shared_config.binpb`.
    options:
      armageddon_container_name: *armageddon_container_name
      armageddon_registry_endpoint: *armageddon_registry_endpoint
      armageddon_image_name: *armageddon_image_name
      armageddon_image_tag: *armageddon_image_tag
      armageddon_image: *armageddon_image
      armageddon_container_config_dir: *armageddon_container_config_dir
      armageddon_config_file: *armageddon_config_file
      armageddon_shared_config_file: *armageddon_shared_config_file
      armageddon_container_output_dir: *armageddon_container_output_dir
      config_build_dir: *config_build_dir
      armageddon_artifacts_dir: *armageddon_artifacts_dir
      armageddon_container_crypto_artifacts_dir: *armageddon_container_crypto_artifacts_dir
      fetched_artifacts_dir: *fetched_artifacts_dir
