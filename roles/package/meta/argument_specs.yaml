---
argument_specs:
  role-options:
    short_description: Shared package options
    description:
      - Reusable option definitions for package entry points.
    options:
      package_name: &package_name
        type: str
        required: true
        description:
          - Names the executable or package to install on the target host.
          - Set this to the package identifier used by the host package manager.

      package_service_name: &package_service_name
        type: str
        required: false
        description:
          - Names the Linux service to enable and start after installation.

  install:
    short_description: Install a package for the current operating system
    description:
      - Installs a package by dispatching to the Linux or macOS entry point based on C(ansible_facts.system).
      - This entry point validates C(package_name) and C(package_service_name).
    options:
      package_name: *package_name
      package_service_name: *package_service_name

  install_on_linux:
    short_description: Install a package on Linux
    description:
      - Installs a package on Linux hosts after confirming the command is not already present and the package is available through the system package manager.
      - If a service name is provided, this entry point also enables and starts that service after installation.
    options:
      package_name: *package_name
      package_service_name: *package_service_name

  install_on_macos:
    short_description: Install a package on macOS
    description:
      - Installs a package on macOS hosts with Homebrew after confirming the command is not already present.
      - This entry point assumes Homebrew is already installed on the target host.
    options:
      package_name: *package_name
