---
argument_specs:
  role-options:
    short_description: Shared configtxgen inputs
    description:
      - Common inputs reused by the binary, container, config, and dispatch entry points in this role.
    options:
      configtxgen_registry_endpoint: &configtxgen_registry_endpoint
        type: str
        default: "{{ lookup('env', 'CONFIGTXGEN_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - Image registry endpoint for C(configtxgen_image).
      configtxgen_image_name: &configtxgen_image_name
        type: str
        default: fabric-x-tools
        description:
          - Image repository name for C(configtxgen_image).
      configtxgen_image_tag: &configtxgen_image_tag
        type: str
        default: "0.0.8"
        description:
          - Image tag for C(configtxgen_image).
      configtxgen_image: &configtxgen_image
        type: str
        default: "{{ configtxgen_registry_endpoint }}/{{ configtxgen_image_name }}:{{ configtxgen_image_tag }}"
        description:
          - Full container image reference for `configtxgen`.
      configtxgen_container_name: &configtxgen_container_name
        type: str
        default: configtxgen
        description:
          - Container name used by the container entry point.
      configtxgen_git_hub_url: &configtxgen_git_hub_url
        type: str
        default: github.com
        description:
          - Git host for C(configtxgen_bin_package).
      configtxgen_git_repo: &configtxgen_git_repo
        type: str
        default: hyperledger/fabric-x
        description:
          - Repository path for C(configtxgen_bin_package).
      configtxgen_git_commit: &configtxgen_git_commit
        type: str
        default: v0.0.8
        description:
          - Git reference used by the binary build and install entry points.
      configtxgen_source_code_package: &configtxgen_source_code_package
        type: str
        default: tools/configtxgen
        description:
          - Go package path for the `configtxgen` source tree.
      configtxgen_bin_package: &configtxgen_bin_package
        type: str
        default: "{{ configtxgen_git_hub_url }}/{{ configtxgen_git_repo }}/{{ configtxgen_source_code_package }}"
        description:
          - Go package reference used by `bin/install`.
      configtxgen_bin_name: &configtxgen_bin_name
        type: str
        default: configtxgen
        description:
          - Executable name used by the binary and container entry points.
      configtxgen_use_bin: &configtxgen_use_bin
        type: bool
        default: false
        description:
          - Dispatch selector for the public start entry point and the config template branch selection.
          - When false, the container path is used.
      config_build_dir: &config_build_dir
        type: path
        description:
          - Base build directory for C(configtxgen_artifacts_dir).
          - "Example: C(/opt/fabricx/build/configtxgen)."
      configtxgen_artifacts_dir: &configtxgen_artifacts_dir
        type: path
        default: "{{ config_build_dir }}/configtxgen-artifacts"
        description:
          - Directory used for the generated config file and genesis block artifacts.
      configtxgen_container_artifacts_dir: &configtxgen_container_artifacts_dir
        type: path
        default: /tmp/configtxgen-artifacts
        description:
          - Container output directory used by `container/start`.
      configtxgen_container_config_dir: &configtxgen_container_config_dir
        type: path
        default: /tmp/config
        description:
          - Container mount path for `configtx.yaml`.
      configtxgen_container_crypto_artifacts_dir:
        &configtxgen_container_crypto_artifacts_dir
        type: path
        default: /tmp/crypto-artifacts
        description:
          - Container mount path for fetched crypto artifacts.
      configtxgen_armageddon_container_artifacts_dir:
        &configtxgen_armageddon_container_artifacts_dir
        type: path
        default: /tmp/armageddon-artifacts
        description:
          - Container mount path for armageddon artifacts.
      configtxgen_armageddon_binpb_file: &configtxgen_armageddon_binpb_file
        type: str
        default: shared_config.binpb
        description:
          - Shared config binary file name consumed by the config template.
      configtxgen_config_file: &configtxgen_config_file
        type: str
        default: configtx.yaml
        description:
          - Generated configuration file name written by `config/build` and mounted by `container/start`.
      channel_id: &channel_id
        type: str
        description:
          - Channel identifier for C(configtxgen_channel_id).
          - "Example: C(fabricx-main-channel)."
      configtxgen_channel_id: &configtxgen_channel_id
        type: str
        default: "{{ channel_id }}"
        description:
          - Channel identifier passed to `configtxgen` and used in the output block filename.
      configtxgen_profile_id: &configtxgen_profile_id
        type: str
        default: OrgsChannel
        description:
          - Config profile passed to `configtxgen`.
      configtxgen_orderers_by_org: &configtxgen_orderers_by_org
        type: dict
        default: {}
        description:
          - Orderer organization map rendered into `configtx.yaml`.
      configtxgen_peers_by_org: &configtxgen_peers_by_org
        type: dict
        default: {}
        description:
          - Peer organization map rendered into `configtx.yaml`.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - Directory containing fetched crypto artifacts used by the binary path and container mounts.
          - "Example: C(/opt/fabricx/artifacts/crypto)."
      armageddon_artifacts_dir: &armageddon_artifacts_dir
        type: path
        required: true
        description:
          - Directory containing armageddon artifacts used by the binary path and container mounts.
          - "Example: C(/opt/fabricx/artifacts/armageddon)."
      cli_bin_dir: &cli_bin_dir
        type: path
        required: true
        description:
          - Directory used as the `configtxgen` binary destination or lookup path.
          - "Example: C(/opt/fabricx/bin)."

  config/build:
    short_description: Render the configtxgen configuration file
    description:
      - Generate `configtx.yaml` for Fabric-X genesis block creation.
      - Render the config template from the selected crypto and armageddon artifact roots, then place it under C(configtxgen_artifacts_dir).
      - The template switches between the binary and container artifact paths based on C(configtxgen_use_bin).
    options:
      config_build_dir: *config_build_dir
      configtxgen_artifacts_dir: *configtxgen_artifacts_dir
      configtxgen_use_bin: *configtxgen_use_bin
      configtxgen_container_crypto_artifacts_dir: *configtxgen_container_crypto_artifacts_dir
      configtxgen_armageddon_container_artifacts_dir: *configtxgen_armageddon_container_artifacts_dir
      configtxgen_config_file: *configtxgen_config_file
      configtxgen_armageddon_binpb_file: *configtxgen_armageddon_binpb_file
      configtxgen_orderers_by_org: *configtxgen_orderers_by_org
      configtxgen_peers_by_org: *configtxgen_peers_by_org
      fetched_artifacts_dir: *fetched_artifacts_dir
      armageddon_artifacts_dir: *armageddon_artifacts_dir

  bin/build:
    short_description: Build the configtxgen binary on the control node
    description:
      - Build the `configtxgen` binary from the Fabric-X source tree on the control node.
      - The compiled executable is written to C(cli_bin_dir) and reused by the binary start entry point.
    options:
      configtxgen_git_hub_url: *configtxgen_git_hub_url
      configtxgen_git_repo: *configtxgen_git_repo
      configtxgen_git_commit: *configtxgen_git_commit
      configtxgen_source_code_package: *configtxgen_source_code_package
      configtxgen_bin_name: *configtxgen_bin_name
      cli_bin_dir: *cli_bin_dir

  bin/install:
    short_description: Install the configtxgen binary into the local bin directory
    description:
      - Install the `configtxgen` Go package through the shared `bin` role.
      - The installed executable lands in C(cli_bin_dir) and is then used by the binary start entry point.
    options:
      configtxgen_git_hub_url: *configtxgen_git_hub_url
      configtxgen_git_repo: *configtxgen_git_repo
      configtxgen_source_code_package: *configtxgen_source_code_package
      configtxgen_bin_package: *configtxgen_bin_package
      configtxgen_git_commit: *configtxgen_git_commit
      configtxgen_bin_name: *configtxgen_bin_name
      cli_bin_dir: *cli_bin_dir

  bin/start:
    short_description: Generate a genesis block with the configtxgen binary
    description:
      - Run the local `configtxgen` binary to generate the channel genesis block.
      - The output block is written beneath C(configtxgen_artifacts_dir) as C(<channel_id>_block.pb); with the bundled example channel, that becomes C(fabricx-main-channel_block.pb).
    options:
      channel_id: *channel_id
      config_build_dir: *config_build_dir
      cli_bin_dir: *cli_bin_dir
      configtxgen_bin_name: *configtxgen_bin_name
      configtxgen_channel_id: *configtxgen_channel_id
      configtxgen_profile_id: *configtxgen_profile_id
      configtxgen_artifacts_dir: *configtxgen_artifacts_dir

  container/start:
    short_description: Generate a genesis block with the configtxgen container
    description:
      - Run `configtxgen` in a container to generate the channel genesis block.
      - The container consumes the rendered `configtx.yaml` plus mounted crypto and armageddon artifacts, then writes C(<channel_id>_block.pb) beneath C(configtxgen_container_artifacts_dir).
    options:
      channel_id: *channel_id
      config_build_dir: *config_build_dir
      configtxgen_artifacts_dir: *configtxgen_artifacts_dir
      configtxgen_container_name: *configtxgen_container_name
      configtxgen_registry_endpoint: *configtxgen_registry_endpoint
      configtxgen_image_name: *configtxgen_image_name
      configtxgen_image_tag: *configtxgen_image_tag
      configtxgen_image: *configtxgen_image
      configtxgen_bin_name: *configtxgen_bin_name
      configtxgen_channel_id: *configtxgen_channel_id
      configtxgen_profile_id: *configtxgen_profile_id
      configtxgen_container_config_dir: *configtxgen_container_config_dir
      configtxgen_container_artifacts_dir: *configtxgen_container_artifacts_dir
      configtxgen_config_file: *configtxgen_config_file
      configtxgen_armageddon_container_artifacts_dir: *configtxgen_armageddon_container_artifacts_dir
      configtxgen_container_crypto_artifacts_dir: *configtxgen_container_crypto_artifacts_dir
      configtxgen_armageddon_binpb_file: *configtxgen_armageddon_binpb_file
      armageddon_artifacts_dir: *armageddon_artifacts_dir
      fetched_artifacts_dir: *fetched_artifacts_dir

  start:
    short_description: Dispatch genesis block generation to binary or container
    description:
      - Select the binary or container execution path for `configtxgen` based on C(configtxgen_use_bin).
      - Both execution paths consume the rendered configuration and emit the same C(<channel_id>_block.pb) artifact name.
    options:
      configtxgen_use_bin: *configtxgen_use_bin
