---
argument_specs:

  start:
    short_description: Start ElasticSearch in the selected deployment mode
    description:
      - Starts ElasticSearch either as a local container or as Kubernetes resources.
      - Select the deployment mode with C(elasticsearch_use_container) or C(elasticsearch_use_k8s).
    options:
      elasticsearch_use_container:
        type: bool
        default: true
        description:
          - Controls whether the role starts ElasticSearch with the container entry point.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the role starts ElasticSearch with the Kubernetes entry point.

  stop:
    short_description: Stop the ElasticSearch container
    description:
      - Stops the ElasticSearch container managed by this role.
    options:
      elasticsearch_container_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Names the ElasticSearch container to stop.

  teardown:
    short_description: Remove ElasticSearch workload and data
    description:
      - Removes the ElasticSearch workload and then removes the data directory or persistent volume claim.
      - Removes either the container deployment or the Kubernetes deployment depending on the enabled mode.
    options:
      elasticsearch_use_container:
        type: bool
        default: true
        description:
          - Controls whether the container workload is removed.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the Kubernetes workload is removed.
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used for StatefulSet, Service, Secret, and PVC objects.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the ElasticSearch resources.
      elasticsearch_remote_data_dir:
        type: path
        required: true
        description:
          - Sets the remote data directory used by the container deployment.

  wipe:
    short_description: Remove ElasticSearch deployment artifacts
    description:
      - Runs teardown and then removes ElasticSearch TLS material and configuration files from the remote host.
    options:
      elasticsearch_use_container:
        type: bool
        default: true
        description:
          - Controls whether the container workload is removed during teardown.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the Kubernetes workload is removed during teardown and crypto cleanup.
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used by the cleanup tasks.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the ElasticSearch resources to remove.
      elasticsearch_remote_data_dir:
        type: path
        required: true
        description:
          - Sets the remote data directory removed during teardown.
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory that stores ElasticSearch TLS assets and config files.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the TLS private key file removed from the remote configuration directory.

  fetch_logs:
    short_description: Fetch ElasticSearch logs from the selected deployment mode
    description:
      - Collects logs from the ElasticSearch container or from the ElasticSearch Kubernetes pod.
    options:
      elasticsearch_use_container:
        type: bool
        default: true
        description:
          - Controls whether logs are collected from the container deployment.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether logs are collected from the Kubernetes deployment.

  ping:
    short_description: Check that ElasticSearch ports are reachable
    description:
      - Verifies that the ElasticSearch HTTP and transport ports are reachable on the target host.
    options:
      elasticsearch_http_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch HTTP port to check. Example: C(9200)."
      elasticsearch_transport_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch transport port to check. Example: C(9300)."

  container/start:
    short_description: Start ElasticSearch as a container
    description:
      - Creates the required volumes, configures TLS settings when enabled, and starts the ElasticSearch container.
    options:
      elasticsearch_remote_data_dir:
        type: path
        required: true
        description:
          - Sets the remote directory mounted into the container for ElasticSearch data.
      elasticsearch_container_data_dir:
        type: path
        default: /usr/share/elasticsearch/data
        description:
          - Sets the in-container data directory mount path.
      elasticsearch_use_tls:
        type: bool
        default: false
        description:
          - Enables TLS configuration for ElasticSearch HTTP traffic.
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory that stores ElasticSearch TLS files.
      elasticsearch_tls_cert_file:
        type: str
        default: server.crt
        description:
          - Names the TLS server certificate file used by ElasticSearch.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the TLS private key file used by ElasticSearch.
      elasticsearch_container_config_dir:
        type: path
        default: /usr/share/elasticsearch
        description:
          - Sets the base configuration directory inside the ElasticSearch container.
      elasticsearch_http_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch HTTP port exposed by the container. Example: C(9200)."
      elasticsearch_transport_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch transport port exposed by the container. Example: C(9300)."
      elasticsearch_container_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Names the ElasticSearch container to create.
      elasticsearch_image:
        type: str
        default: "{{ elasticsearch_registry_endpoint }}/{{ elasticsearch_image_name }}:{{ elasticsearch_image_tag }}"
        description:
          - Sets the fully qualified ElasticSearch image reference.

  container/stop:
    short_description: Stop the ElasticSearch container
    description:
      - Stops the ElasticSearch container managed by this role.
    options:
      elasticsearch_container_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Names the ElasticSearch container to stop.

  container/rm:
    short_description: Remove the ElasticSearch container
    description:
      - Removes the ElasticSearch container managed by this role.
    options:
      elasticsearch_container_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Names the ElasticSearch container to remove.

  container/fetch_logs:
    short_description: Fetch logs from the ElasticSearch container
    description:
      - Collects logs from the ElasticSearch container managed by this role.
    options:
      elasticsearch_container_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Names the ElasticSearch container whose logs are collected.

  config/rm:
    short_description: Remove the ElasticSearch configuration directory
    description:
      - Deletes the remote ElasticSearch configuration directory from the target host.
    options:
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory to remove.

  data/rm:
    short_description: Remove ElasticSearch data storage
    description:
      - Removes the local data directory for container deployments or the Kubernetes persistent volume claim for Kubernetes deployments.
    options:
      elasticsearch_use_container:
        type: bool
        default: true
        description:
          - Controls whether the container data directory is removed.
      elasticsearch_remote_data_dir:
        type: path
        required: true
        description:
          - Sets the remote data directory removed for the container deployment.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the Kubernetes persistent volume claim is removed.
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the base Kubernetes resource name used to derive the persistent volume claim name.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the persistent volume claim.

  crypto/setup:
    short_description: Prepare ElasticSearch TLS material
    description:
      - Generates TLS material when TLS is enabled and transfers it into Kubernetes when the Kubernetes deployment mode is enabled.
    options:
      elasticsearch_use_tls:
        type: bool
        default: false
        description:
          - Enables TLS material generation and TLS secret creation.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the generated TLS material is uploaded to Kubernetes as a Secret.

  crypto/fetch:
    short_description: Fetch ElasticSearch TLS certificates
    description:
      - Fetches the ElasticSearch TLS CA certificate and server certificate from the remote host when TLS is enabled.
    options:
      elasticsearch_use_tls:
        type: bool
        default: false
        description:
          - Enables certificate fetching for TLS-enabled ElasticSearch deployments.
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory that contains the TLS certificate files.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Sets the local directory used to store fetched ElasticSearch TLS artifacts.

  crypto/rm:
    short_description: Remove ElasticSearch TLS material
    description:
      - Deletes the local ElasticSearch TLS files from the remote host and removes the Kubernetes Secret when Kubernetes is enabled.
    options:
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory that contains the TLS files to remove.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the ElasticSearch TLS private key file to remove.
      elasticsearch_use_k8s:
        type: bool
        default: false
        description:
          - Controls whether the Kubernetes TLS Secret is removed.
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used to derive the TLS Secret name.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the TLS Secret to remove.

  crypto/openssl/generate_cert:
    short_description: Generate ElasticSearch TLS material with OpenSSL
    description:
      - Generates a self-signed TLS certificate and private key for ElasticSearch on the target host.
    options:
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory where the TLS files are created.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the generated TLS private key file.
      elasticsearch_tls_cert_file:
        type: str
        default: server.crt
        description:
          - Names the generated TLS certificate file.
      organization:
        type: dict
        required: false
        description:
          - Optionally provides organization metadata used to derive the TLS certificate organization name.

  k8s/start:
    short_description: Start ElasticSearch on Kubernetes
    description:
      - Creates the namespace if needed and applies the ElasticSearch Service, NodePort Service, and StatefulSet resources.
    options:
      elasticsearch_k8s_wait_timeout:
        type: int
        default: 120
        description:
          - Sets the number of seconds to wait for the ElasticSearch StatefulSet to become ready.
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used for the ElasticSearch objects.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace where ElasticSearch resources are created.
      elasticsearch_http_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch HTTP service and container port. Example: C(9200)."
      elasticsearch_transport_port:
        type: int
        required: true
        description:
          - "Sets the ElasticSearch transport service and container port. Example: C(9300)."
      elasticsearch_k8s_http_node_port:
        type: int
        default: "{{ elasticsearch_http_port }}"
        description:
          - Sets the NodePort used to expose the ElasticSearch HTTP service externally.
      elasticsearch_k8s_transport_node_port:
        type: int
        default: "{{ elasticsearch_transport_port }}"
        description:
          - Sets the NodePort used to expose the ElasticSearch transport service externally.
      elasticsearch_k8s_fs_group:
        type: int
        default: 1000
        description:
          - Sets the pod file-system group used to read mounted TLS secrets.
      elasticsearch_image:
        type: str
        default: "{{ elasticsearch_registry_endpoint }}/{{ elasticsearch_image_name }}:{{ elasticsearch_image_tag }}"
        description:
          - Sets the ElasticSearch container image used by the StatefulSet.
      elasticsearch_use_tls:
        type: bool
        default: false
        description:
          - Enables TLS-specific environment variables, volume mounts, and HTTPS probes in the StatefulSet.
      elasticsearch_container_config_dir:
        type: path
        default: /usr/share/elasticsearch
        description:
          - Sets the base configuration directory inside the ElasticSearch container.
      elasticsearch_container_data_dir:
        type: path
        default: /usr/share/elasticsearch/data
        description:
          - Sets the in-container data directory mounted from persistent storage.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the mounted TLS private key file when TLS is enabled.
      elasticsearch_tls_cert_file:
        type: str
        default: server.crt
        description:
          - Names the mounted TLS certificate file when TLS is enabled.
      k8s_image_pull_secret:
        type: str
        required: false
        description:
          - Optionally names the Kubernetes image pull secret used for private registries.
      k8s_storage_class:
        type: str
        required: false
        description:
          - Optionally sets the storage class used for the ElasticSearch persistent volume claim.
      k8s_storage_size:
        type: str
        required: true
        description:
          - "Sets the requested persistent volume size for ElasticSearch data. Example: C(20Gi)."
      k8s_readiness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the readiness probe initial delay in seconds.
      k8s_readiness_probe_period_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the readiness probe interval in seconds.
      k8s_readiness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the readiness probe timeout in seconds.
      k8s_readiness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Optionally overrides the readiness probe failure threshold.
      k8s_liveness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the liveness probe initial delay in seconds.
      k8s_liveness_probe_period_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the liveness probe interval in seconds.
      k8s_liveness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Optionally overrides the liveness probe timeout in seconds.
      k8s_liveness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Optionally overrides the liveness probe failure threshold.

  k8s/rm:
    short_description: Remove ElasticSearch Kubernetes resources
    description:
      - Deletes the ElasticSearch StatefulSet, headless Service, and NodePort Service from Kubernetes.
    options:
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used for the ElasticSearch objects to delete.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the ElasticSearch resources.

  k8s/fetch_logs:
    short_description: Fetch ElasticSearch pod logs from Kubernetes
    description:
      - Collects logs from the ElasticSearch pod selected by the ElasticSearch application label.
    options:
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes application label used to select the ElasticSearch pod logs.

  k8s/crypto/rm:
    short_description: Remove the ElasticSearch Kubernetes TLS Secret
    description:
      - Deletes the Kubernetes Secret that stores ElasticSearch TLS material.
    options:
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used to derive the TLS Secret name.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace containing the ElasticSearch TLS Secret.

  k8s/crypto/transfer:
    short_description: Upload ElasticSearch TLS material to Kubernetes
    description:
      - Creates or updates the Kubernetes Secret that stores ElasticSearch TLS material.
    options:
      elasticsearch_k8s_resource_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes resource name used to derive the TLS Secret name.
      k8s_namespace:
        type: str
        required: true
        description:
          - Names the Kubernetes namespace where the ElasticSearch TLS Secret is created.
      elasticsearch_use_tls:
        type: bool
        default: false
        description:
          - Controls whether TLS key and certificate data are added to the Kubernetes Secret.
      elasticsearch_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote configuration directory containing the ElasticSearch TLS files to upload.
      elasticsearch_tls_private_key_file:
        type: str
        default: server.key
        description:
          - Names the TLS private key file uploaded to the Kubernetes Secret.
      elasticsearch_tls_cert_file:
        type: str
        default: server.crt
        description:
          - Names the TLS certificate file uploaded to the Kubernetes Secret.
