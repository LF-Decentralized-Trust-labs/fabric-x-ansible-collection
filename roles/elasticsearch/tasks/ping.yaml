# =======================
# bin / container
# =======================
- name: Check that ElasticSearch ports are open
  vars:
    utils_ports_to_ping:
      - "{{ elasticsearch_http_port }}"
      - "{{ elasticsearch_transport_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not elasticsearch_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.elasticsearch
    tasks_from: k8s/ping
  when: elasticsearch_use_k8s
