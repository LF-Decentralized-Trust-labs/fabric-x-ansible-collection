# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for ElasticSearch
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply ElasticSearch Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply ElasticSearch NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2
  when: elasticsearch_k8s_http_node_port is defined or
    elasticsearch_k8s_transport_node_port is defined

- name: Apply ElasticSearch LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-loadbalancer.yaml.j2
  when: elasticsearch_k8s_loadbalancer_expose_http_port or
    elasticsearch_k8s_loadbalancer_expose_transport_port

- name: Apply ElasticSearch StatefulSet
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/statefulset.yaml.j2
    wait: true
    wait_timeout: "{{ elasticsearch_k8s_wait_timeout }}"
