- name: Delete ElasticSearch StatefulSet
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: StatefulSet
    name: "{{ elasticsearch_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete ElasticSearch Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ elasticsearch_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete ElasticSearch NodePort Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ elasticsearch_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
  when:
    - elasticsearch_k8s_http_node_port is defined or
      elasticsearch_k8s_transport_node_port is defined

- name: Delete ElasticSearch LoadBalancer Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ elasticsearch_k8s_resource_name }}-loadbalancer"
    namespace: "{{ k8s_namespace }}"
  when:
    - elasticsearch_k8s_loadbalancer_expose_http_port or
      elasticsearch_k8s_loadbalancer_expose_transport_port
