# =========================
# K8s ConfigMaps and Operator
# =========================
- name: Remove AWX Kubernetes ConfigMaps and Operator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.awx
    tasks_from: k8s/config/rm
  when: awx_use_k8s or awx_use_openshift
