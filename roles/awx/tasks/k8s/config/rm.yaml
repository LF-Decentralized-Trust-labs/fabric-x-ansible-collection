# =========================
# AWX ConfigMaps
# =========================
- name: Remove AWX ConfigMaps
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ConfigMap
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"

# =========================
# Remove the AWX Operator, its RBAC, and its CRDs
# =========================

# =========================
# Kustomize-based bulk delete
# =========================
- name: Check whether AWX operator kustomization was rendered
  ansible.builtin.stat:
    path: "{{ awx_k8s_operator_kustomize_dir }}/kustomization.yaml"
  register: awx_operator_kustomization_file

- name: Delete AWX operator
  kubernetes.core.k8s:
    state: absent
    definition: "{{ lookup('kubernetes.core.kustomize', dir=awx_k8s_operator_kustomize_dir) }}"
  when: awx_operator_kustomization_file.stat.exists

- name: Remove AWX operator kustomize directory
  ansible.builtin.file:
    path: "{{ awx_k8s_operator_kustomize_dir }}"
    state: absent

# =========================
# AWX Operator Deployment/Service/ServiceAccount
# =========================
- name: Delete AWX Operator Deployment
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: awx-operator-controller-manager
    namespace: "{{ k8s_namespace | default('default') }}"

- name: Delete AWX Operator metrics Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: awx-operator-controller-manager-metrics-service
    namespace: "{{ k8s_namespace | default('default') }}"

- name: Delete AWX Operator ServiceAccount
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ServiceAccount
    name: awx-operator-controller-manager
    namespace: "{{ k8s_namespace | default('default') }}"

