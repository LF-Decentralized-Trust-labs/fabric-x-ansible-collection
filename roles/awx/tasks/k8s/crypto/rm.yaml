- name: Remove AWX Secrets
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"
