- name: Delete AWX custom resource
  kubernetes.core.k8s:
    state: absent
    api_version: awx.ansible.com/v1beta1
    kind: AWX
    name: "awx"
    namespace: "{{ k8s_namespace | default('default') }}"
    wait: true
    wait_timeout: "{{ awx_k8s_wait_timeout }}"
  register: awx_delete_custom_resource
  failed_when:
    - awx_delete_custom_resource.failed | default(false)
    - "'Failed to find exact match for awx.ansible.com/v1beta1.AWX' not in (awx_delete_custom_resource.msg | default(''))"

- name: Remove residual AWX Deployments
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"
    wait: true
    wait_timeout: "{{ awx_k8s_wait_timeout }}"

- name: Remove residual AWX StatefulSets
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: StatefulSet
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"
    wait: true
    wait_timeout: "{{ awx_k8s_wait_timeout }}"

- name: Remove residual AWX Jobs
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"
    wait: true
    wait_timeout: "{{ awx_k8s_wait_timeout }}"

- name: Remove residual AWX Services
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ k8s_namespace | default('default') }}"
    label_selectors:
      - "app.kubernetes.io/part-of=awx"
    wait: true
    wait_timeout: "{{ awx_k8s_wait_timeout }}"
