- name: Teardown AWX
  ansible.builtin.include_role:
    name: hyperledger.fabricx.awx
    tasks_from: teardown

- name: Remove AWX Secrets
  ansible.builtin.include_role:
    name: hyperledger.fabricx.awx
    tasks_from: crypto/rm

- name: Remove AWX ConfigMaps and Operator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.awx
    tasks_from: config/rm
