- name: Delete Loki http OpenShift Route
  vars:
    openshift_route_name: "{{ loki_container_name }}-http"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: loki_openshift_route is defined

- name: Remove Loki workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loki
    tasks_from: k8s/rm
