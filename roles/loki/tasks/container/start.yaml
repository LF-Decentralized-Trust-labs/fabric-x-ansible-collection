- name: Ensure the data directory for Loki exists
  ansible.builtin.file:
    path: "{{ loki_remote_data_dir }}"
    state: directory
    mode: "0755"

- name: Start Loki container
  vars:
    container_name: "{{ loki_container_name }}"
    container_image: "{{ loki_image }}"
    container_run_as_host_user: true
    container_ports:
      - "{{ loki_port }}:{{ loki_port }}"
    container_volumes:
      - "{{ loki_remote_config_dir }}:{{ loki_container_config_dir }}:ro,z"
      - "{{ loki_remote_data_dir }}:{{ loki_container_data_dir }}:z"
    container_command: "-config.file={{ loki_container_config_dir }}/config.yaml"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: start
