- name: Remove Loki PersistentVolumeClaim
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolumeClaim
    name: "{{ loki_container_name }}-pvc"
    namespace: "{{ k8s_namespace }}"
