- name: Ensure Kubernetes namespace exists for Loki
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

- name: Apply Loki Secret
  vars:
    loki_k8s_tls_server_key_path: "{{ loki_remote_config_dir }}/tls/{{ loki_tls_private_key_file }}"
    loki_k8s_tls_server_cert_path: "{{ loki_remote_config_dir }}/tls/{{ loki_tls_cert_file }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/secret.yaml.j2
  when: loki_use_tls
