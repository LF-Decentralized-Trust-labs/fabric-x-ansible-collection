- name: Deploy Loki on Kubernetes
  block:
    - name: Transfer Loki configuration
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loki
        tasks_from: k8s/config/transfer

    - name: Create Loki headless Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ loki_container_name }}"
            namespace: "{{ k8s_namespace }}"
            labels:
              app: "{{ loki_container_name }}"
              app.kubernetes.io/name: "{{ loki_container_name }}"
              app.kubernetes.io/component: loki
              app.kubernetes.io/part-of: monitoring
              platform: cbdc
          spec:
            clusterIP: None
            selector:
              app: "{{ loki_container_name }}"
            ports:
              - name: http
                port: "{{ loki_port }}"
                targetPort: "{{ loki_port }}"
                protocol: TCP

    - name: Deploy Loki StatefulSet
      kubernetes.core.k8s:
        state: present
        namespace: "{{ k8s_namespace }}"
        template:
          path: k8s/statefulset.yaml.j2
        wait: true
        wait_timeout: "{{ loki_k8s_wait_timeout }}"
