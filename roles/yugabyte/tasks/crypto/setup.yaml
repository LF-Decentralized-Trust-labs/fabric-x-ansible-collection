- name: Setup TLS crypto material
  when:
    - yugabyte_use_tls
    - organization is defined
    - organization.role is defined
    - organization.role == 'peer'
  block:
    # =========================
    # With cryptogen
    # =========================
    # If no Fabric CA is defined, assume the crypto material is generated
    # with cryptogen. Thus, transfer it.
    - name: Transfer the SSL crypto material generated by cryptogen
      ansible.builtin.include_role:
        name: hyperledger.fabricx.yugabyte
        tasks_from: crypto/cryptogen/transfer
      when: organization.fabric_ca_host is not defined
    # =========================
    # With Fabric-CA
    # =========================
    - name: Enroll with Fabric-CA to generate the TLS crypto material
      ansible.builtin.include_role:
        name: hyperledger.fabricx.yugabyte
        tasks_from: crypto/fabric_ca/enroll
      when: organization.fabric_ca_host is defined

# =========================
# Kubernetes Secret
# =========================
- name: Apply Yugabyte k8s Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: k8s/crypto/transfer
  when: yugabyte_use_k8s or yugabyte_use_openshift
