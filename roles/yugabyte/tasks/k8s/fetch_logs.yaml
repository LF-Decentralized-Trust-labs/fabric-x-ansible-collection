- name: Ensure fetched log directory exists
  ansible.builtin.file:
    path: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Fetch Yugabyte pod logs
  kubernetes.core.k8s_log:
    namespace: "{{ k8s_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name={{ yugabyte_k8s_resource_name }}"
  register: yugabyte_k8s_logs
  failed_when: false

- name: Write Yugabyte logs to file
  ansible.builtin.copy:
    content: "{{ yugabyte_k8s_logs.log | default('') }}"
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/logs.txt"
    mode: "0644"
