# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Yugabyte tablet
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Yugabyte tablet Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/tablet-service.yaml.j2

- name: Apply Yugabyte tablet NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/tablet-service-nodeport.yaml.j2
  when: yugabyte_k8s_tablet_pgsql_node_port is defined or
    yugabyte_k8s_tablet_rpc_node_port is defined or
    yugabyte_k8s_tablet_webserver_node_port is defined or
    yugabyte_k8s_tablet_pgsql_web_node_port is defined or
    yugabyte_k8s_tablet_cql_bind_node_port is defined or
    yugabyte_k8s_tablet_cql_web_node_port is defined

- name: Apply Yugabyte tablet LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/tablet-service-loadbalancer.yaml.j2
  when: yugabyte_k8s_loadbalancer_expose_tablet_pgsql_port or
    yugabyte_k8s_loadbalancer_expose_tablet_rpc_port or
    yugabyte_k8s_loadbalancer_expose_tablet_webserver_port or
    yugabyte_k8s_loadbalancer_expose_tablet_pgsql_web_port or
    yugabyte_k8s_loadbalancer_expose_tablet_cql_bind_port or
    yugabyte_k8s_loadbalancer_expose_tablet_cql_web_port

- name: Apply Yugabyte tablet StatefulSet
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/tablet-statefulset.yaml.j2
    wait: "{{ yugabyte_k8s_wait }}"
    wait_timeout: "{{ yugabyte_k8s_wait_timeout }}"

# =========================
# DB init (first tablet only)
# =========================
- name: Initialize DB in first tablet pod
  kubernetes.core.k8s_exec:
    namespace: "{{ k8s_namespace }}"
    pod: "{{ yugabyte_k8s_resource_name }}-0"
    container: yugabyte
    command: >-
      ysqlsh -h localhost -p {{ yugabyte_tablet_pgsql_bind_port }}
      -U yugabyte -f /var/ybinit/{{ yugabyte_init_script_file }}
  when: inventory_hostname == yugabyte_tablet_hosts[0]
