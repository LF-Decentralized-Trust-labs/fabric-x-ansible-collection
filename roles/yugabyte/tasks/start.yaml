# =========================
# Cluster topology (shared across all deployment modes and component types)
# =========================
- name: Set Yugabyte cluster variables
  vars:
    _yb_masters: >-
      {{
        yugabyte_cluster
        | map('extract', hostvars)
        | selectattr('yugabyte_component_type', 'defined')
        | selectattr('yugabyte_component_type', '==', 'master')
        | map(attribute='inventory_hostname')
        | sort
        | list
      }}
    _yb_tablets: >-
      {{
        yugabyte_cluster
        | map('extract', hostvars)
        | selectattr('yugabyte_component_type', 'defined')
        | selectattr('yugabyte_component_type', '==', 'tablet')
        | map(attribute='inventory_hostname')
        | sort
        | list
      }}
  ansible.builtin.set_fact:
    yugabyte_master_hosts: "{{ _yb_masters }}"
    yugabyte_tablet_hosts: "{{ _yb_tablets }}"
    yugabyte_master_endpoints: >-
      {{
        _yb_masters
        | map('extract', hostvars, 'ansible_host')
        | zip(_yb_masters | map('extract', hostvars, 'yugabyte_master_rpc_bind_port'))
        | map('join', ':')
        | join(',')
      }}

- name: Start Yugabyte DB on Kubernetes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: k8s/start
  when: yugabyte_use_k8s

- name: Start Yugabyte on OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: openshift/start
  when: yugabyte_use_openshift

- name: Start Yugabyte DB containers
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: container/start
  when: yugabyte_use_container
