- name: Start Yugabyte master OpenShift resources
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: openshift/master/start
  when: yugabyte_component_type == 'master'

- name: Start Yugabyte tablet server OpenShift resources
  ansible.builtin.include_role:
    name: hyperledger.fabricx.yugabyte
    tasks_from: openshift/tablet/start
  when: yugabyte_component_type == 'tablet'
