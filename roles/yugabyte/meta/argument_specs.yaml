  k8s/crypto/transfer:
    short_description: Create a YugabyteDB TLS Secret
    description:
      - "Creates the Kubernetes Secret that exposes the YugabyteDB TLS key pair and CA certificate to pods."
      - "The Secret is mounted by master and tablet StatefulSets when YugabyteDB TLS is enabled."
    options:
      k8s_namespace: *k8s_namespace
      remote_config_dir: *remote_config_dir
      yugabyte_k8s_resource_name: *yugabyte_k8s_resource_name
      yugabyte_remote_config_dir: *yugabyte_remote_config_dir
      yugabyte_use_tls: *yugabyte_use_tls

  data/rm:
    short_description: Remove YugabyteDB persisted data
    description:
      - "Deletes persisted YugabyteDB data for the selected deployment mode."
      - "Container mode removes the host data directory; Kubernetes mode removes the PVC associated with the StatefulSet volume claim."
    options:
      remote_data_dir: *remote_data_dir
      yugabyte_use_container: *yugabyte_use_container
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_remote_data_dir: *yugabyte_remote_data_dir
      yugabyte_k8s_resource_name: *yugabyte_k8s_resource_name
      k8s_namespace:
        <<: *k8s_namespace
        required: false

  prometheus/get_scrapers:
    short_description: Build Prometheus scrapers for YugabyteDB
    description:
      - "Groups YugabyteDB hosts by cluster and assembles Prometheus scrape configuration for exposed master and tablet metrics endpoints."
      - "When webserver TLS is enabled, the generated scraper references the fetched organization TLS CA artifact for HTTPS scraping."
    options:
      yugabyte_hosts: *yugabyte_hosts
      fetched_artifacts_dir: *fetched_artifacts_dir
