---
argument_specs:
  role-options:
    short_description: Shared YugabyteDB argument definitions
    description:
      - "Reusable option catalog for the YugabyteDB role."
    options:
      yugabyte_cluster: &yugabyte_cluster
        type: list
        elements: str
        required: true
        description:
          - "Lists the inventory hosts that belong to the YugabyteDB cluster."
          - "Example: C(['yb-master-1', 'yb-master-2', 'yb-master-3', 'yb-tserver-1', 'yb-tserver-2', 'yb-tserver-3'])."
      yugabyte_hosts: &yugabyte_hosts
        type: list
        elements: str
        required: true
        description:
          - "Lists the inventory hosts that belong to the YugabyteDB clusters monitored by Prometheus."
          - "Example: C(['yb-master-1', 'yb-master-2', 'yb-master-3', 'yb-tserver-1', 'yb-tserver-2', 'yb-tserver-3'])."
      yugabyte_component_type: &yugabyte_component_type
        type: str
        required: true
        choices:
          - master
          - tablet
        description:
          - "Selects whether the current host is handled as a YugabyteDB master or tablet node."
          - "Example: C(tablet)."
      yugabyte_use_k8s: &yugabyte_use_k8s
        type: bool
        required: false
        default: false
        description:
          - "Enables Kubernetes mode for the YugabyteDB role."
      yugabyte_use_container: &yugabyte_use_container
        type: bool
        required: false
        default: "{{ not yugabyte_use_k8s }}"
        description:
          - "Enables container mode for the YugabyteDB role."
      yugabyte_use_tls: &yugabyte_use_tls
        type: bool
        required: false
        default: false
        description:
          - "Enables TLS asset handling for YugabyteDB."
      yugabyte_webserver_use_tls: &yugabyte_webserver_use_tls
        type: bool
        required: false
        default: "{{ yugabyte_use_tls }}"
        description:
          - "Enables HTTPS for the YugabyteDB webserver."
      yugabyte_client_to_server_use_tls: &yugabyte_client_to_server_use_tls
        type: bool
        required: false
        default: "{{ yugabyte_use_tls }}"
        description:
          - "Enables client-to-server TLS for YugabyteDB RPC and SQL access."
      yugabyte_node_to_node_use_tls: &yugabyte_node_to_node_use_tls
        type: bool
        required: false
        default: "{{ yugabyte_use_tls }}"
        description:
          - "Enables node-to-node TLS for YugabyteDB."
      yugabyte_registry_endpoint: &yugabyte_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'YUGABYTE_REGISTRY_ENDPOINT') or 'docker.io/yugabytedb' }}"
        description:
          - "Sets the registry endpoint used to resolve the YugabyteDB image."
      yugabyte_image_name: &yugabyte_image_name
        type: str
        required: false
        default: "yugabyte"
        description:
          - "Sets the YugabyteDB image name."
      yugabyte_image_tag: &yugabyte_image_tag
        type: str
        required: false
        default: "2025.2.1.0-b141"
        description:
          - "Sets the YugabyteDB image tag."
      yugabyte_image: &yugabyte_image
        type: str
        required: false
        default: "{{ yugabyte_registry_endpoint }}/{{ yugabyte_image_name }}:{{ yugabyte_image_tag }}"
        description:
          - "Sets the YugabyteDB container image."
      yugabyte_container_name: &yugabyte_container_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Names the YugabyteDB container associated with the current host."
      yugabyte_remote_config_dir: &yugabyte_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Sets the remote configuration directory used by YugabyteDB tasks."
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - "Sets the shared remote configuration directory consumed by YugabyteDB."
          - "Example: C(/opt/hyperledger/fabric-x/yugabyte/config)."
      yugabyte_remote_data_dir: &yugabyte_remote_data_dir
        type: path
        required: false
        default: "{{ remote_data_dir }}"
        description:
          - "Sets the remote data directory used by YugabyteDB tasks."
      remote_data_dir: &remote_data_dir
        type: path
        required: false
        description:
          - "Sets the shared remote data directory consumed by YugabyteDB."
          - "Example: C(/var/hyperledger/fabric-x/yugabyte/data)."
      yugabyte_container_data_dir: &yugabyte_container_data_dir
        type: path
        required: false
        default: "/var/data"
        description:
          - "Sets the in-container data directory used by YugabyteDB."
      yugabyte_init_script_file: &yugabyte_init_script_file
        type: str
        required: false
        default: "01-yb-init.sql"
        description:
          - "Names the SQL initialization script used by tablet pods."
      yugabyte_logs_level: &yugabyte_logs_level
        type: int
        required: false
        default: 3
        description:
          - "Sets the YugabyteDB log verbosity threshold."
      yugabyte_master_endpoints: &yugabyte_master_endpoints
        type: str
        required: true
        description:
          - "Lists the master RPC endpoints used to bootstrap YugabyteDB tablets and health checks."
          - "Example: C(yb-master-1.example.com:7100,yb-master-2.example.com:7100,yb-master-3.example.com:7100)."
      yugabyte_master_hosts: &yugabyte_master_hosts
        type: list
        elements: str
        required: true
        description:
          - "Provides the ordered list of master hosts used to compute replication factors."
          - "Example: C(['yb-master-1', 'yb-master-2', 'yb-master-3'])."
      yugabyte_tablet_hosts: &yugabyte_tablet_hosts
        type: list
        elements: str
        required: true
        description:
          - "Provides the ordered list of tablet hosts used to initialize the first tablet."
          - "Example: C(['yb-tserver-1', 'yb-tserver-2', 'yb-tserver-3'])."
      yugabyte_master_rpc_bind_port: &yugabyte_master_rpc_bind_port
        type: int
        required: false
        default: 7100
        description:
          - "Sets the master RPC bind port."
      yugabyte_master_webserver_port: &yugabyte_master_webserver_port
        type: int
        required: false
        default: 7000
        description:
          - "Sets the master webserver port."
      yugabyte_tablet_pgsql_bind_port: &yugabyte_tablet_pgsql_bind_port
        type: int
        required: false
        default: 5433
        description:
          - "Sets the tablet YSQL bind port."
      yugabyte_tablet_rpc_bind_port: &yugabyte_tablet_rpc_bind_port
        type: int
        required: false
        default: 9100
        description:
          - "Sets the tablet RPC bind port."
      yugabyte_tablet_webserver_port: &yugabyte_tablet_webserver_port
        type: int
        required: false
        default: 9000
        description:
          - "Sets the tablet webserver port."
      yugabyte_tablet_pgsql_web_port: &yugabyte_tablet_pgsql_web_port
        type: int
        required: false
        default: 13000
        description:
          - "Sets the tablet YSQL web UI port."
      yugabyte_tablet_cql_bind_port: &yugabyte_tablet_cql_bind_port
        type: int
        required: false
        default: 9042
        description:
          - "Sets the tablet YCQL bind port."
      yugabyte_tablet_cql_web_port: &yugabyte_tablet_cql_web_port
        type: int
        required: false
        default: 12000
        description:
          - "Sets the tablet YCQL web UI port."
      yugabyte_k8s_resource_name: &yugabyte_k8s_resource_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Names the Kubernetes resources associated with the current host, including the derived NodePort Service when enabled."
      yugabyte_k8s_wait: &yugabyte_k8s_wait
        type: bool
        required: false
        default: true
        description:
          - "Waits for YugabyteDB Kubernetes resources to become ready."
      yugabyte_k8s_wait_timeout: &yugabyte_k8s_wait_timeout
        type: int
        required: false
        default: 300
        description:
          - "Sets the Kubernetes readiness wait timeout in seconds."
      yugabyte_k8s_master_rpc_node_port: &yugabyte_k8s_master_rpc_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external master RPC Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32100)."
      yugabyte_k8s_loadbalancer_expose_master_rpc_port:
        &yugabyte_k8s_loadbalancer_expose_master_rpc_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the master RPC port externally.
          - When undefined or C(false), the master RPC port is not included in the LoadBalancer Service.
      yugabyte_k8s_master_webserver_node_port:
        &yugabyte_k8s_master_webserver_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external master webserver Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32000)."
      yugabyte_k8s_loadbalancer_expose_master_webserver_port:
        &yugabyte_k8s_loadbalancer_expose_master_webserver_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the master webserver port externally.
          - When undefined or C(false), the master webserver port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_pgsql_node_port: &yugabyte_k8s_tablet_pgsql_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet YSQL Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31433)."
      yugabyte_k8s_loadbalancer_expose_tablet_pgsql_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_pgsql_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet YSQL port externally.
          - When undefined or C(false), the tablet YSQL port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_rpc_node_port: &yugabyte_k8s_tablet_rpc_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet RPC Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32101)."
      yugabyte_k8s_loadbalancer_expose_tablet_rpc_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_rpc_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet RPC port externally.
          - When undefined or C(false), the tablet RPC port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_webserver_node_port:
        &yugabyte_k8s_tablet_webserver_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet webserver Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32001)."
      yugabyte_k8s_loadbalancer_expose_tablet_webserver_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_webserver_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet webserver port externally.
          - When undefined or C(false), the tablet webserver port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_pgsql_web_node_port:
        &yugabyte_k8s_tablet_pgsql_web_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet YSQL web UI Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32300)."
      yugabyte_k8s_loadbalancer_expose_tablet_pgsql_web_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_pgsql_web_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet YSQL web UI port externally.
          - When undefined or C(false), the tablet YSQL web UI port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_cql_bind_node_port:
        &yugabyte_k8s_tablet_cql_bind_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet YCQL bind Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32042)."
      yugabyte_k8s_loadbalancer_expose_tablet_cql_bind_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_cql_bind_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet YCQL bind port externally.
          - When undefined or C(false), the tablet YCQL bind port is not included in the LoadBalancer Service.
      yugabyte_k8s_tablet_cql_web_node_port:
        &yugabyte_k8s_tablet_cql_web_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external tablet YCQL web UI Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(32200)."
      yugabyte_k8s_loadbalancer_expose_tablet_cql_web_port:
        &yugabyte_k8s_loadbalancer_expose_tablet_cql_web_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the tablet YCQL web UI port externally.
          - When undefined or C(false), the tablet YCQL web UI port is not included in the LoadBalancer Service.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: false
        description:
          - "Defines the control-node directory that stores fetched YugabyteDB artifacts."
          - "Required when TLS-enabled tasks need access to fetched CA or certificate artifacts, such as when C(yugabyte_use_tls) or webserver TLS is enabled."
          - "Example: C(/tmp/fabric-x/artifacts/yugabyte)."
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - "Defines the control-node directory that stores cryptogen-generated artifacts."
          - "Example: C(/tmp/fabric-x/crypto-config)."
      actual_host: &actual_host
        type: str
        required: true
        description:
          - Real machine host.
          - "Example: C(myvpc.cloud.ibm.com)."
      organization: &organization
        type: dict
        required: false
        description:
          - "Provides the organization metadata consumed by the crypto entry points."
          - "The mapping is expected to expose C(domain), C(role), C(peer.name), C(peer.secret), and C(fabric_ca_host) when relevant."
          - "Example: C({'domain': 'org1.example.com', 'role': 'peer', 'peer': {'name': 'yb-tserver-1', 'secret': 'yb-tserver-1pw'}, 'fabric_ca_host': 'ca-org1'})."
      organization_required: &organization_required
        type: dict
        required: true
        description:
          - "Provides the organization metadata consumed by the crypto entry points that require it."
          - "The mapping is expected to expose C(domain), C(role), C(peer.name), C(peer.secret), and C(fabric_ca_host) when relevant."
          - "Example: C({'domain': 'org1.example.com', 'role': 'peer', 'peer': {'name': 'yb-tserver-1', 'secret': 'yb-tserver-1pw'}, 'fabric_ca_host': 'ca-org1'})."
      yugabyte_db: &yugabyte_db
        type: str
        required: true
        description:
          - "Sets the YugabyteDB database name created by the initialization SQL script."
          - "Example: C(fabricx)."
      yugabyte_user: &yugabyte_user
        type: str
        required: true
        description:
          - "Sets the YugabyteDB database user created by the initialization SQL script."
          - "Example: C(fabricx_user)."
      yugabyte_password: &yugabyte_password
        type: str
        required: true
        description:
          - "Sets the password for the YugabyteDB database user."
          - "Store this value in Ansible Vault."
          - "Example: C(my_yugabyte_password)."
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - "Sets the Kubernetes namespace used by YugabyteDB resources."
          - "Example: C(fabricx-yugabyte)."
      k8s_storage_size: &k8s_storage_size
        type: str
        required: true
        description:
          - "Sets the requested persistent storage size for Kubernetes deployments."
          - "Example: C(20Gi)."
      k8s_storage_class: &k8s_storage_class
        type: str
        required: false
        description:
          - "Sets the storage class used by Kubernetes PersistentVolumeClaims when defined."
          - "Example: C(fast-ssd)."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        required: false
        description:
          - "Sets the image pull secret used by Kubernetes deployments when defined."
          - "Example: C(registry-pull-secret)."
      k8s_readiness_probe_initial_delay_seconds:
        &k8s_readiness_probe_initial_delay_seconds
        type: int
        required: false
        description:
          - "Overrides the readiness probe initial delay used by Kubernetes templates when defined."
          - "Example: C(30)."
      k8s_readiness_probe_period_seconds: &k8s_readiness_probe_period_seconds
        type: int
        required: false
        description:
          - "Overrides the readiness probe period used by Kubernetes templates when defined."
          - "Example: C(10)."
      k8s_readiness_probe_timeout_seconds: &k8s_readiness_probe_timeout_seconds
        type: int
        required: false
        description:
          - "Overrides the readiness probe timeout used by Kubernetes templates when defined."
          - "Example: C(5)."
      k8s_readiness_probe_failure_threshold:
        &k8s_readiness_probe_failure_threshold
        type: int
        required: false
        description:
          - "Overrides the readiness probe failure threshold used by Kubernetes templates when defined."
          - "Example: C(12)."
      k8s_liveness_probe_initial_delay_seconds:
        &k8s_liveness_probe_initial_delay_seconds
        type: int
        required: false
        description:
          - "Overrides the liveness probe initial delay used by Kubernetes templates when defined."
          - "Example: C(60)."
      k8s_liveness_probe_period_seconds: &k8s_liveness_probe_period_seconds
        type: int
        required: false
        description:
          - "Overrides the liveness probe period used by Kubernetes templates when defined."
          - "Example: C(20)."
      k8s_liveness_probe_timeout_seconds: &k8s_liveness_probe_timeout_seconds
        type: int
        required: false
        description:
          - "Overrides the liveness probe timeout used by Kubernetes templates when defined."
          - "Example: C(5)."
      k8s_liveness_probe_failure_threshold:
        &k8s_liveness_probe_failure_threshold
        type: int
        required: false
        description:
          - "Overrides the liveness probe failure threshold used by Kubernetes templates when defined."
          - "Example: C(6)."

  start:
    short_description: Start a YugabyteDB cluster
    description:
      - "Builds master and tablet topology facts from C(yugabyte_cluster), derives the master RPC endpoint list, and dispatches each host to the container or Kubernetes startup path."
      - "Master hosts run C(yb-master) with a replication factor based on the master host list; tablet hosts run C(yb-tserver) and the first tablet initializes the configured database."
    options:
      yugabyte_cluster: *yugabyte_cluster
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_use_container: *yugabyte_use_container

  stop:
    short_description: Stop YugabyteDB runtime
    description:
      - "Stops the YugabyteDB runtime for container deployments."
      - "Kubernetes mode is managed through the removal entry points because StatefulSets and Services are reconciled resources."
    options:
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_use_container: *yugabyte_use_container

  teardown:
    short_description: Remove YugabyteDB runtime artifacts
    description:
      - "Removes the active YugabyteDB runtime in the selected deployment mode and then removes persisted role-managed data."
      - "Container mode deletes the running container and host data directory; Kubernetes mode deletes StatefulSets, Services, optional NodePort Services, and PVCs."
    options:
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_use_container: *yugabyte_use_container

  wipe:
    short_description: Wipe YugabyteDB state
    description:
      - "Runs teardown, removes persisted data, and deletes role-managed TLS and initialization configuration artifacts."
      - "Use this entry point when the YugabyteDB node should be returned to a clean state before regeneration."
    options: {}

  fetch_logs:
    short_description: Collect YugabyteDB logs
    description:
      - "Collects YugabyteDB logs through the selected deployment mode."
      - "Container mode fetches logs from the named container; Kubernetes mode fetches pod logs selected by the resource labels."
    options:
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_use_container: *yugabyte_use_container

  ping:
    short_description: Check YugabyteDB service ports
    description:
      - "Selects the expected master or tablet service ports for the current host and delegates reachability checks."
      - "Masters expose RPC and webserver ports; tablets expose YSQL, RPC, webserver, YSQL web UI, YCQL, and YCQL web UI ports."
    options:
      yugabyte_component_type: *yugabyte_component_type
      yugabyte_use_k8s: *yugabyte_use_k8s
      yugabyte_master_webserver_port: *yugabyte_master_webserver_port
      yugabyte_master_rpc_bind_port: *yugabyte_master_rpc_bind_port
      yugabyte_tablet_pgsql_bind_port: *yugabyte_tablet_pgsql_bind_port
      yugabyte_tablet_rpc_bind_port: *yugabyte_tablet_rpc_bind_port
      yugabyte_tablet_webserver_port: *yugabyte_tablet_webserver_port
      yugabyte_tablet_pgsql_web_port: *yugabyte_tablet_pgsql_web_port
      yugabyte_tablet_cql_bind_port: *yugabyte_tablet_cql_bind_port
      yugabyte_tablet_cql_web_port: *yugabyte_tablet_cql_web_port

  k8s/ping:
    short_description: Check YugabyteDB Kubernetes NodePorts
    description:
      - Probes configured Kubernetes NodePort values and LoadBalancer-exposed service ports for external reachability.
    options:
      yugabyte_component_type: *yugabyte_component_type
      yugabyte_k8s_master_rpc_node_port: *yugabyte_k8s_master_rpc_node_port
      yugabyte_k8s_master_webserver_node_port: *yugabyte_k8s_master_webserver_node_port
      yugabyte_k8s_tablet_pgsql_node_port: *yugabyte_k8s_tablet_pgsql_node_port
      yugabyte_k8s_tablet_rpc_node_port: *yugabyte_k8s_tablet_rpc_node_port
      yugabyte_k8s_tablet_webserver_node_port: *yugabyte_k8s_tablet_webserver_node_port
      yugabyte_k8s_tablet_pgsql_web_node_port: *yugabyte_k8s_tablet_pgsql_web_node_port
      yugabyte_k8s_tablet_cql_bind_node_port: *yugabyte_k8s_tablet_cql_bind_node_port
      yugabyte_k8s_tablet_cql_web_node_port: *yugabyte_k8s_tablet_cql_web_node_port
      yugabyte_k8s_loadbalancer_expose_master_rpc_port: *yugabyte_k8s_loadbalancer_expose_master_rpc_port
      yugabyte_k8s_loadbalancer_expose_master_webserver_port: *yugabyte_k8s_loadbalancer_expose_master_webserver_port
      yugabyte_k8s_loadbalancer_expose_tablet_pgsql_port: *yugabyte_k8s_loadbalancer_expose_tablet_pgsql_port
