      yugabyte_user: *yugabyte_user
      yugabyte_password: *yugabyte_password
      yugabyte_use_k8s: *yugabyte_use_k8s

  config/rm:
    short_description: Remove YugabyteDB configuration
    description:
      - "Deletes the remote YugabyteDB configuration directory and, in Kubernetes mode, removes the generated initialization ConfigMap."
      - "This cleans role-managed config without removing running resources unless paired with teardown or wipe."
    options:
      remote_config_dir: *remote_config_dir
      yugabyte_remote_config_dir: *yugabyte_remote_config_dir
      yugabyte_use_k8s: *yugabyte_use_k8s
