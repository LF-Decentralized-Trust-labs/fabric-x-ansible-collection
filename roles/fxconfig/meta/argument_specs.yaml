        type: path
        required: false
        default: "{{ fxconfig_remote_config_dir }}/tx.json"
        description:
          - "Defines where the merged transaction is written on the managed host. Example: C(/opt/hlf/config/fxconfig/tx.json)."
      fxconfig_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Selects whether the role merges transactions with the host binary instead of the container workflow."
      remote_config_dir:
        type: path
        required: true
        description:
          - "Provides the base remote configuration directory used by role defaults that back the default output path. Example: C(/opt/hlf/config)."

  namespace/create:
    short_description: Create a namespace transaction
    description:
      - "Dispatches namespace transaction creation to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_namespace_id:
        type: str
        required: true
        description:
          - "Defines the namespace identifier to create. Example: C(workload)."
      fxconfig_namespace_policy:
        type: str
        required: true
        description:
          - "Defines the endorsement policy embedded into the namespace transaction. Example: C(threshold:/tmp/pubkey.pem)."
      fxconfig_output:
        type: path
        required: false
        default: "{{ fxconfig_remote_config_dir }}/tx.json"
        description:
          - "Defines where the generated namespace transaction is written. Example: C(/opt/hlf/config/fxconfig/tx.json)."
      fxconfig_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Selects whether the role creates namespace transactions with the host binary instead of the container workflow."
      remote_config_dir:
        type: path
        required: true
        description:
          - "Provides the base remote configuration directory used by role defaults that back the default output path. Example: C(/opt/hlf/config)."

  namespace/group:
    short_description: Group hosts by declared namespaces
    description:
      - "Builds a namespace-to-host mapping from inventory organization data and expands threshold policies to certificate paths."
    options:
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - "Defines the local directory that stores fetched crypto artifacts used to construct threshold policy certificate paths. Example: C(/tmp/fabricx-artifacts)."
      fxconfig_hosts:
        type: list
        required: false
        default: "{{ groups['all'] }}"
        description:
          - "Limits namespace grouping to a subset of inventory hosts. By default all hosts are considered."
      organization:
        type: dict
        required: true
        description:
          - "Defines organization metadata on participating hosts, including domain, users, and namespaces. Example: C({'domain': 'org1.example.com', 'users': [{'name': 'User1'}], 'namespaces': [{'id': 'workload', 'policy': 'threshold'}]})."

  namespace/list:
    short_description: List namespaces
    description:
      - "Dispatches namespace listing to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Selects whether the role lists namespaces with the host binary instead of the container workflow."
      remote_config_dir:
        type: path
        required: true
        description:
          - "Provides the base remote configuration directory used by role defaults that back the default configuration path. Example: C(/opt/hlf/config)."

  submit:
    short_description: Submit a namespace transaction
    description:
      - "Dispatches merged transaction submission to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_tx_to_submit_path:
        type: path
        required: true
        description:
          - "Supplies the merged namespace transaction JSON file to submit. Example: C(/tmp/fxconfig-artifacts/workload/merged.json)."
      fxconfig_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Selects whether the role submits transactions with the host binary instead of the container workflow."
      remote_config_dir:
        type: path
        required: true
        description:
          - "Provides the base remote configuration directory used by role defaults that back the default staging path. Example: C(/opt/hlf/config)."

  wipe:
    short_description: Remove fxconfig binaries when enabled
    description:
      - "Removes the fxconfig binary from the managed host when the binary workflow is enabled."
    options:
      fxconfig_bin_name:
        type: str
        required: false
        default: "fxconfig"
        description:
          - "Defines the binary name to remove. Example: C(fxconfig)."
      fxconfig_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Selects whether the role removes the host binary. When false, the wipe entry point is a no-op."
