---
argument_specs:
  _shared_options:
    short_description: Shared option catalog for fxconfig role entry points
    options:
      channel_id: &channel_id
        type: str
        required: true
        description:
          - "Defines the Fabric-X channel used by the task. Example: C(arma)."
      fxconfig_committer_query_service_connection_timeout:
        &fxconfig_committer_query_service_connection_timeout
        type: str
        required: false
        description:
          - "Defines the query-service connection timeout. Example: C(30s)."
      committer_query_service_host: &committer_query_service_host
        type: str
        required: true
        description:
          - "Identifies the inventory host for the Committer Query-Service component. Example: C(committer-query-service-1)."
      fxconfig_committer_sidecar_connection_timeout:
        &fxconfig_committer_sidecar_connection_timeout
        type: str
        required: false
        description:
          - "Defines the sidecar connection timeout. Example: C(30s)."
      committer_sidecar_host: &committer_sidecar_host
        type: str
        required: true
        description:
          - "Identifies the inventory host for the Committer Sidecar component. Example: C(committer-sidecar-1)."
      fxconfig_committer_sidecar_waiting_timeout:
        &fxconfig_committer_sidecar_waiting_timeout
        type: str
        required: false
        description:
          - "Defines the sidecar waiting timeout. Example: C(30s)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Defines the local directory that stores fetched artifacts. Example: C(/tmp/fabricx-artifacts)."
      fxconfig_bin_name: &fxconfig_bin_name
        type: str
        required: false
        default: "fxconfig"
        description:
          - "Defines the fxconfig binary name. Example: C(fxconfig)."
      fxconfig_bin_package: &fxconfig_bin_package
        type: str
        required: false
        default: "{{ fxconfig_git_hub_url }}/{{ fxconfig_git_repo }}/{{ fxconfig_source_code_package }}"
        description:
          - "Defines the Go package path used to install fxconfig. The default derives from C(fxconfig_git_hub_url), C(fxconfig_git_repo), and C(fxconfig_source_code_package)."
      fxconfig_config_file: &fxconfig_config_file
        type: str
        required: false
        default: "fxconfig.yaml"
        description:
          - "Defines the fxconfig configuration filename. Example: C(fxconfig.yaml)."
      fxconfig_container_config_dir: &fxconfig_container_config_dir
        type: path
        required: false
        default: "/config"
        description:
          - "Defines the configuration directory mounted inside the fxconfig container. Example: C(/config)."
      fxconfig_container_name: &fxconfig_container_name
        type: str
        required: false
        default: "fxconfig"
        description:
          - "Defines the base container name used by fxconfig workflows. Example: C(fxconfig)."
      fxconfig_endorsed_txs_dir: &fxconfig_endorsed_txs_dir
        type: path
        required: true
        description:
          - "Defines the directory containing endorsed JSON transactions. Example: C(/tmp/fxconfig-artifacts/workload/endorsed)."
      fxconfig_git_commit: &fxconfig_git_commit
        type: str
        required: false
        default: "v0.0.12"
        description:
          - "Selects the Git ref used by build and install workflows. Example: C(v0.0.12)."
      fxconfig_git_hub_url: &fxconfig_git_hub_url
        type: str
        required: false
        default: "github.com"
        description:
          - "Defines the Git host used to resolve the Fabric-X source repository. Example: C(github.com)."
      fxconfig_git_repo: &fxconfig_git_repo
        type: str
        required: false
        default: "hyperledger/fabric-x"
        description:
          - "Defines the Fabric-X source repository path. Example: C(hyperledger/fabric-x)."
      fxconfig_hosts: &fxconfig_hosts
        type: list
        elements: str
        required: false
        description:
          - "Limits namespace grouping to a subset of inventory hosts. If omitted, the task considers all hosts."
          - "Selected hosts must expose the organization metadata expected by the namespace grouping helper."
      fxconfig_image: &fxconfig_image
        type: str
        required: false
        default: "{{ fxconfig_registry_endpoint }}/{{ fxconfig_image_name }}:{{ fxconfig_image_tag }}"
        description:
          - "Defines the fxconfig container image. The default derives from C(fxconfig_registry_endpoint), C(fxconfig_image_name), and C(fxconfig_image_tag)."
      fxconfig_image_name: &fxconfig_image_name
        type: str
        required: false
        default: "fabric-x-tools"
        description:
          - "Defines the image name used by the default fxconfig container image. Example: C(fabric-x-tools)."
      fxconfig_image_tag: &fxconfig_image_tag
        type: str
        required: false
        default: "0.0.12"
        description:
          - "Defines the image tag used by the default fxconfig container image. Example: C(0.0.12)."
      fxconfig_log_format: &fxconfig_log_format
        type: str
        required: false
        default: "%{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc} -> %{level:.4s} %{id:03x}%{color:reset} %{message}"
        description:
          - "Defines the fxconfig log format."
      fxconfig_log_level: &fxconfig_log_level
        type: str
        required: false
        default: "info"
        description:
          - "Defines the fxconfig log level. Example: C(info)."
      fxconfig_msp_config_path: &fxconfig_msp_config_path
        type: path
        required: true
        description:
          - "Defines the source MSP directory copied into the fxconfig configuration directory. Example: C(/opt/hlf/config/users/User1@example.com/msp)."
      fxconfig_msp_id: &fxconfig_msp_id
        type: str
        required: false
        default: "{{ organization.name }}MSP"
        description:
          - "Defines the MSP identifier written into the rendered configuration. The default derives from C(organization.name)."
      fxconfig_mtls_client_cert_path: &fxconfig_mtls_client_cert_path
        type: path
        required: false
        default: "{{ remote_config_dir }}/tls/server.crt"
        description:
          - "Defines the source certificate path used for fxconfig mTLS. The default derives from C(remote_config_dir)."
      fxconfig_mtls_client_key_path: &fxconfig_mtls_client_key_path
        type: path
        required: false
        default: "{{ remote_config_dir }}/tls/server.key"
        description:
          - "Defines the source private key path used for fxconfig mTLS. The default derives from C(remote_config_dir)."
      fxconfig_namespace_id: &fxconfig_namespace_id
        type: raw
        required: true
        description:
          - "Defines the namespace identifier. Accepts either a string or an integer value. Examples: C(workload), C(0)."
      fxconfig_namespace_policy: &fxconfig_namespace_policy
        type: str
        required: true
        description:
          - "Defines the namespace endorsement policy. Example: C(threshold:/tmp/pubkey.pem)."
      fxconfig_orderer_connection_timeout: &fxconfig_orderer_connection_timeout
        type: str
        required: false
        description:
          - "Defines the orderer connection timeout written into the rendered configuration. Example: C(30s)."
      fxconfig_output: &fxconfig_output
        type: path
        required: false
        default: "{{ fxconfig_remote_config_dir }}/tx.json"
        description:
          - "Defines the transaction artifact path on the managed host. The default derives from C(fxconfig_remote_config_dir)."
      fxconfig_registry_endpoint: &fxconfig_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'FXCONFIG_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - "Defines the registry endpoint used by the default fxconfig container image. Example: C(docker.io/hyperledger)."
      fxconfig_remote_config_dir: &fxconfig_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}/fxconfig"
        description:
          - "Defines the fxconfig remote configuration directory. The default derives from C(remote_config_dir)."
      fxconfig_source_code_package: &fxconfig_source_code_package
        type: str
        required: false
        default: "tools/fxconfig"
        description:
          - "Defines the Go package path containing the fxconfig source code. Example: C(tools/fxconfig)."
      fxconfig_tx_to_endorse: &fxconfig_tx_to_endorse
        type: path
        required: true
        description:
          - "Supplies the JSON transaction file to endorse. Example: C(/tmp/fxconfig-artifacts/workload/ns.json)."
      fxconfig_tx_to_submit_path: &fxconfig_tx_to_submit_path
        type: path
        required: true
        description:
          - "Supplies the merged JSON transaction file to submit. Example: C(/tmp/fxconfig-artifacts/workload/merged.json)."
      fxconfig_use_bin: &fxconfig_use_bin
        type: bool
        required: false
        default: false
        description:
          - "Selects the host-binary workflow instead of the container workflow."
      organization: &organization
        type: dict
        required: true
        description:
          - "Provides organization metadata required by tasks that read `organization.*`."
      orderer_router_host: &orderer_router_host
        type: str
        required: true
        description:
          - "Identifies the inventory host for the Orderer Router component. Example: C(orderer-router-1)."
      remote_config_dir: &remote_config_dir
        type: path
        required: true
        description:
          - "Provides the base remote configuration directory used by the role. Example: C(/opt/hlf/config)."

  bin/build:
    short_description: Build the fxconfig binary
    description:
      - "Builds the fxconfig Go binary by delegating compilation to the shared bin role."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_git_commit: *fxconfig_git_commit
      fxconfig_git_hub_url: *fxconfig_git_hub_url
      fxconfig_git_repo: *fxconfig_git_repo
      fxconfig_source_code_package: *fxconfig_source_code_package

  bin/endorse:
    short_description: Endorse a namespace transaction with the fxconfig binary
    description:
      - "Copies a transaction to the target host, endorses it with the local fxconfig binary, and fetches the endorsed JSON artifact."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_output: *fxconfig_output
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_endorse: *fxconfig_tx_to_endorse
      remote_config_dir: *remote_config_dir

  bin/install:
    short_description: Install the fxconfig binary
    description:
      - "Installs the fxconfig Go package by delegating to the shared bin role."
    options:
      fxconfig_bin_package: *fxconfig_bin_package
      fxconfig_git_commit: *fxconfig_git_commit
      fxconfig_git_hub_url: *fxconfig_git_hub_url
      fxconfig_git_repo: *fxconfig_git_repo
      fxconfig_source_code_package: *fxconfig_source_code_package

  bin/merge:
    short_description: Merge endorsed transactions with the fxconfig binary
    description:
      - "Collects endorsed transaction files and merges them into a single transaction using the local fxconfig binary."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_endorsed_txs_dir: *fxconfig_endorsed_txs_dir
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_output: *fxconfig_output
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  bin/namespace/create:
    short_description: Create a namespace transaction with the fxconfig binary
    description:
      - "Creates a namespace transaction JSON file with the local fxconfig binary."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_namespace_id: *fxconfig_namespace_id
      fxconfig_namespace_policy: *fxconfig_namespace_policy
      fxconfig_output: *fxconfig_output
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  bin/namespace/list:
    short_description: List namespaces with the fxconfig binary
    description:
      - "Lists namespaces from the configured Fabric-X network by invoking the local fxconfig binary."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  bin/rm:
    short_description: Remove the fxconfig binary
    description:
      - "Removes the fxconfig binary from the managed host by delegating to the shared bin role."
    options:
      fxconfig_bin_name: *fxconfig_bin_name

  bin/submit:
    short_description: Submit a namespace transaction with the fxconfig binary
    description:
      - "Transfers a merged transaction to the managed host and submits it with the local fxconfig binary."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_submit_path: *fxconfig_tx_to_submit_path
      remote_config_dir: *remote_config_dir

  bin/transfer:
    short_description: Transfer the fxconfig binary
    description:
      - "Transfers the fxconfig binary to the managed host by delegating to the shared bin role."
    options:
      fxconfig_bin_name: *fxconfig_bin_name

  config/mtls/transfer:
    short_description: Transfer fxconfig mTLS client material
    description:
      - "Copies the client certificate and key used by fxconfig for mTLS connections into the role-specific configuration directory."
    options:
      fxconfig_mtls_client_cert_path: *fxconfig_mtls_client_cert_path
      fxconfig_mtls_client_key_path: *fxconfig_mtls_client_key_path
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  config/tls/transfer:
    short_description: Transfer fxconfig TLS trust material
    description:
      - "Copies the Orderer Router and Committer Query-Service CA certificates required by the rendered fxconfig configuration."
      - "Inventory hosts named by the gating variables must expose connection metadata, RPC ports, and TLS flags."
    options:
      committer_query_service_host: *committer_query_service_host
      fetched_artifacts_dir: *fetched_artifacts_dir
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      orderer_router_host: *orderer_router_host
      remote_config_dir: *remote_config_dir

  config/transfer:
    short_description: Transfer fxconfig configuration material
    description:
      - "Renders the fxconfig configuration file, copies MSP material, and stages TLS and mTLS assets when the inventory enables them."
      - "Inventory hosts named by the routing variables must expose connection metadata, RPC ports, and TLS or mTLS flags."
    options:
      channel_id: *channel_id
      fxconfig_committer_query_service_connection_timeout: *fxconfig_committer_query_service_connection_timeout
      committer_query_service_host: *committer_query_service_host
      fxconfig_committer_sidecar_connection_timeout: *fxconfig_committer_sidecar_connection_timeout
      committer_sidecar_host: *committer_sidecar_host
      fxconfig_committer_sidecar_waiting_timeout: *fxconfig_committer_sidecar_waiting_timeout
      fetched_artifacts_dir: *fetched_artifacts_dir
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_msp_config_path: *fxconfig_msp_config_path
      fxconfig_msp_id: *fxconfig_msp_id
      fxconfig_mtls_client_cert_path: *fxconfig_mtls_client_cert_path
      fxconfig_mtls_client_key_path: *fxconfig_mtls_client_key_path
      fxconfig_orderer_connection_timeout: *fxconfig_orderer_connection_timeout
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_use_bin: *fxconfig_use_bin
      orderer_router_host: *orderer_router_host
      organization: *organization
      remote_config_dir: *remote_config_dir

  container/endorse:
    short_description: Endorse a namespace transaction with the fxconfig container
    description:
      - "Copies a transaction to the target host, endorses it with a transient fxconfig container, and fetches the endorsed JSON artifact."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_endorse: *fxconfig_tx_to_endorse
      remote_config_dir: *remote_config_dir

  container/merge:
    short_description: Merge endorsed transactions with the fxconfig container
    description:
      - "Collects endorsed transactions and merges them into a single artifact by running fxconfig in a transient container."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_endorsed_txs_dir: *fxconfig_endorsed_txs_dir
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  container/namespace/create:
    short_description: Create a namespace transaction with the fxconfig container
    description:
      - "Creates a namespace transaction JSON file by running fxconfig in a transient container."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_namespace_id: *fxconfig_namespace_id
      fxconfig_namespace_policy: *fxconfig_namespace_policy
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  container/namespace/list:
    short_description: List namespaces with the fxconfig container
    description:
      - "Lists namespaces from the configured Fabric-X network by running fxconfig in a transient container."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      remote_config_dir: *remote_config_dir

  container/submit:
    short_description: Submit a namespace transaction with the fxconfig container
    description:
      - "Transfers a merged transaction to the managed host and submits it by running fxconfig in a transient container."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_submit_path: *fxconfig_tx_to_submit_path
      remote_config_dir: *remote_config_dir

  endorse:
    short_description: Endorse a namespace transaction
    description:
      - "Dispatches transaction endorsement to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_endorse: *fxconfig_tx_to_endorse
      fxconfig_use_bin: *fxconfig_use_bin
      remote_config_dir: *remote_config_dir

  get_endorser:
    short_description: Resolve the namespace endorser user
    description:
      - "Selects the preferred endorser from C(organization.users) and stores it in C(fxconfig_endorser_user)."
    options:
      organization: *organization

  merge:
    short_description: Merge endorsed namespace transactions
    description:
      - "Dispatches merge operations to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_endorsed_txs_dir: *fxconfig_endorsed_txs_dir
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_use_bin: *fxconfig_use_bin
      remote_config_dir: *remote_config_dir

  namespace/create:
    short_description: Create a namespace transaction
    description:
      - "Dispatches namespace transaction creation to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_namespace_id: *fxconfig_namespace_id
      fxconfig_namespace_policy: *fxconfig_namespace_policy
      fxconfig_output: *fxconfig_output
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_use_bin: *fxconfig_use_bin
      remote_config_dir: *remote_config_dir

  namespace/group:
    short_description: Group hosts by declared namespaces
    description:
      - "Builds a namespace-to-host mapping from inventory organization data."
      - "Inventory hosts selected via C(fxconfig_hosts) must define the organization data expected by the helper."
    options:
      fetched_artifacts_dir: *fetched_artifacts_dir
      fxconfig_hosts: *fxconfig_hosts

  namespace/list:
    short_description: List namespaces
    description:
      - "Dispatches namespace listing to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_log_format: *fxconfig_log_format
      fxconfig_log_level: *fxconfig_log_level
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_use_bin: *fxconfig_use_bin
      remote_config_dir: *remote_config_dir

  submit:
    short_description: Submit a namespace transaction
    description:
      - "Dispatches merged transaction submission to either the host binary or a transient container based on C(fxconfig_use_bin)."
    options:
      fxconfig_bin_name: *fxconfig_bin_name
      fxconfig_config_file: *fxconfig_config_file
      fxconfig_container_config_dir: *fxconfig_container_config_dir
      fxconfig_container_name: *fxconfig_container_name
      fxconfig_image: *fxconfig_image
      fxconfig_image_name: *fxconfig_image_name
      fxconfig_image_tag: *fxconfig_image_tag
      fxconfig_registry_endpoint: *fxconfig_registry_endpoint
      fxconfig_remote_config_dir: *fxconfig_remote_config_dir
      fxconfig_tx_to_submit_path: *fxconfig_tx_to_submit_path
      fxconfig_use_bin: *fxconfig_use_bin
      remote_config_dir: *remote_config_dir

  wipe:
    short_description: Remove fxconfig binaries when enabled
    description:
