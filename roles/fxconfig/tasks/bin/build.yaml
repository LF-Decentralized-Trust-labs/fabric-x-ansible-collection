- name: Build {{ fxconfig_bin_name }}
  vars:
    # Git vars
    git_hub_url: "{{ fxconfig_git_hub_url }}"
    git_repo: "{{ fxconfig_git_repo }}"
    git_commit: "{{ fxconfig_git_commit }}"
    # Bin vars
    bin_name: "{{ fxconfig_bin_name }}"
    # Go vars
    go_source_code_package: "{{ fxconfig_source_code_package }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/build
