- name: Check that the MSP path is defined
  ansible.builtin.fail:
    msg: "No path to the meta namespace admin MSP is indicated. Set it via 'fxconfig_msp_config_path'."
  when:
    - fxconfig_msp_config_path is not defined

# =========================
# Configuration
# =========================
- name: Ensure the config directory for fxconfig exists
  ansible.builtin.file:
    path: "{{ fxconfig_remote_config_dir }}"
    state: directory
    mode: "0o755"

- name: Set fxconfig effective orderer address (NodePort)
  ansible.builtin.set_fact:
    fxconfig_orderer_address: "{{ hostvars[orderer_router_host].actual_host }}:{{ hostvars[orderer_router_host].orderer_k8s_rpc_node_port }}"
  when:
    - hostvars[orderer_router_host].orderer_k8s_use_node_port is defined
    - hostvars[orderer_router_host].orderer_k8s_use_node_port

- name: Set fxconfig effective committer sidecar address (NodePort)
  ansible.builtin.set_fact:
    fxconfig_committer_sidecar_address: "{{ hostvars[committer_sidecar_host].actual_host }}:{{ hostvars[committer_sidecar_host].committer_k8s_rpc_node_port }}"
  when:
    - hostvars[committer_sidecar_host].committer_k8s_use_node_port is defined
    - hostvars[committer_sidecar_host].committer_k8s_use_node_port

- name: Set fxconfig effective committer query-service address (NodePort)
  ansible.builtin.set_fact:
    fxconfig_committer_query_service_address: "{{ hostvars[committer_query_service_host].actual_host }}:{{ hostvars[committer_query_service_host].committer_k8s_rpc_node_port }}"
  when:
    - hostvars[committer_query_service_host].committer_k8s_use_node_port is defined
    - hostvars[committer_query_service_host].committer_k8s_use_node_port

- name: Setup the fxconfig configuration file
  vars:
    fxconfig_config_dir: >-
      {{
        fxconfig_remote_config_dir
        if fxconfig_use_bin
        else fxconfig_container_config_dir
      }}
    fxconfig_effective_orderer_address: >-
      {{
        fxconfig_orderer_address
        | default(hostvars[orderer_router_host].actual_host ~ ':' ~ hostvars[orderer_router_host].orderer_rpc_port)
      }}
    fxconfig_effective_committer_query_service_address: >-
      {{
        fxconfig_committer_query_service_address
        | default(hostvars[committer_query_service_host].actual_host ~ ':' ~ hostvars[committer_query_service_host].committer_rpc_port)
      }}
    fxconfig_effective_committer_sidecar_address: >-
      {{
        fxconfig_committer_sidecar_address
        | default(hostvars[committer_sidecar_host].actual_host ~ ':' ~ hostvars[committer_sidecar_host].committer_rpc_port)
      }}
  ansible.builtin.template:
    src: "config.yaml.j2"
    dest: "{{ fxconfig_remote_config_dir }}/{{ fxconfig_config_file }}"
    mode: "0o644"

# =========================
# MSP material
# =========================
- name: Transfer the MSP material
  ansible.builtin.copy:
    src: "{{ fxconfig_msp_config_path }}"
    dest: "{{ fxconfig_remote_config_dir }}"
    remote_src: true
    mode: "preserve"

# =========================
# TLS material
# =========================
- name: Setup TLS material for fxconfig
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fxconfig
    tasks_from: config/tls/transfer
  when:
    - (hostvars[committer_query_service_host].committer_use_tls is defined and hostvars[committer_query_service_host].committer_use_tls)
      or
      (hostvars[orderer_router_host].orderer_use_tls is defined and hostvars[orderer_router_host].orderer_use_tls)

# =========================
# mTLS material
# =========================
- name: Setup mTLS material for fxconfig
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fxconfig
    tasks_from: config/mtls/transfer
  when:
    - (hostvars[committer_query_service_host].committer_use_mtls is defined and hostvars[committer_query_service_host].committer_use_mtls)
      or
      (hostvars[orderer_router_host].orderer_use_mtls is defined and hostvars[orderer_router_host].orderer_use_mtls)
