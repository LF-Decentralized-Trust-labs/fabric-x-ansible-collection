- name: Define folder for endorsement
  ansible.builtin.set_fact:
    fxconfig_output_dir: "{{ fxconfig_output | dirname }}"

- name: Ensure output directory for namespace transactions to endorse exists
  ansible.builtin.file:
    path: "{{ fxconfig_output_dir }}/{{ fxconfig_namespace }}/to_endorse"
    state: directory
    mode: "0o755"

- name: Transfer namespace transaction
  ansible.builtin.copy:
    src: "{{ config_build_dir }}/fxconfig-artifacts/{{ fxconfig_namespace }}/to_endorse/ns.json"
    dest: "{{ fxconfig_output_dir }}/{{ fxconfig_namespace }}/to_endorse/ns.json"
    mode: preserve

- name: Endorse namespace transaction
  vars:
    container_name: "{{ fxconfig_container_name }}-{{ fxconfig_namespace }}-endorse"
    container_image: "{{ fxconfig_image }}"
    container_command: >-
      {{ fxconfig_bin_name }} tx
      endorse
      /tmp/{{ fxconfig_namespace }}/to_endorse/ns.json
      --config={{ fxconfig_container_config_dir }}/{{ fxconfig_config_file }}
      --output=/tmp/{{ fxconfig_output | basename }}
    container_volumes:
      - "{{ fxconfig_output_dir }}:/tmp:z"
      - "{{ fxconfig_remote_config_dir }}:{{ fxconfig_container_config_dir }}:z"
    container_run_detach_mode: false
    container_run_as_host_user: true
    container_autoremove: true
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: start

- name: Get the endorser user
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fxconfig
    tasks_from: get_endorser

- name: Fetch endorsed transaction
  ansible.builtin.fetch:
    src: "{{ fxconfig_output }}"
    dest: "{{ config_build_dir }}/fxconfig-artifacts/{{ fxconfig_namespace }}/endorsed/{{ fxconfig_endorser_user.name }}.json"
    flat: true
    mode: preserve
