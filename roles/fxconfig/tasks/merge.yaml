- name: Merge transactions with fxconfig binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fxconfig
    tasks_from: bin/merge
  when:
    - fxconfig_use_bin

- name: Merge transactions with fxconfig container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fxconfig
    tasks_from: container/merge
  when:
    - not fxconfig_use_bin
