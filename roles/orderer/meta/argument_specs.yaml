  config/mtls/transfer:
    short_description: Transfer mTLS CA certificates for orderer clients and orgs
    description:
      - "Copies trusted client and organization TLS CA certificates into the orderer mTLS directory structure."
      - "Consumes fetched client C(tls/ca.crt) files and peer organization tlsca certificates so generated configs can enable client mutual TLS."
    options:
      remote_config_dir: *remote_config_dir
      fetched_artifacts_dir: *fetched_artifacts_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_mtls_clients: *orderer_mtls_clients
      orderer_mtls_orgs: *orderer_mtls_orgs

  config/rm:
    short_description: Remove orderer configuration
    description:
      - "Deletes the orderer configuration directory, including rendered config, genesis block, mTLS trust bundles, and deployment-local config artifacts."
      - "In Kubernetes mode, also delegates removal of the orderer ConfigMap."
    options:
      remote_config_dir: *remote_config_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  config/transfer_grafana_dashboard:
    short_description: Copy the orderer Grafana dashboard
    description:
      - "Publishes the bundled Fabric-X Orderer Grafana dashboard through the grafana role."
      - "The dashboard consumes Prometheus scrape targets produced for consenter, batcher, assembler, and router metrics endpoints."
    options: {}

  crypto/setup:
    short_description: Prepare orderer crypto material
    description:
      - "Validates TLS and mTLS prerequisites, provisions orderer MSP and TLS material through cryptogen or Fabric CA, and optionally creates the Kubernetes Secret."
