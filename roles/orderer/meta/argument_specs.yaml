      orderer_use_mtls: *orderer_use_mtls
      organization: *organization
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  crypto/cryptogen/transfer:
    short_description: Transfer cryptogen-generated orderer crypto material
    description:
      - "Copies cryptogen-generated MSP and TLS artifacts for the orderer identity into the remote configuration directory."
      - "Consumes the cryptogen artifact tree for the orderer organization and prepares material for local mounts or Kubernetes Secret creation."
    options:
      cryptogen_artifacts_dir: *cryptogen_artifacts_dir
      remote_config_dir: *remote_config_dir
      organization: *organization
      orderer_crypto_name: *orderer_crypto_name
      orderer_remote_config_dir: *orderer_remote_config_dir

  crypto/fabric_ca/enroll:
    short_description: Enroll the orderer with Fabric CA
    description:
      - "Copies the Fabric CA TLS certificate when needed and enrolls both MSP and TLS identities for the orderer host."
      - "Writes generated MSP and server TLS material into the orderer config directory for later config, runtime, and fetch tasks."
    options:
      fetched_artifacts_dir: *fetched_artifacts_dir
      actual_host: *actual_host
      remote_config_dir: *remote_config_dir
      organization: *organization
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_openshift_route: *orderer_openshift_route
      orderer_openshift_metrics_route: *orderer_openshift_metrics_route

  crypto/fetch:
    short_description: Fetch orderer certificates to the control node
    description:
      - "Fetches the orderer sign certificate, TLS server certificate, and TLS CA certificate to the control node."
      - "Publishes artifacts consumed by downstream config generation, client mTLS trust bundles, and other roles."
    options:
      fetched_artifacts_dir: *fetched_artifacts_dir
      remote_config_dir: *remote_config_dir
      organization: *organization
      orderer_crypto_name: *orderer_crypto_name
      orderer_remote_config_dir: *orderer_remote_config_dir

  crypto/rm:
    short_description: Remove orderer crypto material
    description:
      - "Deletes the orderer MSP and TLS directories from the config path."
      - "In Kubernetes mode, also delegates deletion of the Secret that mounted MSP and TLS material into the workload."
    options:
      remote_config_dir: *remote_config_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  k8s/start:
    short_description: Create the orderer Kubernetes workload
    description:
      - "Creates the orderer Kubernetes Service, StatefulSet, and optional NodePort and LoadBalancer Services after ensuring the namespace exists."
      - "Consumes ConfigMap and Secret artifacts generated by the Kubernetes config and crypto transfer entrypoints, then starts the selected component container."
    options:
      orderer_component_type: *orderer_component_type
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      orderer_k8s_wait_timeout: *orderer_k8s_wait_timeout
      orderer_rpc_port: *orderer_rpc_port
      orderer_metrics_port: *orderer_metrics_port
      orderer_k8s_rpc_node_port: *orderer_k8s_rpc_node_port
      orderer_k8s_metrics_node_port: *orderer_k8s_metrics_node_port
      orderer_k8s_fs_group: *orderer_k8s_fs_group
      orderer_image: *orderer_image
      orderer_registry_endpoint: *orderer_registry_endpoint
      orderer_image_name: *orderer_image_name
      orderer_image_tag: *orderer_image_tag
      orderer_container_config_dir: *orderer_container_config_dir
      orderer_container_data_dir: *orderer_container_data_dir
      orderer_use_mtls: *orderer_use_mtls
      orderer_mtls_clients: *orderer_mtls_clients
      orderer_mtls_orgs: *orderer_mtls_orgs
      organization: *organization
      k8s_namespace:
        <<: *k8s_namespace
        required: true
      k8s_storage_size: *k8s_storage_size
      k8s_storage_class: *k8s_storage_class
      k8s_image_pull_secret: *k8s_image_pull_secret
      k8s_readiness_probe_initial_delay_seconds: *k8s_readiness_probe_initial_delay_seconds
      k8s_readiness_probe_period_seconds: *k8s_readiness_probe_period_seconds
      k8s_readiness_probe_timeout_seconds: *k8s_readiness_probe_timeout_seconds
      k8s_readiness_probe_failure_threshold: *k8s_readiness_probe_failure_threshold
      k8s_liveness_probe_initial_delay_seconds: *k8s_liveness_probe_initial_delay_seconds
      k8s_liveness_probe_period_seconds: *k8s_liveness_probe_period_seconds
      k8s_liveness_probe_timeout_seconds: *k8s_liveness_probe_timeout_seconds
      k8s_liveness_probe_failure_threshold: *k8s_liveness_probe_failure_threshold
      orderer_k8s_loadbalancer_expose_rpc_port: *orderer_k8s_loadbalancer_expose_rpc_port
      orderer_k8s_loadbalancer_expose_metrics_port: *orderer_k8s_loadbalancer_expose_metrics_port

  k8s/ping:
    short_description: Check that the orderer Kubernetes services are reachable
    description:
      - Probes configured Kubernetes NodePort values and LoadBalancer-exposed service ports for external reachability.
    options:
      orderer_k8s_rpc_node_port: *orderer_k8s_rpc_node_port
      orderer_k8s_metrics_node_port: *orderer_k8s_metrics_node_port
      orderer_k8s_loadbalancer_expose_rpc_port: *orderer_k8s_loadbalancer_expose_rpc_port
      orderer_k8s_loadbalancer_expose_metrics_port: *orderer_k8s_loadbalancer_expose_metrics_port
      orderer_rpc_port: *orderer_rpc_port
      orderer_metrics_port: *orderer_metrics_port

  k8s/rm:
    short_description: Remove the orderer Kubernetes workload
    description:
      - "Deletes the orderer StatefulSet and Services from the configured namespace."
      - "Leaves ConfigMap, Secret, and PVC artifacts for explicit config, crypto, or data cleanup entrypoints."
    options:
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      k8s_namespace:
        <<: *k8s_namespace
        required: true

      orderer_k8s_rpc_node_port: *orderer_k8s_rpc_node_port
      orderer_k8s_loadbalancer_expose_rpc_port: *orderer_k8s_loadbalancer_expose_rpc_port
      orderer_k8s_metrics_node_port: *orderer_k8s_metrics_node_port
      orderer_k8s_loadbalancer_expose_metrics_port: *orderer_k8s_loadbalancer_expose_metrics_port
  k8s/teardown:
    short_description: Remove the orderer Kubernetes workload and data
    description:
      - "Deletes the Kubernetes workload and removes persisted orderer data."
      - "Keeps generated ConfigMap and Secret artifacts unless their dedicated removal entrypoints are invoked."
    options: {}

  k8s/fetch_logs:
    short_description: Fetch logs from the orderer Kubernetes pod
    description:
      - "Collects logs from pods selected by the orderer Kubernetes app label."
      - "Works for consenter, batcher, assembler, and router workloads by using the generated resource name labels."
    options:
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of

  k8s/config/transfer:
    short_description: Create the orderer Kubernetes ConfigMap
    description:
      - "Slurps the generated genesis block and renders the orderer ConfigMap."
      - "Includes the component config file and optional mTLS CA bundles consumed by the Kubernetes StatefulSet."
    options:
      remote_config_dir: *remote_config_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      orderer_component_type: *orderer_component_type
      orderer_config_file: *orderer_config_file
      orderer_use_mtls: *orderer_use_mtls
      orderer_mtls_clients: *orderer_mtls_clients
      orderer_mtls_orgs: *orderer_mtls_orgs
      k8s_namespace:
        <<: *k8s_namespace
        required: true

  k8s/config/rm:
    short_description: Remove the orderer Kubernetes ConfigMap
    description:
      - "Deletes the ConfigMap that holds orderer configuration, genesis material, and optional mTLS CA bundles."
      - "Does not remove the local generated config directory."
    options:
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      k8s_namespace:
        <<: *k8s_namespace
        required: true

  k8s/crypto/transfer:
    short_description: Create the orderer Kubernetes Secret
    description:
      - "Resolves orderer MSP and TLS file locations and renders the Kubernetes Secret."
      - "The Secret is consumed by the StatefulSet to mount MSP private key, signcert, CA certs, TLS server key, TLS server certificate, and TLS CA material."
    options:
      remote_config_dir: *remote_config_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      organization: *organization
      orderer_crypto_name: *orderer_crypto_name
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      orderer_component_type: *orderer_component_type
      k8s_namespace:
        <<: *k8s_namespace
        required: true

  k8s/crypto/rm:
    short_description: Remove the orderer Kubernetes Secret
    description:
      - "Deletes the Secret that stores orderer MSP and TLS material."
      - "Does not remove the local MSP and TLS directories under the orderer config path."
    options:
      orderer_k8s_resource_name: *orderer_k8s_resource_name
      orderer_k8s_part_of: *orderer_k8s_part_of
      k8s_namespace:
        <<: *k8s_namespace
        required: true

