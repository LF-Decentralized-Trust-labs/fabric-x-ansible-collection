---
argument_specs:

  start:
    short_description: Dispatch orderer startup by component and deployment mode
    description:
      - "Selects the orderer component implementation and delegates to the matching deployment-mode start task."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component to start."
      orderer_deployment_mode:
        type: str
        required: false
        default: "{%- if orderer_use_bin -%}bin{%- elif orderer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        choices:
          - bin
          - container
          - k8s
        description:
          - "Deployment backend used to start the component."

  stop:
    short_description: Dispatch orderer shutdown by component and deployment mode
    description:
      - "Selects the orderer component implementation and delegates to the matching deployment-mode stop task."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component to stop."
      orderer_deployment_mode:
        type: str
        required: false
        default: "{%- if orderer_use_bin -%}bin{%- elif orderer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        choices:
          - bin
          - container
          - k8s
        description:
          - "Deployment backend used to stop the component."

  teardown:
    short_description: Dispatch orderer teardown by component and deployment mode
    description:
      - "Selects the orderer component implementation and delegates to the matching deployment-mode teardown task."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component to remove."
      orderer_deployment_mode:
        type: str
        required: false
        default: "{%- if orderer_use_bin -%}bin{%- elif orderer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        choices:
          - bin
          - container
          - k8s
        description:
          - "Deployment backend used to remove the component."

  wipe:
    short_description: Remove orderer runtime state, config, and optional binary
    description:
      - "Runs teardown and removes generated configuration, crypto material, and optionally the installed binary."
    options:
      orderer_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Whether the orderer binary should also be removed during wipe."

  fetch_logs:
    short_description: Fetch orderer logs from the active deployment backend
    description:
      - "Delegates log collection to the Kubernetes, container, or binary implementation according to the enabled deployment mode."
    options:
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether to collect logs from a Kubernetes deployment."
      orderer_use_container:
        type: bool
        required: false
        default: "{{ (not orderer_use_bin) and (not orderer_use_k8s) }}"
        description:
          - "Whether to collect logs from a container deployment."
      orderer_use_bin:
        type: bool
        required: false
        default: false
        description:
          - "Whether to collect logs from a binary deployment."

  ping:
    short_description: Check the orderer gRPC port
    description:
      - "Pings the configured orderer gRPC endpoint through the shared utils role."
    options:
      orderer_rpc_port:
        type: int
        required: true
        description:
          - "gRPC port exposed by the orderer component."

  get_metrics:
    short_description: Retrieve orderer Prometheus metrics
    description:
      - "Fetches metrics from the orderer monitoring endpoint when metrics are enabled."
    options:
      actual_host:
        type: str
        required: true
        description:
          - "Resolvable hostname or IP address used to contact the orderer from the control node."
      orderer_http_protocol:
        type: str
        required: false
        default: http
        choices:
          - http
          - https
        description:
          - "Protocol used to reach the metrics endpoint."
      orderer_metrics_port:
        type: int
        required: false
        description:
          - "Metrics port to query. When omitted, the task skips metric retrieval."

  bin/build:
    short_description: Build the orderer binary from source
    description:
      - "Builds the orderer binary through the shared bin role using the configured Git repository and Go package."
    options:
      orderer_bin_name:
        type: str
        required: false
        default: arma
        description:
          - "Name of the output binary."
      orderer_git_hub_url:
        type: str
        required: false
        default: github.com
        description:
          - "Git hosting domain for the orderer source repository."
      orderer_git_repo:
        type: str
        required: false
        default: hyperledger/fabric-x-orderer
        description:
          - "Repository path containing the orderer source code."
      orderer_git_commit:
        type: str
        required: false
        default: v0.0.23
        description:
          - "Git ref to build."
      orderer_source_code_package:
        type: str
        required: false
        default: cmd/arma
        description:
          - "Go package path that produces the orderer binary."

  bin/install:
    short_description: Install the published orderer binary
    description:
      - "Installs the configured released orderer binary through the shared bin role."
    options:
      orderer_bin_package:
        type: str
        required: false
        default: "{{ orderer_git_hub_url }}/{{ orderer_git_repo }}/{{ orderer_source_code_package }}"
        description:
          - "Go package path used for installation."
      orderer_git_commit:
        type: str
        required: false
        default: v0.0.23
        description:
          - "Version suffix appended to the install package."

  bin/transfer:
    short_description: Transfer the orderer binary to the target host
    description:
      - "Copies the built or downloaded orderer binary through the shared bin role."
    options:
      orderer_bin_name:
        type: str
        required: false
        default: arma
        description:
          - "Name of the binary to transfer."

  bin/rm:
    short_description: Remove the installed orderer binary
    description:
      - "Deletes the orderer binary through the shared bin role."
    options:
      orderer_bin_name:
        type: str
        required: false
        default: arma
        description:
          - "Name of the binary to remove."

  bin/start:
    short_description: Start the orderer binary process
    description:
      - "Ensures the data directory exists and starts the orderer binary with the selected component configuration."
    options:
      orderer_bin_name:
        type: str
        required: false
        default: arma
        description:
          - "Name of the binary to execute."
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component subcommand to run."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory that stores generated orderer configuration files."
      orderer_remote_data_dir:
        type: path
        required: false
        default: "{{ remote_data_dir }}"
        description:
          - "Remote directory used for orderer data."
      orderer_config_file:
        type: str
        required: false
        default: node_config.yaml
        description:
          - "Orderer configuration filename passed to the binary."
      orderer_rpc_port:
        type: int
        required: true
        description:
          - "gRPC port the binary must open before startup is considered complete."

  bin/stop:
    short_description: Stop the orderer binary process
    description:
      - "Stops the orderer binary through the shared bin role."
    options: {}

  bin/fetch_logs:
    short_description: Fetch logs for the orderer binary process
    description:
      - "Collects binary-process logs through the shared bin role."
    options: {}

  bin/teardown:
    short_description: Remove the orderer binary runtime state
    description:
      - "Stops the orderer binary and removes its persisted data."
    options: {}

  container/start:
    short_description: Start the orderer container
    description:
      - "Ensures the data directory exists and starts the orderer container with the configured ports and volume mounts."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component subcommand passed to the container."
      orderer_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Container name used for the orderer process."
      orderer_image:
        type: str
        required: false
        default: "{{ orderer_registry_endpoint }}/{{ orderer_image_name }}:{{ orderer_image_tag }}"
        description:
          - "Container image used to run the orderer."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory mounted into the container as read-only configuration."
      orderer_remote_data_dir:
        type: path
        required: false
        default: "{{ remote_data_dir }}"
        description:
          - "Remote directory mounted into the container for persisted data."
      orderer_container_config_dir:
        type: path
        required: false
        default: /config
        description:
          - "Container path where orderer configuration is mounted."
      orderer_container_data_dir:
        type: path
        required: false
        default: /data
        description:
          - "Container path where orderer data is mounted."
      orderer_config_file:
        type: str
        required: false
        default: node_config.yaml
        description:
          - "Orderer configuration filename inside the config mount."
      orderer_rpc_port:
        type: int
        required: true
        description:
          - "gRPC port exposed by the container."
      orderer_metrics_port:
        type: int
        required: true
        description:
          - "Metrics port exposed by the container."

  container/stop:
    short_description: Stop the orderer container
    description:
      - "Stops the orderer container through the shared container role."
    options:
      orderer_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Container name to stop."

  container/rm:
    short_description: Remove the orderer container
    description:
      - "Deletes the orderer container through the shared container role."
    options:
      orderer_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Container name to remove."

  container/fetch_logs:
    short_description: Fetch logs from the orderer container
    description:
      - "Collects logs for the configured orderer container."
    options:
      orderer_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Container name whose logs should be fetched."

  container/teardown:
    short_description: Remove the orderer container runtime state
    description:
      - "Deletes the orderer container and removes its persisted data."
    options: {}

  data/rm:
    short_description: Remove orderer persisted data
    description:
      - "Deletes the orderer data directory locally or removes the Kubernetes PVC when running in Kubernetes mode."
    options:
      orderer_remote_data_dir:
        type: path
        required: false
        default: "{{ remote_data_dir }}"
        description:
          - "Remote directory that stores orderer data for non-Kubernetes deployments."
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether data removal should target the Kubernetes PersistentVolumeClaim instead of the filesystem."

  config/transfer:
    short_description: Render and transfer orderer configuration
    description:
      - "Creates the main orderer configuration file, copies the genesis block, and optionally prepares mTLS and Kubernetes-specific configuration."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component whose configuration template should be rendered."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where orderer configuration files are written."
      orderer_config_file:
        type: str
        required: false
        default: node_config.yaml
        description:
          - "Filename used for the rendered orderer configuration."
      configtxgen_artifacts_dir:
        type: path
        required: true
        description:
          - "Directory on the control node containing generated genesis block artifacts."
      orderer_genesis_block_file:
        type: str
        required: false
        default: "{{ channel_id }}_block.pb"
        description:
          - "Genesis block filename copied into the orderer configuration directory."
      orderer_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - "Whether client mTLS CA certificates should also be transferred."
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether Kubernetes-specific ConfigMap rendering should also run."
      orderer_config_dir:
        type: path
        required: false
        default: "{{ orderer_remote_config_dir if orderer_use_bin else orderer_container_config_dir }}"
        description:
          - "Configuration path embedded into the rendered orderer config."
      orderer_data_dir:
        type: path
        required: false
        default: "{{ orderer_remote_data_dir if orderer_use_bin else orderer_container_data_dir }}"
        description:
          - "Data path embedded into the rendered orderer config."
      orderer_rpc_port:
        type: int
        required: true
        description:
          - "gRPC port written into the rendered orderer configuration."
      orderer_use_tls:
        type: bool
        required: false
        default: false
        description:
          - "Whether server-side TLS should be enabled in the rendered orderer configuration."
      orderer_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - "Client host identifiers whose mTLS CA certificates should be trusted when mutual TLS is enabled."
      orderer_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - "Peer organization definitions whose mTLS CA certificates should be trusted when mutual TLS is enabled."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata used to set the local MSP identifier and certificate paths."
      orderer_metrics_port:
        type: int
        required: false
        description:
          - "Metrics port to expose in the rendered orderer configuration."
      orderer_metrics_log_interval:
        type: str
        required: false
        description:
          - "Metrics log interval written when metrics are enabled. Example: C(10s)."
      orderer_group:
        type: str
        required: true
        description:
          - "Party identifier written into the orderer configuration."
      orderer_shard_id:
        type: int
        required: false
        description:
          - "Shard identifier for the batcher configuration template."

  config/mtls/transfer:
    short_description: Transfer mTLS CA certificates for orderer clients and orgs
    description:
      - "Copies trusted client and organization TLS CA certificates into the orderer mTLS directory structure."
    options:
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where mTLS trust material is stored."
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - "Control-node directory containing fetched TLS CA artifacts."
      orderer_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - "Client identifiers whose TLS CA certificates should be copied."
      orderer_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - "Organization definitions whose TLS CA certificates should be copied."

  config/rm:
    short_description: Remove orderer configuration
    description:
      - "Deletes the orderer configuration directory and optionally removes Kubernetes ConfigMap resources."
    options:
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory containing orderer configuration files."
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether Kubernetes ConfigMap cleanup should also run."

  config/transfer_grafana_dashboard:
    short_description: Copy the orderer Grafana dashboard
    description:
      - "Publishes the bundled Fabric-X Orderer Grafana dashboard through the grafana role."
    options: {}

  crypto/setup:
    short_description: Prepare orderer crypto material
    description:
      - "Validates TLS prerequisites, provisions crypto material through cryptogen or Fabric CA, and optionally creates the Kubernetes Secret."
    options:
      orderer_use_tls:
        type: bool
        required: false
        default: false
        description:
          - "Whether TLS crypto material is required for the orderer."
      orderer_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - "Whether mutual TLS crypto material is required for the orderer."
      organization:
        type: dict
        required: false
        description:
          - "Organization metadata required for cryptogen or Fabric CA enrollment. It must be set when TLS or mutual TLS is enabled."
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether Kubernetes Secret generation should also run."

  crypto/cryptogen/transfer:
    short_description: Transfer cryptogen-generated orderer crypto material
    description:
      - "Copies cryptogen-generated MSP and TLS artifacts into the remote orderer configuration directory."
    options:
      cryptogen_artifacts_dir:
        type: path
        required: true
        description:
          - "Control-node directory containing cryptogen-generated crypto artifacts."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata used to resolve the orderer crypto artifact paths."
      orderer_crypto_name:
        type: str
        required: false
        default: "{{ organization.orderer.name | default(inventory_hostname) }}"
        description:
          - "Orderer crypto identity name used to locate the cryptogen output directory."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where crypto material is stored."

  crypto/fabric_ca/enroll:
    short_description: Enroll the orderer with Fabric CA
    description:
      - "Copies the Fabric CA TLS certificate when needed and enrolls both MSP and TLS identities for the orderer."
    options:
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - "Control-node directory containing fetched CA certificate artifacts."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata that identifies the Fabric CA host and orderer enrollment identity."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where enrolled MSP and TLS material is written."

  crypto/fetch:
    short_description: Fetch orderer certificates to the control node
    description:
      - "Fetches the orderer sign certificate, TLS certificate, and TLS CA certificate for downstream artifact generation."
    options:
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - "Control-node directory where fetched crypto artifacts are stored."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata used to build fetched artifact paths."
      orderer_crypto_name:
        type: str
        required: false
        default: "{{ organization.orderer.name | default(inventory_hostname) }}"
        description:
          - "Orderer crypto identity name used in fetched artifact paths."
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory containing the orderer MSP and TLS material."

  crypto/rm:
    short_description: Remove orderer crypto material
    description:
      - "Deletes the orderer MSP and TLS directories and optionally removes the Kubernetes Secret."
    options:
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory containing the orderer MSP and TLS subdirectories."
      orderer_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - "Whether Kubernetes Secret cleanup should also run."

  k8s/start:
    short_description: Create the orderer Kubernetes workload
    description:
      - "Creates the orderer Services and StatefulSet in Kubernetes after ensuring the namespace exists."
    options:
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component label and container arguments used in the Kubernetes manifests."
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for Kubernetes objects."
      orderer_k8s_wait_timeout:
        type: int
        required: false
        default: 120
        description:
          - "Seconds to wait for the StatefulSet rollout."
      orderer_rpc_port:
        type: int
        required: true
        description:
          - "gRPC port exposed by the Service, NodePort Service, and container."
      orderer_k8s_rpc_node_port:
        type: int
        required: false
        default: "{{ orderer_rpc_port }}"
        description:
          - "NodePort value used for external gRPC access."
      orderer_metrics_port:
        type: int
        required: true
        description:
          - "Metrics port exposed by the Service, NodePort Service, and container."
      orderer_k8s_metrics_node_port:
        type: int
        required: false
        default: "{{ orderer_metrics_port }}"
        description:
          - "NodePort value used for external metrics scraping."
      orderer_k8s_fs_group:
        type: int
        required: false
        default: 10001
        description:
          - "Filesystem group applied to mounted ConfigMap and Secret volumes."
      orderer_image:
        type: str
        required: false
        default: "{{ orderer_registry_endpoint }}/{{ orderer_image_name }}:{{ orderer_image_tag }}"
        description:
          - "Container image used by the StatefulSet."
      orderer_container_config_dir:
        type: path
        required: false
        default: /config
        description:
          - "Container path where configuration and crypto files are mounted."
      orderer_container_data_dir:
        type: path
        required: false
        default: /data
        description:
          - "Container path where persisted data is mounted."
      orderer_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - "Whether mTLS client CA cert mounts should be added to the StatefulSet."
      orderer_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - "Client identifiers whose mTLS CA certificates should be mounted into the pod."
      orderer_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - "Organization definitions whose mTLS CA certificates should be mounted into the pod."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata used to derive MSP certificate paths in the pod mounts."

  k8s/rm:
    short_description: Remove the orderer Kubernetes workload
    description:
      - "Deletes the orderer StatefulSet and Services from Kubernetes."
    options:
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for the Kubernetes objects to delete."

  k8s/teardown:
    short_description: Remove the orderer Kubernetes workload and data
    description:
      - "Deletes the Kubernetes workload and removes persisted orderer data."
    options: {}

  k8s/fetch_logs:
    short_description: Fetch logs from the orderer Kubernetes pod
    description:
      - "Collects logs from pods selected by the orderer Kubernetes app label."
    options:
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used to select the orderer pod."

  k8s/config/transfer:
    short_description: Create the orderer Kubernetes ConfigMap
    description:
      - "Slurps the genesis block and renders the orderer ConfigMap, including optional mTLS CA bundles."
    options:
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory containing the rendered orderer configuration and genesis block."
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for the ConfigMap."
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component label written into the ConfigMap metadata."
      orderer_config_file:
        type: str
        required: false
        default: node_config.yaml
        description:
          - "Rendered orderer configuration filename to embed into the ConfigMap."
      orderer_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - "Whether mTLS CA bundles should be added to the ConfigMap."
      orderer_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - "Client identifiers whose mTLS CA certificates should be embedded."
      orderer_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - "Organization definitions whose mTLS CA certificates should be embedded."

  k8s/config/rm:
    short_description: Remove the orderer Kubernetes ConfigMap
    description:
      - "Deletes the ConfigMap that holds orderer configuration and genesis material."
    options:
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for the ConfigMap to delete."

  k8s/crypto/transfer:
    short_description: Create the orderer Kubernetes Secret
    description:
      - "Resolves the orderer crypto file locations and renders the Kubernetes Secret containing MSP and TLS material."
    options:
      orderer_remote_config_dir:
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory containing the orderer MSP and TLS files to package into the Secret."
      organization:
        type: dict
        required: true
        description:
          - "Organization metadata used to resolve MSP certificate filenames and Fabric CA behavior."
      orderer_crypto_name:
        type: str
        required: false
        default: "{{ organization.orderer.name | default(inventory_hostname) }}"
        description:
          - "Orderer crypto identity name used to derive certificate filenames."
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for the Secret."
      orderer_component_type:
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component label written into the Secret metadata."

  k8s/crypto/rm:
    short_description: Remove the orderer Kubernetes Secret
    description:
      - "Deletes the Secret that stores orderer MSP and TLS material."
    options:
      orderer_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Base resource name used for the Secret to delete."

  prometheus/get_scrapers:
    short_description: Build Prometheus scrape targets for orderer hosts
    description:
      - "Groups orderer hosts by component type and exposes Prometheus scrape service definitions for downstream monitoring configuration."
    options:
      orderer_hosts:
        type: list
        elements: str
        required: true
        description:
          - "Inventory hostnames dedicated to Fabric-X Orderer components."
