---
argument_specs:
  role-options:
    short_description: Shared option catalog for orderer role entry points
    options:
      remote_config_dir: &remote_config_dir
        type: path
        description:
          - "Shared base directory for generated configuration."
          - "Example: C(/var/hyperledger/fabric-x/config/orderer/assembler-1)."
      remote_data_dir: &remote_data_dir
        type: path
        description:
          - "Shared base directory for persisted runtime data."
          - "Example: C(/var/hyperledger/fabric-x/data/orderer/router-1)."
      actual_host: &actual_host
        type: str
        required: true
        description:
          - Real machine host.
          - "Example: C(myvpc.cloud.ibm.com)."
      channel_id: &channel_id
        type: str
        description:
          - "Channel identifier used to derive the genesis block filename."
          - "Example: C(fabricx-channel)."
      configtxgen_artifacts_dir: &configtxgen_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing configtxgen artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/configtxgen)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing fetched crypto artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/fetched)."
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing cryptogen-generated crypto artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/cryptogen)."
      k8s_namespace: &k8s_namespace
        type: str
        description:
          - "Kubernetes namespace used for orderer resources."
          - "Example: C(fabricx-orderer)."
      k8s_storage_size: &k8s_storage_size
        type: str
        required: true
        description:
          - "PVC storage request used by the orderer StatefulSet."
          - "Example: C(20Gi)."
      orderer_hosts: &orderer_hosts
        type: list
        elements: str
        required: true
        description:
          - "Inventory hosts dedicated to orderer nodes."
          - "Example: C(['orderer-consenter-1', 'orderer-batcher-1', 'orderer-assembler-1', 'orderer-router-1'])."
      orderer_registry_endpoint: &orderer_registry_endpoint
        type: str
        default: "{{ lookup('env', 'ORDERER_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - "Registry prefix used to build the orderer image reference."
      orderer_image_name: &orderer_image_name
        type: str
        default: fabric-x-orderer
        description:
          - "Image name used for the orderer container."
      orderer_image_tag: &orderer_image_tag
        type: str
        default: "0.0.23"
        description:
          - "Image tag used for the orderer container."
      orderer_image: &orderer_image
        type: str
        default: "{{ orderer_registry_endpoint }}/{{ orderer_image_name }}:{{ orderer_image_tag }}"
        description:
          - "Full image reference used by the container and Kubernetes branches."
      orderer_container_name: &orderer_container_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Container name used by the container lifecycle branch."
      orderer_git_hub_url: &orderer_git_hub_url
        type: str
        default: github.com
        description:
          - "Git host used to resolve the orderer source repository."
      orderer_git_repo: &orderer_git_repo
        type: str
        default: hyperledger/fabric-x-orderer
        description:
          - "Repository path for the orderer source code."
      orderer_git_commit: &orderer_git_commit
        type: str
        default: v0.0.23
        description:
          - "Git ref or release tag used by the bin build and install branches."
      orderer_source_code_package: &orderer_source_code_package
        type: str
        default: cmd/arma
        description:
          - "Go package path that builds the orderer binary."
      orderer_bin_package: &orderer_bin_package
        type: str
        default: "{{ orderer_git_hub_url }}/{{ orderer_git_repo }}/{{ orderer_source_code_package }}"
        description:
          - "Go package path used by the install branch."
      orderer_bin_name: &orderer_bin_name
        type: str
        default: arma
        description:
          - "Binary name used by the bin branches."
      orderer_k8s_resource_name: &orderer_k8s_resource_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Base name used for the orderer Kubernetes objects, including the optional NodePort Service."
      orderer_k8s_part_of: &orderer_k8s_part_of
        type: str
        default: "{{ organization.name }}"
        description:
          - "Value for the Kubernetes C(app.kubernetes.io/part-of) label applied to orderer resources."
      orderer_k8s_wait_timeout: &orderer_k8s_wait_timeout
        type: int
        default: 120
        description:
          - "Seconds to wait for the orderer StatefulSet rollout."
      orderer_k8s_fs_group: &orderer_k8s_fs_group
        type: int
        default: 10001
        description:
          - "Filesystem group applied to mounted ConfigMap and Secret volumes."
      orderer_k8s_rpc_node_port: &orderer_k8s_rpc_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external RPC Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31050)."
      orderer_k8s_loadbalancer_expose_rpc_port:
        &orderer_k8s_loadbalancer_expose_rpc_port
        type: bool
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the RPC port externally.
          - When undefined or C(false), the RPC port is not included in the LoadBalancer Service.
      orderer_k8s_metrics_node_port: &orderer_k8s_metrics_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external metrics Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31051)."
      orderer_k8s_loadbalancer_expose_metrics_port:
        &orderer_k8s_loadbalancer_expose_metrics_port
        type: bool
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the metrics port externally.
          - When undefined or C(false), the metrics port is not included in the LoadBalancer Service.
      orderer_container_config_dir: &orderer_container_config_dir
        type: path
        default: /config
        description:
          - "Container path where orderer configuration is mounted."
      orderer_container_data_dir: &orderer_container_data_dir
        type: path
        default: /data
        description:
          - "Container path where orderer data is mounted."
      orderer_remote_config_dir: &orderer_remote_config_dir
        type: path
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where orderer configuration is written."
      orderer_remote_data_dir: &orderer_remote_data_dir
        type: path
        default: "{{ remote_data_dir }}"
        description:
          - "Remote directory where orderer data is stored."
      orderer_config_file: &orderer_config_file
        type: str
        default: node_config.yaml
        description:
          - "Rendered orderer configuration filename."
      orderer_genesis_block_file: &orderer_genesis_block_file
        type: str
        default: "{{ channel_id }}_block.pb"
        description:
          - "Genesis block filename copied into the config directory."
      orderer_crypto_name: &orderer_crypto_name
        type: str
        default: "{{ organization.orderer.name | default(inventory_hostname) }}"
        description:
          - "Orderer identity name used to derive crypto artifact paths."
      orderer_config_dir: &orderer_config_dir
        type: path
        default: "{{ orderer_remote_config_dir if orderer_use_bin else orderer_container_config_dir }}"
        description:
          - "Configuration path embedded into rendered orderer files."
      orderer_data_dir: &orderer_data_dir
        type: path
        default: "{{ orderer_remote_data_dir if orderer_use_bin else orderer_container_data_dir }}"
        description:
          - "Data path embedded into rendered orderer files."
      orderer_group: &orderer_group
        type: str
        required: true
        description:
          - "Party identifier written into the orderer configuration."
          - "Example: C(consenter-1), C(batcher-1), C(assembler-1), or C(router-1)."
      orderer_component_type: &orderer_component_type
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component to manage; use C(consensus) for the consenter process."
          - "Example: C(consensus), C(batcher), C(assembler), or C(router)."
      orderer_shard_id: &orderer_shard_id
        type: int
        description:
          - "Batcher shard identifier written only by the batcher template."
          - "Example: C(0)."
      orderer_rpc_port: &orderer_rpc_port
        type: int
        required: true
        description:
          - "gRPC port exposed by the orderer."
          - "Example: C(7050)."
      orderer_metrics_port: &orderer_metrics_port
        type: int
        required: true
        description:
          - "Metrics port exposed by the orderer."
          - "Example: C(7060)."
      orderer_metrics_port_config_transfer:
        &orderer_metrics_port_config_transfer
        type: int
        description:
          - "Metrics port written into the rendered config when enabled."
          - "Example: C(9444)."
      orderer_metrics_port_get_metrics: &orderer_metrics_port_get_metrics
        type: int
        description:
          - "Metrics port queried by the metrics fetch branch."
          - "Example: C(9445)."
      orderer_metrics_log_interval: &orderer_metrics_log_interval
        type: str
        description:
          - "Optional metrics logging interval written into the rendered config."
          - "Example: C(10s)."
      orderer_http_protocol: &orderer_http_protocol
        type: str
        default: http
        choices:
          - http
          - https
        description:
          - "Protocol used by the metrics fetch branch."
      orderer_use_bin: &orderer_use_bin
        type: bool
        default: false
        description:
          - "Selects the binary deployment branch."
      orderer_use_k8s: &orderer_use_k8s
        type: bool
        default: false
        description:
          - "Selects the Kubernetes deployment branch."
      orderer_use_container: &orderer_use_container
        type: bool
        default: "{{ (not orderer_use_bin) and (not orderer_use_k8s) and (not orderer_use_openshift) }}"
        description:
          - "Selects the container deployment branch."
      orderer_deployment_mode: &orderer_deployment_mode
        type: str
        default: "{%- if orderer_use_bin -%}bin{%- elif orderer_use_openshift -%}openshift{%- elif orderer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        choices:
          - bin
          - container
          - k8s
          - openshift
        description:
          - "Deployment backend selected by the top-level dispatcher."
      orderer_use_tls: &orderer_use_tls
        type: bool
        default: false
        description:
          - "Enables server-side TLS in the rendered config."
      orderer_use_mtls: &orderer_use_mtls
        type: bool
        default: false
        description:
          - "Enables client mutual TLS in the rendered config."
      orderer_mtls_clients: &orderer_mtls_clients
        type: list
        elements: str
        description:
          - "Client identifiers whose mTLS CA certificates are mounted or transferred."
          - "Trusts fetched C(tls/ca.crt) files under those artifact directories."
          - "Example: C(['loadgen-1', 'gateway-1'])."
      orderer_mtls_orgs: &orderer_mtls_orgs
        type: list
        elements: dict
        description:
          - "Organization dictionaries whose mTLS CA certificates are mounted or transferred."
          - "Example: C([{'domain': 'org1.example.com'}, {'domain': 'org2.example.com'}])."
      organization: &organization
        type: dict
        required: true
        description:
          - "Organization metadata shared by the orderer crypto and config branches."
          - "Example: C({'domain': 'orderer.example.com', 'orderer': {'name': 'orderer-consenter-1'}, 'fabric_ca_host': 'ca-orderer'})."
      k8s_storage_class: &k8s_storage_class
        type: str
        description:
          - "Optional storage class used by the StatefulSet PVC."
          - "Example: C(fast-ssd)."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        description:
          - "Optional image pull secret used by the StatefulSet."
          - "Example: C(regcred-orderer)."
      k8s_readiness_probe_initial_delay_seconds:
        &k8s_readiness_probe_initial_delay_seconds
        type: int
        description:
          - "Optional readiness probe initial delay override."
          - "Example: C(15)."
      k8s_readiness_probe_period_seconds: &k8s_readiness_probe_period_seconds
        type: int
        description:
          - "Optional readiness probe period override."
          - "Example: C(10)."
      k8s_readiness_probe_timeout_seconds: &k8s_readiness_probe_timeout_seconds
        type: int
        description:
          - "Optional readiness probe timeout override."
          - "Example: C(3)."
      k8s_readiness_probe_failure_threshold:
        &k8s_readiness_probe_failure_threshold
        type: int
        description:
          - "Optional readiness probe failure threshold override."
          - "Example: C(6)."
      k8s_liveness_probe_initial_delay_seconds:
        &k8s_liveness_probe_initial_delay_seconds
        type: int
        description:
          - "Optional liveness probe initial delay override."
          - "Example: C(30)."
      k8s_liveness_probe_period_seconds: &k8s_liveness_probe_period_seconds
        type: int
        description:
          - "Optional liveness probe period override."
          - "Example: C(20)."
      k8s_liveness_probe_timeout_seconds: &k8s_liveness_probe_timeout_seconds
        type: int
        description:
          - "Optional liveness probe timeout override."
          - "Example: C(5)."
      k8s_liveness_probe_failure_threshold:
        &k8s_liveness_probe_failure_threshold
        type: int
        description:
          - "Optional liveness probe failure threshold override."
          - "Example: C(3)."

      orderer_use_openshift: &orderer_use_openshift
        type: bool
        default: false
        description:
          - Selects the OpenShift deployment branch.
      orderer_openshift_route: &orderer_openshift_route
        type: str
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(orderer-rpc.apps.example.com)."
      orderer_openshift_metrics_route: &orderer_openshift_metrics_route
        type: str
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(orderer-metrics.apps.example.com)."
  start:
    short_description: Dispatch orderer startup by component and deployment mode
    description:
      - "Dispatches C(consensus), C(batcher), C(assembler), or C(router) startup to the selected C(bin), C(container), or C(k8s) implementation."
      - "Consumes configuration, crypto, genesis, and TLS material prepared by the config and crypto entrypoints."
    options:
      orderer_component_type: *orderer_component_type
      orderer_deployment_mode: *orderer_deployment_mode
      orderer_use_bin: *orderer_use_bin
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  stop:
    short_description: Dispatch orderer shutdown by component and deployment mode
    description:
      - "Dispatches component shutdown to the active binary, container, or Kubernetes lifecycle implementation."
      - "Stops the running orderer process or workload without removing generated config, crypto, genesis, or data artifacts."
    options:
      orderer_component_type: *orderer_component_type
      orderer_deployment_mode: *orderer_deployment_mode
      orderer_use_bin: *orderer_use_bin
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  teardown:
    short_description: Dispatch orderer teardown by component and deployment mode
    description:
      - "Dispatches component teardown to the selected deployment backend."
      - "Removes runtime resources for the consenter, batcher, assembler, or router while leaving reusable generated config and crypto cleanup to dedicated entrypoints."
    options:
      orderer_component_type: *orderer_component_type
      orderer_deployment_mode: *orderer_deployment_mode
      orderer_use_bin: *orderer_use_bin
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  wipe:
    short_description: Remove orderer runtime state, config, and optional binary
    description:
      - "Runs lifecycle teardown, removes generated orderer configuration and MSP/TLS material, and removes the installed binary when binary mode is selected."
      - "Use for a full role-local reset after generated artifacts have been fetched or are no longer needed."
    options:
      orderer_use_bin: *orderer_use_bin

  fetch_logs:
    short_description: Fetch orderer logs from the active deployment backend
    description:
      - "Delegates log collection to the Kubernetes pod selector, container name, or binary process implementation according to the enabled deployment mode."
      - "Collects runtime logs for any orderer component without modifying config, crypto, or data artifacts."
    options:
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift
      orderer_use_container: *orderer_use_container
      orderer_use_bin: *orderer_use_bin

  ping:
    short_description: Check the orderer gRPC port
    description:
      - "Checks the configured orderer gRPC listener for binary and container deployments."
      - "When Kubernetes mode is active, delegates to the NodePort ping branch so exposed Service ports can be checked from the control node."
    options:
      orderer_rpc_port: *orderer_rpc_port
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  get_metrics:
    short_description: Retrieve orderer Prometheus metrics
    description:
      - "Fetches Prometheus metrics from the configured orderer monitoring endpoint using the selected HTTP protocol."
      - "Consumes the metrics listener written into the generated orderer config."
    options:
      actual_host: *actual_host
      orderer_http_protocol: *orderer_http_protocol
      orderer_metrics_port: *orderer_metrics_port_get_metrics

  bin/build:
    short_description: Build the orderer binary from source
    description:
      - "Builds the orderer binary through the shared bin role using the configured Git repository, ref, and Go package path."
      - "Produces a binary that can be transferred and started for consenter, batcher, assembler, or router component modes."
    options:
      orderer_bin_name: *orderer_bin_name
      orderer_git_hub_url: *orderer_git_hub_url
      orderer_git_repo: *orderer_git_repo
      orderer_git_commit: *orderer_git_commit
      orderer_source_code_package: *orderer_source_code_package

  bin/install:
    short_description: Install the published orderer binary
    description:
      - "Installs the configured released orderer binary through the shared bin role."
      - "Uses the Git host, repository, package path, and ref metadata to resolve the published binary package."
    options:
      orderer_bin_name: *orderer_bin_name
      orderer_bin_package: *orderer_bin_package
      orderer_git_hub_url: *orderer_git_hub_url
      orderer_git_repo: *orderer_git_repo
      orderer_source_code_package: *orderer_source_code_package
      orderer_git_commit: *orderer_git_commit

  bin/transfer:
    short_description: Transfer the orderer binary to the target host
    description:
      - "Copies the built or downloaded orderer binary through the shared bin role."
      - "Prepares target hosts for binary-mode lifecycle tasks without rendering config or crypto."
    options:
      orderer_bin_name: *orderer_bin_name

  bin/rm:
    short_description: Remove the installed orderer binary
    description:
      - "Deletes the installed orderer binary through the shared bin role."
      - "Does not remove generated config, crypto material, or persisted orderer data."
    options:
      orderer_bin_name: *orderer_bin_name

  bin/start:
    short_description: Start the orderer binary process
    description:
      - "Ensures the binary-mode data directory exists and starts C(orderer_bin_name) with the selected component subcommand and generated config file."
      - "Consumes remote config, genesis, MSP, and TLS material already transferred into the orderer config directory."
    options:
      orderer_bin_name: *orderer_bin_name
      orderer_component_type: *orderer_component_type
      remote_config_dir: *remote_config_dir
      remote_data_dir: *remote_data_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_remote_data_dir: *orderer_remote_data_dir
      orderer_config_file: *orderer_config_file
      orderer_rpc_port: *orderer_rpc_port

  bin/stop:
    short_description: Stop the orderer binary process
    description:
      - "Stops the orderer binary process through the shared bin role."
      - "Leaves the binary, generated config, crypto, logs, and persisted data in place for restart or inspection."
    options: {}

  bin/fetch_logs:
    short_description: Fetch logs for the orderer binary process
    description:
      - "Collects logs for the binary-mode orderer process through the shared bin role."
      - "Useful after running consenter, batcher, assembler, or router components directly on the host."
    options: {}

  bin/teardown:
    short_description: Remove the orderer binary runtime state
    description:
      - "Stops the binary-mode orderer process and removes its persisted data directory."
      - "Keeps generated configuration and crypto artifacts under the config directory for explicit cleanup or later reuse."
    options: {}

  container/start:
    short_description: Start the orderer container
    description:
      - "Ensures the host data directory exists and starts the orderer container with the selected component command."
      - "Mounts generated config and TLS/MSP material read-only, mounts the data directory read-write, and exposes gRPC and metrics ports."
    options:
      orderer_component_type: *orderer_component_type
      orderer_container_name: *orderer_container_name
      orderer_image: *orderer_image
      orderer_registry_endpoint: *orderer_registry_endpoint
      orderer_image_name: *orderer_image_name
      orderer_image_tag: *orderer_image_tag
      remote_config_dir: *remote_config_dir
      remote_data_dir: *remote_data_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_remote_data_dir: *orderer_remote_data_dir
      orderer_container_config_dir: *orderer_container_config_dir
      orderer_container_data_dir: *orderer_container_data_dir
      orderer_config_file: *orderer_config_file
      orderer_rpc_port: *orderer_rpc_port
      orderer_metrics_port: *orderer_metrics_port

  container/stop:
    short_description: Stop the orderer container
    description:
      - "Stops the named orderer container through the shared container role."
      - "Leaves the container definition, mounted config, crypto material, and persisted data for restart or inspection."
    options:
      orderer_container_name: *orderer_container_name

  container/rm:
    short_description: Remove the orderer container
    description:
      - "Deletes the named orderer container through the shared container role."
      - "Does not remove host-side generated config, crypto material, or persisted data directories."
    options:
      orderer_container_name: *orderer_container_name

  container/fetch_logs:
    short_description: Fetch logs from the orderer container
    description:
      - "Collects logs for the configured orderer container."
      - "Covers consenter, batcher, assembler, and router containers by using the role's container name."
    options:
      orderer_container_name: *orderer_container_name

  container/teardown:
    short_description: Remove the orderer container runtime state
    description:
      - "Deletes the orderer container and removes its persisted data directory."
      - "Keeps generated config and crypto artifacts on the host unless the config or crypto cleanup entrypoints are run."
    options: {}

  data/rm:
    short_description: Remove orderer persisted data
    description:
      - "Deletes the orderer data directory for binary and container deployments."
      - "In Kubernetes mode, removes the orderer PVC so StatefulSet-managed component data can be recreated."
    options:
      orderer_remote_data_dir: *orderer_remote_data_dir
      remote_data_dir: *remote_data_dir
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift
      k8s_namespace:
        <<: *k8s_namespace

  config/transfer:
    short_description: Render and transfer orderer configuration
    description:
      - "Renders the component-specific orderer config for C(consensus), C(batcher), C(assembler), or C(router)."
      - "Copies the genesis block from configtxgen artifacts, writes data and config paths for the selected deployment mode, and prepares optional TLS, mTLS, metrics, and Kubernetes ConfigMap artifacts."
    options:
      orderer_component_type: *orderer_component_type
      remote_config_dir: *remote_config_dir
      remote_data_dir: *remote_data_dir
      orderer_remote_config_dir: *orderer_remote_config_dir
      orderer_remote_data_dir: *orderer_remote_data_dir
      orderer_container_config_dir: *orderer_container_config_dir
      orderer_container_data_dir: *orderer_container_data_dir
      orderer_config_dir: *orderer_config_dir
      orderer_data_dir: *orderer_data_dir
      orderer_config_file: *orderer_config_file
      configtxgen_artifacts_dir: *configtxgen_artifacts_dir
      channel_id: *channel_id
      orderer_genesis_block_file: *orderer_genesis_block_file
      orderer_use_bin: *orderer_use_bin
      orderer_use_tls: *orderer_use_tls
      orderer_use_mtls: *orderer_use_mtls
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift
      orderer_rpc_port: *orderer_rpc_port
      orderer_metrics_port: *orderer_metrics_port_config_transfer
      orderer_metrics_log_interval: *orderer_metrics_log_interval
      orderer_mtls_clients: *orderer_mtls_clients
      orderer_mtls_orgs: *orderer_mtls_orgs
      organization: *organization
