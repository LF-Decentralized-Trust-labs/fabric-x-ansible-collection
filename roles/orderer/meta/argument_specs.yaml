---
argument_specs:
  role-options:
    short_description: Shared option catalog for orderer role entry points
    options:
      remote_config_dir: &remote_config_dir
        type: path
        description:
          - "Shared base directory for generated configuration."
          - "Example: C(/var/hyperledger/fabric-x/config/orderer/assembler-1)."
      remote_data_dir: &remote_data_dir
        type: path
        description:
          - "Shared base directory for persisted runtime data."
          - "Example: C(/var/hyperledger/fabric-x/data/orderer/router-1)."
      actual_host: &actual_host
        type: str
        required: true
        description:
          - Real machine host.
          - "Example: C(myvpc.cloud.ibm.com)."
      orderer_host: &orderer_host
        type: str
        description:
          - "Inventory host whose orderer metrics endpoint should be resolved."
          - "Example: C(orderer-router-1)."
      channel_id: &channel_id
        type: str
        description:
          - "Channel identifier used to derive the genesis block filename."
          - "Example: C(fabricx-channel)."
      configtxgen_artifacts_dir: &configtxgen_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing configtxgen artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/configtxgen)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing fetched crypto artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/fetched)."
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - "Control-node directory containing cryptogen-generated crypto artifacts."
          - "Example: C(/tmp/fabric-x/artifacts/cryptogen)."
      k8s_namespace: &k8s_namespace
        type: str
        description:
          - "Kubernetes namespace used for orderer resources."
          - "Example: C(fabricx-orderer)."
      k8s_storage_size: &k8s_storage_size
        type: str
        required: true
        description:
          - "PVC storage request used by the orderer StatefulSet."
          - "Example: C(20Gi)."
      orderer_hosts: &orderer_hosts
        type: list
        elements: str
        required: true
        description:
          - "Inventory hosts dedicated to orderer nodes."
          - "Example: C(['orderer-consenter-1', 'orderer-batcher-1', 'orderer-assembler-1', 'orderer-router-1'])."
      orderer_registry_endpoint: &orderer_registry_endpoint
        type: str
        default: "{{ lookup('env', 'ORDERER_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - "Registry prefix used to build the orderer image reference."
      orderer_image_name: &orderer_image_name
        type: str
        default: fabric-x-orderer
        description:
          - "Image name used for the orderer container."
      orderer_image_tag: &orderer_image_tag
        type: str
        required: false
        default: "1.0.0"
        description:
          - "Image tag used for the orderer container."
      orderer_image: &orderer_image
        type: str
        default: "{{ orderer_registry_endpoint }}/{{ orderer_image_name }}:{{ orderer_image_tag }}"
        description:
          - "Full image reference used by the container and Kubernetes branches."
      orderer_container_name: &orderer_container_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Container name used by the container lifecycle branch."
      orderer_git_hub_url: &orderer_git_hub_url
        type: str
        default: github.com
        description:
          - "Git host used to resolve the orderer source repository."
      orderer_git_repo: &orderer_git_repo
        type: str
        default: hyperledger/fabric-x-orderer
        description:
          - "Repository path for the orderer source code."
      orderer_git_commit: &orderer_git_commit
        type: str
        required: false
        default: v1.0.0
        description:
          - "Git ref or release tag used by the bin build and install branches."
      orderer_source_code_package: &orderer_source_code_package
        type: str
        default: cmd/arma
        description:
          - "Go package path that builds the orderer binary."
      orderer_bin_package: &orderer_bin_package
        type: str
        default: "{{ orderer_git_hub_url }}/{{ orderer_git_repo }}/{{ orderer_source_code_package }}"
        description:
          - "Go package path used by the install branch."
      orderer_bin_name: &orderer_bin_name
        type: str
        default: arma
        description:
          - "Binary name used by the bin branches."
      orderer_k8s_resource_name: &orderer_k8s_resource_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Base name used for the orderer Kubernetes objects, including the optional NodePort Service."
      orderer_k8s_part_of: &orderer_k8s_part_of
        type: str
        default: "fabric-x-orderer-{{ organization.name }}"
        description:
          - "Value for the Kubernetes C(app.kubernetes.io/part-of) label applied to orderer resources."
      orderer_k8s_wait_timeout: &orderer_k8s_wait_timeout
        type: int
        default: 120
        description:
          - "Seconds to wait for the orderer StatefulSet rollout."
      orderer_k8s_fs_group: &orderer_k8s_fs_group
        type: int
        default: 10001
        description:
          - "Filesystem group applied to mounted ConfigMap and Secret volumes."
      orderer_k8s_rpc_node_port: &orderer_k8s_rpc_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external RPC Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31050)."
      orderer_k8s_loadbalancer_expose_rpc_port:
        &orderer_k8s_loadbalancer_expose_rpc_port
        type: bool
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the RPC port externally.
          - When undefined or C(false), the RPC port is not included in the LoadBalancer Service.
      orderer_k8s_metrics_node_port: &orderer_k8s_metrics_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external operations/metrics Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31051)."
      orderer_k8s_loadbalancer_expose_metrics_port:
        &orderer_k8s_loadbalancer_expose_metrics_port
        type: bool
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the operations/metrics port externally.
          - When undefined or C(false), the operations/metrics port is not included in the LoadBalancer Service.
      orderer_container_config_dir: &orderer_container_config_dir
        type: path
        default: /config
        description:
          - "Container path where orderer configuration is mounted."
      orderer_container_data_dir: &orderer_container_data_dir
        type: path
        default: /data
        description:
          - "Container path where orderer data is mounted."
      orderer_remote_config_dir: &orderer_remote_config_dir
        type: path
        default: "{{ remote_config_dir }}"
        description:
          - "Remote directory where orderer configuration is written."
      orderer_remote_data_dir: &orderer_remote_data_dir
        type: path
        default: "{{ remote_data_dir }}"
        description:
          - "Remote directory where orderer data is stored."
      orderer_config_file: &orderer_config_file
        type: str
        default: node_config.yaml
        description:
          - "Rendered orderer configuration filename."
      orderer_genesis_block_file: &orderer_genesis_block_file
        type: str
        default: "{{ channel_id }}_block.pb"
        description:
          - "Genesis block filename copied into the config directory."
      orderer_crypto_name: &orderer_crypto_name
        type: str
        default: "{{ organization.orderer.name | default(inventory_hostname) }}"
        description:
          - "Orderer identity name used to derive crypto artifact paths."
      orderer_config_dir: &orderer_config_dir
        type: path
        default: "{{ orderer_remote_config_dir if orderer_use_bin else orderer_container_config_dir }}"
        description:
          - "Configuration path embedded into rendered orderer files."
      orderer_data_dir: &orderer_data_dir
        type: path
        default: "{{ orderer_remote_data_dir if orderer_use_bin else orderer_container_data_dir }}"
        description:
          - "Data path embedded into rendered orderer files."
      orderer_group: &orderer_group
        type: int
        required: true
        description:
          - "Numeric party identifier written to C(PartyID) in the orderer configuration."
          - "Example: C(1)."
      orderer_component_type: &orderer_component_type
        type: str
        required: true
        choices:
          - consensus
          - batcher
          - assembler
          - router
        description:
          - "Orderer component to manage; use C(consensus) for the consenter process."
          - "Example: C(consensus), C(batcher), C(assembler), or C(router)."
      orderer_shard_id: &orderer_shard_id
        type: int
        description:
          - "Batcher shard identifier written only by the batcher template."
          - "Example: C(0)."
      orderer_listen_address: &orderer_listen_address
        type: str
        description:
          - "IP address on which the orderer gRPC server binds."
          - "Example: C(0.0.0.0)."
      orderer_keepalive_client_interval: &orderer_keepalive_client_interval
        type: str
        description:
          - "Interval between client keepalive pings to other orderer nodes."
          - "Example: C(1m0s)."
      orderer_keepalive_client_timeout: &orderer_keepalive_client_timeout
        type: str
        description:
          - "Time the orderer client waits for a keepalive response before closing the connection."
          - "Example: C(20s)."
      orderer_keepalive_server_min_interval:
        &orderer_keepalive_server_min_interval
        type: str
        description:
          - "Minimum permitted interval between client pings to the orderer gRPC server."
          - "Example: C(1m0s)."
      orderer_keepalive_server_interval: &orderer_keepalive_server_interval
        type: str
        description:
          - "Interval between server keepalive pings to connected clients."
          - "Example: C(2h0m0s)."
      orderer_keepalive_server_timeout: &orderer_keepalive_server_timeout
        type: str
        description:
          - "Time the orderer server waits for a keepalive response before closing the connection."
          - "Example: C(20s)."
      orderer_backoff_base_delay: &orderer_backoff_base_delay
        type: str
        description:
          - "Initial delay used by the orderer gRPC client backoff policy."
          - "Example: C(1s)."
      orderer_backoff_multiplier: &orderer_backoff_multiplier
        type: float
        description:
          - "Multiplier applied to orderer gRPC client retry backoff delays."
          - "Example: C(1.6)."
      orderer_backoff_max_delay: &orderer_backoff_max_delay
        type: str
        description:
          - "Maximum delay used by the orderer gRPC client backoff policy."
          - "Example: C(2m0s)."
      orderer_max_recv_msg_size: &orderer_max_recv_msg_size
        type: int
        description:
          - "Maximum message size in bytes the orderer gRPC server and client can receive."
          - "Example: C(104857600)."
      orderer_max_send_msg_size: &orderer_max_send_msg_size
        type: int
        description:
          - "Maximum message size in bytes the orderer gRPC server and client can send."
          - "Example: C(104857600)."
      orderer_bootstrap_method: &orderer_bootstrap_method
        type: str
        choices:
          - block
          - yaml
        description:
          - "Bootstrap method written to C(General.Bootstrap.Method) in the orderer config."
          - "Example: C(block)."
      orderer_cluster_send_buffer_size: &orderer_cluster_send_buffer_size
        type: int
        description:
          - "Maximum number of messages in the orderer cluster egress buffer."
          - "Example: C(100)."
      orderer_cluster_replication_policy: &orderer_cluster_replication_policy
        type: str
        description:
          - "Optional block replication policy written to C(General.Cluster.ReplicationPolicy)."
      orderer_bccsp_default: &orderer_bccsp_default
        type: str
        choices:
          - SW
          - PKCS11
        description:
          - "Preferred blockchain crypto service provider for the orderer."
          - "Example: C(SW)."
      orderer_bccsp_sw_hash: &orderer_bccsp_sw_hash
        type: str
        description:
          - "Hash algorithm for the software blockchain crypto provider."
          - "Example: C(SHA2)."
      orderer_bccsp_sw_security: &orderer_bccsp_sw_security
        type: int
        description:
          - "Security level for the software blockchain crypto provider."
          - "Example: C(256)."
      orderer_bccsp_sw_file_key_store: &orderer_bccsp_sw_file_key_store
        type: path
        description:
          - "Optional key store path for the software blockchain crypto provider."
      orderer_bccsp_pkcs11_library: &orderer_bccsp_pkcs11_library
        type: path
        description:
          - "PKCS#11 module library path used when C(orderer_bccsp_default) is C(PKCS11)."
      orderer_bccsp_pkcs11_label: &orderer_bccsp_pkcs11_label
        type: str
        description:
          - "PKCS#11 token label used by the orderer crypto provider."
      orderer_bccsp_pkcs11_pin: &orderer_bccsp_pkcs11_pin
        type: str
        description:
          - "PKCS#11 user PIN used by the orderer crypto provider."
      orderer_bccsp_pkcs11_hash: &orderer_bccsp_pkcs11_hash
        type: str
        description:
          - "Hash algorithm for the PKCS#11 crypto provider."
      orderer_bccsp_pkcs11_security: &orderer_bccsp_pkcs11_security
        type: int
        description:
          - "Security level for the PKCS#11 crypto provider."
      orderer_bccsp_pkcs11_file_key_store: &orderer_bccsp_pkcs11_file_key_store
        type: path
        description:
          - "Optional key store path for the PKCS#11 crypto provider."
      orderer_log_spec: &orderer_log_spec
        type: str
        description:
          - "Logging specification written to C(General.LogSpec)."
          - "Example: C(info)."
      orderer_client_signature_verification_required:
        &orderer_client_signature_verification_required
        type: bool
        description:
          - "Controls whether router and batcher validate signatures in client requests."
          - "Example: C(false)."
      orderer_router_number_of_connections_per_batcher:
        &orderer_router_number_of_connections_per_batcher
        type: int
        description:
          - "Number of connections the router opens to each batcher."
          - "Example: C(10)."
      orderer_router_number_of_streams_per_connection:
        &orderer_router_number_of_streams_per_connection
        type: int
        description:
          - "Number of streams the router opens per connection to a batcher."
          - "Example: C(5)."
      orderer_batcher_batch_sequence_gap: &orderer_batcher_batch_sequence_gap
        type: int
        description:
          - "Maximum batch sequence distance primary batchers allow before waiting for secondaries."
          - "Example: C(10)."
      orderer_batcher_mem_pool_max_size: &orderer_batcher_mem_pool_max_size
        type: int
        description:
          - "Maximum number of requests permitted in the batcher request pool."
          - "Example: C(1000000)."
      orderer_batcher_submit_timeout: &orderer_batcher_submit_timeout
        type: str
        description:
          - "Time a client can wait when submitting a request into the batcher pool."
          - "Example: C(500ms)."
      orderer_assembler_prefetch_buffer_memory_bytes:
        &orderer_assembler_prefetch_buffer_memory_bytes
        type: int
        description:
          - "Maximum memory in bytes used by the assembler prefetch buffer."
          - "Example: C(1073741824)."
      orderer_assembler_restart_ledger_scan_timeout:
        &orderer_assembler_restart_ledger_scan_timeout
        type: str
        description:
          - "Timeout for assembler ledger scanning during restart."
          - "Example: C(5s)."
      orderer_assembler_prefetch_eviction_ttl:
        &orderer_assembler_prefetch_eviction_ttl
        type: str
        description:
          - "Time-to-live for evicting prefetched assembler batches."
          - "Example: C(1h)."
      orderer_assembler_pop_wait_monitor_timeout:
        &orderer_assembler_pop_wait_monitor_timeout
        type: str
        description:
          - "Timeout for assembler pop-wait monitoring."
          - "Example: C(1s)."
      orderer_assembler_replication_channel_size:
        &orderer_assembler_replication_channel_size
        type: int
        description:
          - "Channel size for assembler replication messages."
          - "Example: C(100)."
      orderer_assembler_batch_requests_channel_size:
        &orderer_assembler_batch_requests_channel_size
        type: int
        description:
          - "Channel size for assembler batch request messages."
          - "Example: C(1000)."
      orderer_rpc_port: &orderer_rpc_port
        type: int
        required: true
        description:
          - "gRPC port exposed by the orderer."
          - "Example: C(7050)."
      orderer_operations_port: &orderer_operations_port
        type: int
        required: true
        description:
          - "Operations endpoint port exposed by the orderer."
          - "This endpoint serves operational APIs and Prometheus metrics."
          - "Example: C(7060)."
      orderer_operations_listen_address: &orderer_operations_listen_address
        type: str
        description:
          - "IP address on which the orderer operations server binds."
          - "Example: C(0.0.0.0)."
      orderer_operations_use_tls: &orderer_operations_use_tls
        type: bool
        default: false
        description:
          - "Enables TLS for the orderer operations endpoint."
      orderer_operations_use_mtls: &orderer_operations_use_mtls
        type: bool
        default: "{{ orderer_use_mtls }}"
        description:
          - "Enables client mutual TLS for the orderer operations endpoint."
      orderer_operations_mtls_clients: &orderer_operations_mtls_clients
        type: list
        elements: str
        description:
          - "Client identifiers whose TLS CA certificates are trusted by the operations endpoint."
          - "Trusts fetched C(tls/ca.crt) files under those artifact directories."
          - "Example: C(['prometheus-1'])."
      orderer_operations_mtls_orgs: &orderer_operations_mtls_orgs
        type: list
        elements: dict
        description:
          - "Organization dictionaries whose TLS CA certificates are trusted by the operations endpoint."
          - "Example: C([{'name': 'Org1', 'domain': 'org1.example.com'}])."
      orderer_metrics_provider: &orderer_metrics_provider
        type: str
        choices:
          - prometheus
          - disabled
        description:
          - "Metrics provider written to the orderer C(Metrics.Provider) setting."
          - "Example: C(prometheus)."
      orderer_metrics_log_interval: &orderer_metrics_log_interval
        type: str
        description:
          - "Metrics logging interval written to C(Metrics.MetricsLogInterval); C(0s) disables periodic logging."
          - "Example: C(0s)."
      orderer_use_bin: &orderer_use_bin
        type: bool
        default: false
        description:
          - "Selects the binary deployment branch."
      orderer_use_k8s: &orderer_use_k8s
        type: bool
        default: false
        description:
          - "Selects the Kubernetes deployment branch."
      orderer_use_container: &orderer_use_container
        type: bool
        default: "{{ (not orderer_use_bin) and (not orderer_use_k8s) and (not orderer_use_openshift) }}"
        description:
          - "Selects the container deployment branch."
      orderer_deployment_mode: &orderer_deployment_mode
        type: str
        default: "{%- if orderer_use_bin -%}bin{%- elif orderer_use_openshift -%}openshift{%- elif orderer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        choices:
          - bin
          - container
          - k8s
          - openshift
        description:
          - "Deployment backend selected by the top-level dispatcher."
      orderer_use_tls: &orderer_use_tls
        type: bool
        default: false
        description:
          - "Enables server-side TLS in the rendered config."
      orderer_use_mtls: &orderer_use_mtls
        type: bool
        default: false
        description:
          - "Enables client mutual TLS in the rendered config."
      orderer_mtls_clients: &orderer_mtls_clients
        type: list
        elements: str
        description:
          - "Client identifiers whose mTLS CA certificates are mounted or transferred."
          - "Trusts fetched C(tls/ca.crt) files under those artifact directories."
          - "Example: C(['loadgen-1', 'gateway-1'])."
      orderer_mtls_orgs: &orderer_mtls_orgs
        type: list
        elements: dict
        description:
          - "Organization dictionaries whose mTLS CA certificates are mounted or transferred."
          - "Example: C([{'name': 'Org1', 'domain': 'org1.example.com'}, {'name': 'Org2', 'domain': 'org2.example.com'}])."
      organization: &organization
        type: dict
        required: true
        description:
          - "Organization metadata shared by the orderer crypto and config branches."
          - "Example: C({'name': 'OrdererOrg1', 'domain': 'ordererorg1.example.com', 'role': 'orderer', 'fabric_ca_host': 'fca-orderer-org1', 'orderer': {'name': 'orderer-router-1', 'secret': 'orderer-router-1PWD'}})."
      k8s_storage_class: &k8s_storage_class
        type: str
        description:
          - "Optional storage class used by the StatefulSet PVC."
          - "Example: C(fast-ssd)."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        description:
          - "Optional image pull secret used by the StatefulSet."
          - "Example: C(regcred-orderer)."
      k8s_readiness_probe_initial_delay_seconds:
        &k8s_readiness_probe_initial_delay_seconds
        type: int
        description:
          - "Optional readiness probe initial delay override."
          - "Example: C(15)."
      k8s_readiness_probe_period_seconds: &k8s_readiness_probe_period_seconds
        type: int
        description:
          - "Optional readiness probe period override."
          - "Example: C(10)."
      k8s_readiness_probe_timeout_seconds: &k8s_readiness_probe_timeout_seconds
        type: int
        description:
          - "Optional readiness probe timeout override."
          - "Example: C(3)."
      k8s_readiness_probe_failure_threshold:
        &k8s_readiness_probe_failure_threshold
        type: int
        description:
          - "Optional readiness probe failure threshold override."
          - "Example: C(6)."
      k8s_liveness_probe_initial_delay_seconds:
        &k8s_liveness_probe_initial_delay_seconds
        type: int
        description:
          - "Optional liveness probe initial delay override."
          - "Example: C(30)."
      k8s_liveness_probe_period_seconds: &k8s_liveness_probe_period_seconds
        type: int
        description:
          - "Optional liveness probe period override."
          - "Example: C(20)."
      k8s_liveness_probe_timeout_seconds: &k8s_liveness_probe_timeout_seconds
        type: int
        description:
          - "Optional liveness probe timeout override."
          - "Example: C(5)."
      k8s_liveness_probe_failure_threshold:
        &k8s_liveness_probe_failure_threshold
        type: int
        description:
          - "Optional liveness probe failure threshold override."
          - "Example: C(3)."
      k8s_resources: &k8s_resources
        type: dict
        description:
          - Optional Kubernetes container resource requests and limits.
          - "Example: C({'requests': {'memory': '1Gi', 'cpu': '500m'}, 'limits': {'memory': '2Gi', 'cpu': '1000m'}})."

      orderer_use_openshift: &orderer_use_openshift
        type: bool
        default: false
        description:
          - Selects the OpenShift deployment branch.
      orderer_openshift_route: &orderer_openshift_route
        type: str
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(orderer-rpc.apps.example.com)."
      orderer_openshift_metrics_route: &orderer_openshift_metrics_route
        type: str
        description:
          - Specifies the OpenShift Route host for the operations/metrics endpoint.
          - "Example: C(orderer-metrics.apps.example.com)."
  start:
    short_description: Dispatch orderer startup by component and deployment mode
    description:
      - "Dispatches C(consensus), C(batcher), C(assembler), or C(router) startup to the selected C(bin), C(container), or C(k8s) implementation."
      - "Consumes configuration, crypto, genesis, and TLS material prepared by the config and crypto entrypoints."
    options:
      orderer_component_type: *orderer_component_type
      orderer_deployment_mode: *orderer_deployment_mode
      orderer_use_bin: *orderer_use_bin
      orderer_use_k8s: *orderer_use_k8s
      orderer_use_openshift: *orderer_use_openshift

  stop:
    short_description: Dispatch orderer shutdown by component and deployment mode
    description:
      - "Dispatches component shutdown to the active binary, container, or Kubernetes lifecycle implementation."
      - "Stops the running orderer process or workload without removing generated config, crypto, genesis, or data artifacts."
    options:
      orderer_component_type: *orderer_component_type
      orderer_deployment_mode: *orderer_deployment_mode
      orderer_use_bin: *orderer_use_bin
      orderer_use_k8s: *orderer_use_k8s
