- name: Start Fabric-X Orderer container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: container/start
  when:
    - orderer_use_container

- name: Start Fabric-X Orderer binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: bin/start
  when:
    - orderer_use_bin

- name: Start Fabric-X Orderer on k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/start
  when:
    - orderer_use_k8s
