- name: Resolve effective orderer metrics address
  vars:
    orderer_host: "{{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: effective_address

- name: Get Fabric-X Orderer metrics
  ansible.builtin.uri:
    url: "{{ orderer_effective_metrics_address }}/metrics"
    validate_certs: false
    method: GET
    return_content: true
  register: orderer_metrics

- name: Print Fabric-X Orderer metrics
  ansible.builtin.debug:
    msg: "{{ orderer_metrics.content }}"
  when:
    - orderer_metrics is defined
