# =======================
# bin / container
# =======================
- name: Check that the gRPC port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_rpc_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not orderer_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/ping
  when: orderer_use_k8s
