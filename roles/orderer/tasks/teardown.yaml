- name: Teardown Fabric-X Orderer nodes
  vars:
    orderer_mode: "{{ 'k8s' if orderer_use_k8s else ('bin' if orderer_use_bin else 'container') }}"
  block:
    - name: Teardown Fabric-X Orderer router nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: "{{ orderer_mode }}/teardown"
      when: orderer_component_type == 'router'

    - name: Teardown Fabric-X Orderer assembler nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: "{{ orderer_mode }}/teardown"
      when: orderer_component_type == 'assembler'

    - name: Teardown Fabric-X Orderer batcher nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: "{{ orderer_mode }}/teardown"
      when: orderer_component_type == 'batcher'

    - name: Teardown Fabric-X Orderer consensus nodes
      ansible.builtin.include_role:
        name: hyperledger.fabricx.orderer
        tasks_from: "{{ orderer_mode }}/teardown"
      when: orderer_component_type == 'consensus'
