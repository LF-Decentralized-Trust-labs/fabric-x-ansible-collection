- name: Stop Fabric-X Orderer container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: container/stop
  when:
    - orderer_use_container

- name: Stop Fabric-X Orderer binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: bin/stop
  when:
    - orderer_use_bin
