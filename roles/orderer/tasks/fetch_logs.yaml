- name: Fetch the logs from the Fabric-X Orderer on Kubernetes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/fetch_logs
  when: orderer_use_k8s

- name: Fetch the logs from the Fabric-X Orderer container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: container/fetch_logs
  when: orderer_use_container

- name: Fetch the logs from the Fabric-X Orderer binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: bin/fetch_logs
  when: orderer_use_bin
