- name: Ensure the data directory for Fabric-X Orderer exists
  ansible.builtin.file:
    path: "{{ orderer_remote_data_dir }}"
    state: directory
    mode: "0o755"

- name: Start Fabric-X Orderer binary
  vars:
    bin_command: >-
      {{ orderer_bin_name }} {{ orderer_component_type }}
      --config={{ orderer_remote_config_dir }}/{{ orderer_config_file }}
    bin_wait_until_running: true
    bin_wait_port: "{{ orderer_rpc_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: start
