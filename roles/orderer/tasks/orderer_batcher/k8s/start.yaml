- name: Check if Fabric-X Orderer Batcher MSP admin certs directory exists
  ansible.builtin.stat:
    path: "{{ orderer_remote_config_dir }}/msp/admincerts"
  register: orderer_admincerts_stat

- name: Apply Fabric-X Orderer Batcher Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply Fabric-X Orderer Batcher NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2

- name: Apply Fabric-X Orderer Batcher StatefulSet
  vars:
    orderer_k8s_command: batcher
    orderer_k8s_has_admincerts: "{{ orderer_admincerts_stat.stat.exists and orderer_admincerts_stat.stat.isdir }}"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/statefulset.yaml.j2
    wait: "{{ orderer_k8s_wait }}"
    wait_timeout: "{{ orderer_k8s_wait_timeout }}"
