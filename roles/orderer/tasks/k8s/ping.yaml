- name: Check that the Fabric-X Orderer gRPC node port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_k8s_rpc_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_rpc_node_port is defined

- name: Check that the Fabric-X Orderer gRPC load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_rpc_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_loadbalancer_expose_rpc_port

- name: Check that the Fabric-X Orderer metrics node port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_k8s_metrics_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_metrics_node_port is defined

- name: Check that the Fabric-X Orderer metrics load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_metrics_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_loadbalancer_expose_metrics_port
