- name: Check that the gRPC node port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_k8s_rpc_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_use_node_port
    - orderer_k8s_rpc_node_port is defined

- name: Check that the metrics node port is open
  vars:
    utils_ports_to_ping:
      - "{{ orderer_k8s_metrics_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - orderer_k8s_use_node_port
    - orderer_k8s_metrics_node_port is defined
