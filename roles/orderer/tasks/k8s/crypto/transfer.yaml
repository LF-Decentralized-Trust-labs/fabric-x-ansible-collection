# =========================
# Resolve dynamic cert paths via glob
# =========================
- name: Resolve Fabric-X Orderer MSP CA cert path for Fabric CA
  ansible.builtin.set_fact:
    orderer_k8s_msp_cacert_path: >-
      {{
        query('fileglob', orderer_remote_config_dir + '/msp/cacerts/*.pem')
        | first
      }}
  when:
    - organization.fabric_ca_host is defined

- name: Resolve Fabric-X Orderer MSP CA cert path
  ansible.builtin.set_fact:
    orderer_k8s_msp_cacert_path: "{{ orderer_remote_config_dir }}/msp/cacerts/ca.{{ organization.domain }}-cert.pem"
  when:
    - organization.fabric_ca_host is undefined

# =========================
# Apply Secret
# =========================
- name: Apply Fabric-X Orderer Secret
  vars:
    cryptogen_signcert_file: "{{ orderer_crypto_name }}.{{ organization.domain }}-cert.pem"
    fabric_ca_signcert_file: "cert.pem"
    signcert_file: >-
      {{
        cryptogen_signcert_file
        if organization.fabric_ca_host is undefined
        else fabric_ca_signcert_file
      }}
    orderer_k8s_msp_signcert_path: "{{ orderer_remote_config_dir }}/msp/signcerts/{{ signcert_file }}"
    orderer_k8s_msp_config_path: "{{ orderer_remote_config_dir }}/msp/config.yaml"
    orderer_k8s_msp_keystore_path: "{{ orderer_remote_config_dir }}/msp/keystore/priv_sk"
    orderer_k8s_tls_server_key_path: "{{ orderer_remote_config_dir }}/tls/server.key"
    orderer_k8s_tls_server_cert_path: "{{ orderer_remote_config_dir }}/tls/server.crt"
    orderer_k8s_tls_ca_cert_path: "{{ orderer_remote_config_dir }}/tls/ca.crt"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/secret.yaml.j2
