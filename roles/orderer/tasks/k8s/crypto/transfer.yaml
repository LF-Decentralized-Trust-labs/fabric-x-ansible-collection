# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Orderer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Secret
# =========================
- name: Apply Fabric-X Orderer Secret
  vars:
    orderer_k8s_msp_cacert_path: "{{ orderer_remote_config_dir }}/msp/cacerts/ca.{{ organization.domain }}-cert.pem"
    orderer_k8s_msp_signcert_path: "{{ orderer_remote_config_dir }}/msp/signcerts/{{ orderer_crypto_name }}.{{ organization.domain }}-cert.pem"
    orderer_k8s_msp_config_path: "{{ orderer_remote_config_dir }}/msp/config.yaml"
    orderer_k8s_msp_keystore_path: "{{ orderer_remote_config_dir }}/msp/keystore/priv_sk"
    orderer_k8s_tls_server_key_path: "{{ orderer_remote_config_dir }}/tls/server.key"
    orderer_k8s_tls_server_cert_path: "{{ orderer_remote_config_dir }}/tls/server.crt"
    orderer_k8s_tls_ca_cert_path: "{{ orderer_remote_config_dir }}/tls/ca.crt"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/secret.yaml.j2
