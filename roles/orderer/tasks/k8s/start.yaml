- name: Start Fabric-X Orderer Consenter on k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: orderer_consenter/k8s/start
  when:
    - orderer_component_type == 'consenter'

- name: Start Fabric-X Orderer Batcher on k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: orderer_batcher/k8s/start
  when:
    - orderer_component_type == 'batcher'

- name: Start Fabric-X Orderer Assembler on k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: orderer_assembler/k8s/start
  when:
    - orderer_component_type == 'assembler'

- name: Start Fabric-X Orderer Router on k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: orderer_router/k8s/start
  when:
    - orderer_component_type == 'router'
