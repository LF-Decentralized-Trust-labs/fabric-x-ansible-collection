- name: Delete Fabric-X Orderer StatefulSet
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: StatefulSet
    name: "{{ orderer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Orderer Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ orderer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Orderer NodePort Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ orderer_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
