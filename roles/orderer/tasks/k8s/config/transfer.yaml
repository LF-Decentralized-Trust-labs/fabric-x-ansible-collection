# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Orderer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Genesis block
# =========================
- name: Slurp Fabric-X Orderer genesis block
  ansible.builtin.slurp:
    src: "{{ orderer_remote_config_dir }}/genesis.block"
  register: orderer_slurp_genesis

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Orderer ConfigMap
  vars:
    orderer_k8s_genesis_block_b64: "{{ orderer_slurp_genesis.content }}"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap.yaml.j2
