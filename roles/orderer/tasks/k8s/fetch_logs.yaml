- name: Ensure fetched log directory exists
  ansible.builtin.file:
    path: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0o755"

- name: Fetch Fabric-X Orderer pod logs
  kubernetes.core.k8s_log:
    namespace: "{{ k8s_namespace }}"
    name: "{{ orderer_k8s_resource_name }}-0"
    container: "{{ orderer_component_type }}"
    kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
    context: "{{ k8s_context | default(omit) }}"
  register: orderer_k8s_logs
  failed_when: false

- name: Write Fabric-X Orderer logs
  ansible.builtin.copy:
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/logs.txt"
    mode: "0o644"
    content: "{{ orderer_k8s_logs.log | default('') }}"
