- name: Wipe Fabric-X Orderer router nodes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: "{{ orderer_deployment_mode }}/wipe"
  when: orderer_component_type == 'router'

- name: Wipe Fabric-X Orderer assembler nodes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: "{{ orderer_deployment_mode }}/wipe"
  when: orderer_component_type == 'assembler'

- name: Wipe Fabric-X Orderer batcher nodes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: "{{ orderer_deployment_mode }}/wipe"
  when: orderer_component_type == 'batcher'

- name: Wipe Fabric-X Orderer consensus nodes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: "{{ orderer_deployment_mode }}/wipe"
  when: orderer_component_type == 'consensus'
