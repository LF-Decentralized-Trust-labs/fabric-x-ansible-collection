- name: Remove Fabric-X Orderer Consenter container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: container/rm
  when: orderer_use_container

- name: Remove Fabric-X Orderer Consenter Kubernetes workload
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/rm
  when: orderer_use_k8s

- name: Stop Fabric-X Orderer Consenter binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: bin/stop
  when: orderer_use_bin

- name: Remove Fabric-X Orderer Consenter data
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: data/rm
