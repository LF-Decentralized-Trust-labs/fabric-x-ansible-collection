# =========================
# Operations mTLS clients
# =========================
- name: Transfer Operations mTLS client certificates
  when:
    - orderer_operations_mtls_clients is defined
  block:
    - name: Ensure folder for TLS Certificates of Operations mTLS clients exist
      ansible.builtin.file:
        path: "{{ orderer_remote_config_dir }}/mtls/{{ current_orderer_operations_mtls_client }}"
        state: directory
        mode: "0o755"
      loop: "{{ orderer_operations_mtls_clients }}"
      loop_control:
        loop_var: current_orderer_operations_mtls_client
        label: "{{ current_orderer_operations_mtls_client }}"

    - name: Copy TLS CA Certificates of Operations mTLS clients
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ current_orderer_operations_mtls_client }}/tls/ca.crt"
        dest: "{{ orderer_remote_config_dir }}/mtls/{{ current_orderer_operations_mtls_client }}/ca.crt"
        mode: "0o644"
      loop: "{{ orderer_operations_mtls_clients }}"
      loop_control:
        loop_var: current_orderer_operations_mtls_client
        label: "{{ current_orderer_operations_mtls_client }}"

# =========================
# Operations mTLS Orgs
# =========================
- name: Transfer Operations mTLS Org certificates
  when:
    - orderer_operations_mtls_orgs is defined
  block:
    - name: Ensure folder for TLS Certificates of Operations mTLS Orgs exist
      ansible.builtin.file:
        path: "{{ orderer_remote_config_dir }}/mtls/{{ current_orderer_operations_mtls_org.domain }}"
        state: directory
        mode: "0o755"
      loop: "{{ orderer_operations_mtls_orgs }}"
      loop_control:
        loop_var: current_orderer_operations_mtls_org
        label: "{{ current_orderer_operations_mtls_org.domain }}"

    - name: Copy TLS CA Certificates of Operations mTLS Orgs
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ current_orderer_operations_mtls_org.domain }}/msp/tlscacerts/tlsca.{{ current_orderer_operations_mtls_org.domain }}-cert.pem"
        dest: "{{ orderer_remote_config_dir }}/mtls/{{ current_orderer_operations_mtls_org.domain }}/ca.crt"
        mode: "0o644"
      loop: "{{ orderer_operations_mtls_orgs }}"
      loop_control:
        loop_var: current_orderer_operations_mtls_org
        label: "{{ current_orderer_operations_mtls_org.domain }}"
