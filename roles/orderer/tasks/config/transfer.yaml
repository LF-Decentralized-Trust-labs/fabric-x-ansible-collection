# =========================
# Config
# =========================
- name: Ensure Fabric-X Orderer config directory exists
  ansible.builtin.file:
    path: "{{ orderer_remote_config_dir }}"
    state: directory
    mode: "0o755"

- name: Create Fabric-X Orderer config
  ansible.builtin.template:
    src: config-{{ orderer_component_type }}.yaml.j2
    dest: "{{ orderer_remote_config_dir }}/{{ orderer_config_file }}"
    mode: "0o640"

# =========================
# Genesis block
# =========================
- name: Copy Genesis block to use for the genesis setup phase
  ansible.builtin.copy:
    src: "{{ configtxgen_artifacts_dir }}/{{ orderer_genesis_block_file }}"
    dest: "{{ orderer_remote_config_dir }}/genesis.block"
    mode: "0o644"

# =========================
# mTLS
# =========================
- name: Transfer mTLS certificates
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: config/mtls/transfer
  when:
    - orderer_use_mtls

# =========================
# Config (Kubernetes)
# =========================
- name: Transfer Fabric-X Orderer K8s config
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/config/transfer
  when: orderer_use_k8s
