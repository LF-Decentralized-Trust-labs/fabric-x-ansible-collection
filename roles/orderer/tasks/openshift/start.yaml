- name: Start Orderer workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: k8s/start

- name: Apply Orderer rpc OpenShift Route
  vars:
    openshift_route_name: "{{ orderer_k8s_resource_name }}-rpc"
    openshift_route_host: "{{ orderer_openshift_route }}"
    openshift_route_service_name: "{{ orderer_k8s_resource_name }}"
    openshift_route_service_port: rpc
    openshift_route_use_tls: "{{ orderer_use_tls }}"
    openshift_route_labels:
      app.kubernetes.io/name: "{{ orderer_k8s_resource_name }}"
      app.kubernetes.io/component: "{{ orderer_component_type }}"
      app.kubernetes.io/part-of: "{{ orderer_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: orderer_openshift_route is defined

- name: Apply Orderer metrics OpenShift Route
  vars:
    openshift_route_name: "{{ orderer_k8s_resource_name }}-metrics"
    openshift_route_host: "{{ orderer_openshift_metrics_route }}"
    openshift_route_service_name: "{{ orderer_k8s_resource_name }}"
    openshift_route_service_port: metrics
    openshift_route_use_tls: false
    openshift_route_labels:
      app.kubernetes.io/name: "{{ orderer_k8s_resource_name }}"
      app.kubernetes.io/component: "{{ orderer_component_type }}"
      app.kubernetes.io/part-of: "{{ orderer_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: orderer_openshift_metrics_route is defined
