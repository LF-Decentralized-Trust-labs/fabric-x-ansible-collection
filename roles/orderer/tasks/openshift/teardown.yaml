- name: Teardown Orderer OpenShift resources
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: openshift/rm

- name: Remove Fabric-X Orderer data
  ansible.builtin.include_role:
    name: hyperledger.fabricx.orderer
    tasks_from: data/rm
