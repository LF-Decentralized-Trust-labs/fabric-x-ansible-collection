- name: Start Block Explorer UI container
  vars:
    container_name: "{{ block_explorer_ui_container_name }}"
    container_image: "{{ block_explorer_ui_image }}"
    container_env:
      PORT: "{{ block_explorer_ui_port | string }}"
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: "http://{{ hostvars[block_explorer_host].ansible_host }}:{{ hostvars[block_explorer_host].block_explorer_port }}"
      NEXT_PUBLIC_BACKEND_DISPLAY_URL: "http://{{ hostvars[block_explorer_host].ansible_host }}:{{ hostvars[block_explorer_host].block_explorer_port }}"
    container_ports:
      - "{{ block_explorer_ui_port }}:{{ block_explorer_ui_port }}"
    # The Block Explorer UI image has no curl/wget/nc — only bash. Use a
    # /dev/tcp HTTP probe; the UI only ever serves plain HTTP.
    container_healthcheck_test: >-
      bash -c '
      exec 42<>/dev/tcp/localhost/{{ block_explorer_ui_port }};
      echo -e "GET /api/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&42;
      head -1 <&42 | cut -d" " -f2 | grep -q "^200$" || exit 1;
      exec 42<&-;
      exec 42>&-
      '
    container_wait_until_running: true
    container_run_as_host_user: true
    container_wait_port: "{{ block_explorer_ui_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: start
