- name: Start Block Explorer UI workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer_ui
    tasks_from: k8s/start

- name: Apply Block Explorer UI web OpenShift Route
  vars:
    openshift_route_name: "{{ block_explorer_ui_k8s_resource_name }}-web"
    openshift_route_host: "{{ block_explorer_ui_openshift_route }}"
    openshift_route_service_name: "{{ block_explorer_ui_k8s_resource_name }}"
    openshift_route_service_port: web
    openshift_route_labels:
      app.kubernetes.io/name: "{{ block_explorer_ui_k8s_resource_name }}"
      app.kubernetes.io/component: block-explorer-ui
      app.kubernetes.io/part-of: "{{ block_explorer_ui_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: block_explorer_ui_openshift_route is defined
