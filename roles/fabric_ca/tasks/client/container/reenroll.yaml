- name: Resolve effective Fabric CA connection port
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/effective_address

- name: Set volumes for Fabric-CA client
  ansible.builtin.set_fact:
    fabric_ca_volumes:
      - "{{ fabric_ca_msp_dir }}:{{ fabric_ca_client_container_config_dir }}:z"

- name: Set volumes for TLS certificates
  vars:
    fabric_ca_tls_certfile_volume: "{{ fabric_ca_tls_certfile }}:{{ fabric_ca_client_container_config_dir }}/tls-cert.pem:z"
  ansible.builtin.set_fact:
    fabric_ca_volumes: "{{ fabric_ca_volumes + [fabric_ca_tls_certfile_volume] }}"
  when:
    - fabric_ca_use_tls
    - fabric_ca_tls_certfile is defined

- name: Reenroll identity with Fabric CA client container
  vars:
    container_name: "{{ fabric_ca_name }}-reenroll-{{ fabric_ca_identity.name }}"
    container_image: "{{ fabric_ca_image }}"
    container_env:
      FABRIC_CA_CLIENT_HOME: "{{ fabric_ca_client_container_config_dir }}"
    container_command: >-
      {{ fabric_ca_client_bin_name }} reenroll
      -u {{ fabric_ca_scheme }}://{{ fabric_ca_identity.name }}:{{ fabric_ca_identity.secret }}@{{ fabric_ca_server_effective_address }}
      --caname {{ fabric_ca_name }}
      --mspdir {{ fabric_ca_client_container_config_dir }}
      {% if fabric_ca_enrollment_profile is defined and fabric_ca_enrollment_profile == 'tls' %}
      --myskfile {{ fabric_ca_cryptogenize_tls_key_file }}
      --mycertfile {{ fabric_ca_cryptogenize_tls_cert_file }}
      --mycacertfile {{ fabric_ca_cryptogenize_tls_ca_cert_file }}
      --enrollment.profile tls
      {% else %}
      --myskfile {{ fabric_ca_cryptogenize_msp_private_key_file }}
      --mycertfile {{ fabric_ca_cryptogenize_msp_signcert_file }}
      --mycacertfile {{ fabric_ca_cryptogenize_msp_ca_cert_file }}
      {% endif %}
      {% if fabric_ca_csr_hosts is defined and (fabric_ca_csr_hosts | length) > 0 %}
      {% for csr_host in fabric_ca_csr_hosts %}
      --csr.hosts {{ csr_host }}
      {% endfor %}
      {% endif %}
      {% if fabric_ca_use_tls and (fabric_ca_tls_certfile is defined) %}
      --tls.certfiles {{ fabric_ca_client_container_config_dir }}/tls-cert.pem
      {% endif %}
    container_volumes: "{{ fabric_ca_volumes }}"
    container_autoremove: true
    container_run_as_host_user: true
    container_run_detach_mode: false
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: start
