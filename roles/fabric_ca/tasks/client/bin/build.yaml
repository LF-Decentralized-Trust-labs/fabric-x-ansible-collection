- name: Build the binary {{ fabric_ca_client_bin_name }}
  vars:
    # Git vars
    git_hub_url: "{{ fabric_ca_git_hub_url }}"
    git_repo: "{{ fabric_ca_git_repo }}"
    git_commit: "{{ fabric_ca_git_commit }}"
    # Bin vars
    bin_name: "{{ fabric_ca_client_bin_name }}"
    # Go vars
    go_source_code_package: "{{ fabric_ca_client_source_code_package }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/build
