- name: Build the binary {{ fabric_ca_server_bin_name }}
  vars:
    # Git vars
    git_uri: "{{ fabric_ca_git_uri }}"
    git_commit: "{{ fabric_ca_git_commit }}"
    # Bin vars
    bin_name: "{{ fabric_ca_server_bin_name }}"
    # Go vars
    go_source_code_package: "{{ fabric_ca_server_source_code_package }}"
    go_cgo_enabled: true
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/multiplatform_build
