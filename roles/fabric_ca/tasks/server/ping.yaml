# =======================
# bin / container
# =======================
- name: Check that the Fabric CA web port is open
  vars:
    utils_ports_to_ping:
      - "{{ fabric_ca_port }}"
      - "{{ fabric_ca_operations_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not fabric_ca_server_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open (k8s)
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/k8s/ping
  when: fabric_ca_server_use_k8s
