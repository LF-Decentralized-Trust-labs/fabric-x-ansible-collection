- name: Remove Fabric CA config directory
  ansible.builtin.file:
    path: "{{ fabric_ca_server_remote_config_dir }}"
    state: absent

- name: Remove Fabric CA Kubernetes ConfigMap
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/k8s/config/rm
  when: fabric_ca_server_use_k8s
