- name: Teardown Fabric CA container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/container/rm
  when: fabric_ca_server_use_container

- name: Stop Fabric CA binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/bin/stop
  when: fabric_ca_server_use_bin

- name: Remove Fabric CA Kubernetes resources
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/k8s/rm
  when: fabric_ca_server_use_k8s

- name: Teardown Fabric CA server on OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/openshift/rm
  when: fabric_ca_server_use_openshift
