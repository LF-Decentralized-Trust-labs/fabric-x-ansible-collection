- name: Start Fabric CA server container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/container/start
  when: fabric_ca_server_use_container

- name: Start Fabric CA server binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/bin/start
  when: fabric_ca_server_use_bin

- name: Start Fabric CA server on Kubernetes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/k8s/start
  when: fabric_ca_server_use_k8s
