- name: Setup Fabric CA x509 crypto material
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/crypto/x509/setup

- name: Setup Fabric CA Idemix crypto material
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/crypto/idemix/setup

- name: Transfer Fabric CA crypto material to Kubernetes Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fabric_ca
    tasks_from: server/k8s/crypto/transfer
  when: fabric_ca_server_use_k8s
