- name: Determine if the current organization is an orderer organization
  ansible.builtin.set_fact:
    fabric_ca_orderer_organization: >-
      {{
        groups['all']
        | map('extract', hostvars)
        | selectattr('organization', 'defined')
        | selectattr('organization.domain', '==', organization.domain)
        | selectattr('organization.role', 'defined')
        | selectattr('organization.role', '==', 'orderer')
        | length > 0
      }}
  when:
    - fabric_ca_orderer_organization is not defined

- name: Set the MSP folder
  vars:
    org_dir: >-
      {{
        'ordererOrganizations'
        if fabric_ca_orderer_organization is defined and fabric_ca_orderer_organization
        else 'peerOrganizations'
      }}
  ansible.builtin.set_fact:
    fabric_ca_org_dir: "{{ fetched_artifacts_dir }}/crypto/{{ org_dir }}/{{ organization.domain }}"

- name: Fetch the CA certificate
  ansible.builtin.fetch:
    src: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_ca_cert_file }}"
    dest: "{{ fabric_ca_org_dir }}/msp/cacerts/ca.{{ organization.domain }}-cert.pem"
    flat: true
  when:
    - not (fabric_ca_fetch_admin_only | default(false))

- name: Fetch the TLS CA certificate
  ansible.builtin.fetch:
    src: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_ca_cert_file }}"
    dest: "{{ fabric_ca_org_dir }}/msp/tlscacerts/tlsca.{{ organization.domain }}-cert.pem"
    flat: true
  when:
    - not (fabric_ca_fetch_admin_only | default(false))

# Despite admincerts being deprecated, we must fetch also the admin cert in order to build a proper
# config block for the ordering service.
# If we don't fetch the admin certificate, the genesis block is built without it and the orderers
# fail with the error "administrators must be declared when no admin ou classification is set".
- name: Check if the Admin CA certificate exists
  ansible.builtin.stat:
    path: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_admin.name }}/msp/signcerts/cert.pem"
  register: fabric_ca_admin_cert
  when:
    - fabric_ca_admin is defined
    - fabric_ca_admin.name is defined

- name: Fetch the Admin CA certificate
  ansible.builtin.fetch:
    src: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_admin.name }}/msp/signcerts/cert.pem"
    dest: "{{ fabric_ca_org_dir }}/msp/admincerts/Admin@{{ organization.domain }}-cert.pem"
    flat: true
  when:
    - fabric_ca_admin is defined
    - fabric_ca_admin.name is defined
    - fabric_ca_admin_cert.stat.exists | default(false)
