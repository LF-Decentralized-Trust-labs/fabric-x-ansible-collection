---
argument_specs:

  client/enroll:
    short_description: Dispatch client enrollment
    description:
      - "Selects the Fabric CA client enrollment implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/register:
    short_description: Dispatch client registration
    description:
      - "Selects the Fabric CA client registration implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/reenroll:
    short_description: Dispatch client reenrollment
    description:
      - "Selects the Fabric CA client reenrollment implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/identity_list:
    short_description: Dispatch client identity listing
    description:
      - "Selects the Fabric CA client identity listing implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/revoke:
    short_description: Dispatch client revocation
    description:
      - "Selects the Fabric CA client revocation implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/gencrl:
    short_description: Dispatch client CRL generation
    description:
      - "Selects the Fabric CA client CRL generation implementation."
    options:
      fabric_ca_client_use_bin:
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container client flow."

  client/cryptogenize:
    short_description: Normalize enrolled MSP output
    description:
      - "Copies enrolled client material into cryptogen-compatible filenames."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the MSP directory to normalize after enrollment. Example: C(/var/hyperledger/msp)."
      fabric_ca_enrollment_profile:
        type: str
        required: false
        description:
          - "Selects the enrollment profile that determines whether TLS-specific files are copied."
      fabric_ca_cryptogenize_tls_ca_cert_file:
        type: str
        default: ca.crt
        description:
          - "Sets the destination filename for the copied TLS CA certificate."
      fabric_ca_cryptogenize_tls_cert_file:
        type: str
        default: server.crt
        description:
          - "Sets the destination filename for the copied TLS sign certificate."
      fabric_ca_cryptogenize_tls_key_file:
        type: str
        default: server.key
        description:
          - "Sets the destination filename for the copied TLS private key."

  client/bin/build:
    short_description: Build the Fabric CA client binary
    description:
      - "Builds the Fabric CA client binary from source through the shared Go helper roles."
    options:
      fabric_ca_git_hub_url:
        type: str
        default: github.com
        description:
          - "Sets the GitHub host used when building the Fabric CA client source."
      fabric_ca_git_repo:
        type: str
        default: hyperledger/fabric-ca
        description:
          - "Sets the Fabric CA source repository used for the build."
      fabric_ca_git_commit:
        type: str
        default: v1.5.15
        description:
          - "Pins the Fabric CA source revision used for the build."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the output binary name for the Fabric CA client."
      fabric_ca_client_source_code_package:
        type: str
        default: cmd/fabric-ca-client
        description:
          - "Sets the Go package path used to build the Fabric CA client."

  client/bin/install:
    short_description: Install the Fabric CA client binary
    description:
      - "Installs the Fabric CA client binary through the shared Go install helper."
    options:
      fabric_ca_client_bin_package:
        type: str
        default: "{{ fabric_ca_git_hub_url }}/{{ fabric_ca_git_repo }}/{{ fabric_ca_client_source_code_package }}"
        description:
          - "Sets the Go package to install for the Fabric CA client."
      fabric_ca_git_commit:
        type: str
        default: v1.5.15
        description:
          - "Pins the Fabric CA source revision used for installation."

  client/bin/transfer:
    short_description: Transfer the Fabric CA client binary
    description:
      - "Copies the built Fabric CA client binary to the managed host."
    options:
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name to transfer."

  client/bin/rm:
    short_description: Remove the Fabric CA client binary
    description:
      - "Removes the Fabric CA client binary from the managed host."
    options:
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name to remove."

  client/bin/enroll:
    short_description: Enroll an identity with the client binary
    description:
      - "Enrolls a Fabric CA identity with the locally installed client binary and normalizes BCCSP output when needed."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the MSP directory where enrollment material is written. Example: C(/var/hyperledger/msp)."
      fabric_ca_identity:
        type: dict
        required: true
        description:
          - "Supplies the identity data used for enrollment. This dictionary must include C(name) and C(secret)."
          - "Store the enrollment secret in an Ansible Vault."
      fabric_ca_enrollment_type:
        type: str
        default: bccsp
        choices:
          - bccsp
          - idemix
        description:
          - "Selects whether the client enrolls BCCSP or Idemix credentials."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name used to run the enrollment command."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the enrollment request."
      fabric_ca_idemix_enrollment_profile:
        type: str
        default: idemix
        description:
          - "Sets the enrollment profile used when C(fabric_ca_enrollment_type) is C(idemix)."
      fabric_ca_enrollment_profile:
        type: str
        required: false
        description:
          - "Sets an optional enrollment profile such as C(tls) for BCCSP reenrollment and enrollment."
      fabric_ca_csr_hosts:
        type: list
        required: false
        description:
          - "Overrides the CSR SAN host entries requested during BCCSP enrollment."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
          - "Enables TLS when connecting to the Fabric CA server."
      fabric_ca_tls_certfile:
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file presented to the client when TLS is enabled."

  client/bin/register:
    short_description: Register an identity with the client binary
    description:
      - "Registers a new Fabric CA identity with the locally installed client binary when it does not already exist."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the client MSP directory used to authenticate the registration request."
      fabric_ca_identity:
        type: dict
        required: true
        description:
          - "Supplies the identity to register. This dictionary must include C(name), C(secret), and C(type)."
          - "Store the registration secret in an Ansible Vault."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name used to run the registration command."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the registration request."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
          - "Enables TLS when connecting to the Fabric CA server."
      fabric_ca_tls_certfile:
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file presented to the client when TLS is enabled."

  client/bin/reenroll:
    short_description: Reenroll an identity with the client binary
    description:
      - "Reenrolls an existing Fabric CA identity with the locally installed client binary and normalizes the generated material."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the MSP directory where reenrolled material is written."
      fabric_ca_identity:
        type: dict
        required: true
        description:
          - "Supplies the identity data used for reenrollment. This dictionary must include C(name) and C(secret)."
          - "Store the enrollment secret in an Ansible Vault."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name used to run the reenrollment command."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the reenrollment request."
      fabric_ca_enrollment_profile:
        type: str
        required: false
        description:
          - "Sets an optional enrollment profile such as C(tls) for reenrollment."
      fabric_ca_csr_hosts:
        type: list
        required: false
        description:
          - "Overrides the CSR SAN host entries requested during reenrollment."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
          - "Enables TLS when connecting to the Fabric CA server."
      fabric_ca_tls_certfile:
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file presented to the client when TLS is enabled."

  client/bin/identity_list:
    short_description: List Fabric CA identities with the client binary
    description:
      - "Lists identities registered in the target Fabric CA server with the locally installed client binary."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the client MSP directory used to authenticate the identity list request."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name used to run the identity list command."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the identity list request."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
          - "Enables TLS when connecting to the Fabric CA server."
      fabric_ca_tls_certfile:
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file presented to the client when TLS is enabled."

  client/bin/revoke:
    short_description: Revoke an identity with the client binary
    description:
      - "Revokes an enrolled Fabric CA identity with the locally installed client binary."
    options:
      fabric_ca_msp_dir:
