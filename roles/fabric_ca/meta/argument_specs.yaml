---
argument_specs:
  role-options:
    short_description: Shared option catalog for fabric_ca role entry points
    options:
      fabric_ca_client_use_bin: &fabric_ca_client_use_bin
        type: bool
        default: false
        description:
          - "Uses the binary client flow instead of the container flow."
      fabric_ca_server_use_bin: &fabric_ca_server_use_bin
        type: bool
        default: false
        description:
          - "Uses the binary server flow instead of container or Kubernetes."
      fabric_ca_server_use_k8s: &fabric_ca_server_use_k8s
        type: bool
        default: false
        description:
          - "Uses the Kubernetes server flow instead of the local runtimes."
      fabric_ca_server_use_container: &fabric_ca_server_use_container
        type: bool
        default: "{{ (not fabric_ca_server_use_bin) and (not fabric_ca_server_use_k8s) }}"
        description:
          - "Uses the container server flow."
      fabric_ca_registry_endpoint: &fabric_ca_registry_endpoint
        type: str
        default: "{{ lookup('env', 'FABRIC_CA_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - "Sets the registry endpoint used to resolve the Fabric CA image."
      fabric_ca_image_name: &fabric_ca_image_name
        type: str
        default: fabric-ca
        description:
          - "Sets the Fabric CA image name."
      fabric_ca_image_tag: &fabric_ca_image_tag
        type: str
        default: 1.5.15
        description:
          - "Sets the Fabric CA image tag."
      fabric_ca_image: &fabric_ca_image
        type: str
        default: "{{ fabric_ca_registry_endpoint }}/{{ fabric_ca_image_name }}:{{ fabric_ca_image_tag }}"
        description:
          - "Sets the Fabric CA image."
      fabric_ca_container_name: &fabric_ca_container_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the container name used for the Fabric CA server runtime."
      fabric_ca_git_hub_url: &fabric_ca_git_hub_url
        type: str
        default: github.com
        description:
          - "Sets the Git host used for Fabric CA source lookups."
      fabric_ca_git_repo: &fabric_ca_git_repo
        type: str
        default: hyperledger/fabric-ca
        description:
          - "Sets the Fabric CA source repository."
      fabric_ca_git_commit: &fabric_ca_git_commit
        type: str
        default: v1.5.15
        description:
          - "Pins the Fabric CA source revision."
      fabric_ca_server_source_code_package:
        &fabric_ca_server_source_code_package
        type: str
        default: cmd/fabric-ca-server
        description:
          - "Sets the Go package path used to build the server binary."
      fabric_ca_server_bin_package: &fabric_ca_server_bin_package
        type: str
        default: "{{ fabric_ca_git_hub_url }}/{{ fabric_ca_git_repo }}/{{ fabric_ca_server_source_code_package }}"
        description:
          - "Sets the server Go package path."
      fabric_ca_server_bin_name: &fabric_ca_server_bin_name
        type: str
        default: fabric-ca-server
        description:
          - "Sets the server binary name."
      fabric_ca_client_source_code_package:
        &fabric_ca_client_source_code_package
        type: str
        default: cmd/fabric-ca-client
        description:
          - "Sets the Go package path used to build the client binary."
      fabric_ca_client_bin_package: &fabric_ca_client_bin_package
        type: str
        default: "{{ fabric_ca_git_hub_url }}/{{ fabric_ca_git_repo }}/{{ fabric_ca_client_source_code_package }}"
        description:
          - "Sets the client Go package path."
      fabric_ca_client_bin_name: &fabric_ca_client_bin_name
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name."
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - "Provides the shared remote configuration root used by this role."
          - "Example: C(/var/hyperledger/fabricx/fabric-ca/ca-org1/config)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Provides the shared local artifacts root used by this role."
          - "Example: C(/tmp/fabricx/fetched-artifacts)."
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - "Provides the Kubernetes namespace from the shared inventory."
          - "Example: C(fabricx)."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        required: false
        description:
          - "Provides an optional Kubernetes image pull secret from shared inventory."
          - "Example: C(registry-pull-secret)."
      postgres_db_host: &postgres_db_host
        type: str
        required: true
        description:
          - "Names the PostgreSQL host defined elsewhere in inventory."
          - "Example: C(postgres0.example.com)."
      organization: &organization
        type: dict
        required: true
        description:
          - "Provides the organization metadata defined elsewhere in inventory; C(domain) is required."
          - "Example: C(org1.example.com)."
      fabric_ca_server_remote_config_dir: &fabric_ca_server_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Sets the remote Fabric CA config root."
      fabric_ca_server_container_config_dir:
        &fabric_ca_server_container_config_dir
        type: path
        default: /config
        description:
          - "Sets the in-container Fabric CA config root."
      fabric_ca_client_container_config_dir:
        &fabric_ca_client_container_config_dir
        type: path
        default: /config
        description:
          - "Sets the in-container client config root."
      fabric_ca_host: &fabric_ca_host
        type: str
        required: true
        description:
          - "Names the inventory host that provides the target Fabric CA server."
          - "Example: C(ca-org1)."
      fabric_ca_server_config_dir: &fabric_ca_server_config_dir
        type: path
        default: "{{ fabric_ca_server_remote_config_dir if fabric_ca_server_use_bin else fabric_ca_server_container_config_dir }}"
        description:
          - "Sets the server config directory."
      fabric_ca_server_k8s_resource_name: &fabric_ca_server_k8s_resource_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the Kubernetes resource name for the Fabric CA server and its Service resources."
      fabric_ca_server_k8s_wait_timeout: &fabric_ca_server_k8s_wait_timeout
        type: int
        default: 120
        description:
          - "Sets the Kubernetes deployment wait timeout."
      fabric_ca_server_k8s_fs_group: &fabric_ca_server_k8s_fs_group
        type: int
        default: 0
        description:
          - "Sets the pod fsGroup for the Fabric CA deployment."
      fabric_ca_port: &fabric_ca_port
        type: int
        required: true
        description:
          - "Sets the Fabric CA API port."
          - "Example: C(7054)."
      fabric_ca_operations_port: &fabric_ca_operations_port
        type: int
        required: true
        description:
          - "Sets the Fabric CA operations port."
          - "Example: C(9443)."
      fabric_ca_server_k8s_node_port: &fabric_ca_server_k8s_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external API Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30054)."
      fabric_ca_server_k8s_loadbalancer_expose_port:
        &fabric_ca_server_k8s_loadbalancer_expose_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the API port externally.
          - When undefined or C(false), the API port is not included in the LoadBalancer Service.
      fabric_ca_server_k8s_operations_node_port:
        &fabric_ca_server_k8s_operations_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external operations Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30943)."
      fabric_ca_server_k8s_loadbalancer_expose_operations_port:
        &fabric_ca_server_k8s_loadbalancer_expose_operations_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the operations port externally.
          - When undefined or C(false), the operations port is not included in the LoadBalancer Service.
      fabric_ca_log_level: &fabric_ca_log_level
        type: str
        default: INFO
        description:
          - "Sets the server log level."
      fabric_ca_use_tls: &fabric_ca_use_tls
        type: bool
        default: false
        description:
          - "Enables TLS for server and client connections."
      fabric_ca_scheme: &fabric_ca_scheme
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the client URL scheme."
      fabric_ca_name: &fabric_ca_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name."
      fabric_ca_enrollment_type: &fabric_ca_enrollment_type
        type: str
        default: bccsp
        choices:
          - bccsp
          - idemix
        description:
          - "Selects the enrollment type."
      fabric_ca_idemix_enrollment_profile: &fabric_ca_idemix_enrollment_profile
        type: str
        default: idemix
        description:
          - "Sets the Idemix enrollment profile."
      fabric_ca_enrollment_profile: &fabric_ca_enrollment_profile
        type: str
        required: false
        description:
          - "Sets an optional enrollment profile such as C(tls)."
          - "Example: C(tls)."
      actual_host: &actual_host
        type: str
        required: false
        description:
          - Real machine host.
          - "Example: C(myvpc.cloud.ibm.com)."
      fabric_ca_csr_hosts: &fabric_ca_csr_hosts
        type: list
        elements: str
        required: false
        default:
          - "{{ ansible_host }}"
          - "{{ actual_host }}"
          - "{{ inventory_hostname }}"
        description:
          - "Sets the CSR SAN host list."
      openssl_san_ipv4_regex: &openssl_san_ipv4_regex
        type: str
        required: false
        description:
          - "Matches IPv4 SAN entries while splitting Fabric CA CSR hosts into IP and DNS names."
          - "Example: C(^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}$)"
      fabric_ca_server_openssl_curve: &fabric_ca_server_openssl_curve
        type: str
        default: P-256
        description:
          - "Sets the curve used for Fabric CA server key generation."
      fabric_ca_server_ca_private_key_file:
        &fabric_ca_server_ca_private_key_file
        type: str
        default: ca-key.pem
        description:
          - "Sets the server CA private key filename."
      fabric_ca_server_ca_cert_file: &fabric_ca_server_ca_cert_file
        type: str
        default: ca-cert.pem
        description:
          - "Sets the server CA certificate filename."
      fabric_ca_server_tls_private_key_file:
        &fabric_ca_server_tls_private_key_file
        type: str
        default: tls-key.pem
        description:
          - "Sets the server TLS private key filename."
      fabric_ca_server_tls_cert_file: &fabric_ca_server_tls_cert_file
        type: str
        default: tls-cert.pem
        description:
          - "Sets the server TLS certificate filename."
      fabric_ca_server_idemixgen_output_dir:
        &fabric_ca_server_idemixgen_output_dir
        type: path
        default: "{{ fabric_ca_server_remote_config_dir }}/idemixgen-artifacts"
        description:
          - "Sets the transient Idemix output directory."
      fabric_ca_csr_cn: &fabric_ca_csr_cn
        type: str
        default: "{{ fabric_ca_name }}"
        description:
          - "Sets the CSR common name."
      fabric_ca_csr_expiry: &fabric_ca_csr_expiry
        type: str
        default: 131400h
        description:
          - "Sets the CSR expiry."
      fabric_ca_msp_dir: &fabric_ca_msp_dir
        type: path
        required: true
        description:
          - "Sets the MSP directory used by Fabric CA client flows and MSP normalization."
          - "Example: C(/tmp/fabricx/crypto-config/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp)."
      fabric_ca_cryptogenize_tls_ca_cert_file:
        &fabric_ca_cryptogenize_tls_ca_cert_file
        type: str
        default: ca.crt
        description:
          - "Sets the normalized TLS CA certificate filename."
      fabric_ca_cryptogenize_tls_cert_file:
        &fabric_ca_cryptogenize_tls_cert_file
        type: str
        default: server.crt
        description:
          - "Sets the normalized TLS certificate filename."
      fabric_ca_cryptogenize_tls_key_file: &fabric_ca_cryptogenize_tls_key_file
        type: str
        default: server.key
        description:
          - "Sets the normalized TLS private key filename."
      fabric_ca_identity: &fabric_ca_identity
        type: dict
        required: true
        description:
          - "Supplies the identity used by Fabric CA client operations."
          - "Store secrets in Ansible Vault."
          - "Example: C(peer0.org1.example.com)."
      fabric_ca_admin: &fabric_ca_admin
        type: dict
        required: true
        description:
          - "Supplies the bootstrap administrator rendered into the server registry section; C(name) and C(secret) are required."
          - "Store the secret in Ansible Vault."
          - "Example: C(admin)."
      fabric_ca_tls_certfile: &fabric_ca_tls_certfile
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file used by Fabric CA client flows when TLS is enabled."
          - "Example: C(/tmp/fabricx/crypto-config/peerOrganizations/org1.example.com/ca/ca.org1.example.com-cert.pem)."

  client/enroll:
    short_description: Dispatch client enrollment
    description:
      - "Dispatches client enrollment to the binary or transient-container implementation."
      - "Creates MSP or Idemix material for the requested identity under C(fabric_ca_msp_dir), using TLS profile settings when requested."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/register:
    short_description: Dispatch client registration
    description:
      - "Dispatches identity registration to the binary or transient-container implementation."
      - "Registers a new Fabric CA identity such as a peer, orderer, admin, or client using an already enrolled registrar MSP."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/reenroll:
    short_description: Dispatch client reenrollment
    description:
      - "Dispatches reenrollment to the binary or transient-container implementation."
      - "Refreshes the enrolled identity certificates in C(fabric_ca_msp_dir), including TLS certificates when C(fabric_ca_enrollment_profile) is C(tls)."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/identity_list:
    short_description: Dispatch client identity listing
    description:
      - "Dispatches Fabric CA identity listing to the binary or transient-container implementation."
      - "Uses the enrolled registrar MSP to query identities registered on the target Fabric CA server."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/revoke:
    short_description: Dispatch client revocation
    description:
      - "Dispatches identity revocation to the binary or transient-container implementation."
      - "Revokes the configured identity on the target Fabric CA server using the registrar MSP."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/gencrl:
    short_description: Dispatch client CRL generation
    description:
      - "Dispatches certificate revocation list generation to the binary or transient-container implementation."
      - "Fetches the CRL from the target Fabric CA server using the enrolled registrar MSP."
    options:
      fabric_ca_client_use_bin: *fabric_ca_client_use_bin

  client/effective_address:
    short_description: Resolve the Fabric CA connection address
    description:
      - "Resolves the effective Fabric CA host, port, and URL scheme used by client operations."
      - "The referenced host must define C(actual_host) and the Fabric CA server port settings; when it enables NodePort, the client uses C(fabric_ca_server_k8s_node_port) instead of C(fabric_ca_port)."
    options:
      fabric_ca_host: *fabric_ca_host

  client/cryptogenize:
    short_description: Normalize enrolled MSP output
    description:
      - "Copies enrolled client MSP and TLS material into cryptogen-compatible filenames."
      - "Produces normalized files such as C(ca.crt), C(server.crt), and C(server.key) for consumers that expect cryptogen layout."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_enrollment_profile: *fabric_ca_enrollment_profile
      fabric_ca_cryptogenize_tls_ca_cert_file: *fabric_ca_cryptogenize_tls_ca_cert_file
      fabric_ca_cryptogenize_tls_cert_file: *fabric_ca_cryptogenize_tls_cert_file
      fabric_ca_cryptogenize_tls_key_file: *fabric_ca_cryptogenize_tls_key_file

  client/bin/build:
    short_description: Build the Fabric CA client binary
    description:
      - "Builds the Fabric CA client binary from the configured Fabric CA Git source revision."
      - "Produces the local C(fabric-ca-client) artifact later transferred to managed hosts."
    options:
      fabric_ca_git_hub_url: *fabric_ca_git_hub_url
      fabric_ca_git_repo: *fabric_ca_git_repo
      fabric_ca_git_commit: *fabric_ca_git_commit
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_client_source_code_package: *fabric_ca_client_source_code_package

  client/bin/install:
    short_description: Install the Fabric CA client binary
    description:
      - "Installs the Fabric CA client binary directly on the managed host with Go tooling."
      - "Uses the configured repository, source package, and revision without changing client enrollment data."
    options:
      fabric_ca_client_bin_package: *fabric_ca_client_bin_package
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_git_hub_url: *fabric_ca_git_hub_url
      fabric_ca_git_repo: *fabric_ca_git_repo
      fabric_ca_client_source_code_package: *fabric_ca_client_source_code_package
      fabric_ca_git_commit: *fabric_ca_git_commit

  client/bin/transfer:
    short_description: Transfer the Fabric CA client binary
    description:
      - "Copies the previously built Fabric CA client binary to the managed host."
      - "Prepares the binary runtime path used by client enrollment, registration, revocation, and CRL tasks."
    options:
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name

  client/bin/rm:
    short_description: Remove the Fabric CA client binary
    description:
      - "Removes the Fabric CA client binary from the managed host."
      - "Leaves enrolled MSP, TLS, and Idemix artifacts untouched."
    options:
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name

  client/bin/enroll:
    short_description: Enroll an identity with the client binary
    description:
      - "Enrolls an identity with the locally installed Fabric CA client binary."
      - "Writes X.509 MSP, TLS, or Idemix enrollment artifacts under C(fabric_ca_msp_dir) depending on enrollment type and profile."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_identity: *fabric_ca_identity
      fabric_ca_enrollment_type: *fabric_ca_enrollment_type
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_idemix_enrollment_profile: *fabric_ca_idemix_enrollment_profile
      fabric_ca_enrollment_profile: *fabric_ca_enrollment_profile
      actual_host: *actual_host
      fabric_ca_csr_hosts: *fabric_ca_csr_hosts
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/bin/register:
    short_description: Register an identity with the client binary
    description:
      - "Registers a new identity with the locally installed Fabric CA client binary."
      - "Uses the registrar MSP in C(fabric_ca_msp_dir) to create the configured enrollment ID, secret, type, and affiliation on the target server."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_identity: *fabric_ca_identity
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/bin/reenroll:
    short_description: Reenroll an identity with the client binary
    description:
      - "Reenrolls an existing identity with the locally installed Fabric CA client binary."
      - "Refreshes certificate material in C(fabric_ca_msp_dir), preserving the selected CA name, CSR hosts, TLS settings, and enrollment profile."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_identity: *fabric_ca_identity
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_enrollment_profile: *fabric_ca_enrollment_profile
      actual_host: *actual_host
      fabric_ca_csr_hosts: *fabric_ca_csr_hosts
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/bin/identity_list:
    short_description: List Fabric CA identities with the client binary
    description:
      - "Lists identities registered in the target Fabric CA server with the locally installed client binary."
      - "Uses the enrolled registrar MSP and effective server address to report identities without changing server state."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/bin/revoke:
    short_description: Revoke an identity with the client binary
    description:
      - "Revokes an enrolled identity with the locally installed Fabric CA client binary."
      - "Uses the registrar MSP to revoke the configured enrollment ID on the target server while leaving local files for cleanup by separate tasks."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_identity: *fabric_ca_identity
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/bin/gencrl:
    short_description: Generate a CRL with the client binary
    description:
      - "Generates a certificate revocation list from the target Fabric CA server with the locally installed client binary."
      - "Uses the registrar MSP and effective address to retrieve current revocation data without changing runtime resources."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_host: *fabric_ca_host
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/container/enroll:
    short_description: Enroll an identity with the client container
    description:
      - "Enrolls an identity with a transient Fabric CA client container."
      - "Mounts the local MSP/config path into the container and writes X.509, TLS, or Idemix artifacts under C(fabric_ca_msp_dir)."
    options:
      fabric_ca_msp_dir: *fabric_ca_msp_dir
      fabric_ca_identity: *fabric_ca_identity
      fabric_ca_enrollment_type: *fabric_ca_enrollment_type
      fabric_ca_host: *fabric_ca_host
      fabric_ca_image: *fabric_ca_image
      fabric_ca_registry_endpoint: *fabric_ca_registry_endpoint
      fabric_ca_image_name: *fabric_ca_image_name
      fabric_ca_image_tag: *fabric_ca_image_tag
      fabric_ca_client_bin_name: *fabric_ca_client_bin_name
      fabric_ca_client_container_config_dir: *fabric_ca_client_container_config_dir
      fabric_ca_scheme: *fabric_ca_scheme
      fabric_ca_name: *fabric_ca_name
      fabric_ca_idemix_enrollment_profile: *fabric_ca_idemix_enrollment_profile
      fabric_ca_enrollment_profile: *fabric_ca_enrollment_profile
      actual_host: *actual_host
      fabric_ca_csr_hosts: *fabric_ca_csr_hosts
      fabric_ca_use_tls: *fabric_ca_use_tls
      fabric_ca_tls_certfile: *fabric_ca_tls_certfile

  client/container/register:
    short_description: Register an identity with the client container
    description:
      - "Registers a new identity with a transient Fabric CA client container."
