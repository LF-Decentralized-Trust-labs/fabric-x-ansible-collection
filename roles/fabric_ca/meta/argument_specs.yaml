      fabric_ca_identity:
        type: dict
        required: true
        description:
          - "Supplies the identity data to revoke. This dictionary must include C(name) and can include C(reason)."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_client_bin_name:
        type: str
        default: fabric-ca-client
        description:
          - "Sets the client binary name used to run the revoke command."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the revoke request."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
          - "Enables TLS when connecting to the Fabric CA server."
      fabric_ca_tls_certfile:
        type: path
        required: false
        description:
          - "Sets the TLS root certificate file presented to the client when TLS is enabled."

  client/bin/gencrl:
    short_description: Generate a CRL with the client binary
    description:
      - "Generates a certificate revocation list from the target Fabric CA server with the locally installed client binary."
    options:
      fabric_ca_msp_dir:
        type: path
        required: true
        description:
          - "Defines the client MSP directory used to authenticate the CRL generation request."
      fabric_ca_host:
        type: str
        required: true
        description:
          - "Names the inventory host that runs the target Fabric CA server."
      fabric_ca_scheme:
        type: str
        default: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
        description:
          - "Sets the scheme used to connect to the Fabric CA server."
      fabric_ca_port:
        type: int
        required: true
        description:
          - "Sets the Fabric CA enrollment API port exposed by the target server."
      fabric_ca_name:
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the CA name passed with the CRL generation request."
      fabric_ca_use_tls:
        type: bool
        default: false
        description:
