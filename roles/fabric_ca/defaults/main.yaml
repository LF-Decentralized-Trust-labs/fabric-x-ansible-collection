# =========================
# Fabric CA image
# =========================
fabric_ca_registry_endpoint: "{{ lookup('env', 'FABRIC_CA_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
fabric_ca_image_name: "fabric-ca"
fabric_ca_image_tag: "1.5.15"
fabric_ca_image: "{{ fabric_ca_registry_endpoint }}/{{ fabric_ca_image_name }}:{{ fabric_ca_image_tag }}"
fabric_ca_container_name: "{{ inventory_hostname }}"

# =========================
# Fabric CA binaries
# =========================
fabric_ca_git_uri: "https://github.com/hyperledger/fabric-ca.git"
fabric_ca_git_commit: "v1.5.15"
# Fabric CA Server binary
fabric_ca_server_source_code_package: "cmd/fabric-ca-server"
fabric_ca_server_bin_package: "github.com/hyperledger/fabric-ca/cmd/fabric-ca-server"
fabric_ca_server_bin_name: "fabric-ca-server"
fabric_ca_server_use_bin: false
# Fabric CA Client binary
fabric_ca_client_source_code_package: "cmd/fabric-ca-client"
fabric_ca_client_bin_package: "github.com/hyperledger/fabric-ca/cmd/fabric-ca-client"
fabric_ca_client_bin_name: "fabric-ca-client"
fabric_ca_client_use_bin: false

# =========================
# Paths, locations
# =========================
fabric_ca_server_remote_config_dir: "{{ remote_config_dir }}"
fabric_ca_server_remote_data_dir: "{{ remote_data_dir }}"
fabric_ca_server_container_config_dir: "/config"
fabric_ca_client_container_config_dir: "/config"
fabric_ca_server_container_data_dir: "/data"
fabric_ca_server_config_dir: "{{ fabric_ca_server_remote_config_dir if fabric_ca_server_use_bin else fabric_ca_server_container_config_dir }}"
fabric_ca_server_data_dir: "{{ fabric_ca_server_remote_data_dir if fabric_ca_server_use_bin else fabric_ca_server_container_data_dir }}"

# =========================
# General settings
# =========================
fabric_ca_log_level: "INFO"

# =========================
# TLS settings
# =========================
fabric_ca_scheme: "{{ 'https' if fabric_ca_use_tls else 'http' }}"
fabric_ca_use_tls: false
fabric_ca_enable_nodeous: true
fabric_ca_tls_root_cert: "{{ fabric_ca_server_ca_cert_path }}"

# =========================
# CA identity settings
# =========================
fabric_ca_name: "{{ inventory_hostname }}"

# =========================
# CA x509 file settings
# =========================
fabric_ca_server_openssl_curve: "P-256"
fabric_ca_server_ca_private_key_file: "ca-key.pem"
fabric_ca_server_ca_cert_file: "ca-cert.pem"
fabric_ca_server_ca_private_key_path: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_ca_private_key_file }}"
fabric_ca_server_ca_cert_path: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_ca_cert_file }}"

# =========================
# CA TLS file settings
# =========================
fabric_ca_server_tls_private_key_file: "tls-key.pem"
fabric_ca_server_tls_cert_file: "tls-cert.pem"
fabric_ca_server_tls_private_key_path: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_tls_private_key_file }}"
fabric_ca_server_tls_cert_path: "{{ fabric_ca_server_remote_config_dir }}/{{ fabric_ca_server_tls_cert_file }}"

# =========================
# CA Idemix file settings
# =========================
fabric_ca_server_msp_dir: "{{ fabric_ca_server_remote_config_dir }}/msp"
fabric_ca_server_keystore_dir: "{{ fabric_ca_server_msp_dir }}/keystore"
fabric_ca_server_idemixgen_output_dir: "{{ fabric_ca_server_remote_config_dir }}/idemixgen-artifacts"
fabric_ca_server_idemix_issuer_public_key_path: "{{ fabric_ca_server_remote_config_dir }}/IssuerPublicKey"
fabric_ca_server_idemix_issuer_revocation_public_key_path: "{{ fabric_ca_server_remote_config_dir }}/IssuerRevocationPublicKey"
fabric_ca_server_idemix_issuer_secret_key_path: "{{ fabric_ca_server_keystore_dir }}/IssuerSecretKey"
fabric_ca_server_idemix_issuer_revocation_private_key_path: "{{ fabric_ca_server_keystore_dir }}/IssuerRevocationPrivateKey"

# =========================
# CSR settings
# =========================
fabric_ca_csr_cn: "{{ fabric_ca_name }}"
fabric_ca_csr_hosts:
  - "{{ ansible_host }}"
  - "{{ inventory_hostname }}"
fabric_ca_csr_expiry: "131400h"

# =========================
# Cryptogenize settings
# =========================
fabric_ca_cryptogenize_tls_ca_cert_file: ca.crt
fabric_ca_cryptogenize_tls_cert_file: server.crt
fabric_ca_cryptogenize_tls_key_file: server.key
