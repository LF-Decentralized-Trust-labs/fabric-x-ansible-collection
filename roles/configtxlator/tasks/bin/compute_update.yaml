- name: Run {{ configtxlator_bin_name }} compute_update
  vars:
    bin_run_with_tmux: false
    bin_remote_dir: "{{ cli_bin_dir }}"
    bin_command: >-
      {{ configtxlator_bin_name }} compute_update
      --channel_id {{ configtxlator_channel_id }}
      --original {{ configtxlator_original_file }}
      --updated {{ configtxlator_updated_file }}
      --output {{ configtxlator_output_file }}
    bin_collect_logs: false
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: start
