- name: Install {{ configtxlator_bin_name }}
  vars:
    bin_dir: "{{ cli_bin_dir }}"
    go_package: "{{ configtxlator_bin_package }}@{{ configtxlator_git_commit }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/install
