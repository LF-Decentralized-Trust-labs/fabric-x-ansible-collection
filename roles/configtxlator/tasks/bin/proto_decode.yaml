- name: Ensure configtxlator artifacts directory exists
  ansible.builtin.file:
    path: "{{ configtxlator_artifacts_dir }}"
    state: directory
    mode: "0o755"

- name: Run {{ configtxlator_bin_name }} proto_decode
  vars:
    bin_run_with_tmux: false
    bin_remote_dir: "{{ cli_bin_dir }}"
    bin_command: >-
      {{ configtxlator_bin_name }} proto_decode
      --type {{ configtxlator_proto_type }}
      --input {{ configtxlator_artifacts_dir }}/{{ configtxlator_input_file }}
      --output {{ configtxlator_artifacts_dir }}/{{ configtxlator_output_file }}
    bin_collect_logs: false
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: start
