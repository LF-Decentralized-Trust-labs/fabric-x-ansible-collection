- name: Run configtxlator compute_update as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.configtxlator
    tasks_from: container/compute_update
  when: not configtxlator_use_bin

- name: Run configtxlator compute_update as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.configtxlator
    tasks_from: bin/compute_update
  when: configtxlator_use_bin
