- name: Set Grafana dashboard path to copy
  # set as fact before calling the method allows to evaluate `role_path` in the right role
  ansible.builtin.set_fact:
    cadvisor_grafana_dashboard_path: "{{ role_path }}/files/cadvisor-insights.json"

- name: Transfer the cAdvisor Insights Grafana Dashboard
  vars:
    grafana_dashboard_file: "cadvisor-insights.json"
    grafana_dashboard_path: "{{ cadvisor_grafana_dashboard_path }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: config/copy_dashboard
