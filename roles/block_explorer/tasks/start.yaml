- name: Start Block Explorer container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: container/start
  when: block_explorer_use_container

- name: Start Block Explorer on Kubernetes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: k8s/start
  when: block_explorer_use_k8s

- name: Start Block Explorer on OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: openshift/start
  when: block_explorer_use_openshift
