- name: Start Block Explorer workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: k8s/start

- name: Apply Block Explorer REST OpenShift Route
  vars:
    openshift_route_name: "{{ block_explorer_k8s_resource_name }}-rest"
    openshift_route_host: "{{ block_explorer_openshift_route }}"
    openshift_route_service_name: "{{ block_explorer_k8s_resource_name }}"
    openshift_route_service_port: rest
    openshift_route_labels:
      app.kubernetes.io/name: "{{ block_explorer_k8s_resource_name }}"
      app.kubernetes.io/component: block-explorer
      app.kubernetes.io/part-of: "{{ block_explorer_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: block_explorer_openshift_route is defined
