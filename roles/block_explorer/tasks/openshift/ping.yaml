- name: Check that the Block Explorer OpenShift route is reachable
  vars:
    openshift_route_host: "{{ block_explorer_openshift_route }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/ping
  when: block_explorer_openshift_route is defined

- name: Check that the Block Explorer Kubernetes services are reachable
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: k8s/ping
