- name: Delete Block Explorer REST OpenShift Route
  vars:
    openshift_route_name: "{{ block_explorer_k8s_resource_name }}-rest"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: block_explorer_openshift_route is defined

- name: Delete Block Explorer UI web OpenShift Route
  vars:
    openshift_route_name: "{{ block_explorer_k8s_resource_name }}-web"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: block_explorer_ui_openshift_route is defined

- name: Remove Block Explorer workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: k8s/rm
