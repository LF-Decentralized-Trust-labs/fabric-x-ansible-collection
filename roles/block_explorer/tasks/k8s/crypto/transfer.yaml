# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Block Explorer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Secret
# =========================
- name: Apply Block Explorer Secret
  vars:
    block_explorer_k8s_tls_key_path: "{{ block_explorer_remote_config_dir }}/tls/{{ block_explorer_tls_private_key_file }}"
    block_explorer_k8s_tls_cert_path: "{{ block_explorer_remote_config_dir }}/tls/{{ block_explorer_tls_cert_file }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/secret.yaml.j2
  when:
    - hostvars[sidecar_host].committer_use_mtls | default(false)
