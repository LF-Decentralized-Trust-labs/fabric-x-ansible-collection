# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Block Explorer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Block Explorer Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service.yaml.j2

- name: Apply Block Explorer NodePort Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service-nodeport.yaml.j2
  when: block_explorer_k8s_node_port is defined

- name: Apply Block Explorer LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service-loadbalancer.yaml.j2
  when: block_explorer_k8s_loadbalancer_expose_port

- name: Apply Block Explorer Deployment
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/deployment.yaml.j2
    wait: true
    wait_timeout: "{{ block_explorer_k8s_wait_timeout }}"
