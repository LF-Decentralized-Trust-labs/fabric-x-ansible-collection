# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Block Explorer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply ConfigMap
# =========================
- name: Apply Block Explorer ConfigMap
  vars:
    block_explorer_k8s_config_path: "{{ block_explorer_remote_config_dir }}/{{ block_explorer_config_file }}"
    block_explorer_k8s_sidecar_ca_path: "{{ block_explorer_remote_config_dir }}/tls/sidecar/ca.crt"
    block_explorer_k8s_db_ca_path: "{{ block_explorer_remote_config_dir }}/tls/db/ca.crt"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/configmap.yaml.j2
