# =========================
# TLS certs
# =========================
- name: Ensure Block Explorer config directory exists
  ansible.builtin.file:
    path: "{{ block_explorer_remote_config_dir }}/tls"
    state: directory
    mode: "0o755"

- name: Transfer the client TLS key for Block Explorer generated by cryptogen
  ansible.builtin.copy:
    src: "{{ cryptogen_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/peers/{{ organization.peer.name | default(inventory_hostname) }}.{{ organization.domain }}/tls/server.key"
    dest: "{{ block_explorer_remote_config_dir }}/tls/{{ block_explorer_tls_private_key_file }}"
    mode: preserve

- name: Transfer the client TLS cert for Block Explorer generated by cryptogen
  ansible.builtin.copy:
    src: "{{ cryptogen_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/peers/{{ organization.peer.name | default(inventory_hostname) }}.{{ organization.domain }}/tls/server.crt"
    dest: "{{ block_explorer_remote_config_dir }}/tls/{{ block_explorer_tls_cert_file }}"
    mode: preserve

- name: Transfer the client TLS CA cert for Block Explorer generated by cryptogen
  ansible.builtin.copy:
    src: "{{ cryptogen_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/peers/{{ organization.peer.name | default(inventory_hostname) }}.{{ organization.domain }}/tls/ca.crt"
    dest: "{{ block_explorer_remote_config_dir }}/tls/ca.crt"
    mode: preserve
