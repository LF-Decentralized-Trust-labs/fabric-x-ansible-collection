- name: Remove Block Explorer TLS directory
  ansible.builtin.file:
    path: "{{ block_explorer_remote_config_dir }}/tls"
    state: absent

- name: Delete Block Explorer Kubernetes Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: k8s/crypto/rm
  when: block_explorer_use_k8s or block_explorer_use_openshift
