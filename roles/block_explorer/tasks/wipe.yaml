- name: Teardown Block Explorer
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: teardown

- name: Remove Block Explorer crypto files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: crypto/rm

- name: Remove Block Explorer configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.block_explorer
    tasks_from: config/rm
