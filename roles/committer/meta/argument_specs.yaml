---
argument_specs:
  role-options:
    short_description: Shared committer options
    description:
      - Reusable option definitions shared by the committer role entry points.
    options:
      committer_registry_endpoint:
        type: str
        required: false
        default: "{{ lookup('env', 'COMMITTER_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - Container registry endpoint for the committer image.
      committer_image_name:
        type: str
        required: false
        default: fabric-x-committer
        description:
          - Image name for the committer container.
      committer_image_tag:
        type: str
        required: false
        default: "0.1.9"
        description:
          - Image tag for the committer container.
      committer_image: &committer_image
        type: str
        required: false
        default: "{{ committer_registry_endpoint }}/{{ committer_image_name }}:{{ committer_image_tag }}"
        description:
          - Fully qualified committer image.
      committer_container_name: &committer_container_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name used by the committer container helper.
      committer_git_hub_url: &committer_git_hub_url
        type: str
        required: false
        default: github.com
        description:
          - Git host used for the committer source repository.
      committer_git_repo: &committer_git_repo
        type: str
        required: false
        default: hyperledger/fabric-x-committer
        description:
          - Git repository that contains the committer sources.
      committer_git_commit: &committer_git_commit
        type: str
        required: false
        default: v0.1.9
        description:
          - Git ref used for building or installing the binary.
      committer_source_code_package: &committer_source_code_package
        type: str
        required: false
        default: cmd/committer
        description:
          - Go package path used as the build or install target.
      committer_bin_package: &committer_bin_package
        type: str
        required: false
        default: "{{ committer_git_hub_url }}/{{ committer_git_repo }}/{{ committer_source_code_package }}"
        description:
          - Go package path used by the shared binary installer.
      committer_bin_name: &committer_bin_name
        type: str
        required: false
        default: committer
        description:
          - Binary name managed by the committer role.
      committer_use_bin: &committer_use_bin
        type: bool
        required: false
        default: false
        description:
          - Enable host-binary deployment mode.
      committer_use_k8s: &committer_use_k8s
        type: bool
        required: false
        default: false
        description:
          - Enable Kubernetes deployment mode.
      committer_use_container: &committer_use_container
        type: bool
        required: false
        default: "{{ (not committer_use_bin) and (not committer_use_k8s) }}"
        description:
          - Enable container deployment mode.
      committer_deployment_mode: &committer_deployment_mode
        type: str
        required: false
        default: "{%- if committer_use_bin -%}bin{%- elif committer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        description:
          - Deployment mode selected by the role.
      committer_k8s_resource_name: &committer_k8s_resource_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base Kubernetes resource name for committer objects.
          - Used by the service, workload, secret, and optional NodePort resources.
      committer_k8s_wait_timeout: &committer_k8s_wait_timeout
        type: int
        required: false
        default: 120
        description:
          - Wait timeout in seconds for Kubernetes rollouts.
      committer_k8s_fs_group:
        type: int
        required: false
        default: 10001
        description:
          - Filesystem group assigned to committer pods.
      committer_k8s_use_node_port: &committer_k8s_use_node_port
        type: bool
        required: false
        default: false
        description:
          - Enable the optional Kubernetes NodePort Service for committer RPC and metrics access.
      committer_k8s_rpc_node_port: &committer_k8s_rpc_node_port
        type: int
        required: false
        description:
          - NodePort used for the RPC service when C(committer_k8s_use_node_port) is enabled.
          - Must be explicitly set to a valid Kubernetes NodePort value when needed.
          - "Example: C(31051)."
      committer_k8s_metrics_node_port: &committer_k8s_metrics_node_port
        type: int
        required: false
        description:
          - NodePort used for the metrics service when C(committer_k8s_use_node_port) is enabled.
          - Must be explicitly set to a valid Kubernetes NodePort value when needed.
          - "Example: C(31052)."
      committer_remote_config_dir: &committer_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - Remote config directory managed by the role.
      committer_remote_data_dir: &committer_remote_data_dir
        type: path
        required: false
        default: "{{ remote_data_dir }}"
        description:
          - Remote data directory managed by the role.
      committer_container_config_dir: &committer_container_config_dir
        type: path
        required: false
        default: /config
        description:
          - Config directory inside the committer container.
      committer_container_data_dir: &committer_container_data_dir
        type: path
        required: false
        default: /data
        description:
          - Data directory inside the committer container.
      committer_config_dir: &committer_config_dir
        type: path
        required: false
        default: "{{ committer_remote_config_dir if committer_use_bin else committer_container_config_dir }}"
        description:
          - Active config directory used by the committer runtime.
      committer_data_dir: &committer_data_dir
        type: path
        required: false
        default: "{{ committer_remote_data_dir if committer_use_bin else committer_container_data_dir }}"
        description:
          - Active data directory used by the committer runtime.
      committer_config_file: &committer_config_file
        type: str
        required: false
        default: "config-{{ committer_component_type }}.yml"
        description:
          - Generated config file name used by the selected component.
      committer_use_tls: &committer_use_tls
        type: bool
        required: false
        default: false
        description:
          - Enable TLS material for the selected component.
      committer_monitoring_use_tls: &committer_monitoring_use_tls
        type: bool
        required: false
        default: "{{ committer_use_tls }}"
        description:
          - Enable TLS for the monitoring endpoint.
      committer_use_mtls: &committer_use_mtls
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the selected component.
      committer_monitoring_use_mtls: &committer_monitoring_use_mtls
        type: bool
        required: false
        default: "{{ committer_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint.
      committer_http_protocol: &committer_http_protocol
        type: str
        required: false
        default: "{{ 'https' if committer_use_tls else 'http' }}"
        description:
          - HTTP protocol used by the metrics client.
      committer_crypto_name: &committer_crypto_name
        type: str
        required: false
        default: "{{ organization.peer.name | default(inventory_hostname) }}"
        description:
          - Crypto material base name for the committer.
      committer_rpc_port: &committer_rpc_port
        type: int
        required: true
        description:
          - RPC port exposed by the selected committer component.
          - "Example: C(7051)."
      committer_metrics_port: &committer_metrics_port
        type: int
        required: true
        description:
          - Metrics port exposed by the selected committer component.
          - "Example: C(9443)."
      committer_log_level: &committer_log_level
        type: str
        required: false
        default: info
        description:
          - Log level emitted by the committer component.
      committer_log_format: &committer_log_format
        type: str
        required: false
        default: "%{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc} -> %{level:.4s}%{color:reset} %{message}"
        description:
          - Log format emitted by the committer component.
      committer_component_type: &committer_component_type
        type: str
        required: true
        description:
          - Committer component handled by the entry point.
          - "Example: C(coordinator)."
        choices: [validator, verifier, coordinator, sidecar, query-service]
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - Remote config directory used by delegated crypto tasks.
          - "Example: C(/opt/fabricx/committer/config)."
      remote_data_dir:
        type: path
        required: false
        description:
          - Remote data directory used by delegated sidecar tasks.
          - "Example: C(/var/lib/fabricx/committer/sidecar)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        description:
          - Control-node directory that stores fetched artifacts.
          - "Example: C(/tmp/fabricx/artifacts)."
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - Control-node directory that stores cryptogen output.
          - "Example: C(/tmp/fabricx/crypto-material)."
      actual_host: &actual_host
        type: str
        description:
          - Reachable host or IP address used by the metrics client and Fabric-CA CSR generation.
          - "Example: C(committer-validator-1.example.com)."
      organization: &organization
        type: dict
        required: true
        description:
          - Organization definition consumed by crypto and sidecar configuration tasks.
          - "Example: C({'name': 'Org1', 'domain': 'org1.example.com', 'peer': {'name': 'committer-sidecar-1'}})."
      channel_id: &channel_id
        type: str
        required: false
        description:
          - Fabric channel identifier consumed by sidecar configuration.
          - "Example: C(mychannel)."
      committer_validators: &committer_validators
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for validator components.
          - "Example: C(['committer-validator-1', 'committer-validator-2'])."
      committer_verifiers: &committer_verifiers
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for verifier components.
          - "Example: C(['committer-verifier-1', 'committer-verifier-2'])."
      committer_coordinator: &committer_coordinator
        type: str
        required: false
        description:
          - Inventory host name of the coordinator component.
          - "Example: C(committer-coordinator-1)."
      orderer_assemblers: &orderer_assemblers
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for orderer assembler components.
          - "Example: C(['orderer-assembler-1', 'orderer-assembler-2'])."
      postgres_db_host: &postgres_db_host
        type: str
        description:
          - Inventory host name of the Postgres backend used by validator or query-service configuration.
          - "Example: C(postgres-committer-1)."
      yugabyte_cluster_ref_id: &yugabyte_cluster_ref_id
        type: str
        description:
          - Yugabyte cluster identifier used by validator or query-service configuration.
          - "Example: C(yb-committer-ledger)."
      committer_hosts: &committer_hosts
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for committer components used by Prometheus scrape generation.
          - "Example: C(['committer-validator-1', 'committer-verifier-1', 'committer-coordinator-1', 'committer-sidecar-1'])."
      k8s_namespace: &k8s_namespace
        type: str
        description:
          - Kubernetes namespace that contains the committer resources.
          - "Example: C(fabricx-committer)."
      k8s_storage_size:
        type: str
        required: false
        description:
          - Persistent volume size requested by the sidecar StatefulSet.
          - "Example: C(20Gi)."
      k8s_storage_class:
        type: str
        required: false
        description:
          - Storage class requested by the sidecar StatefulSet.
          - "Example: C(fast-ssd)."
      k8s_image_pull_secret:
        type: str
        required: false
        description:
          - Optional image pull secret referenced by Kubernetes workloads.
          - "Example: C(fabricx-registry-secret)."
      k8s_readiness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Readiness probe initial delay for Kubernetes workloads.
          - "Example: C(10)."
      k8s_readiness_probe_period_seconds:
        type: int
        required: false
        description:
          - Readiness probe period for Kubernetes workloads.
          - "Example: C(10)."
      k8s_readiness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Readiness probe timeout for Kubernetes workloads.
          - "Example: C(5)."
      k8s_readiness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Readiness probe failure threshold for Kubernetes workloads.
          - "Example: C(3)."
      k8s_liveness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Liveness probe initial delay for Kubernetes workloads.
          - "Example: C(30)."
      k8s_liveness_probe_period_seconds:
        type: int
        required: false
        description:
          - Liveness probe period for Kubernetes workloads.
          - "Example: C(15)."
      k8s_liveness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Liveness probe timeout for Kubernetes workloads.
          - "Example: C(5)."
      k8s_liveness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Liveness probe failure threshold for Kubernetes workloads.
          - "Example: C(5)."
      committer_monitoring_rate_limit_requests_per_second:
        &committer_monitoring_rate_limit_requests_per_second
        type: int
        required: false
        description:
          - Monitoring rate-limit requests per second.
          - "Example: C(1000)."
      committer_monitoring_rate_limit_burst:
        &committer_monitoring_rate_limit_burst
        type: int
        required: false
        description:
          - Monitoring rate-limit burst.
          - "Example: C(100)."
      committer_server_rate_limit_requests_per_second:
        &committer_server_rate_limit_requests_per_second
        type: int
        required: false
        description:
          - Server rate-limit requests per second.
          - "Example: C(2000)."
      committer_server_rate_limit_burst: &committer_server_rate_limit_burst
        type: int
        required: false
        description:
          - Server rate-limit burst.
          - "Example: C(200)."
      committer_server_keep_alive_time: &committer_server_keep_alive_time
        type: str
        required: false
        description:
          - Server keepalive ping interval.
          - "Example: C(300s)."
      committer_server_keep_alive_timeout: &committer_server_keep_alive_timeout
        type: str
        required: false
        description:
          - Server keepalive acknowledgment timeout.
          - "Example: C(600s)."
      committer_server_keep_alive_min_time:
        &committer_server_keep_alive_min_time
        type: str
        required: false
        description:
          - Minimum client keepalive interval enforced by the server.
          - "Example: C(60s)."
      committer_server_keep_alive_permit_without_stream:
        &committer_server_keep_alive_permit_without_stream
        type: bool
        required: false
        description:
          - Allow keepalive pings without active streams.
          - "Example: C(false)."
      committer_server_max_concurrent_streams:
        &committer_server_max_concurrent_streams
        type: int
        required: false
        description:
          - Maximum concurrent streaming RPCs allowed per client connection.
          - "Example: C(128)."
      committer_database_max_connections: &committer_database_max_connections
        type: int
        required: false
        description:
          - Maximum size of the committer database connection pool.
          - "Example: C(32)."
      committer_database_min_connections: &committer_database_min_connections
        type: int
        required: false
        description:
          - Minimum size of the committer database connection pool.
          - "Example: C(8)."
      committer_database_retry_initial_interval:
        &committer_database_retry_initial_interval
        type: str
        required: false
        description:
          - Initial backoff interval for database retries.
          - "Example: C(500ms)."
      committer_database_retry_randomization_factor:
        &committer_database_retry_randomization_factor
        type: float
        required: false
        description:
          - Jitter factor applied to database retry intervals.
          - "Example: C(0.5)."
      committer_database_retry_multiplier: &committer_database_retry_multiplier
        type: float
        required: false
        description:
          - Exponential multiplier applied to database retry intervals.
          - "Example: C(1.5)."
      committer_database_retry_max_interval:
        &committer_database_retry_max_interval
        type: str
        required: false
        description:
          - Maximum interval allowed between database retry attempts.
          - "Example: C(60s)."
      committer_database_retry_max_elapsed_time:
        &committer_database_retry_max_elapsed_time
        type: str
        required: false
        description:
          - Maximum total elapsed time allowed for database retries.
          - "Example: C(15m)."
      committer_resource_limits_max_workers_for_preparer:
        &committer_resource_limits_max_workers_for_preparer
        type: int
        required: false
        description:
          - Worker count for validator transaction preparation.
          - "Example: C(4)."
      committer_resource_limits_max_workers_for_validator:
        &committer_resource_limits_max_workers_for_validator
        type: int
        required: false
        description:
          - Worker count for validator MVCC checks.
          - "Example: C(8)."
      committer_resource_limits_max_workers_for_committer:
        &committer_resource_limits_max_workers_for_committer
        type: int
        required: false
        description:
          - Worker count for validator commit processing.
          - "Example: C(20)."
      committer_resource_limits_min_transaction_batch_size:
        &committer_resource_limits_min_transaction_batch_size
        type: int
        required: false
        description:
          - Minimum validator transaction batch size.
          - "Example: C(100)."
      committer_resource_limits_timeout_for_min_transaction_batch_size:
        &committer_resource_limits_timeout_for_min_transaction_batch_size
        type: str
        required: false
        description:
          - Timeout for the minimum validator transaction batch size.
          - "Example: C(2s)."
      committer_verifier_parallelism: &committer_verifier_parallelism
        type: int
        required: false
        description:
          - Parallel signature verification workers.
          - "Example: C(16)."
      committer_verifier_batch_size_cutoff:
        &committer_verifier_batch_size_cutoff
        type: int
        required: false
        description:
          - Signature verification batch size cutoff.
          - "Example: C(500)."
      committer_verifier_batch_time_cutoff:
        &committer_verifier_batch_time_cutoff
        type: str
        required: false
        description:
          - Signature verification batch timeout.
          - "Example: C(2ms)."
      committer_verifier_channel_buffer_size:
        &committer_verifier_channel_buffer_size
        type: int
        required: false
        description:
          - Channel buffer size for the verifier pipeline.
          - "Example: C(1000)."
      committer_coordinator_dep_graph_constructors:
        &committer_coordinator_dep_graph_constructors
        type: int
        required: false
        description:
          - Dependency-graph constructor count for the coordinator.
          - "Example: C(4)."
      committer_coordinator_dep_graph_wait_tx_limit:
        &committer_coordinator_dep_graph_wait_tx_limit
        type: int
        required: false
        description:
          - Dependency-graph waiting transaction limit for the coordinator.
          - "Example: C(20000000)."
      committer_coordinator_per_channel_buffer_size_per_goroutine:
        &committer_coordinator_per_channel_buffer_size_per_goroutine
        type: int
        required: false
        description:
          - Per-goroutine channel buffer size for the coordinator.
          - "Example: C(10)."
      committer_sidecar_last_committed_block_set_interval:
        &committer_sidecar_last_committed_block_set_interval
        type: str
        required: false
        description:
          - Interval between sidecar committed-block updates.
          - "Example: C(5s)."
      committer_sidecar_waiting_txs_limit: &committer_sidecar_waiting_txs_limit
        type: int
        required: false
        description:
          - Sidecar waiting transaction limit.
          - "Example: C(20000000)."
      committer_sidecar_channel_buffer_size:
        &committer_sidecar_channel_buffer_size
        type: int
        required: false
        description:
          - Sidecar internal channel buffer size.
          - "Example: C(100)."
      committer_sidecar_ledger_sync_interval:
        &committer_sidecar_ledger_sync_interval
        type: int
        required: false
        description:
          - Sidecar ledger sync interval.
          - "Example: C(100)."
      committer_sidecar_notification_max_timeout:
        &committer_sidecar_notification_max_timeout
        type: str
        required: false
        description:
          - Sidecar notification timeout.
          - "Example: C(10m)."
      committer_query_service_min_batch_keys:
        &committer_query_service_min_batch_keys
        type: int
        required: false
        description:
          - Query-service minimum batch key count.
          - "Example: C(1024)."
      committer_query_service_max_batch_wait:
        &committer_query_service_max_batch_wait
        type: str
        required: false
        description:
          - Query-service maximum batch wait time.
          - "Example: C(100ms)."
      committer_query_service_view_aggregation_window:
        &committer_query_service_view_aggregation_window
        type: str
        required: false
        description:
          - Query-service view aggregation window.
          - "Example: C(100ms)."
      committer_query_service_max_aggregated_views:
        &committer_query_service_max_aggregated_views
        type: int
        required: false
        description:
          - Query-service maximum aggregated views.
          - "Example: C(1024)."
      committer_query_service_max_active_views:
        &committer_query_service_max_active_views
        type: int
        required: false
        description:
          - Query-service maximum active views.
          - "Example: C(4096)."
      committer_query_service_max_view_timeout:
        &committer_query_service_max_view_timeout
        type: str
        required: false
        description:
          - Query-service view timeout.
          - "Example: C(10s)."
      committer_query_service_max_request_keys:
        &committer_query_service_max_request_keys
        type: int
        required: false
        description:
          - Query-service maximum request key count.
          - "Example: C(10000)."
      committer_mtls_clients: &committer_mtls_clients
        type: list
        elements: str
        required: false
        description:
          - mTLS client identifiers trusted by the component.
          - "Example: C(['committer-sidecar-1', 'loadgen-1'])."
      committer_mtls_orgs: &committer_mtls_orgs
        type: list
        elements: dict
        required: false
        description:
          - mTLS organizations trusted by the component.
          - "Example: C([{'domain': 'org2.example.com'}])."
      committer_monitoring_mtls_clients: &committer_monitoring_mtls_clients
        type: list
        elements: str
        required: false
        description:
          - Monitoring mTLS client identifiers trusted by the component.
          - "Example: C(['prometheus-1'])."
      committer_monitoring_mtls_orgs: &committer_monitoring_mtls_orgs
        type: list
        elements: dict
        required: false
        description:
          - Monitoring mTLS organizations trusted by the component.
          - "Example: C([{'domain': 'monitoring.example.com'}])."

  ping:
    short_description: Check the committer gRPC endpoint
    description:
      - Validate that the Fabric-X Committer RPC port is reachable.
      - Uses C(committer_rpc_port) on host deployments and skips the direct host check in Kubernetes mode.
    options:
      committer_rpc_port: *committer_rpc_port
      committer_use_k8s: *committer_use_k8s

  k8s/ping:
    short_description: Check the committer Kubernetes NodePorts
    description:
      - Validate that the optional Kubernetes NodePort Service exposes the RPC and metrics ports.
      - Requires explicit RPC and metrics NodePort values when external Kubernetes access is enabled.
    options:
      committer_k8s_use_node_port: *committer_k8s_use_node_port
      committer_k8s_rpc_node_port: *committer_k8s_rpc_node_port
      committer_k8s_metrics_node_port: *committer_k8s_metrics_node_port

  validator/start:
    short_description: Start a validator component
    description:
      - Start a validator in bin, container, or Kubernetes mode.
      - The selected runtime path depends on C(committer_use_bin) and C(committer_use_k8s).
      - Expects validator configuration and database settings to be generated before the process starts.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  verifier/start:
    short_description: Start a verifier component
    description:
      - Start a verifier in bin, container, or Kubernetes mode.
      - The selected runtime path depends on C(committer_use_bin) and C(committer_use_k8s).
      - Expects verifier configuration and optional TLS/mTLS assets to be available.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  coordinator/start:
    short_description: Start a coordinator component
    description:
      - Start a coordinator in bin, container, or Kubernetes mode.
      - Coordinators connect to validator and verifier hosts that must already be configured.
      - Uses C(committer_validators) and C(committer_verifiers) to locate upstream committers.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  sidecar/start:
    short_description: Start a sidecar component
    description:
      - Start a sidecar in bin, container, or Kubernetes mode.
      - Sidecars require persistent data storage and connect to coordinator and orderer hosts.
      - Uses MSP material plus C(committer_coordinator), C(orderer_assemblers), and C(channel_id).
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  query_service/start:
    short_description: Start a query-service component
    description:
      - Start a query-service in bin, container, or Kubernetes mode.
      - The selected runtime path depends on C(committer_use_bin) and C(committer_use_k8s).
      - Expects generated database-backed query-service configuration.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  stop:
    short_description: Stop a committer process
    description:
      - Stop the selected component in bin or container mode.
      - Kubernetes teardown is handled through the teardown entry points instead.
      - Selects the stop path from C(committer_component_type) and C(committer_deployment_mode).
    options:
      committer_component_type: *committer_component_type
      committer_deployment_mode: *committer_deployment_mode
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s

  teardown:
    short_description: Teardown a selected component
    description:
      - Remove the selected component according to its deployment mode.
      - Sidecar teardown also removes sidecar data.
      - Dispatches by C(committer_component_type) to the component-specific teardown entry point.
    options:
      committer_component_type: *committer_component_type

  query_service/teardown:
    short_description: Teardown the query-service
    description:
      - Remove the query-service according to its deployment mode.
      - Deletes the runtime process, container, or Kubernetes query-service resources.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  sidecar/teardown:
    short_description: Teardown the sidecar
    description:
      - Remove the sidecar according to its deployment mode and delete sidecar data.
      - Deletes the runtime process, container, or Kubernetes StatefulSet and storage artifacts.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  coordinator/teardown:
    short_description: Teardown the coordinator
    description:
      - Remove the coordinator according to its deployment mode.
      - Deletes the runtime process, container, or Kubernetes coordinator resources.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  wipe:
    short_description: Remove all committer artifacts
    description:
      - Tear down the selected component and remove binary, config, and crypto assets.
      - Intended for full cleanup of role-managed host artifacts after stopping the component.
    options:
      committer_component_type: *committer_component_type
      committer_use_bin: *committer_use_bin

  fetch_logs:
    short_description: Collect committer logs
    description:
      - Fetch logs from the selected deployment mode.
      - Dispatches to binary, container, or Kubernetes log collection based on deployment flags.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  get_metrics:
    short_description: Retrieve Prometheus metrics
    description:
      - Query the component metrics endpoint and print the response body.
      - Uses C(actual_host), C(committer_http_protocol), and C(committer_metrics_port).
    options:
      actual_host:
        <<: *actual_host
        required: false
      committer_http_protocol: *committer_http_protocol
      committer_metrics_port: *committer_metrics_port

  start:
    short_description: Start a committer component by type
    description:
      - Dispatch startup to the selected committer component.
      - C(committer_component_type) selects validator, verifier, coordinator, sidecar, or query-service.
    options:
      committer_component_type: *committer_component_type

  crypto/setup:
    short_description: Prepare crypto material
    description:
      - Transfer cryptogen artifacts or enroll with Fabric CA for the selected component.
      - When C(committer_use_k8s) is true, also create the Kubernetes secret for the component.
      - Uses C(organization) to determine Fabric CA enrollment or cryptogen artifact paths.
    options:
      organization: *organization
      committer_use_k8s: *committer_use_k8s

  crypto/fetch:
    short_description: Fetch TLS certificates
    description:
      - Fetch the committer TLS CA certificate and server certificate to the control node.
      - This task runs only when C(committer_use_tls) is true.
      - Stores fetched files under C(fetched_artifacts_dir) for downstream trust bundle generation.
    options:
      remote_config_dir: *remote_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: false
      committer_use_tls: *committer_use_tls

  bin/install:
    short_description: Install the committer binary
    description:
      - Install the committer binary through the shared C(bin) role Go installer entry point.
      - Uses the configured Git repository, ref, package path, and binary name.
    options:
      committer_bin_name: *committer_bin_name
      committer_bin_package: *committer_bin_package
      committer_git_hub_url: *committer_git_hub_url
      committer_git_repo: *committer_git_repo
      committer_git_commit: *committer_git_commit
      committer_source_code_package: *committer_source_code_package

  bin/build:
    short_description: Build the committer binary
    description:
      - Build the committer binary through the shared C(bin) role Go build entry point.
      - Produces the local committer binary artifact later transferred to target hosts.
    options:
      committer_bin_name: *committer_bin_name
      committer_git_hub_url: *committer_git_hub_url
      committer_git_repo: *committer_git_repo
      committer_git_commit: *committer_git_commit
      committer_source_code_package: *committer_source_code_package

  bin/stop:
    short_description: Stop a committer binary
    description:
      - Stop the running committer binary process through the shared C(bin) role.
      - Applies to validator, verifier, coordinator, sidecar, and query-service host-binary processes.
    options: {}

  bin/rm:
    short_description: Remove the committer binary
    description:
      - Remove the installed committer binary from the target host.
      - Uses C(committer_bin_name) as the target executable name.
    options:
      committer_bin_name: *committer_bin_name

  bin/fetch_logs:
    short_description: Fetch committer binary logs
    description:
      - Collect logs generated by the committer binary through the shared C(bin) role.
      - Applies to host-binary deployments.
    options: {}

  bin/transfer:
    short_description: Transfer the committer binary
    description:
      - Copy the built committer binary to the target host.
      - Uses C(committer_bin_name) for the executable transferred by the shared C(bin) role.
    options:
      committer_bin_name: *committer_bin_name

  validator/container/start:
    short_description: Start the validator container
    description:
      - Run the validator container with its generated configuration directory mounted read-only.
      - Publishes validator RPC and metrics ports from the container to the host.
    options:
      committer_container_name: *committer_container_name
      committer_image: *committer_image
      committer_container_config_dir: *committer_container_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  verifier/container/start:
    short_description: Start the verifier container
    description:
      - Run the verifier container with its generated configuration directory mounted read-only.
      - Publishes verifier RPC and metrics ports from the container to the host.
    options:
      committer_container_name: *committer_container_name
      committer_image: *committer_image
      committer_container_config_dir: *committer_container_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  coordinator/container/start:
    short_description: Start the coordinator container
    description:
      - Run the coordinator container with its generated configuration directory mounted read-only.
      - Publishes coordinator RPC and metrics ports from the container to the host.
    options:
      committer_container_name: *committer_container_name
      committer_image: *committer_image
      committer_container_config_dir: *committer_container_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  sidecar/container/start:
    short_description: Start the sidecar container
    description:
      - Ensure the sidecar data directory exists and run the sidecar container with config and data volumes mounted.
      - Persists the sidecar ledger under C(committer_remote_data_dir).
    options:
      committer_container_name: *committer_container_name
      committer_image: *committer_image
      committer_container_config_dir: *committer_container_config_dir
      committer_container_data_dir: *committer_container_data_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_remote_data_dir: *committer_remote_data_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  query_service/container/start:
    short_description: Start the query-service container
    description:
      - Run the query-service container with its generated configuration directory mounted read-only.
      - Publishes query-service RPC and metrics ports from the container to the host.
    options:
      committer_container_name: *committer_container_name
      committer_image: *committer_image
      committer_container_config_dir: *committer_container_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  container/stop:
    short_description: Stop a committer container
    description:
      - Stop the committer container through the shared C(container) role.
      - Uses C(committer_container_name) for the selected component container.
    options:
      committer_container_name: *committer_container_name

  container/rm:
    short_description: Remove a committer container
    description:
      - Remove the committer container through the shared C(container) role.
      - Uses C(committer_container_name) for the selected component container.
    options:
      committer_container_name: *committer_container_name

  container/fetch_logs:
    short_description: Fetch committer container logs
    description:
      - Collect logs from the committer container through the shared C(container) role.
      - Uses C(committer_container_name) for the selected component container.
    options:
      committer_container_name: *committer_container_name

  config/transfer:
    short_description: Generate config by component type
    description:
      - Dispatch configuration generation to the selected committer component.
      - Renders the component YAML config and any required companion artifacts.
    options:
      committer_component_type: *committer_component_type

  config/rm:
    short_description: Remove committer configuration
    description:
      - Remove the component config directory and the Kubernetes ConfigMap when enabled.
      - Cleans C(committer_remote_config_dir) and, for Kubernetes, the component ConfigMap.
    options:
      committer_remote_config_dir: *committer_remote_config_dir
      committer_use_k8s: *committer_use_k8s

  config/transfer_grafana_dashboard:
    short_description: Transfer the committer Grafana dashboard
    description:
      - Publish the committer Grafana dashboard through the shared Grafana helper flow.
      - Installs dashboard configuration used to visualize committer metrics.
    options: {}

  config/db/transfer:
    short_description: Transfer DB config by backend type
    description:
      - Dispatch database configuration generation to the selected backend.
      - Selects PostgreSQL via C(postgres_db_host) or YugabyteDB via C(yugabyte_cluster_ref_id).
    options:
      postgres_db_host:
        <<: *postgres_db_host
        required: false
      yugabyte_cluster_ref_id:
        <<: *yugabyte_cluster_ref_id
        required: false

  config/db/postgres/transfer:
    short_description: Transfer PostgreSQL DB config
    description:
      - Generate the PostgreSQL connection settings consumed by the committer component.
      - Copies the Postgres TLS CA certificate from C(fetched_artifacts_dir) when needed.
    options:
      postgres_db_host:
        <<: *postgres_db_host
        required: true
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true

  config/db/yugabyte/transfer:
    short_description: Transfer Yugabyte DB config
    description:
      - Generate the Yugabyte connection settings consumed by the committer component.
      - Copies the Yugabyte TLS CA certificate from C(fetched_artifacts_dir) when needed.
    options:
      yugabyte_cluster_ref_id:
        <<: *yugabyte_cluster_ref_id
        required: true
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true

  config/mtls/transfer:
    short_description: Transfer committer mTLS certificates
    description:
      - Copy mTLS certificates for the committer service-to-service connections.
      - Builds trust bundles for C(committer_mtls_clients) and C(committer_mtls_orgs).
    options:
      committer_mtls_clients: *committer_mtls_clients
      committer_mtls_orgs: *committer_mtls_orgs
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true

  config/mtls/monitoring/transfer:
    short_description: Transfer monitoring mTLS certificates
    description:
      - Copy monitoring mTLS certificates for Prometheus scraping.
      - Builds monitoring trust bundles for Prometheus clients and monitoring organizations.
    options:
      committer_monitoring_mtls_clients: *committer_monitoring_mtls_clients
      committer_monitoring_mtls_orgs: *committer_monitoring_mtls_orgs
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true

  crypto/rm:
    short_description: Remove committer crypto material
    description:
      - Remove local TLS assets and the Kubernetes Secret when enabled.
      - Cleans TLS material under C(committer_remote_config_dir) for the selected component.
    options:
      committer_remote_config_dir: *committer_remote_config_dir
      committer_use_tls: *committer_use_tls
      committer_use_k8s: *committer_use_k8s

  crypto/cryptogen/transfer:
    short_description: Transfer committer crypto from cryptogen
    description:
      - Copy cryptogen-generated TLS assets for the selected committer component.
      - Sidecar components also receive MSP material from the organization peer directory.
    options:
      organization: *organization
      committer_component_type: *committer_component_type
      cryptogen_artifacts_dir: *cryptogen_artifacts_dir
      committer_remote_config_dir: *committer_remote_config_dir
      committer_use_tls: *committer_use_tls

  crypto/fabric_ca/enroll:
    short_description: Enroll committer crypto with Fabric CA
    description:
      - Enroll the selected committer component against its Fabric CA and write the resulting TLS assets.
      - Uses C(actual_host) as a TLS CSR host and writes certificates under C(committer_remote_config_dir).
    options:
      organization: *organization
      committer_component_type: *committer_component_type
      committer_remote_config_dir: *committer_remote_config_dir
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true
      committer_use_tls: *committer_use_tls
      actual_host:
        <<: *actual_host
        required: true

  data/rm:
    short_description: Remove sidecar data
    description:
      - Remove the sidecar data directory and sidecar PVC when Kubernetes mode is enabled.
      - Applies only to sidecar ledger data stored under C(committer_remote_data_dir).
    options:
      committer_remote_data_dir: *committer_remote_data_dir
      committer_k8s_resource_name: *committer_k8s_resource_name
      committer_use_k8s: *committer_use_k8s
      k8s_namespace:
        <<: *k8s_namespace
        required: false

  k8s/config/rm:
    short_description: Remove the committer ConfigMap
    description:
      - Delete the committer Kubernetes ConfigMap.
      - Uses C(committer_k8s_resource_name) and C(k8s_namespace) to identify the ConfigMap.
    options:
      committer_k8s_resource_name: *committer_k8s_resource_name
      k8s_namespace:
        <<: *k8s_namespace
        required: true

  k8s/crypto/rm:
    short_description: Remove the committer Secret
    description:
      - Delete the committer Kubernetes Secret.
      - Uses C(committer_k8s_resource_name) and C(k8s_namespace) to identify the Secret.
    options:
      committer_k8s_resource_name: *committer_k8s_resource_name
      k8s_namespace:
        <<: *k8s_namespace
        required: true

  k8s/crypto/transfer:
    short_description: Create the committer Secret
    description:
      - Create the committer Kubernetes Secret from the generated TLS materials.
      - Includes TLS keys, TLS certificates, and sidecar MSP material when required by the component.
    options:
      committer_component_type: *committer_component_type
      committer_crypto_name: *committer_crypto_name
      committer_k8s_resource_name: *committer_k8s_resource_name
      committer_remote_config_dir: *committer_remote_config_dir
      k8s_namespace:
        <<: *k8s_namespace
        required: true
      organization: *organization

  k8s/fetch_logs:
    short_description: Fetch committer pod logs
    description:
      - Collect logs from committer pods through the shared Kubernetes helper role.
      - Uses C(committer_k8s_resource_name) to select the component workload.
    options:
      committer_k8s_resource_name: *committer_k8s_resource_name

  prometheus/get_scrapers:
    short_description: Build Prometheus scrape targets for committer
    description:
      - Construct the Prometheus scrape service definitions for all deployed committer component types.
      - Reads C(committer_hosts) and fetched TLS artifacts to build scrape targets.
    options:
      committer_hosts: *committer_hosts
      fetched_artifacts_dir:
        <<: *fetched_artifacts_dir
        required: true

  validator/bin/start:
    short_description: Start the validator binary
    description:
      - Run the validator binary with its generated configuration file.
      - Waits for the validator RPC port after starting C(start-vc).
    options:
      committer_bin_name: *committer_bin_name
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port

  verifier/bin/start:
    short_description: Start the verifier binary
    description:
      - Run the verifier binary with its generated configuration file.
      - Waits for the verifier RPC port after starting C(start-verifier).
    options:
      committer_bin_name: *committer_bin_name
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port

  coordinator/bin/start:
    short_description: Start the coordinator binary
    description:
      - Run the coordinator binary with its generated configuration file.
      - Waits for the coordinator RPC port after starting C(start-coordinator).
    options:
      committer_bin_name: *committer_bin_name
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port

  sidecar/bin/start:
    short_description: Start the sidecar binary
    description:
      - Ensure the sidecar data directory exists and run the sidecar binary.
      - Waits for the sidecar RPC port after starting C(start-sidecar).
    options:
      committer_bin_name: *committer_bin_name
      committer_remote_config_dir: *committer_remote_config_dir
      committer_remote_data_dir: *committer_remote_data_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port

  query_service/bin/start:
    short_description: Start the query-service binary
    description:
      - Run the query-service binary with its generated configuration file.
      - Waits for the query-service RPC port after starting C(start-query).
    options:
      committer_bin_name: *committer_bin_name
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_rpc_port: *committer_rpc_port

  validator/config/transfer:
    short_description: Generate validator config
    description:
      - Render validator configuration, DB settings, mTLS assets, and optional Kubernetes ConfigMap.
      - Requires either C(postgres_db_host) or C(yugabyte_cluster_ref_id) for the state database.
    options:
      committer_config_dir: *committer_config_dir
      committer_database_max_connections: *committer_database_max_connections
      committer_database_min_connections: *committer_database_min_connections
      committer_database_retry_initial_interval: *committer_database_retry_initial_interval
      committer_database_retry_max_elapsed_time: *committer_database_retry_max_elapsed_time
      committer_database_retry_max_interval: *committer_database_retry_max_interval
      committer_database_retry_multiplier: *committer_database_retry_multiplier
      committer_database_retry_randomization_factor: *committer_database_retry_randomization_factor
      committer_remote_config_dir: *committer_remote_config_dir
      committer_config_file: *committer_config_file
      committer_metrics_port: *committer_metrics_port
      committer_rpc_port: *committer_rpc_port
      committer_use_tls: *committer_use_tls
      committer_monitoring_use_tls: *committer_monitoring_use_tls
      committer_use_mtls: *committer_use_mtls
      committer_monitoring_use_mtls: *committer_monitoring_use_mtls
      committer_server_rate_limit_requests_per_second: *committer_server_rate_limit_requests_per_second
      committer_server_rate_limit_burst: *committer_server_rate_limit_burst
      committer_server_keep_alive_time: *committer_server_keep_alive_time
      committer_server_keep_alive_timeout: *committer_server_keep_alive_timeout
      committer_server_keep_alive_min_time: *committer_server_keep_alive_min_time
      committer_server_keep_alive_permit_without_stream: *committer_server_keep_alive_permit_without_stream
      committer_server_max_concurrent_streams: *committer_server_max_concurrent_streams
      committer_monitoring_rate_limit_requests_per_second: *committer_monitoring_rate_limit_requests_per_second
      committer_monitoring_rate_limit_burst: *committer_monitoring_rate_limit_burst
      committer_log_level: *committer_log_level
      committer_log_format: *committer_log_format
      committer_resource_limits_max_workers_for_preparer: *committer_resource_limits_max_workers_for_preparer
      committer_resource_limits_max_workers_for_validator: *committer_resource_limits_max_workers_for_validator
      committer_resource_limits_max_workers_for_committer: *committer_resource_limits_max_workers_for_committer
      committer_resource_limits_min_transaction_batch_size: *committer_resource_limits_min_transaction_batch_size
      committer_resource_limits_timeout_for_min_transaction_batch_size: *committer_resource_limits_timeout_for_min_transaction_batch_size
      postgres_db_host:
        <<: *postgres_db_host
        required: false
      yugabyte_cluster_ref_id:
        <<: *yugabyte_cluster_ref_id
        required: false
      committer_use_k8s: *committer_use_k8s

  verifier/config/transfer:
    short_description: Generate verifier config
    description:
      - Render verifier configuration, mTLS assets, and optional Kubernetes ConfigMap.
      - Includes verifier parallel executor settings and RPC/metrics server settings.
    options:
      committer_config_dir: *committer_config_dir
      committer_remote_config_dir: *committer_remote_config_dir
