---
argument_specs:

  _shared_options:
    short_description: Shared committer options
    description:
      - Reusable option definitions shared by the committer role entry points.
    options:
      committer_registry_endpoint:
        type: str
        required: false
        default: "{{ lookup('env', 'COMMITTER_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - Container registry endpoint for the committer image.
          - The default falls back to C(docker.io/hyperledger) when the C(COMMITTER_REGISTRY_ENDPOINT) environment variable is unset.
      committer_image_name:
        type: str
        required: false
        default: fabric-x-committer
        description:
          - Image name for the committer container.
      committer_image_tag:
        type: str
        required: false
        default: "0.1.9"
        description:
          - Image tag for the committer container.
      committer_image: &committer_image
        type: str
        required: false
        default: "{{ committer_registry_endpoint }}/{{ committer_image_name }}:{{ committer_image_tag }}"
        description:
          - Fully qualified committer image.
          - The default derives from C(committer_registry_endpoint), C(committer_image_name), and C(committer_image_tag).
      committer_container_name: &committer_container_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name used by the committer container helper.
          - The default derives from C(inventory_hostname).
      committer_git_hub_url: &committer_git_hub_url
        type: str
        required: false
        default: github.com
        description:
          - Git host used for the committer source repository.
      committer_git_repo: &committer_git_repo
        type: str
        required: false
        default: hyperledger/fabric-x-committer
        description:
          - Git repository that contains the committer sources.
      committer_git_commit: &committer_git_commit
        type: str
        required: false
        default: v0.1.9
        description:
          - Git ref used for building or installing the binary.
      committer_source_code_package: &committer_source_code_package
        type: str
        required: false
        default: cmd/committer
        description:
          - Go package path used as the build or install target.
      committer_bin_package: &committer_bin_package
        type: str
        required: false
        default: "{{ committer_git_hub_url }}/{{ committer_git_repo }}/{{ committer_source_code_package }}"
        description:
          - Go package path used by the shared binary installer.
          - The default derives from C(committer_git_hub_url), C(committer_git_repo), and C(committer_source_code_package).
      committer_bin_name: &committer_bin_name
        type: str
        required: false
        default: committer
        description:
          - Binary name managed by the committer role.
      committer_use_bin: &committer_use_bin
        type: bool
        required: false
        default: false
        description:
          - Enable host-binary deployment mode.
      committer_use_k8s: &committer_use_k8s
        type: bool
        required: false
        default: false
        description:
          - Enable Kubernetes deployment mode.
      committer_use_container: &committer_use_container
        type: bool
        required: false
        default: "{{ (not committer_use_bin) and (not committer_use_k8s) }}"
        description:
          - Enable container deployment mode.
          - The default derives from C(committer_use_bin) and C(committer_use_k8s).
      committer_deployment_mode: &committer_deployment_mode
        type: str
        required: false
        default: "{%- if committer_use_bin -%}bin{%- elif committer_use_k8s -%}k8s{%- else -%}container{%- endif -%}"
        description:
          - Deployment mode selected by the role.
          - The default derives from C(committer_use_bin) and C(committer_use_k8s).
      committer_k8s_resource_name: &committer_k8s_resource_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base Kubernetes resource name for committer objects.
          - The default derives from C(inventory_hostname) and is used by the service, workload, secret, and optional NodePort resources.
      committer_k8s_wait_timeout: &committer_k8s_wait_timeout
        type: int
        required: false
        default: 120
        description:
          - Wait timeout in seconds for Kubernetes rollouts.
      committer_k8s_fs_group:
        type: int
        required: false
        default: 10001
        description:
          - Filesystem group assigned to committer pods.
      committer_k8s_use_node_port: &committer_k8s_use_node_port
        type: bool
        required: false
        default: false
        description:
          - Enable the optional Kubernetes NodePort Service for committer RPC and metrics access.
      committer_k8s_rpc_node_port: &committer_k8s_rpc_node_port
        type: int
        required: false
        default: "{{ committer_rpc_port }}"
        description:
          - NodePort used for the RPC service when C(committer_k8s_use_node_port) is enabled.
          - The default derives from C(committer_rpc_port).
      committer_k8s_metrics_node_port: &committer_k8s_metrics_node_port
        type: int
        required: false
        default: "{{ committer_metrics_port }}"
        description:
          - NodePort used for the metrics service when C(committer_k8s_use_node_port) is enabled.
          - The default derives from C(committer_metrics_port).
      committer_remote_config_dir: &committer_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - Remote config directory managed by the role.
          - The default derives from C(remote_config_dir).
      committer_remote_data_dir: &committer_remote_data_dir
        type: path
        required: true
        default: "{{ remote_data_dir }}"
        description:
          - Remote data directory managed by the role.
          - The default derives from C(remote_data_dir).
      committer_container_config_dir: &committer_container_config_dir
        type: path
        required: false
        default: /config
        description:
          - Config directory inside the committer container.
      committer_container_data_dir: &committer_container_data_dir
        type: path
        required: false
        default: /data
        description:
          - Data directory inside the committer container.
      committer_config_dir: &committer_config_dir
        type: path
        required: false
        default: "{{ committer_remote_config_dir if committer_use_bin else committer_container_config_dir }}"
        description:
          - Active config directory used by the committer runtime.
          - The default derives from C(committer_remote_config_dir), C(committer_use_bin), and C(committer_container_config_dir).
      committer_data_dir: &committer_data_dir
        type: path
        required: false
        default: "{{ committer_remote_data_dir if committer_use_bin else committer_container_data_dir }}"
        description:
          - Active data directory used by the committer runtime.
          - The default derives from C(committer_remote_data_dir), C(committer_use_bin), and C(committer_container_data_dir).
      committer_config_file: &committer_config_file
        type: str
        required: false
        default: "config-{{ committer_component_type }}.yml"
        description:
          - Generated config file name used by the selected component.
          - The default derives from C(committer_component_type).
      committer_use_tls: &committer_use_tls
        type: bool
        required: false
        default: false
        description:
          - Enable TLS material for the selected component.
      committer_monitoring_use_tls: &committer_monitoring_use_tls
        type: bool
        required: false
        default: "{{ committer_use_tls }}"
        description:
          - Enable TLS for the monitoring endpoint.
          - The default derives from C(committer_use_tls).
      committer_use_mtls: &committer_use_mtls
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the selected component.
      committer_monitoring_use_mtls: &committer_monitoring_use_mtls
        type: bool
        required: false
        default: "{{ committer_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint.
          - The default derives from C(committer_use_mtls).
      committer_http_protocol: &committer_http_protocol
        type: str
        required: false
        default: "{{ 'https' if committer_use_tls else 'http' }}"
        description:
          - HTTP protocol used by the metrics client.
          - The default derives from C(committer_use_tls).
      committer_crypto_name: &committer_crypto_name
        type: str
        required: false
        default: "{{ organization.peer.name | default(inventory_hostname) }}"
        description:
          - Crypto material base name for the committer.
          - The default derives from C(organization.peer.name) when present, otherwise C(inventory_hostname).
      committer_rpc_port: &committer_rpc_port
        type: int
        required: true
        description:
          - RPC port exposed by the selected committer component.
      committer_metrics_port: &committer_metrics_port
        type: int
        required: true
        description:
          - Metrics port exposed by the selected committer component.
      committer_log_level: &committer_log_level
        type: str
        required: false
        default: info
        description:
          - Log level emitted by the committer component.
      committer_log_format: &committer_log_format
        type: str
        required: false
        default: "%{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc} -> %{level:.4s}%{color:reset} %{message}"
        description:
          - Log format emitted by the committer component.
      committer_component_type: &committer_component_type
        type: str
        required: true
        description:
          - Committer component handled by the entry point.
        choices: [validator, verifier, coordinator, sidecar, query-service]
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - Remote config directory used by delegated crypto tasks.
      remote_data_dir:
        type: path
        required: false
        description:
          - Remote data directory used by delegated sidecar tasks.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        description:
          - Control-node directory that stores fetched artifacts.
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - Control-node directory that stores cryptogen output.
      actual_host: &actual_host
        type: str
        description:
          - Reachable host or IP address used by the metrics client and Fabric-CA CSR generation.
      organization: &organization
        type: dict
        required: true
        description:
          - Organization definition consumed by crypto and sidecar configuration tasks.
      channel_id: &channel_id
        type: str
        required: false
        description:
          - Fabric channel identifier consumed by sidecar configuration.
      committer_validators: &committer_validators
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for validator components.
      committer_verifiers: &committer_verifiers
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for verifier components.
      committer_coordinator: &committer_coordinator
        type: str
        required: false
        description:
          - Inventory host name of the coordinator component.
      orderer_assemblers: &orderer_assemblers
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for orderer assembler components.
      postgres_db_host: &postgres_db_host
        type: str
        description:
          - Inventory host name of the Postgres backend used by validator or query-service configuration.
      yugabyte_cluster_ref_id: &yugabyte_cluster_ref_id
        type: str
        description:
          - Yugabyte cluster identifier used by validator or query-service configuration.
      committer_hosts: &committer_hosts
        type: list
        required: true
        elements: str
        description:
          - Inventory hosts for committer components used by Prometheus scrape generation.
      k8s_namespace: &k8s_namespace
        type: str
        description:
          - Kubernetes namespace that contains the committer resources.
      k8s_storage_size:
        type: str
        required: false
        description:
          - Persistent volume size requested by the sidecar StatefulSet.
      k8s_storage_class:
        type: str
        required: false
        description:
          - Storage class requested by the sidecar StatefulSet.
      k8s_image_pull_secret:
        type: str
        required: false
        description:
          - Optional image pull secret referenced by Kubernetes workloads.
      k8s_readiness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Readiness probe initial delay for Kubernetes workloads.
      k8s_readiness_probe_period_seconds:
        type: int
        required: false
        description:
          - Readiness probe period for Kubernetes workloads.
      k8s_readiness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Readiness probe timeout for Kubernetes workloads.
      k8s_readiness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Readiness probe failure threshold for Kubernetes workloads.
      k8s_liveness_probe_initial_delay_seconds:
        type: int
        required: false
        description:
          - Liveness probe initial delay for Kubernetes workloads.
      k8s_liveness_probe_period_seconds:
        type: int
        required: false
        description:
          - Liveness probe period for Kubernetes workloads.
      k8s_liveness_probe_timeout_seconds:
        type: int
        required: false
        description:
          - Liveness probe timeout for Kubernetes workloads.
      k8s_liveness_probe_failure_threshold:
        type: int
        required: false
        description:
          - Liveness probe failure threshold for Kubernetes workloads.
      committer_monitoring_rate_limit_requests_per_second: &committer_monitoring_rate_limit_requests_per_second
        type: int
        required: false
        description:
          - Monitoring rate-limit requests per second.
      committer_monitoring_rate_limit_burst: &committer_monitoring_rate_limit_burst
        type: int
        required: false
        description:
          - Monitoring rate-limit burst.
      committer_server_rate_limit_requests_per_second: &committer_server_rate_limit_requests_per_second
        type: int
        required: false
        description:
          - Server rate-limit requests per second.
      committer_server_rate_limit_burst: &committer_server_rate_limit_burst
        type: int
        required: false
        description:
          - Server rate-limit burst.
      committer_server_keep_alive_time: &committer_server_keep_alive_time
        type: str
        required: false
        description:
          - Server keepalive ping interval.
      committer_server_keep_alive_timeout: &committer_server_keep_alive_timeout
        type: str
        required: false
        description:
          - Server keepalive acknowledgment timeout.
      committer_server_keep_alive_min_time: &committer_server_keep_alive_min_time
        type: str
        required: false
        description:
          - Minimum client keepalive interval enforced by the server.
      committer_server_keep_alive_permit_without_stream: &committer_server_keep_alive_permit_without_stream
        type: bool
        required: false
        description:
          - Allow keepalive pings without active streams.
      committer_server_max_concurrent_streams: &committer_server_max_concurrent_streams
        type: int
        required: false
        description:
          - Maximum concurrent streaming RPCs allowed per client connection.
      committer_database_max_connections: &committer_database_max_connections
        type: int
        required: false
        description:
          - Maximum size of the committer database connection pool.
      committer_database_min_connections: &committer_database_min_connections
        type: int
        required: false
        description:
          - Minimum size of the committer database connection pool.
      committer_database_retry_initial_interval: &committer_database_retry_initial_interval
        type: str
        required: false
        description:
          - Initial backoff interval for database retries.
      committer_database_retry_randomization_factor: &committer_database_retry_randomization_factor
        type: float
        required: false
        description:
          - Jitter factor applied to database retry intervals.
      committer_database_retry_multiplier: &committer_database_retry_multiplier
        type: float
        required: false
        description:
          - Exponential multiplier applied to database retry intervals.
      committer_database_retry_max_interval: &committer_database_retry_max_interval
        type: str
        required: false
        description:
          - Maximum interval allowed between database retry attempts.
      committer_database_retry_max_elapsed_time: &committer_database_retry_max_elapsed_time
        type: str
        required: false
        description:
          - Maximum total elapsed time allowed for database retries.
      committer_resource_limits_max_workers_for_preparer: &committer_resource_limits_max_workers_for_preparer
        type: int
        required: false
        description:
          - Worker count for validator transaction preparation.
      committer_resource_limits_max_workers_for_validator: &committer_resource_limits_max_workers_for_validator
        type: int
        required: false
        description:
          - Worker count for validator MVCC checks.
      committer_resource_limits_max_workers_for_committer: &committer_resource_limits_max_workers_for_committer
        type: int
        required: false
        description:
          - Worker count for validator commit processing.
      committer_resource_limits_min_transaction_batch_size: &committer_resource_limits_min_transaction_batch_size
        type: int
        required: false
        description:
          - Minimum validator transaction batch size.
      committer_resource_limits_timeout_for_min_transaction_batch_size: &committer_resource_limits_timeout_for_min_transaction_batch_size
        type: str
        required: false
        description:
          - Timeout for the minimum validator transaction batch size.
      committer_verifier_parallelism: &committer_verifier_parallelism
        type: int
        required: false
        description:
          - Parallel signature verification workers.
      committer_verifier_batch_size_cutoff: &committer_verifier_batch_size_cutoff
        type: int
        required: false
        description:
          - Signature verification batch size cutoff.
      committer_verifier_batch_time_cutoff: &committer_verifier_batch_time_cutoff
        type: str
        required: false
        description:
          - Signature verification batch timeout.
      committer_verifier_channel_buffer_size: &committer_verifier_channel_buffer_size
        type: int
        required: false
        description:
          - Channel buffer size for the verifier pipeline.
      committer_coordinator_dep_graph_constructors: &committer_coordinator_dep_graph_constructors
        type: int
        required: false
        description:
          - Dependency-graph constructor count for the coordinator.
      committer_coordinator_dep_graph_wait_tx_limit: &committer_coordinator_dep_graph_wait_tx_limit
        type: int
        required: false
        description:
          - Dependency-graph waiting transaction limit for the coordinator.
      committer_coordinator_per_channel_buffer_size_per_goroutine: &committer_coordinator_per_channel_buffer_size_per_goroutine
        type: int
        required: false
        description:
          - Per-goroutine channel buffer size for the coordinator.
      committer_sidecar_last_committed_block_set_interval: &committer_sidecar_last_committed_block_set_interval
        type: str
        required: false
        description:
          - Interval between sidecar committed-block updates.
      committer_sidecar_waiting_txs_limit: &committer_sidecar_waiting_txs_limit
        type: int
        required: false
        description:
          - Sidecar waiting transaction limit.
      committer_sidecar_channel_buffer_size: &committer_sidecar_channel_buffer_size
        type: int
        required: false
        description:
          - Sidecar internal channel buffer size.
      committer_sidecar_ledger_sync_interval: &committer_sidecar_ledger_sync_interval
        type: int
        required: false
        description:
          - Sidecar ledger sync interval.
      committer_sidecar_notification_max_timeout: &committer_sidecar_notification_max_timeout
        type: str
        required: false
        description:
          - Sidecar notification timeout.
      committer_query_service_min_batch_keys: &committer_query_service_min_batch_keys
        type: int
        required: false
        description:
          - Query-service minimum batch key count.
      committer_query_service_max_batch_wait: &committer_query_service_max_batch_wait
        type: str
        required: false
        description:
          - Query-service maximum batch wait time.
      committer_query_service_view_aggregation_window: &committer_query_service_view_aggregation_window
        type: str
        required: false
        description:
          - Query-service view aggregation window.
      committer_query_service_max_aggregated_views: &committer_query_service_max_aggregated_views
        type: int
        required: false
        description:
          - Query-service maximum aggregated views.
      committer_query_service_max_active_views: &committer_query_service_max_active_views
        type: int
        required: false
        description:
          - Query-service maximum active views.
      committer_query_service_max_view_timeout: &committer_query_service_max_view_timeout
        type: str
        required: false
        description:
          - Query-service view timeout.
      committer_query_service_max_request_keys: &committer_query_service_max_request_keys
        type: int
        required: false
        description:
          - Query-service maximum request key count.
      committer_mtls_clients: &committer_mtls_clients
        type: list
        required: false
        description:
          - mTLS client identifiers trusted by the component.
      committer_mtls_orgs: &committer_mtls_orgs
        type: list
        required: false
        description:
          - mTLS organizations trusted by the component.
      committer_monitoring_mtls_clients: &committer_monitoring_mtls_clients
        type: list
        required: false
        description:
          - Monitoring mTLS client identifiers trusted by the component.
      committer_monitoring_mtls_orgs: &committer_monitoring_mtls_orgs
        type: list
        required: false
        description:
          - Monitoring mTLS organizations trusted by the component.

  ping:
    short_description: Check the committer gRPC endpoint
    description:
      - Validate that the Fabric-X Committer RPC port is reachable.
    options:
      committer_rpc_port: *committer_rpc_port
      committer_use_k8s: *committer_use_k8s

  k8s/ping:
    short_description: Check the committer Kubernetes NodePorts
    description:
      - Validate that the optional Kubernetes NodePort Service exposes the RPC and metrics ports.
      - The NodePort defaults derive from C(committer_rpc_port) and C(committer_metrics_port).
    options:
      committer_k8s_use_node_port: *committer_k8s_use_node_port
      committer_k8s_rpc_node_port: *committer_k8s_rpc_node_port
      committer_k8s_metrics_node_port: *committer_k8s_metrics_node_port
      committer_rpc_port: *committer_rpc_port
      committer_metrics_port: *committer_metrics_port

  validator/start:
    short_description: Start a validator component
    description:
      - Start a validator in bin, container, or Kubernetes mode.
      - The selected runtime path depends on C(committer_use_bin) and C(committer_use_k8s).
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  verifier/start:
    short_description: Start a verifier component
    description:
      - Start a verifier in bin, container, or Kubernetes mode.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  coordinator/start:
    short_description: Start a coordinator component
    description:
      - Start a coordinator in bin, container, or Kubernetes mode.
      - Coordinators connect to validator and verifier hosts that must already be configured.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  sidecar/start:
    short_description: Start a sidecar component
    description:
      - Start a sidecar in bin, container, or Kubernetes mode.
      - Sidecars require persistent data storage and connect to coordinator and orderer hosts.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  query_service/start:
    short_description: Start a query-service component
    description:
      - Start a query-service in bin, container, or Kubernetes mode.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  stop:
    short_description: Stop a committer process
    description:
      - Stop the selected component in bin or container mode.
      - Kubernetes teardown is handled through the teardown entry points instead.
    options:
      committer_component_type: *committer_component_type
      committer_deployment_mode: *committer_deployment_mode
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s

  teardown:
    short_description: Teardown a selected component
    description:
      - Remove the selected component according to its deployment mode.
      - Sidecar teardown also removes sidecar data.
    options:
      committer_component_type: *committer_component_type

  query_service/teardown:
    short_description: Teardown the query-service
    description:
      - Remove the query-service according to its deployment mode.
    options:
      committer_use_bin: *committer_use_bin
      committer_use_k8s: *committer_use_k8s
      committer_use_container: *committer_use_container

  sidecar/teardown:
    short_description: Teardown the sidecar
    description:
      - Remove the sidecar according to its deployment mode and delete sidecar data.
    options:
      committer_use_bin: *committer_use_bin
