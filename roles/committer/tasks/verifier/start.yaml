- name: Start Hyperledger Fabric-X Committer verifier in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: verifier/k8s/start
  when: committer_use_k8s

- name: Start Hyperledger Fabric-X Committer verifier in OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: verifier/openshift/start
  when: committer_use_openshift

- name: Start Hyperledger Fabric-X Committer verifier as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: verifier/container/start
  when: committer_use_container

- name: Start Hyperledger Fabric-X Committer verifier as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: verifier/bin/start
  when: committer_use_bin
