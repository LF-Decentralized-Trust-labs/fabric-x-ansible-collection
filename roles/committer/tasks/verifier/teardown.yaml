- name: Teardown Fabric-X Committer verifier in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: verifier/k8s/teardown
  when: committer_use_k8s

- name: Teardown Fabric-X Committer verifier container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: container/rm
  when: committer_use_container

- name: Stop Fabric-X Committer verifier binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/stop
  when: committer_use_bin
