# =========================
# Config
# =========================
- name: Ensure Hyperledger Fabric-X Committer verifier config directory exists
  ansible.builtin.file:
    path: "{{ committer_remote_config_dir }}"
    state: directory
    mode: "0o755"

- name: Generate Hyperledger Fabric-X Committer verifier config from template
  ansible.builtin.template:
    src: "config-verifier.yaml.j2"
    dest: "{{ committer_remote_config_dir }}/{{ committer_config_file }}"
    mode: "0o644"

# =========================
# mTLS
# =========================
- name: Transfer mTLS certificates
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/mtls/transfer
  when:
    - committer_use_mtls
