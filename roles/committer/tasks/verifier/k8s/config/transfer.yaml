# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer verifier
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Generate config on controller
# =========================
- name: Generate Hyperledger Fabric-X Committer verifier config on controller
  ansible.builtin.template:
    src: "config-verifier.yaml.j2"
    dest: "{{ committer_remote_config_dir }}/{{ committer_config_file }}"
    mode: "0o644"

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Committer verifier ConfigMap
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap-verifier.yaml.j2
