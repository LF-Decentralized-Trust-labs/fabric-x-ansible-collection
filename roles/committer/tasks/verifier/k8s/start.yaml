# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer verifier
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Fabric-X Committer verifier Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply Fabric-X Committer verifier NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2
  when: committer_k8s_use_node_port

- name: Apply Fabric-X Committer verifier Deployment
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/deployment-verifier.yaml.j2
    wait: true
    wait_timeout: "{{ committer_k8s_wait_timeout }}"
