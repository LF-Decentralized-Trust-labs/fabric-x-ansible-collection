- name: Start Hyperledger Fabric-X Committer coordinator in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/k8s/start
  when: committer_use_k8s

- name: Start Hyperledger Fabric-X Committer coordinator as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/container/start
  when: committer_use_container

- name: Start Hyperledger Fabric-X Committer coordinator as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/bin/start
  when: committer_use_bin
