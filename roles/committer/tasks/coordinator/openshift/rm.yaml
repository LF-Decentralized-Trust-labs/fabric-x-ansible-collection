- name: Delete Hyperledger Fabric-X Committer coordinator rpc OpenShift Route
  vars:
    openshift_route_name: "{{ committer_k8s_resource_name }}-rpc"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: committer_openshift_route is defined

- name: Delete Hyperledger Fabric-X Committer coordinator metrics OpenShift Route
  vars:
    openshift_route_name: "{{ committer_k8s_resource_name }}-metrics"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: committer_openshift_metrics_route is defined

- name: Remove Hyperledger Fabric-X Committer coordinator workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/k8s/rm
