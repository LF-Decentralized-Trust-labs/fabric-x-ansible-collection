- name: Wipe Fabric-X Committer coordinator in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/k8s/wipe
  when: committer_use_k8s

- name: Teardown Fabric-X Committer coordinator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: coordinator/teardown
  when: not committer_use_k8s

- name: Remove Fabric-X Committer coordinator binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/rm
  when: committer_use_bin

- name: Remove Fabric-X Committer coordinator configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/rm

- name: Remove Fabric-X Committer coordinator crypto material
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: crypto/rm
