# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer coordinator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Generate config on controller
# =========================
- name: Generate Hyperledger Fabric-X Committer coordinator config on controller
  vars:
    committer_validator_ref_host: "{{ committer_validators | first }}"
    committer_verifier_ref_host: "{{ committer_verifiers | first }}"
  ansible.builtin.template:
    src: "config-coordinator.yaml.j2"
    dest: "{{ committer_remote_config_dir }}/{{ committer_config_file }}"
    mode: "0o644"

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Committer coordinator ConfigMap
  vars:
    committer_validator_ref_host: "{{ committer_validators | first }}"
    committer_verifier_ref_host: "{{ committer_verifiers | first }}"
    committer_k8s_validators_ca_path: "{{ fetched_artifacts_dir }}/{{ committer_validator_ref_host }}/tls/ca.crt"
    committer_k8s_verifiers_ca_path: "{{ fetched_artifacts_dir }}/{{ committer_verifier_ref_host }}/tls/ca.crt"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap-coordinator.yaml.j2
