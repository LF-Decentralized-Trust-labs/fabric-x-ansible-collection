# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer coordinator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Fabric-X Committer coordinator Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply Fabric-X Committer coordinator NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2
  when:
    - committer_k8s_rpc_node_port is defined or
      committer_k8s_metrics_node_port is defined

- name: Apply Fabric-X Committer LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-loadbalancer.yaml.j2
  when:
    - committer_k8s_loadbalancer_expose_rpc_port or
      committer_k8s_loadbalancer_expose_metrics_port

- name: Apply Fabric-X Committer coordinator Deployment
  vars:
    committer_validator_ref_host: "{{ committer_validators | first }}"
    committer_verifier_ref_host: "{{ committer_verifiers | first }}"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/deployment-coordinator.yaml.j2
    wait: true
    wait_timeout: "{{ committer_k8s_wait_timeout }}"
