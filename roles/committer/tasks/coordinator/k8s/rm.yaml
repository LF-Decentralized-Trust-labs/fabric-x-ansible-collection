- name: Delete Fabric-X Committer coordinator Deployment
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: "{{ committer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Committer coordinator Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ committer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Committer coordinator NodePort Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ committer_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
