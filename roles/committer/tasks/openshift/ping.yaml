- name: Check that the committer OpenShift RPC route is reachable
  vars:
    openshift_route_host: "{{ committer_openshift_route }}"
    openshift_route_use_tls: "{{ committer_use_tls }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/ping
  when: committer_openshift_route is defined

- name: Check that the committer OpenShift metrics route is reachable
  vars:
    openshift_route_host: "{{ committer_openshift_metrics_route }}"
    openshift_route_use_tls: "{{ committer_monitoring_use_tls }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/ping
  when: committer_openshift_metrics_route is defined

- name: Check that the committer Kubernetes services are reachable
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: k8s/ping
