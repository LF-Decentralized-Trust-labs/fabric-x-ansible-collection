# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer query-service
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Generate config on controller
# =========================
- name: Generate Hyperledger Fabric-X Committer query-service config on controller
  ansible.builtin.template:
    src: "config-query-service.yaml.j2"
    dest: "{{ committer_remote_config_dir }}/{{ committer_query_service_config_file }}"
    mode: "0o644"

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Committer query-service ConfigMap
  vars:
    committer_k8s_db_ca_path: "{{ fetched_artifacts_dir }}/{{ postgres_db_host }}/tls/ca.crt"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap-query-service.yaml.j2
