# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer query-service
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Fabric-X Committer query-service Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply Fabric-X Committer query-service NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2

- name: Apply Fabric-X Committer query-service Deployment
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/deployment-query-service.yaml.j2
    wait: true
    wait_timeout: "{{ committer_k8s_wait_timeout }}"
