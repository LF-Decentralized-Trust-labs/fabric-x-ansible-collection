- name: Start Hyperledger Fabric-X Committer QueryService in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: query_service/k8s/start
  when: committer_use_k8s

- name: Start Hyperledger Fabric-X Committer QueryService in OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: query_service/openshift/start
  when: committer_use_openshift

- name: Start Hyperledger Fabric-X Committer QueryService as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: query_service/container/start
  when: committer_use_container

- name: Start Hyperledger Fabric-X Committer QueryService as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: query_service/bin/start
  when: committer_use_bin
