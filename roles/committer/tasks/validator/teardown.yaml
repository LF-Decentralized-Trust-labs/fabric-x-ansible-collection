- name: Teardown Fabric-X Committer validator in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: validator/k8s/rm
  when: committer_use_k8s

- name: Teardown Hyperledger Fabric-X Committer validator in OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: validator/openshift/rm
  when: committer_use_openshift

- name: Teardown Fabric-X Committer validator container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: container/rm
  when: committer_use_container

- name: Stop Fabric-X Committer validator binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/stop
  when: committer_use_bin
