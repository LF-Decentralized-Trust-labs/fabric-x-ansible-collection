# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Committer validator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Committer validator ConfigMap
  vars:
    committer_k8s_db_ca_path: "{{ committer_remote_config_dir }}/tls/db/ca.crt"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap-validator.yaml.j2
