- name: Delete Fabric-X Committer validator Deployment
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: "{{ committer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Committer validator Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ committer_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Fabric-X Committer validator NodePort Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ committer_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
  when: committer_k8s_rpc_node_port is defined or
    committer_k8s_metrics_node_port is defined

- name: Delete Fabric-X Committer LoadBalancer Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ committer_k8s_resource_name }}-loadbalancer"
    namespace: "{{ k8s_namespace }}"
  when: committer_k8s_loadbalancer_expose_rpc_port or
    committer_k8s_loadbalancer_expose_metrics_port
