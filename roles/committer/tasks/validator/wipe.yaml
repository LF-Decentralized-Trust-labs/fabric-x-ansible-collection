- name: Wipe Fabric-X Committer validator in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: validator/k8s/wipe
  when: committer_use_k8s

- name: Teardown Fabric-X Committer validator
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: validator/teardown
  when: not committer_use_k8s

- name: Remove Fabric-X Committer validator binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/rm
  when: committer_use_bin

- name: Remove Fabric-X Committer validator configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/rm
  when: not committer_use_k8s

- name: Remove Fabric-X Committer validator crypto material
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: crypto/rm
  when: not committer_use_k8s
