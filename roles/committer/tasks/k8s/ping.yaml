- name: Check that the Fabric-X Committer RPC node port is open
  vars:
    utils_ports_to_ping:
      - "{{ committer_k8s_rpc_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - committer_k8s_rpc_node_port is defined

- name: Check that the Fabric-X Committer RPC load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ committer_rpc_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - committer_k8s_loadbalancer_expose_rpc_port

- name: Check that the Fabric-X Committer metrics node port is open
  vars:
    utils_ports_to_ping:
      - "{{ committer_k8s_metrics_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - committer_k8s_metrics_node_port is defined

- name: Check that the Fabric-X Committer metrics load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ committer_metrics_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - committer_k8s_loadbalancer_expose_metrics_port
