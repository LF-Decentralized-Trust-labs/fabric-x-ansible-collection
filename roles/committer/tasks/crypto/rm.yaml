- name: Remove Hyperledger Fabric-X Committer TLS directory
  ansible.builtin.file:
    path: "{{ committer_remote_config_dir }}/tls"
    state: absent
  when:
    - committer_use_tls

- name: Remove Fabric-X Committer k8s Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: k8s/crypto/rm
  when: committer_use_k8s or committer_use_openshift
