- name: Get Fabric-X Committer metrics
  ansible.builtin.uri:
    url: "{{ committer_http_protocol }}://{{ actual_host }}:{{ committer_metrics_port }}/metrics"
    validate_certs: false
    method: GET
    return_content: true
  register: committer_metrics
  when:
    - committer_metrics_port is defined

- name: Print Fabric-X Committer metrics
  ansible.builtin.debug:
    msg: "{{ committer_metrics.content }}"
  when:
    - committer_metrics_port is defined
    - committer_metrics is defined
