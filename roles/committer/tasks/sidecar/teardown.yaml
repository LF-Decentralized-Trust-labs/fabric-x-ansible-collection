- name: Teardown Fabric-X Committer sidecar in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: sidecar/k8s/teardown
  when: committer_use_k8s

- name: Teardown Fabric-X Committer sidecar container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: container/rm
  when: committer_use_container

- name: Stop Fabric-X Committer sidecar binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/stop
  when: committer_use_bin

- name: Remove Fabric-X Committer sidecar data
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: data/rm
  when: not committer_use_k8s
