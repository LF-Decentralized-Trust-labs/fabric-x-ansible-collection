- name: Start Hyperledger Fabric-X Committer sidecar in k8s
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: sidecar/k8s/start
  when: committer_use_k8s

- name: Start Hyperledger Fabric-X Committer sidecar as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: sidecar/container/start
  when: committer_use_container

- name: Start Hyperledger Fabric-X Committer sidecar as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: sidecar/bin/start
  when: committer_use_bin
