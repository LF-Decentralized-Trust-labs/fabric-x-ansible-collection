# =========================
# Config
# =========================
- name: Check that the Hyperledger Fabric-X Orderer Assemblers have been defined
  ansible.builtin.fail:
    msg: "No Hyperledger Fabric-X Orderer Assembler has been defined. Set it via 'orderer_assemblers'."
  when:
    - orderer_assemblers is not defined

- name: Ensure Hyperledger Fabric-X Committer coordinator config directory exists
  ansible.builtin.file:
    path: "{{ committer_remote_config_dir }}"
    state: directory
    mode: "0o755"

- name: Generate Hyperledger Fabric-X Committer Sidecar config
  vars:
    orderer_assembler_ref_host: >-
      {{
        orderer_assemblers
        | first
      }}
  ansible.builtin.template:
    src: "config-sidecar.yaml.j2"
    dest: "{{ committer_remote_config_dir }}/{{ committer_config_file }}"
    mode: "0o644"

# =========================
# Genesis config block
# =========================
- name: Copy genesis config block for Fabric-X Committer sidecar
  ansible.builtin.copy:
    src: "{{ configtxgen_artifacts_dir }}/{{ channel_id }}_block.pb"
    dest: "{{ committer_remote_config_dir }}/{{ committer_sidecar_config_block_file }}"
    mode: "0o644"

# =========================
# Coordinator TLS certs
# =========================
- name: Ensure directory for coordinator TLS CA certificates exists
  ansible.builtin.file:
    path: "{{ committer_remote_config_dir }}/tls/coordinator"
    state: directory
    mode: "0o755"
  when:
    - hostvars[committer_coordinator].committer_use_tls is defined
    - hostvars[committer_coordinator].committer_use_tls

- name: Transfer the coordinator CA certificate
  ansible.builtin.copy:
    src: "{{ fetched_artifacts_dir }}/{{ committer_coordinator }}/tls/ca.crt"
    dest: "{{ committer_remote_config_dir }}/tls/coordinator/ca.crt"
    mode: "0o644"
  when:
    - hostvars[committer_coordinator].committer_use_tls is defined
    - hostvars[committer_coordinator].committer_use_tls

# =========================
# mTLS
# =========================
- name: Transfer mTLS certificates
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/mtls/transfer
  when:
    - committer_use_mtls

- name: Transfer Monitoring mTLS certificates
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/mtls/monitoring/transfer
  when:
    - committer_monitoring_use_mtls

# =========================
# Kubernetes
# =========================
- name: Generate Hyperledger Fabric-X Committer sidecar k8s config
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: sidecar/k8s/config/transfer
  when: committer_use_k8s
