- name: Teardown the Fabric-X Committer components
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: teardown

- name: Remove Fabric-X Committer binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: bin/rm
  when: committer_use_bin

- name: Remove Fabric-X Committer configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: config/rm

- name: Remove Fabric-X Committer crypto material
  ansible.builtin.include_role:
    name: hyperledger.fabricx.committer
    tasks_from: crypto/rm
