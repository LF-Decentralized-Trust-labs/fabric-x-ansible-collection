- name: Initialize Node Exporter TLS SAN hosts
  ansible.builtin.set_fact:
    node_exporter_tls_san_hosts:
      - "{{ ansible_host }}"
      - "{{ actual_host }}"

- name: Append Node Exporter OpenShift route to TLS SAN hosts
  ansible.builtin.set_fact:
    node_exporter_tls_san_hosts: "{{ node_exporter_tls_san_hosts + [node_exporter_openshift_route] }}"
  when:
    - node_exporter_openshift_route is defined

- name: Generate the Node Exporter TLS crypto material with OpenSSL
  vars:
    openssl_common_name: "{{ inventory_hostname }}"
    openssl_organization: "{{ organization.domain | default(inventory_hostname) }}"
    openssl_private_key_path: "{{ node_exporter_remote_config_dir }}/tls/{{ node_exporter_tls_private_key_file }}"
    openssl_cert_path: "{{ node_exporter_remote_config_dir }}/tls/{{ node_exporter_tls_cert_file }}"
    openssl_san_hosts: "{{ node_exporter_tls_san_hosts | unique }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openssl
    tasks_from: generate_self_signed_cert
