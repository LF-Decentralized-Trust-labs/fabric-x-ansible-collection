- name: Check that the Node Exporter OpenShift route is reachable
  vars:
    openshift_route_host: "{{ node_exporter_openshift_route }}"
    openshift_route_use_tls: "{{ node_exporter_use_tls }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/ping
  when: node_exporter_openshift_route is defined

- name: Check that the Node Exporter Kubernetes services are reachable
  ansible.builtin.include_role:
    name: hyperledger.fabricx.node_exporter
    tasks_from: k8s/ping
