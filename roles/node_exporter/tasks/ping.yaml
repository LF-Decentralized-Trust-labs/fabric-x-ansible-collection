# =======================
# bin / container
# =======================
- name: Check that the Node Exporter port is open
  vars:
    utils_ports_to_ping:
      - "{{ node_exporter_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not node_exporter_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.node_exporter
    tasks_from: k8s/ping
  when: node_exporter_use_k8s
