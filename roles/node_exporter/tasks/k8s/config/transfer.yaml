# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Node Exporter
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply ConfigMap
# =========================
- name: Apply Node Exporter ConfigMap
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap.yaml.j2
