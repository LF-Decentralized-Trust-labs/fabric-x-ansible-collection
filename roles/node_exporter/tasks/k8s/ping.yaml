- name: Check that the Node Exporter metrics node port is open
  vars:
    utils_ports_to_ping:
      - "{{ node_exporter_k8s_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - node_exporter_k8s_node_port is defined

- name: Check that the Node Exporter metrics load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ node_exporter_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - node_exporter_k8s_loadbalancer_expose_metrics_port
