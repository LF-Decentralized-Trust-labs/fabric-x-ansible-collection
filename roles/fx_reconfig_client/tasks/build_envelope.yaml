- name: Ensure build_envelope output directory exists
  ansible.builtin.file:
    path: "{{ fx_reconfig_client_build_envelope_output | dirname }}"
    state: directory
    mode: "0o755"

- name: Run {{ fx_reconfig_client_bin_name }} build-envelope
  vars:
    bin_run_with_tmux: false
    bin_remote_dir: "{{ cli_bin_dir }}"
    bin_command: >-
      {{ fx_reconfig_client_bin_name }} build-envelope
      --channel {{ fx_reconfig_client_channel_id }}
      --config-update-envelope {{ fx_reconfig_client_config_update_envelope_file }}
      --mspid {{ fx_reconfig_client_mspid }}
      --cert {{ fx_reconfig_client_cert }}
      --key {{ fx_reconfig_client_key }}
      --output {{ fx_reconfig_client_build_envelope_output }}
    bin_collect_logs: false
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: start
