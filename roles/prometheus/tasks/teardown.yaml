- name: Remove Prometheus container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: container/rm
  when: prometheus_use_container

- name: Remove Prometheus Kubernetes workload
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: k8s/rm
  when: prometheus_use_k8s

- name: Remove Prometheus data
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: data/rm
