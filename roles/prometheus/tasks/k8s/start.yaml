# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Prometheus
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Prometheus Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service.yaml.j2

- name: Apply Prometheus NodePort Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service-nodeport.yaml.j2
  when: prometheus_k8s_node_port is defined

- name: Apply Prometheus LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/service-loadbalancer.yaml.j2
  when: prometheus_k8s_loadbalancer_expose_http_port

# =========================
# RBAC (only when kubernetes_sd_configs is used)
# =========================
- name: Detect whether any scrape service uses kubernetes_sd_configs
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: detect_k8s_sd

- name: Apply Prometheus RBAC resources
  vars:
    k8s_rbac_resource_name: "{{ prometheus_k8s_resource_name }}"
    k8s_rbac_part_of: "{{ prometheus_k8s_part_of }}"
    k8s_rbac_clusterrole_api_groups:
      - ""
    k8s_rbac_clusterrole_resources:
      - pods
      - nodes
      - nodes/metrics
      - services
      - endpoints
    k8s_rbac_clusterrole_verbs:
      - get
      - list
      - watch
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: rbac/apply
  when:
    - prometheus_has_k8s_sd_scrapers is defined
    - prometheus_has_k8s_sd_scrapers

- name: Apply Prometheus StatefulSet
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/statefulset.yaml.j2
    wait: true
    wait_timeout: "{{ prometheus_k8s_wait_timeout }}"
