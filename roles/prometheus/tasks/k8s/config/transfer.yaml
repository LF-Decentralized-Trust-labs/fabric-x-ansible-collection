# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Prometheus
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

- name: Detect whether any scrape service uses kubernetes_sd_configs
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: detect_k8s_sd

- name: Apply Prometheus RBAC resources
  vars:
    k8s_rbac_resource_name: "{{ prometheus_k8s_resource_name }}"
    k8s_rbac_part_of: "{{ prometheus_k8s_part_of }}"
    k8s_rbac_clusterrole_api_groups:
      - ""
    k8s_rbac_clusterrole_resources:
      - pods
      - nodes
      - nodes/metrics
      - services
      - endpoints
    k8s_rbac_clusterrole_verbs:
      - get
      - list
      - watch
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: rbac/apply
  when: prometheus_has_k8s_sd_scrapers

# =========================
# ConfigMap
# =========================
- name: Apply Prometheus ConfigMap
  vars:
    prometheus_k8s_config_path: "{{ prometheus_remote_config_dir }}/{{ prometheus_config_file }}"
    prometheus_k8s_web_config_path: "{{ prometheus_remote_config_dir }}/{{ prometheus_web_config_file }}"
    prometheus_k8s_http_config_path: "{{ prometheus_remote_config_dir }}/{{ prometheus_http_config_file }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default('default') }}"
    template:
      path: k8s/configmap.yaml.j2
