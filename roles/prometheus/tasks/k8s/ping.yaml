- name: Check that the Prometheus HTTP node port is open
  vars:
    utils_ports_to_ping:
      - "{{ prometheus_k8s_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - prometheus_k8s_node_port is defined

- name: Check that the Prometheus HTTP load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ prometheus_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - prometheus_k8s_loadbalancer_expose_http_port
