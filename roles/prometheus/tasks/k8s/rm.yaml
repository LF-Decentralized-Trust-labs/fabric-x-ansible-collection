- name: Delete Prometheus StatefulSet
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: StatefulSet
    name: "{{ prometheus_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Prometheus headless Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ prometheus_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Delete Prometheus NodePort Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ prometheus_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
