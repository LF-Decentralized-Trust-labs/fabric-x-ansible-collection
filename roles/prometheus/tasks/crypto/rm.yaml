- name: Remove Prometheus TLS directory
  ansible.builtin.file:
    path: "{{ prometheus_remote_config_dir }}/tls"
    state: absent
  when:
    - prometheus_use_tls

- name: Delete Prometheus k8s Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.prometheus
    tasks_from: k8s/crypto/rm
  when: prometheus_use_k8s
