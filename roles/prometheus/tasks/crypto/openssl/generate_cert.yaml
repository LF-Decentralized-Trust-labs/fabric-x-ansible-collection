- name: Initialize Prometheus TLS SAN hosts
  ansible.builtin.set_fact:
    prometheus_tls_san_hosts:
      - "{{ ansible_host }}"
      - "{{ actual_host }}"

- name: Append Prometheus OpenShift route to TLS SAN hosts
  ansible.builtin.set_fact:
    prometheus_tls_san_hosts: "{{ prometheus_tls_san_hosts + [prometheus_openshift_route] }}"
  when:
    - prometheus_openshift_route is defined

- name: Generate the Prometheus TLS crypto material with OpenSSL
  vars:
    openssl_common_name: "{{ inventory_hostname }}"
    openssl_organization: "{{ organization.domain | default(inventory_hostname) }}"
    openssl_private_key_path: "{{ prometheus_remote_config_dir }}/tls/{{ prometheus_tls_private_key_file }}"
    openssl_cert_path: "{{ prometheus_remote_config_dir }}/tls/{{ prometheus_tls_cert_file }}"
    openssl_san_hosts: "{{ prometheus_tls_san_hosts | unique }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openssl
    tasks_from: generate_self_signed_cert
