---
argument_specs:
  role-options:
    short_description: Shared Prometheus role options
    description:
      - Reusable option definitions for Prometheus entry points.
    options:
      organization: &organization
        type: dict
        description:
          - Optional certificate organization data forwarded to OpenSSL.
          - "Example: C({'common_name': 'prometheus.observability.svc.cluster.local', 'organization_name': 'Hyperledger Fabric-X'})."
      remote_config_dir: &remote_config_dir
        type: path
        description:
          - Remote configuration directory consumed by C(prometheus_remote_config_dir).
          - "Example: C(/var/lib/prometheus/config)."
      remote_data_dir: &remote_data_dir
        type: path
        description:
          - Remote data directory consumed by C(prometheus_remote_data_dir).
          - "Example: C(/var/lib/prometheus/data)."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - Control-node directory where fetched Prometheus artifacts are written.
          - "Example: C(/tmp/prometheus-artifacts)."
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - Kubernetes namespace used for Prometheus resources.
          - "Example: C(observability)."
      prometheus_registry_endpoint: &prometheus_registry_endpoint
        type: str
        default: "{{ lookup('env', 'PROMETHEUS_REGISTRY_ENDPOINT') or 'docker.io/prom' }}"
        description:
          - Container registry endpoint for Prometheus images.
      prometheus_image_name: &prometheus_image_name
        type: str
        default: prometheus
        description:
          - Image name used when composing C(prometheus_image).
      prometheus_image_tag: &prometheus_image_tag
        type: str
        default: latest
        description:
          - Image tag used when composing C(prometheus_image).
      prometheus_image: &prometheus_image
        type: str
        default: "{{ prometheus_registry_endpoint }}/{{ prometheus_image_name }}:{{ prometheus_image_tag }}"
        description:
          - Fully qualified Prometheus container image.
      prometheus_container_name: &prometheus_container_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Container name used for the Prometheus workload.
      prometheus_remote_config_dir: &prometheus_remote_config_dir
        type: path
        default: "{{ remote_config_dir }}"
        description:
          - Remote directory where Prometheus configuration files are written.
      prometheus_remote_data_dir: &prometheus_remote_data_dir
        type: path
        default: "{{ remote_data_dir }}"
        description:
          - Remote directory where Prometheus TSDB data is stored.
      prometheus_container_config_dir: &prometheus_container_config_dir
        type: path
        default: /etc/prometheus/config
        description:
          - In-container or in-pod mount point for Prometheus configuration files.
      prometheus_container_data_dir: &prometheus_container_data_dir
        type: path
        default: /data
        description:
          - In-container or in-pod path for Prometheus TSDB data.
      prometheus_config_file: &prometheus_config_file
        type: str
        default: prometheus.yaml
        description:
          - Filename of the main Prometheus scrape configuration.
      prometheus_web_config_file: &prometheus_web_config_file
        type: str
        default: web-config.yaml
        description:
          - Filename of the Prometheus web TLS configuration file.
      prometheus_http_config_file: &prometheus_http_config_file
        type: str
        default: http-config.yaml
        description:
          - Filename of the promtool HTTP client configuration used for TLS health checks.
      prometheus_scrape_interval: &prometheus_scrape_interval
        type: str
        default: 2s
        description:
          - Global Prometheus scrape interval.
      prometheus_scrape_services: &prometheus_scrape_services
        type: list
        elements: dict
        description:
          - Optional scrape job definitions rendered into C(prometheus.yaml) and the Kubernetes ConfigMap.
          - "Example: C([{ job_name: fabric-orderer, static_configs: [{ targets: [orderer1.example.com:9443, orderer2.example.com:9443] }] }, { job_name: node_exporter, static_configs: [{ targets: [worker1.example.com:9100] }] }])."
      prometheus_use_tls: &prometheus_use_tls
        type: bool
        default: false
        description:
          - Enables HTTPS and TLS-aware health checks when set to C(true).
      prometheus_tls_private_key_file: &prometheus_tls_private_key_file
        type: str
        default: server.key
        description:
          - Filename used for the Prometheus TLS private key.
      prometheus_tls_cert_file: &prometheus_tls_cert_file
        type: str
        default: server.crt
        description:
          - Filename used for the Prometheus TLS certificate.
      prometheus_port: &prometheus_port
        type: int
        default: 9090
        description:
          - TCP port exposed by Prometheus and used by the container listener and Kubernetes Services.
      prometheus_use_k8s: &prometheus_use_k8s
        type: bool
        default: false
        description:
          - Enables the Kubernetes deployment path when set to C(true).
      prometheus_use_container: &prometheus_use_container
        type: bool
        default: "{{ (not prometheus_use_k8s) and (not prometheus_use_openshift) }}"
        description:
          - Enables the container deployment path when set to C(true).
      prometheus_k8s_resource_name: &prometheus_k8s_resource_name
        type: str
        default: "{{ inventory_hostname }}"
        description:
          - Base Kubernetes resource name used for the Prometheus StatefulSet and Services.
      prometheus_k8s_part_of: &prometheus_k8s_part_of
        type: str
        default: monitoring
        description:
          - Value for the Kubernetes C(app.kubernetes.io/part-of) label applied to Prometheus resources.
      prometheus_k8s_wait_timeout: &prometheus_k8s_wait_timeout
        type: int
        default: 120
        description:
          - Maximum number of seconds to wait for the StatefulSet rollout.
      prometheus_k8s_fs_group: &prometheus_k8s_fs_group
        type: int
        default: 65534
        description:
          - File system group assigned to the pod.
      prometheus_k8s_node_port: &prometheus_k8s_node_port
        type: int
        description:
          - Kubernetes NodePort value used by the external HTTP Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30990)."
      prometheus_k8s_loadbalancer_expose_http_port:
        &prometheus_k8s_loadbalancer_expose_http_port
        type: bool
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the HTTP port externally.
          - When undefined or C(false), the HTTP port is not included in the LoadBalancer Service.
      k8s_storage_size: &k8s_storage_size
        type: str
        required: true
        description:
          - Persistent volume size requested for Prometheus data.
          - "Example: C(20Gi)."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        description:
          - Optional image pull secret name for private registries.
          - "Example: C(prometheus-registry-creds)."
      k8s_storage_class: &k8s_storage_class
        type: str
        description:
          - Optional Kubernetes storage class name for the Prometheus PVC.
          - "Example: C(fast-ssd)."
      k8s_readiness_probe_initial_delay_seconds:
        &k8s_readiness_probe_initial_delay_seconds
        type: int
        description:
          - Initial delay before the readiness probe starts.
          - "Example: C(10)."
      k8s_readiness_probe_period_seconds: &k8s_readiness_probe_period_seconds
        type: int
        description:
          - Interval between readiness probe attempts.
          - "Example: C(5)."
      k8s_readiness_probe_timeout_seconds: &k8s_readiness_probe_timeout_seconds
        type: int
        description:
          - Timeout for each readiness probe request.
          - "Example: C(3)."
      k8s_readiness_probe_failure_threshold:
        &k8s_readiness_probe_failure_threshold
        type: int
        description:
          - Number of failed readiness probes before the pod is marked unready.
          - "Example: C(3)."
      k8s_liveness_probe_initial_delay_seconds:
        &k8s_liveness_probe_initial_delay_seconds
        type: int
        description:
          - Initial delay before the liveness probe starts.
          - "Example: C(30)."
      k8s_liveness_probe_period_seconds: &k8s_liveness_probe_period_seconds
        type: int
        description:
          - Interval between liveness probe attempts.
          - "Example: C(10)."
      k8s_liveness_probe_timeout_seconds: &k8s_liveness_probe_timeout_seconds
        type: int
        description:
          - Timeout for each liveness probe request.
          - "Example: C(5)."
      k8s_liveness_probe_failure_threshold:
        &k8s_liveness_probe_failure_threshold
        type: int
        description:
          - Number of failed liveness probes before Kubernetes restarts the pod.
          - "Example: C(5)."

      prometheus_use_openshift: &prometheus_use_openshift
        type: bool
        default: false
        description:
          - Selects the OpenShift deployment branch.
      prometheus_openshift_route: &prometheus_openshift_route
        type: str
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(prometheus.apps.example.com)."
  ping:
    short_description: Check that the Prometheus listener is reachable
    description:
      - Validates network reachability to the active Prometheus listener on the target host, or to the Kubernetes NodePort when that exposure path is enabled.
    options:
      prometheus_use_openshift: *prometheus_use_openshift
      prometheus_port: *prometheus_port
      prometheus_use_k8s: *prometheus_use_k8s
  start:
    short_description: Start Prometheus in the selected deployment mode
    description:
      - Starts Prometheus as either a container or Kubernetes workload based on the deployment mode flags.
    options:
      prometheus_use_container: *prometheus_use_container
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  container/start:
    short_description: Start the Prometheus container
    description:
      - Renders the remote configuration, creates the data directory, and starts Prometheus through the shared container role.
    options:
      remote_config_dir: *remote_config_dir
      remote_data_dir: *remote_data_dir
      prometheus_registry_endpoint: *prometheus_registry_endpoint
      prometheus_image_name: *prometheus_image_name
      prometheus_image_tag: *prometheus_image_tag
      prometheus_image: *prometheus_image
      prometheus_container_name: *prometheus_container_name
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_remote_data_dir: *prometheus_remote_data_dir
      prometheus_container_config_dir: *prometheus_container_config_dir
      prometheus_container_data_dir: *prometheus_container_data_dir
      prometheus_config_file: *prometheus_config_file
      prometheus_web_config_file: *prometheus_web_config_file
      prometheus_http_config_file: *prometheus_http_config_file
      prometheus_port: *prometheus_port
      prometheus_use_tls: *prometheus_use_tls

  k8s/start:
    short_description: Start Prometheus on Kubernetes
    description:
      - Ensures the namespace exists, renders and transfers Prometheus configuration, and creates the headless Service, optional NodePort and LoadBalancer Services, and StatefulSet resources.
    options:
      prometheus_registry_endpoint: *prometheus_registry_endpoint
      prometheus_image_name: *prometheus_image_name
      prometheus_image_tag: *prometheus_image_tag
      prometheus_image: *prometheus_image
      prometheus_port: *prometheus_port
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      prometheus_k8s_node_port: *prometheus_k8s_node_port
      prometheus_k8s_fs_group: *prometheus_k8s_fs_group
      prometheus_container_config_dir: *prometheus_container_config_dir
      prometheus_container_data_dir: *prometheus_container_data_dir
      prometheus_config_file: *prometheus_config_file
      prometheus_web_config_file: *prometheus_web_config_file
      prometheus_use_tls: *prometheus_use_tls
      prometheus_k8s_wait_timeout: *prometheus_k8s_wait_timeout
      k8s_namespace: *k8s_namespace
      k8s_storage_size: *k8s_storage_size
      k8s_image_pull_secret: *k8s_image_pull_secret
      k8s_storage_class: *k8s_storage_class
      k8s_readiness_probe_initial_delay_seconds: *k8s_readiness_probe_initial_delay_seconds
      k8s_readiness_probe_period_seconds: *k8s_readiness_probe_period_seconds
      k8s_readiness_probe_timeout_seconds: *k8s_readiness_probe_timeout_seconds
      k8s_readiness_probe_failure_threshold: *k8s_readiness_probe_failure_threshold
      k8s_liveness_probe_initial_delay_seconds: *k8s_liveness_probe_initial_delay_seconds
      k8s_liveness_probe_period_seconds: *k8s_liveness_probe_period_seconds
      k8s_liveness_probe_timeout_seconds: *k8s_liveness_probe_timeout_seconds
      k8s_liveness_probe_failure_threshold: *k8s_liveness_probe_failure_threshold
      prometheus_k8s_loadbalancer_expose_http_port: *prometheus_k8s_loadbalancer_expose_http_port

  k8s/ping:
    short_description: Check that the Prometheus Kubernetes service is reachable
    description:
      - Probes configured Kubernetes NodePort values and LoadBalancer-exposed service ports for external reachability.
    options:
      prometheus_port: *prometheus_port
      prometheus_k8s_node_port: *prometheus_k8s_node_port
      prometheus_k8s_loadbalancer_expose_http_port: *prometheus_k8s_loadbalancer_expose_http_port

  stop:
    short_description: Stop the Prometheus container deployment
    description:
      - Stops Prometheus when the container deployment path is enabled.
    options:
      prometheus_use_container: *prometheus_use_container

  container/stop:
    short_description: Stop the Prometheus container
    description:
      - Stops the running Prometheus container through the shared container role.
    options:
      prometheus_container_name: *prometheus_container_name

  teardown:
    short_description: Remove the Prometheus deployment
    description:
      - Removes the active Prometheus container or Kubernetes workload and then deletes its data.
    options:
      prometheus_use_container: *prometheus_use_container
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  container/rm:
    short_description: Remove the Prometheus container
    description:
      - Removes the Prometheus container through the shared container role.
    options:
      prometheus_container_name: *prometheus_container_name

  k8s/rm:
    short_description: Remove Prometheus Kubernetes resources
    description:
      - Deletes the Prometheus StatefulSet and both Services from Kubernetes.
    options:
      k8s_namespace: *k8s_namespace
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      prometheus_k8s_node_port: *prometheus_k8s_node_port
      prometheus_k8s_loadbalancer_expose_http_port: *prometheus_k8s_loadbalancer_expose_http_port

  data/rm:
    short_description: Remove Prometheus data
    description:
      - Deletes Prometheus data from the active deployment mode.
    options:
      remote_data_dir: *remote_data_dir
      prometheus_remote_data_dir: *prometheus_remote_data_dir
      prometheus_use_container: *prometheus_use_container
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  k8s/data/rm:
    short_description: Remove the Prometheus data PVC
    description:
      - Deletes the PersistentVolumeClaim created for the Prometheus StatefulSet.
    options:
      k8s_namespace: *k8s_namespace
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of

  wipe:
    short_description: Remove all Prometheus data and configuration
    description:
      - Tears down Prometheus and removes its data, TLS material, and generated configuration files.
    options: {}

  crypto/setup:
    short_description: Generate Prometheus TLS materials
    description:
      - Generates TLS assets for Prometheus and applies the Kubernetes Secret when Kubernetes mode is enabled.
    options:
      prometheus_use_tls: *prometheus_use_tls
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  crypto/openssl/generate_cert:
    short_description: Generate a self-signed TLS certificate for Prometheus
    description:
      - Delegates certificate creation to the shared OpenSSL role using Prometheus-specific output paths.
    options:
      organization: *organization
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_tls_private_key_file: *prometheus_tls_private_key_file
      prometheus_tls_cert_file: *prometheus_tls_cert_file
      prometheus_openshift_route: *prometheus_openshift_route

  k8s/crypto/transfer:
    short_description: Apply the Prometheus TLS Secret on Kubernetes
    description:
      - Creates or updates the Kubernetes Secret that stores the Prometheus TLS server keypair.
    options:
      k8s_namespace: *k8s_namespace
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_tls_private_key_file: *prometheus_tls_private_key_file
      prometheus_tls_cert_file: *prometheus_tls_cert_file
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      prometheus_use_tls: *prometheus_use_tls

  crypto/fetch:
    short_description: Fetch Prometheus TLS certificates
    description:
      - Fetches the generated Prometheus TLS certificate material to the control node.
    options:
      fetched_artifacts_dir: *fetched_artifacts_dir
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_use_tls: *prometheus_use_tls

  crypto/rm:
    short_description: Remove Prometheus TLS materials
    description:
      - Deletes the Prometheus TLS directory and removes the Kubernetes Secret when Kubernetes mode is enabled.
    options:
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_use_tls: *prometheus_use_tls
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  k8s/crypto/rm:
    short_description: Remove the Prometheus TLS Secret
    description:
      - Deletes the Kubernetes Secret that stores the Prometheus TLS server keypair.
    options:
      k8s_namespace: *k8s_namespace
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of

  config/transfer:
    short_description: Transfer Prometheus configuration files
    description:
      - Renders the main scrape configuration and supporting files on the remote host, including scrape target lists and TLS client settings.
      - Applies the Kubernetes ConfigMap when Kubernetes mode is enabled.
    options:
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_config_file: *prometheus_config_file
      prometheus_web_config_file: *prometheus_web_config_file
      prometheus_http_config_file: *prometheus_http_config_file
      prometheus_scrape_interval: *prometheus_scrape_interval
      prometheus_container_config_dir: *prometheus_container_config_dir
      prometheus_tls_private_key_file: *prometheus_tls_private_key_file
      prometheus_tls_cert_file: *prometheus_tls_cert_file
      prometheus_scrape_services: *prometheus_scrape_services
      prometheus_use_tls: *prometheus_use_tls
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  k8s/config/transfer:
    short_description: Apply the Prometheus ConfigMap on Kubernetes
    description:
      - Creates or updates the ConfigMap that carries the rendered Prometheus configuration and optional TLS CA files.
    options:
      k8s_namespace: *k8s_namespace
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_config_file: *prometheus_config_file
      prometheus_web_config_file: *prometheus_web_config_file
      prometheus_http_config_file: *prometheus_http_config_file
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      prometheus_scrape_services: *prometheus_scrape_services
      prometheus_use_tls: *prometheus_use_tls

  config/rm:
    short_description: Remove Prometheus configuration files
    description:
      - Deletes the remote Prometheus configuration directory and optionally removes the Kubernetes ConfigMap.
    options:
      remote_config_dir: *remote_config_dir
      prometheus_remote_config_dir: *prometheus_remote_config_dir
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  k8s/config/rm:
    short_description: Remove the Prometheus ConfigMap
    description:
      - Deletes the Kubernetes ConfigMap that stores Prometheus configuration.
    options:
      k8s_namespace: *k8s_namespace
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of

  fetch_logs:
    short_description: Fetch Prometheus logs from the active deployment mode
    description:
      - Collects Prometheus logs from either the container deployment or the Kubernetes pod.
    options:
      prometheus_use_container: *prometheus_use_container
      prometheus_use_k8s: *prometheus_use_k8s
      prometheus_use_openshift: *prometheus_use_openshift

  container/fetch_logs:
    short_description: Fetch Prometheus container logs
    description:
      - Collects logs for the Prometheus container through the shared container role.
    options:
      prometheus_container_name: *prometheus_container_name

  k8s/fetch_logs:
    short_description: Fetch Prometheus pod logs
    description:
      - Collects logs for the Prometheus pod through the shared Kubernetes role.
    options:
      k8s_namespace: *k8s_namespace
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of

  openshift/start:
    short_description: Start the OpenShift deployment
    description:
      - Reuses the Kubernetes workload flow and manages OpenShift Routes for configured HTTP-capable ports.
    options:
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      prometheus_use_tls: *prometheus_use_tls
      k8s_namespace: *k8s_namespace
      prometheus_openshift_route: *prometheus_openshift_route

  openshift/ping:
    short_description: Check the OpenShift deployment
    description:
      - Checks configured OpenShift Routes and reuses the Kubernetes service ping flow.
    options:
      prometheus_use_tls: *prometheus_use_tls
      prometheus_openshift_route: *prometheus_openshift_route

  openshift/rm:
    short_description: Remove the OpenShift deployment
    description:
      - Reuses the Kubernetes workload flow and manages OpenShift Routes for configured HTTP-capable ports.
    options:
      prometheus_k8s_resource_name: *prometheus_k8s_resource_name
      prometheus_k8s_part_of: *prometheus_k8s_part_of
      k8s_namespace: *k8s_namespace
      prometheus_openshift_route: *prometheus_openshift_route
