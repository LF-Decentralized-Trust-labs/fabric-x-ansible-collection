---
argument_specs:
  role-options:
    short_description: Shared option catalog for cryptogen role entry points
    options:
      config_build_dir: &config_build_dir
        type: path
        required: false
        description:
          - "Sets the base directory for generated configuration artifacts. Example: C(/opt/hyperledger/fabricx/build)."
      cryptogen_use_bin: &cryptogen_use_bin
        type: bool
        required: false
        default: false
        description:
          - "Selects binary mode when true; otherwise container mode is used."
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: false
        default: "{{ config_build_dir }}/cryptogen-artifacts"
        description:
          - "Sets the directory that stores cryptogen inputs and generated files."
      cryptogen_output_dir: &cryptogen_output_dir
        type: path
        required: false
        default: "{{ cryptogen_artifacts_dir }}/crypto"
        description:
          - "Sets the directory where cryptogen writes generated crypto material."
      cryptogen_registry_endpoint: &cryptogen_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'CRYPTOGEN_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - "Sets the registry used for the cryptogen container image."
      cryptogen_image_name: &cryptogen_image_name
        type: str
        required: false
        default: "fabric-x-tools"
        description:
          - "Sets the cryptogen image name."
      cryptogen_image_tag: &cryptogen_image_tag
        type: str
        required: false
        default: "0.0.15"
        description:
          - "Sets the cryptogen image tag."
      cryptogen_image: &cryptogen_image
        type: str
        required: false
        default: "{{ cryptogen_registry_endpoint }}/{{ cryptogen_image_name }}:{{ cryptogen_image_tag }}"
        description:
          - "Sets the full cryptogen image reference."
      cryptogen_container_name: &cryptogen_container_name
        type: str
        required: false
        default: "cryptogen"
        description:
          - "Sets the container name used for the cryptogen run."
      cryptogen_container_artifacts_dir: &cryptogen_container_artifacts_dir
        type: path
        required: false
        default: "/tmp/cryptogen-artifacts"
        description:
          - "Sets the container directory that receives the mounted cryptogen inputs."
      cryptogen_container_output_dir: &cryptogen_container_output_dir
        type: path
        required: false
        default: "{{ cryptogen_container_artifacts_dir }}/crypto"
        description:
          - "Sets the container directory where cryptogen writes generated crypto material."
      cryptogen_git_hub_url: &cryptogen_git_hub_url
        type: str
        required: false
        default: "github.com"
        description:
          - "Sets the Git host used for the cryptogen source repository."
      cryptogen_git_repo: &cryptogen_git_repo
        type: str
        required: false
        default: "hyperledger/fabric-x"
        description:
          - "Sets the cryptogen source repository path."
      cryptogen_git_commit: &cryptogen_git_commit
        type: str
        required: false
        default: "v0.0.15"
        description:
          - "Pins the cryptogen source revision."
      cryptogen_source_code_package: &cryptogen_source_code_package
        type: str
        required: false
        default: "tools/cryptogen"
        description:
          - "Sets the Go package path that contains the cryptogen source."
      cryptogen_bin_package: &cryptogen_bin_package
        type: str
        required: false
        default: "{{ cryptogen_git_hub_url }}/{{ cryptogen_git_repo }}/{{ cryptogen_source_code_package }}"
        description:
          - "Sets the Go package path used to install cryptogen."
      cryptogen_bin_name: &cryptogen_bin_name
        type: str
        required: false
        default: "cryptogen"
        description:
          - "Sets the cryptogen executable name."
      cryptogen_orderers_by_org: &cryptogen_orderers_by_org
        type: dict
        required: false
        default: {}
        description:
          - "Maps orderer organization domains to their organization definitions."
      cryptogen_peers_by_org: &cryptogen_peers_by_org
        type: dict
        required: false
        default: {}
        description:
          - "Maps peer organization domains to their organization definitions."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Sets the destination directory for fetched MSP folders. Example: C(/opt/hyperledger/fabricx/build/fetched-artifacts)."
      cli_bin_dir: &cli_bin_dir
        type: path
        required: true
        description:
          - "Sets the directory that receives the cryptogen binary. Example: C(/opt/hyperledger/fabricx/bin)."
      cryptogen_config_file: &cryptogen_config_file
        type: str
        required: false
        default: "crypto-config.yaml"
        description:
          - "Sets the cryptogen configuration filename."

  start:
    short_description: Select the cryptogen execution mode
    description:
      - "Choose whether cryptogen runs as a binary or in a container."
      - "This dispatcher selects either the C(bin/start) or C(container/start) entry point so the role can render configuration and generate crypto material in the requested execution mode."
    options:
      cryptogen_use_bin: *cryptogen_use_bin

  fetch:
    short_description: Fetch generated MSP directories
    description:
      - "Copy generated MSP directories for orderer and peer organizations into the fetched artifacts directory."
      - "The role mirrors each organization MSP subtree from C(cryptogen_output_dir) into C({{ fetched_artifacts_dir }}/crypto/ordererOrganizations) and C({{ fetched_artifacts_dir }}/crypto/peerOrganizations)."
      - "Run this after crypto material has already been generated so downstream roles can consume the fetched artifacts."
    options:
      config_build_dir: *config_build_dir
      fetched_artifacts_dir: *fetched_artifacts_dir
      cryptogen_output_dir: *cryptogen_output_dir
      cryptogen_orderers_by_org: *cryptogen_orderers_by_org
      cryptogen_peers_by_org: *cryptogen_peers_by_org

  config/build:
    short_description: Build the cryptogen configuration file
    description:
      - "Render C(crypto-config.yaml) for the cryptogen CLI."
      - "This entry point gathers host IPv4 facts for referenced orderer and peer hosts before templating C({{ cryptogen_artifacts_dir }}/{{ cryptogen_config_file }})."
      - "The rendered file captures the Fabric-X organization layout that cryptogen uses to generate orderer and peer MSP and TLS material."
    options:
      config_build_dir: *config_build_dir
      cryptogen_artifacts_dir: *cryptogen_artifacts_dir
      cryptogen_config_file: *cryptogen_config_file
      cryptogen_orderers_by_org: *cryptogen_orderers_by_org
      cryptogen_peers_by_org: *cryptogen_peers_by_org

  container/start:
    short_description: Generate crypto material with a container
    description:
      - "Clean the output directory and run the cryptogen CLI in a container."
      - "The container mounts the rendered configuration from C({{ cryptogen_artifacts_dir }}) and writes generated material to C({{ cryptogen_output_dir }})."
      - "This entry point delegates container startup to C(hyperledger.fabricx.container)."
    options:
      config_build_dir: *config_build_dir
      cryptogen_artifacts_dir: *cryptogen_artifacts_dir
      cryptogen_output_dir: *cryptogen_output_dir
      cryptogen_registry_endpoint: *cryptogen_registry_endpoint
      cryptogen_image_name: *cryptogen_image_name
      cryptogen_image_tag: *cryptogen_image_tag
      cryptogen_image: *cryptogen_image
      cryptogen_container_name: *cryptogen_container_name
      cryptogen_bin_name: *cryptogen_bin_name
      cryptogen_container_artifacts_dir: *cryptogen_container_artifacts_dir
      cryptogen_container_output_dir: *cryptogen_container_output_dir
      cryptogen_config_file: *cryptogen_config_file

  bin/install:
    short_description: Install the cryptogen binary
    description:
      - "Install the cryptogen binary through C(hyperledger.fabricx.bin)."
      - "This entry point is intended for binary-mode deployments that execute cryptogen on the target host."
    options:
      cli_bin_dir: *cli_bin_dir
      cryptogen_bin_name: *cryptogen_bin_name
      cryptogen_git_hub_url: *cryptogen_git_hub_url
      cryptogen_git_repo: *cryptogen_git_repo
      cryptogen_git_commit: *cryptogen_git_commit
      cryptogen_source_code_package: *cryptogen_source_code_package
      cryptogen_bin_package: *cryptogen_bin_package

  bin/build:
    short_description: Build the cryptogen binary from source
    description:
      - "Build the cryptogen binary from the configured source repository through C(hyperledger.fabricx.bin)."
      - "This entry point builds on the control node and writes the binary into C(cli_bin_dir) for later reuse by the binary start path."
    options:
      cli_bin_dir: *cli_bin_dir
      cryptogen_bin_name: *cryptogen_bin_name
      cryptogen_git_hub_url: *cryptogen_git_hub_url
      cryptogen_git_repo: *cryptogen_git_repo
      cryptogen_git_commit: *cryptogen_git_commit
      cryptogen_source_code_package: *cryptogen_source_code_package

  bin/start:
    short_description: Generate crypto material with the binary
    description:
      - "Clean the output directory and run the cryptogen binary on the target host."
      - "The binary consumes the rendered configuration from C({{ cryptogen_artifacts_dir }}) and writes generated material to C({{ cryptogen_output_dir }})."
      - "This entry point delegates command execution to C(hyperledger.fabricx.bin)."
    options:
      cli_bin_dir: *cli_bin_dir
      config_build_dir: *config_build_dir
      cryptogen_artifacts_dir: *cryptogen_artifacts_dir
      cryptogen_output_dir: *cryptogen_output_dir
      cryptogen_bin_name: *cryptogen_bin_name
      cryptogen_config_file: *cryptogen_config_file
