- name: Build {{ cryptogen_bin_name }}
  vars:
    # Git vars
    git_uri: "{{ cryptogen_git_uri }}"
    git_commit: "{{ cryptogen_git_commit }}"
    # Bin vars
    bin_name: "{{ cryptogen_bin_name }}"
    bin_build_on_control_node: true
    bin_dir: "{{ cli_bin_dir }}"
    # Go vars
    go_source_code_package: "{{ cryptogen_source_code_package }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/build
