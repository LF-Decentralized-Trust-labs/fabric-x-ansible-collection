- name: Install {{ cryptogen_bin_name }}
  vars:
    bin_dir: "{{ cli_bin_dir }}"
    go_package: "{{ cryptogen_bin_package }}@{{ cryptogen_git_commit }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/install
