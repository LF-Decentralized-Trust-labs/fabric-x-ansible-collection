# =========================
# MSP certs
# =========================
- name: Ensure the orderer organizations directories exist
  ansible.builtin.file:
    path: "{{ fetched_artifacts_dir }}/crypto/ordererOrganizations/{{ current_orderer_org_info.domain }}"
    state: directory
    mode: "0o755"
  loop: "{{ cryptogen_orderers_by_org.values() | list }}"
  loop_control:
    loop_var: current_orderer_org_info
    label: "{{ current_orderer_org_info.domain }}"

- name: Fetch orderer organization MSP directory
  ansible.posix.synchronize:
    src: "{{ cryptogen_output_dir }}/ordererOrganizations/{{ current_orderer_org_info.domain }}/msp"
    dest: "{{ fetched_artifacts_dir }}/crypto/ordererOrganizations/{{ current_orderer_org_info.domain }}"
  loop: "{{ cryptogen_orderers_by_org.values() | list }}"
  loop_control:
    loop_var: current_orderer_org_info
    label: "{{ current_orderer_org_info.domain }}"

- name: Ensure the peer organizations directories exist
  ansible.builtin.file:
    path: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ current_peer_org_info.domain }}"
    state: directory
    mode: "0o755"
  loop: "{{ cryptogen_peers_by_org.values() | list }}"
  loop_control:
    loop_var: current_peer_org_info
    label: "{{ current_peer_org_info.domain }}"

- name: Fetch peer organization MSP directory
  ansible.posix.synchronize:
    src: "{{ cryptogen_output_dir }}/peerOrganizations/{{ current_peer_org_info.domain }}/msp"
    dest: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ current_peer_org_info.domain }}"
  loop: "{{ cryptogen_peers_by_org.values() | list }}"
  loop_control:
    loop_var: current_peer_org_info
    label: "{{ current_peer_org_info.domain }}"
