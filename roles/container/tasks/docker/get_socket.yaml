- name: Get Docker context information
  community.docker.docker_context_info:
    only_current: true
  register: container_docker_context_info_output

- name: Set Docker Unix socket from context information
  vars:
    container_docker_socket: "{{ container_docker_context_info_output.contexts[0].config.docker_host | default('') }}"
  ansible.builtin.set_fact:
    container_socket: "{{ container_docker_socket }}"
    container_socket_path: "{{ container_docker_socket | regex_replace('^unix://', '') }}"
  when:
    - container_docker_socket | regex_search('^unix://') is not none

- name: Set Docker TCP endpoint from context information
  vars:
    container_docker_socket: "{{ container_docker_context_info_output.contexts[0].config.docker_host | default('') }}"
  ansible.builtin.set_fact:
    container_socket: "{{ container_docker_socket }}"
  when:
    - container_docker_socket | regex_search('^tcp://') is not none
