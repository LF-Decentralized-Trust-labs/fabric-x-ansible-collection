- name: Ensure Docker volume exists
  ansible.builtin.file:
    path: "{{ container_volume_path }}"
    mode: "{{ container_volume_mode }}"
    state: "{{ container_volume_type }}"
    recurse: "{{ recurse | default(false) }}"

- name: Set Docker volume permissions on Linux for rootful user
  ansible.builtin.file:
    path: "{{ container_volume_path }}"
    mode: "{{ container_volume_mode }}"
    owner: "{{ container_volume_uid }}"
    group: "{{ container_volume_gid }}"
    state: "{{ container_volume_type }}"
    recurse: "{{ recurse | default(false) }}"
  when:
    - not container_on_mac
    - container_host_user_is_root
    - container_volume_uid is defined
    - container_volume_gid is defined

# For Docker, we could be in trouble creating
# the volume with the right permissions (e.g. when the user is not root).
# To solve it, we use `docker-unshare`, which works as an implementation
# of `podman-unshare`, but using alpine as base image.
- name: Set Docker volume "uid" and "gid" on Linux for rootless user
  community.docker.docker_container:
    name: "docker-unshare-chown-{{ container_name | default(999999 | random) }}"
    image: docker.io/library/alpine:3.18
    command:
      - sh
      - -c
      - |
        current=$(stat -c "%u:%g" /volume)
        target="{{ container_volume_uid }}:{{ container_volume_gid }}"
        if [ "$current" != "$target" ]; then
          chown \
          {% if recurse | default(false) %}-R{% endif %} \
          {{ container_volume_uid }}:{{ container_volume_gid }} \
          /volume
          exit 10
        fi
        exit 0
    volumes:
      - "{{ container_volume_path }}:/volume:z"
    detach: false
    auto_remove: true
    state: started
  register: docker_unshare_chown_result
  changed_when: docker_unshare_chown_result.status == 10
  failed_when: docker_unshare_chown_result.status not in [0, 10]
  when:
    - not container_on_mac
    - not container_host_user_is_root
    - container_volume_uid is defined
    - container_volume_gid is defined

- name: Set Docker volume permissions on Linux for rootless user
  community.docker.docker_container:
    name: "docker-unshare-chmod-{{ container_name | default(999999 | random) }}"
    image: docker.io/library/alpine:3.18
    command:
      - sh
      - -c
      - |
        current=$(stat -c "%a" /volume)
        target="{{ container_volume_mode | regex_replace('^0o?', '') }}"
        if [ "$current" != "$target" ]; then
          chmod \
          {% if recurse | default(false) %}-R{% endif %} \
          $target \
          /volume
          exit 10
        fi
        exit 0
    volumes:
      - "{{ container_volume_path }}:/volume:z"
    detach: false
    auto_remove: true
    state: started
  register: docker_unshare_chmod_result
  changed_when: docker_unshare_chmod_result.status == 10
  failed_when: docker_unshare_chmod_result.status not in [0, 10]
  when:
    - not container_on_mac
    - not container_host_user_is_root
    - container_volume_mode is defined

- name: Set Docker volume "uid" and "gid" on macOS for rootless users
  community.docker.docker_container:
    name: "docker-unshare-chown-{{ container_name | default(999999 | random) }}"
    image: docker.io/library/alpine:3.18
    command:
      - sh
      - -c
      - |
        current=$(stat -c "%u:%g" /volume)
        target="{{ container_volume_uid }}:{{ container_volume_gid }}"
        if [ "$current" != "$target" ]; then
          chown \
          {% if recurse | default(false) %}-R{% endif %} \
          $target \
          /volume
          exit 10
        fi
        exit 0
    volumes:
      - "{{ container_volume_path }}:/volume"
    detach: false
    auto_remove: true
    state: started
  register: docker_unshare_chown_result_mac
  changed_when: docker_unshare_chown_result_mac.status == 10
  failed_when: docker_unshare_chown_result_mac.status not in [0, 10]
  when:
    - container_on_mac
    - container_volume_uid is defined
    - container_volume_gid is defined

- name: Set Docker volume permissions on macOS for rootless users
  community.docker.docker_container:
    name: "docker-unshare-chmod-{{ container_name | default(999999 | random) }}"
    image: docker.io/library/alpine:3.18
    command:
      - sh
      - -c
      - |
        current=$(stat -c "%a" /volume)
        target="{{ container_volume_mode | regex_replace('^0o?', '') }}"
        if [ "$current" != "$target" ]; then
          chmod \
          {% if recurse | default(false) %}-R{% endif %} \
          {{ container_volume_mode | regex_replace('^0o', '0') }} \
          /volume
          exit 10
        fi
        exit 0
    volumes:
      - "{{ container_volume_path }}:/volume"
    detach: false
    auto_remove: true
    state: started
  register: docker_unshare_chmod_result_mac
  changed_when: docker_unshare_chmod_result_mac.status == 10
  failed_when: docker_unshare_chmod_result_mac.status not in [0, 10]
  when:
    - container_on_mac
    - container_volume_mode is defined
