# =========================
# Go Build Settings
# =========================
# Enable CGO for cross-compilation (requires a C compiler)
go_cgo_enabled: false
# Host to map platform from (used by map_platform task)
go_host_to_map: "{{ ansible_host }}"
# Mapped GOOS value (set by map_platform task)
go_os: ""
# Mapped GOARCH value (set by map_platform task)
go_arch: ""

# =========================
# Locations/Paths
# =========================
# Output directory for built/installed binaries
go_output_dir: "{{ lookup('env', 'GOBIN') | default(lookup('env', 'GOPATH') + '/bin') }}"
# Source code path (required for build task)
go_source_code_path: "{{ lookup('env', 'GOPATH') }}/src/{{ go_output_name }}"
