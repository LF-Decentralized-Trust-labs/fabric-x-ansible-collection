- name: Create the unsigned ConfigUpdateEnvelope
  vars:
    configtxlator_artifacts_dir: "{{ fabric_reconfig_artifacts_dir }}"
    configtxlator_config_update_file: config_update.pb
    configtxlator_config_update_envelope_file: unsigned_config_update_envelope.pb
  ansible.builtin.include_role:
    name: hyperledger.fabricx.configtxlator
    tasks_from: create_config_update_envelope

- name: Report the unsigned envelope artifact ready for handoff
  ansible.builtin.debug:
    msg: >-
      Unsigned ConfigUpdateEnvelope written to {{ fabric_reconfig_artifacts_dir }}/unsigned_config_update_envelope.pb.
      Hand this file to each required signer ({{ fabric_reconfig_required_signers }}) to run the `sign` entry point against.
