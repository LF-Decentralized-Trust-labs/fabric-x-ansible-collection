- name: Resolve each required signer's ConfigSignature file path
  ansible.builtin.set_fact:
    fabric_reconfig_signature_files: >-
      {{
        fabric_reconfig_signature_files | default([]) +
        [fabric_reconfig_artifacts_dir + '/signature_party' ~ item ~ '.pb']
      }}
  loop: "{{ fabric_reconfig_required_signers }}"

- name: Assert every required signature file was collected
  ansible.builtin.stat:
    path: "{{ item }}"
  register: fabric_reconfig_signature_stat
  loop: "{{ fabric_reconfig_signature_files }}"
  failed_when: not fabric_reconfig_signature_stat.stat.exists

- name: Merge the collected ConfigSignatures into the ConfigUpdateEnvelope
  vars:
    fx_reconfig_client_unsigned_envelope_file: "{{ fabric_reconfig_artifacts_dir }}/unsigned_config_update_envelope.pb"
    fx_reconfig_client_signature_files: "{{ fabric_reconfig_signature_files }}"
    fx_reconfig_client_merge_signatures_output: "{{ fabric_reconfig_artifacts_dir }}/signed_config_update_envelope.pb"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fx_reconfig_client
    tasks_from: merge_signatures
