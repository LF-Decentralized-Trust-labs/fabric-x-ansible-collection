- name: Resolve the signer identity from party number, unless explicitly overridden
  when: fabric_reconfig_signer_cert == ""
  vars:
    fabric_reconfig_identity_party: "{{ fabric_reconfig_signing_party }}"
  ansible.builtin.include_tasks: resolve_identity.yaml

- name: Determine the effective signer identity
  ansible.builtin.set_fact:
    fabric_reconfig_resolved_signer_mspid: "{{ fabric_reconfig_signer_mspid if fabric_reconfig_signer_cert != '' else fabric_reconfig_identity_mspid }}"
    fabric_reconfig_resolved_signer_cert: "{{ fabric_reconfig_signer_cert if fabric_reconfig_signer_cert != '' else fabric_reconfig_identity_cert }}"
    fabric_reconfig_resolved_signer_key: "{{ fabric_reconfig_signer_key if fabric_reconfig_signer_cert != '' else fabric_reconfig_identity_key }}"

- name: Extract the ConfigUpdate bytes from the unsigned ConfigUpdateEnvelope
  vars:
    fx_reconfig_client_config_update_envelope_input: "{{ fabric_reconfig_artifacts_dir }}/unsigned_config_update_envelope.pb"
    fx_reconfig_client_extract_config_update_output: "{{ fabric_reconfig_artifacts_dir }}/config_update.pb"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fx_reconfig_client
    tasks_from: extract_config_update

- name: Sign the ConfigUpdate
  vars:
    fx_reconfig_client_config_update_file: "{{ fabric_reconfig_artifacts_dir }}/config_update.pb"
    fx_reconfig_client_mspid: "{{ fabric_reconfig_resolved_signer_mspid }}"
    fx_reconfig_client_cert: "{{ fabric_reconfig_resolved_signer_cert }}"
    fx_reconfig_client_key: "{{ fabric_reconfig_resolved_signer_key }}"
    fx_reconfig_client_sign_config_update_output: "{{ fabric_reconfig_artifacts_dir }}/signature_party{{ fabric_reconfig_signing_party }}.pb"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fx_reconfig_client
    tasks_from: sign_config_update

- name: Report the produced signature ready for collection
  ansible.builtin.debug:
    msg: >-
      ConfigSignature for party {{ fabric_reconfig_signing_party }} written to
      {{ fabric_reconfig_artifacts_dir }}/signature_party{{ fabric_reconfig_signing_party }}.pb.
      Send this file back for collection before running `submit`.
