- name: Resolve the submitting party's Router endpoint from inventory
  vars:
    fabric_reconfig_router_hostvars: >-
      {{
        groups['fabric_x_orderers']
        | map('extract', hostvars)
        | selectattr('orderer_group', 'defined')
        | selectattr('orderer_group', '==', fabric_reconfig_submitting_party | int)
        | selectattr('orderer_component_type', '==', 'router')
        | first
      }}
  ansible.builtin.set_fact:
    fabric_reconfig_submitting_router_endpoint: "{{ fabric_reconfig_router_hostvars.ansible_host }}:{{ fabric_reconfig_router_hostvars.orderer_rpc_port }}"

# BLOCKED: no CLI or script exists yet from the ordering team to wrap/sign the final Envelope
# or to submit it. May Buzaglo confirmed this is on their side (same gap noted in sign.yaml).
# Everything up to this point (resolving which Router to submit to) is ours; this step is a
# deliberate stop, not a bug.
- name: "BLOCKED: wrap, sign, and submit the final Envelope (needs an ordering-team CLI)"
  ansible.builtin.fail:
    msg: >-
      No CLI/script exists yet from the ordering team to build or submit the final signed
      Envelope. This step is ready to call one once it exists: wrap
      {{ fabric_reconfig_artifacts_dir }}/signed_config_update_envelope.pb into a common.Envelope
      (header type CONFIG_UPDATE, channel {{ fabric_reconfig_channel_id }}), signed by submitting
      identity {{ fabric_reconfig_submitter_mspid }} (cert {{ fabric_reconfig_submitter_cert }},
      key {{ fabric_reconfig_submitter_key }}), then submit it via Broadcast to
      {{ fabric_reconfig_submitting_router_endpoint }}
      {%- if fabric_reconfig_tls_ca %}(TLS CA {{ fabric_reconfig_tls_ca }}){% else %}(plaintext){% endif %}
      (party {{ fabric_reconfig_submitting_party }}'s own Router -- to be confirmed with the
      ordering team; inferred from BroadcastClient.SendTxTo in their test harness, not from a doc).
