- name: Ensure the reconfig artifacts directory exists
  ansible.builtin.file:
    path: "{{ fabric_reconfig_artifacts_dir }}"
    state: directory
    mode: "0o755"

- name: Resolve the fetch-source Assembler endpoint from inventory
  vars:
    fabric_reconfig_fetch_party_resolved: "{{ fabric_reconfig_fetch_party | default(fabric_reconfig_target_party) | int }}"
    fabric_reconfig_fetch_assembler_hostvars: >-
      {{
        groups['fabric_x_orderers']
        | map('extract', hostvars)
        | selectattr('orderer_group', 'defined')
        | selectattr('orderer_group', '==', fabric_reconfig_fetch_party_resolved)
        | selectattr('orderer_component_type', '==', 'assembler')
        | first
      }}
  ansible.builtin.set_fact:
    fabric_reconfig_fetch_assembler_endpoint: "{{ fabric_reconfig_fetch_assembler_hostvars.ansible_host }}:{{ fabric_reconfig_fetch_assembler_hostvars.orderer_rpc_port }}"

# BLOCKED: no CLI or script exists yet from the ordering (Fabric-X-Orderer) team to fetch a
# channel config block. May Buzaglo confirmed this is on their side: "Some of the steps we
# currently perform in our Go-based tests, such as retrieving the latest configuration block
# ... should probably be converted into scripts or CLI commands ... Currently, we do not have
# such scripts or CLI commands." Everything up to this point (resolving which Assembler to talk
# to) is ours; this step is a deliberate stop, not a bug.
- name: "BLOCKED: fetch the current config block from the Assembler (needs an ordering-team CLI)"
  ansible.builtin.fail:
    msg: >-
      No CLI/script exists yet from the ordering team to fetch a channel config block.
      This step is ready to call one once it exists: pull the newest block from Assembler
      {{ fabric_reconfig_fetch_assembler_endpoint }} (channel {{ fabric_reconfig_channel_id }})
      via the Deliver API, signed by reader identity {{ fabric_reconfig_reader_mspid }}
      (cert {{ fabric_reconfig_reader_cert }}, key {{ fabric_reconfig_reader_key }}
      {%- if fabric_reconfig_tls_ca %}, TLS CA {{ fabric_reconfig_tls_ca }}{% else %}, plaintext{% endif %}),
      following its LAST_CONFIG metadata pointer if the newest block is not itself the config
      block, and write the result to {{ fabric_reconfig_artifacts_dir }}/current_config_block.pb
      for configtxlator to decode.
