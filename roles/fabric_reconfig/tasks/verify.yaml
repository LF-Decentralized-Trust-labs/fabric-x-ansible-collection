- name: Resolve the reader identity from party number, unless explicitly overridden
  when: fabric_reconfig_reader_cert == ""
  vars:
    fabric_reconfig_identity_party: "{{ fabric_reconfig_reader_party | default(fabric_reconfig_target_party) }}"
  ansible.builtin.include_tasks: resolve_identity.yaml

- name: Determine the effective reader identity
  ansible.builtin.set_fact:
    fabric_reconfig_resolved_reader_mspid: "{{ fabric_reconfig_reader_mspid if fabric_reconfig_reader_cert != '' else fabric_reconfig_identity_mspid }}"
    fabric_reconfig_resolved_reader_cert: "{{ fabric_reconfig_reader_cert if fabric_reconfig_reader_cert != '' else fabric_reconfig_identity_cert }}"
    fabric_reconfig_resolved_reader_key: "{{ fabric_reconfig_reader_key if fabric_reconfig_reader_cert != '' else fabric_reconfig_identity_key }}"
    fabric_reconfig_resolved_reader_tls_client_cert: "{{ fabric_reconfig_reader_tls_client_cert if fabric_reconfig_reader_cert != '' else fabric_reconfig_identity_tls_client_cert }}"
    fabric_reconfig_resolved_reader_tls_client_key: "{{ fabric_reconfig_reader_tls_client_key if fabric_reconfig_reader_cert != '' else fabric_reconfig_identity_tls_client_key }}"

- name: Resolve the TLS CA bundle, unless explicitly overridden
  ansible.builtin.include_tasks: resolve_tls_ca.yaml

- name: Determine the effective TLS CA bundle
  ansible.builtin.set_fact:
    fabric_reconfig_resolved_tls_ca: "{{ fabric_reconfig_resolved_tls_ca | default(fabric_reconfig_tls_ca) }}"

- name: Resolve the verify-fetch Assembler endpoint from inventory
  vars:
    fabric_reconfig_fetch_party_resolved: "{{ fabric_reconfig_fetch_party | default(fabric_reconfig_target_party) | int }}"
    fabric_reconfig_verify_assembler_hostvars: >-
      {{
        groups['fabric_x_orderers']
        | map('extract', hostvars)
        | selectattr('orderer_group', 'defined')
        | selectattr('orderer_group', '==', fabric_reconfig_fetch_party_resolved)
        | selectattr('orderer_component_type', '==', 'assembler')
        | first
      }}
  ansible.builtin.set_fact:
    fabric_reconfig_verify_assembler_endpoint: "{{ fabric_reconfig_verify_assembler_hostvars.ansible_host }}:{{ fabric_reconfig_verify_assembler_hostvars.orderer_rpc_port }}"

- name: Re-fetch the config after submission
  vars:
    fx_reconfig_client_assembler_endpoint: "{{ fabric_reconfig_verify_assembler_endpoint }}"
    fx_reconfig_client_channel_id: "{{ fabric_reconfig_channel_id }}"
    fx_reconfig_client_mspid: "{{ fabric_reconfig_resolved_reader_mspid }}"
    fx_reconfig_client_cert: "{{ fabric_reconfig_resolved_reader_cert }}"
    fx_reconfig_client_key: "{{ fabric_reconfig_resolved_reader_key }}"
    fx_reconfig_client_tls_ca: "{{ fabric_reconfig_resolved_tls_ca }}"
    fx_reconfig_client_tls_server_name: "{{ fabric_reconfig_tls_server_name }}"
    fx_reconfig_client_tls_client_cert: "{{ fabric_reconfig_resolved_reader_tls_client_cert }}"
    fx_reconfig_client_tls_client_key: "{{ fabric_reconfig_resolved_reader_tls_client_key }}"
    fx_reconfig_client_fetch_config_output: "{{ fabric_reconfig_artifacts_dir }}/verify_config_block.pb"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.fx_reconfig_client
    tasks_from: fetch_config

- name: Decode the re-fetched config block
  vars:
    configtxlator_artifacts_dir: "{{ fabric_reconfig_artifacts_dir }}"
    configtxlator_proto_type: common.Block
    configtxlator_input_file: verify_config_block.pb
    configtxlator_output_file: verify_config_block.json
  ansible.builtin.include_role:
    name: hyperledger.fabricx.configtxlator
    tasks_from: proto_decode

- name: Confirm the config landed as expected
  vars:
    fabric_reconfig_verify_config: >-
      {{
        (lookup('ansible.builtin.file', fabric_reconfig_artifacts_dir + '/verify_config_block.json') | from_json)
        .data.data[0].payload.data.config
      }}
    fabric_reconfig_desired_config: "{{ lookup('ansible.builtin.file', fabric_reconfig_artifacts_dir + '/desired_config.json') | from_json }}"
  ansible.builtin.assert:
    that:
      - fabric_reconfig_verify_config == fabric_reconfig_desired_config
    fail_msg: >-
      The re-fetched config does not match the desired config for party {{ fabric_reconfig_target_party }}. This
      usually means the submission was rejected (for example a stale config version at the consensus layer)
      rather than a generic error -- re-run from fetch_current_config rather than retrying submit directly.
    success_msg: "Config update for party {{ fabric_reconfig_target_party }} confirmed on-chain."
