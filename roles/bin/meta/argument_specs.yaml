---
argument_specs:

  go/build:
    short_description: Build a Go binary for each target platform
    description:
      - "Clones the source repository, groups target hosts by platform, and builds one binary per unique operating system and architecture combination."
      - "This entry point validates only variables owned by the bin role and does not redeclare git or go role inputs passed through internal includes."
    options:
      bin_build_on_control_node:
        type: bool
        required: false
        default: false
        description:
          - "Controls whether source code is cloned and binaries are built on the control node instead of on the managed host."
      bin_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the output binary name. Example: C(sample-go)."
      bin_source_code_dir:
        type: path
        required: false
        default: "{{ bin_control_source_code_dir if bin_build_on_control_node else bin_remote_source_code_dir }}"
        description:
          - "Defines the source code directory used when invoking the go build role after cloning."
      bin_remote_source_code_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/code"
        description:
          - "Defines the source code directory on the managed host when builds do not run on the control node."
      bin_dir:
        type: path
        required: false
        default: "{{ bin_control_dir if bin_build_on_control_node else bin_remote_dir }}"
        description:
          - "Sets the directory where built binaries are written for each target platform."
      bin_hosts:
        type: list
        elements: str
        required: false
        default:
          - "{{ inventory_hostname }}"
        description:
          - "Lists the hosts whose facts are used to determine the operating system and architecture combinations that must be built."

  go/install:
    short_description: Install a Go binary for each target platform
    description:
      - "Groups target hosts by platform and invokes the go install entry point once per unique operating system and architecture combination."
      - "This entry point validates only bin role inputs and does not redeclare go role variables forwarded internally."
    options:
      bin_dir:
        type: path
        required: false
        default: "{{ bin_control_dir if bin_build_on_control_node else bin_remote_dir }}"
        description:
          - "Sets the directory where installed binaries are placed."
      bin_hosts:
        type: list
        elements: str
        required: false
        default:
          - "{{ inventory_hostname }}"
        description:
          - "Lists the hosts whose facts are used to determine which target platforms must receive an installed binary."

  map_platform_to_host:
    short_description: Map hosts to unique platform keys
    description:
      - "Builds the C(bin_platforms) fact by grouping target hosts that share the same operating system and architecture values."
      - "Host facts for each listed host must already be available before this entry point runs."
    options:
      bin_hosts:
        type: list
        elements: str
        required: false
        default:
          - "{{ inventory_hostname }}"
        description:
          - "Lists the hosts whose gathered facts are grouped into unique platform mappings."

  transfer:
    short_description: Copy a binary to the managed host
    description:
      - "Ensures the target binary directory exists on the managed host and copies the selected binary into it."
      - "The source binary must already exist at the resolved local or control-node path before this entry point runs."
    options:
      bin_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the binary file name to copy. Example: C(sample-go)."
      bin_dir:
        type: path
        required: false
        default: "{{ bin_control_dir if bin_build_on_control_node else bin_remote_dir }}"
        description:
          - "Sets the source directory containing the binary file to transfer."
      bin_remote_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/bin"
        description:
          - "Sets the destination directory on the managed host where the binary is copied."

  start:
    short_description: Start a binary process
    description:
      - "Builds the runtime command, optionally redirects logs, and starts the binary either in tmux or directly in the shell."
      - "Set C(bin_command) to the executable command to run. Set C(bin_wait_port) only when C(bin_wait_until_running) is true."
    options:
      bin_command:
        type: str
        required: true
        description:
          - "Defines the command to execute, relative to C(bin_remote_dir) when that directory is set. Example: C(myservice --config /etc/myservice/config.yaml)."
      bin_env:
        type: dict
        required: false
        default: {}
        description:
          - "Provides environment variables prefixed onto the command line before the binary is started."
      bin_remote_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/bin"
        description:
          - "Sets the directory that is prefixed to C(bin_command) when constructing the executable path."
      bin_collect_logs:
        type: bool
        required: false
        default: true
        description:
          - "Controls whether stdout and stderr are redirected to a log file on the managed host."
      bin_remote_logs_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/logs"
        description:
          - "Sets the directory used for redirected log output when C(bin_collect_logs) is enabled."
      bin_remote_logs_file:
        type: str
        required: false
        default: "logs.txt"
        description:
          - "Sets the log file name used when C(bin_collect_logs) is enabled."
      bin_debug:
        type: bool
        required: false
        default: "{{ lookup('env', 'DEBUG') | bool | default(false) }}"
        description:
          - "Controls whether the assembled command and direct-run output are printed for debugging."
      bin_run_with_tmux:
        type: bool
        required: false
        default: true
        description:
          - "Controls whether the binary is started in a tmux session instead of through a direct shell invocation."
      bin_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the tmux session name when C(bin_run_with_tmux) is enabled. Example: C(sample-go)."
      bin_chdir:
        type: path
        required: false
        default: null
        description:
          - "Sets the working directory used for tmux and direct shell execution when a specific directory is required."
      bin_run_until:
        type: str
        required: false
        default: null
        description:
          - "Defines the until expression used for retrying direct shell execution when C(bin_run_with_tmux) is false."
      bin_run_retries:
        type: int
        required: false
        default: 0
        description:
          - "Sets how many times direct shell execution is retried when C(bin_run_until) is defined."
      bin_run_delay:
        type: int
        required: false
        default: 0
        description:
          - "Sets the delay in seconds between retries for direct shell execution."
      bin_ignore_errors:
        type: bool
        required: false
        default: false
        description:
          - "Controls whether failures from direct shell execution are ignored when C(bin_run_with_tmux) is false."
      bin_wait_until_running:
        type: bool
        required: false
        default: false
        description:
          - "Controls whether the role waits for a TCP port to become reachable after the process starts."
      bin_wait_port:
        type: int
        required: false
        description:
          - "Sets the TCP port checked by the wait step when C(bin_wait_until_running) is true. Example: C(7050)."
      bin_wait_delay:
        type: int
        required: false
        default: 1
        description:
          - "Sets the initial delay in seconds before checking C(bin_wait_port)."
      bin_wait_timeout:
        type: int
        required: false
        default: 60
        description:
          - "Sets the maximum wait time in seconds for C(bin_wait_port) to become reachable."

  stop:
    short_description: Stop a tmux-managed binary process
    description:
      - "Stops the tmux session associated with the binary when tmux-based execution is enabled."
      - "When tmux execution is disabled this entry point performs no action."
    options:
      bin_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the tmux session name to stop. Example: C(sample-go)."
      bin_run_with_tmux:
        type: bool
        required: false
        default: true
        description:
          - "Controls whether the tmux stop operation is executed."

  rm:
    short_description: Remove a binary from the managed host
    description:
      - "Deletes the binary file from the managed host."
    options:
      bin_remote_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/bin"
        description:
          - "Sets the directory containing the binary file to remove."
      bin_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the binary file name to remove. Example: C(sample-go)."

  fetch_logs:
    short_description: Fetch binary log output
    description:
      - "Copies the binary log file from the managed host to the control node without failing when the file is absent."
    options:
      bin_remote_logs_dir:
        type: path
        required: false
        default: "{{ remote_node_dir }}/logs"
        description:
          - "Sets the source directory on the managed host that contains the log file."
      bin_remote_logs_file:
        type: str
        required: false
        default: "logs.txt"
        description:
          - "Sets the source log file name on the managed host."
      bin_fetched_logs_dir:
        type: path
        required: false
        default: "{{ fetched_artifacts_dir }}/{{ bin_name }}"
        description:
          - "Sets the destination directory on the control node where the fetched log file is stored."
      bin_fetched_logs_file:
        type: str
        required: false
        default: "logs.txt"
        description:
          - "Sets the destination file name used for the fetched log output."
