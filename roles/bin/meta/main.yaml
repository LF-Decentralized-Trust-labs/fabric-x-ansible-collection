---
galaxy_info:
  author: IBM
  description: >
    Provides shared helpers for building, installing, transferring, starting, stopping, and collecting logs for Fabric-X binaries.
    The role supports both control-node and managed-host execution paths and groups hosts by platform before invoking the Go helpers.
  license: Apache-2.0
  min_ansible_version: "2.17.0"
  platforms:
    - name: Ubuntu
      versions:
        - all
    - name: EL
      versions:
        - all
    - name: MacOSX
      versions:
        - all

dependencies: []
