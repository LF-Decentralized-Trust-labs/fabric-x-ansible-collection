- name: Ensure bin directory exists
  ansible.builtin.file:
    path: "{{ bin_remote_dir }}"
    state: directory
    mode: "0o750"

- name: Transfer binary
  ansible.builtin.copy:
    src: "{{ bin_dir }}/{{ bin_name }}"
    dest: "{{ bin_remote_dir }}"
    mode: "0o755"
