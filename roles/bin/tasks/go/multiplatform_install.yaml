- name: Check that the binary instances have been defined
  ansible.builtin.fail:
    msg: "No bin host is indicated. Set it via 'bin_service_instances'."
  when: bin_service_instances is not defined

# We gather facts in order to get architecture and os running on the remote machine.
- name: Gather host system facts
  ansible.builtin.setup:
  delegate_to: "{{ current_host }}"
  delegate_facts: true
  loop: "{{ bin_service_instances }}"
  loop_control:
    loop_var: current_host
    label: "{{ current_host }}"
  when:
    - hostvars[current_host].ansible_facts.system is undefined or hostvars[current_host].ansible_facts.architecture is undefined

- name: Build unique platform dictionary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: map_platform_to_host

- name: Install go package as binary for multiple platforms
  vars:
    bin_target_os: "{{ bin_platforms[current_platform_key].os }}"
    bin_target_arch: "{{ bin_platforms[current_platform_key].arch }}"
    go_output_dir: "{{ bin_output_dir }}"
    go_host_to_map: "{{ bin_platforms[current_platform_key].hosts[0] }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.go
    tasks_from: install
  loop: "{{ bin_platforms.keys() }}"
  loop_control:
    loop_var: current_platform_key
    label: "{{ current_platform_key }}"
