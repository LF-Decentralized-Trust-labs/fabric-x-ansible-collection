- name: Copy SSD benchmark script to remote host
  ansible.builtin.copy:
    src: ssd_benchmark.sh
    dest: "{{ utils_benchmark_remote_dir }}/ssd_benchmark.sh"
    mode: "0755"

- name: Run SSD benchmark
  ansible.builtin.command:
    cmd: "bash {{ utils_benchmark_remote_dir }}/ssd_benchmark.sh {{ utils_benchmark_test_dir }} {{ utils_benchmark_test_size }} {{ utils_benchmark_block_size }}"
  register: utils_benchmark_result
  failed_when: utils_benchmark_result.rc not in [0, 1]
  changed_when: false

- name: Print benchmark output
  ansible.builtin.debug:
    msg: "{{ utils_benchmark_result.stdout_lines | map('regex_replace', '\\x1b\\[[0-9;]*m', '') | list }}"

- name: Assert sequential write meets high-performance threshold
  ansible.builtin.assert:
    that:
      - utils_benchmark_result.rc == 0
    fail_msg: >-
      SSD benchmark FAILED on {{ inventory_hostname }}: sequential write speed
      does not meet the minimum 1 GB/s threshold required for high-performance
      operations. Review the benchmark output above for details.
    success_msg: >-
      SSD benchmark PASSED on {{ inventory_hostname }}: sequential write speed
      meets the minimum 1 GB/s threshold for high-performance operations.
  when: utils_benchmark_fail_on_threshold | bool

- name: Remove benchmark script from remote host
  ansible.builtin.file:
    path: "{{ utils_benchmark_remote_dir }}/ssd_benchmark.sh"
    state: absent
