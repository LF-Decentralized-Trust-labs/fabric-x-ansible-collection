- name: Remove Postgres DB data volume
  vars:
    container_volume_path: "{{ postgres_remote_data_dir }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: volume/rm
  when: postgres_use_container

- name: Delete Postgres DB PersistentVolumeClaim
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolumeClaim
    name: "data-{{ inventory_hostname }}-0"
    namespace: "{{ k8s_namespace }}"
  when:
    - postgres_use_k8s or postgres_use_openshift
