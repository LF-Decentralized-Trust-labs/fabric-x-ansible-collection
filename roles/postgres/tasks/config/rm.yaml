- name: Clean Postgres config folder
  ansible.builtin.file:
    path: "{{ postgres_remote_config_dir }}"
    state: absent

- name: Remove Postgres DB K8s config
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: k8s/config/rm
  when: postgres_use_k8s or postgres_use_openshift
