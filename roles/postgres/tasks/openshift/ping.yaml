- name: Check that the OpenShift Route hostname is reachable
  vars:
    utils_ports_to_ping:
      - "{{ postgres_port }}"
    utils_host_to_ping: "{{ postgres_openshift_route }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - postgres_openshift_use_route
    - postgres_openshift_route is defined
