- name: Check that the DB node port is open
  vars:
    utils_ports_to_ping:
      - "{{ postgres_k8s_port_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - postgres_k8s_port_node_port is defined
