- name: Check that the DB node port is open
  vars:
    utils_ports_to_ping:
      - "{{ postgres_k8s_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: postgres_k8s_node_port is defined

- name: Check that the DB load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ postgres_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: postgres_k8s_loadbalancer_expose_port
