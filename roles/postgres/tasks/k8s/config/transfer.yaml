# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Postgres DB
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: k8s/namespace/create

# =========================
# mTLS
# =========================
- name: Apply Postgres DB ConfigMap
  vars:
    postgres_k8s_pg_hba_path: "{{ postgres_remote_config_dir }}/pg_hba.conf"
    postgres_k8s_mtls_ca_bundle_path: "{{ postgres_remote_config_dir }}/mtls/ca-certs.pem"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/configmap.yaml.j2
