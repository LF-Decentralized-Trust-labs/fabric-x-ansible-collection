- name: Teardown Postgres DB Kubernetes workload
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: k8s/teardown

- name: Remove Postgres DB crypto files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: crypto/rm

- name: Remove Postgres DB configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: config/rm
