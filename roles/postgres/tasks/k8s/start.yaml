# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Postgres DB
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply Resources
# =========================
- name: Apply Postgres DB Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service.yaml.j2

- name: Apply Postgres DB NodePort Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-nodeport.yaml.j2
  when: postgres_k8s_use_node_port

- name: Apply Postgres DB LoadBalancer Service
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/service-loadbalancer.yaml.j2
  when: postgres_k8s_use_load_balancer

- name: Apply Postgres DB StatefulSet
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/statefulset.yaml.j2
    wait: true
    wait_timeout: "{{ postgres_k8s_wait_timeout }}"
