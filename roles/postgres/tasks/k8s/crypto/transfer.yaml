- name: Apply Postgres DB Secret
  vars:
    postgres_k8s_tls_server_key_path: "{{ postgres_remote_config_dir }}/tls/{{ postgres_tls_private_key_file }}"
    postgres_k8s_tls_server_cert_path: "{{ postgres_remote_config_dir }}/tls/{{ postgres_tls_cert_file }}"
    postgres_k8s_tls_ca_cert_path: "{{ postgres_remote_config_dir }}/tls/ca.crt"
  kubernetes.core.k8s:
    state: present
    template:
      path: k8s/secret.yaml.j2
