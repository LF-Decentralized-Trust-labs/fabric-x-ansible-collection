- name: Remove Postgres DB Kubernetes workload
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: k8s/rm

- name: Remove Postgres DB data
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: data/rm
