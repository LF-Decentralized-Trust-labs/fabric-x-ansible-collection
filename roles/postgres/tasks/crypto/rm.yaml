- name: Clean Postgres TLS key
  vars:
    container_volume_path: "{{ postgres_remote_config_dir }}/tls/{{ postgres_tls_private_key_file }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: volume/rm
  when:
    - postgres_use_tls

- name: Clean Postgres TLS folder
  ansible.builtin.file:
    path: "{{ postgres_remote_config_dir }}/tls"
    state: absent
  when:
    - postgres_use_tls

- name: Delete Postgres DB K8s crypto Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres
    tasks_from: k8s/crypto/rm
  when: postgres_use_k8s or postgres_use_openshift
