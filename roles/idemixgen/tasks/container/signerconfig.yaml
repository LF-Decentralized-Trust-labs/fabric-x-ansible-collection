- name: Check that the idemixgen CA dir has been defined
  ansible.builtin.fail:
    msg: "No idemixgen CA dir is indicated. Set it via 'idemixgen_ca_input_dir'."
  when: idemixgen_ca_input_dir is not defined

- name: Check that the idemixgen output dir has been defined
  ansible.builtin.fail:
    msg: "No idemixgen output dir is indicated. Set it via 'idemixgen_output_dir'."
  when: idemixgen_output_dir is not defined

- name: Clean the /msp folder in the output dir
  ansible.builtin.file:
    path: "{{ idemixgen_output_dir }}/msp"
    state: absent

- name: Clean the /user folder in the output dir
  ansible.builtin.file:
    path: "{{ idemixgen_output_dir }}/user"
    state: absent

- name: Create the idemix output dir
  ansible.builtin.file:
    path: "{{ idemixgen_output_dir }}"
    state: directory
    mode: "0o750"

- name: Generate the idemix SignerConfig
  vars:
    container_name: "{{ idemixgen_container_name }}"
    container_image: "{{ idemixgen_image }}"
    container_command: >-
      {{ idemixgen_bin_name }} signerconfig
      --ca-input /tmp/ca
      --output {{ idemixgen_container_output_dir }}
      --org-unit {{ idemixgen_org_domain }}
      --enrollmentId {{ idemixgen_enrollment_id }}
      --revocationHandle {{ idemixgen_rev_handle }}
      --curve {{ idemixgen_curve_id }}
      --admin
      {% if idemixgen_use_aries %}
      --aries
      {% endif %}
    container_volumes:
      - "{{ idemixgen_ca_input_dir }}:/tmp/ca:ro,z"
      - "{{ idemixgen_output_dir }}:{{ idemixgen_container_output_dir }}:z"
    container_run_detach_mode: false
    container_run_as_host_user: true
    container_autoremove: true
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: start
