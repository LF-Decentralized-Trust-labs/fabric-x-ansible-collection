- name: Start idemixgen signerconfig as container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.idemixgen
    tasks_from: container/signerconfig
  when:
    - not idemixgen_use_bin

- name: Install idemixgen as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.idemixgen
    tasks_from: bin/install
  when:
    - idemixgen_use_bin

- name: Start idemixgen signerconfig as binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.idemixgen
    tasks_from: bin/signerconfig
  when:
    - idemixgen_use_bin
