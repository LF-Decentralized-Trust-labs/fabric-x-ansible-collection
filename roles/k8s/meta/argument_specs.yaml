---
argument_specs:
  role-options:
    short_description: Shared k8s options
    description:
      - Shared option definitions reused by the k8s role entry points.
    options:
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - Specifies the Kubernetes namespace managed by the task.
          - "Example: C(fabric-x)."
      k8s_create_namespace: &k8s_create_namespace
        type: bool
        required: false
        default: true
        description:
          - Controls whether the namespace creation task applies the namespace resource.
          - When C(false), the namespace creation task is skipped.
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        required: true
        description:
          - Specifies the name of the Kubernetes Secret used for image pulls.
          - "Example: C(regcred)."
      k8s_container_registry: &k8s_container_registry
        type: str
        required: true
        description:
          - Specifies the container registry host recorded in the generated Docker config.
          - "Example: C(icr.io)."
      k8s_container_registry_username: &k8s_container_registry_username
        type: str
        required: true
        description:
          - Specifies the username stored in the generated image pull secret.
          - "Example: C(iamapikey)."
      k8s_container_registry_password: &k8s_container_registry_password
        type: str
        required: true
        description:
          - Specifies the password or token stored in the generated image pull secret.
          - This value should be stored in an Ansible Vault.
      k8s_pod_label_selectors: &k8s_pod_label_selectors
        type: list
        elements: str
        required: true
        description:
          - Specifies the label selectors passed to the Kubernetes log query.
          - "Example: C(['app=fabric-x-orderer'])."
      k8s_pod_container: &k8s_pod_container
        type: str
        required: false
        description:
          - Optionally specifies the container name to query from multi-container pods.
          - When omitted, Kubernetes uses the default container.
      remote_node_dir: &remote_node_dir
        type: path
        required: false
        description:
          - Shared managed-host root directory used to derive the remote log path.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: false
        description:
          - Shared control-node artifact root used to derive the fetched log directory.
      k8s_remote_logs_dir: &k8s_remote_logs_dir
        type: path
        required: false
        default: "{{ remote_node_dir }}/logs"
        description:
          - Specifies the directory on the managed host where pod logs are written before transfer.
          - The default derives from C(remote_node_dir).
      k8s_remote_logs_file: &k8s_remote_logs_file
        type: str
        required: false
        default: logs.txt
        description:
          - Specifies the filename used for pod logs on the managed host.
      k8s_fetched_logs_dir: &k8s_fetched_logs_dir
        type: path
        required: false
        default: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}"
        description:
          - Specifies the directory on the control node where fetched pod logs are stored.
          - The default derives from C(fetched_artifacts_dir) and C(inventory_hostname).
      k8s_fetched_logs_file: &k8s_fetched_logs_file
        type: str
        required: false
        default: logs.txt
        description:
          - Specifies the filename used for the fetched log artifact on the control node.

  namespace/create:
    short_description: Ensure a Kubernetes namespace exists
    description:
      - Ensures the target Kubernetes namespace is present in the cluster.
      - Requires a valid kubeconfig on the control node and the kubernetes.core collection.
    options:
      k8s_namespace: *k8s_namespace
      k8s_create_namespace: *k8s_create_namespace

  registry/create_pull_secret:
    short_description: Create a Kubernetes image pull secret
    description:
      - Creates or updates a Docker registry imagePullSecret in the target namespace.
      - Renders a kubernetes.io/dockerconfigjson secret from the configured registry credentials.
    options:
      k8s_namespace: *k8s_namespace
      k8s_image_pull_secret: *k8s_image_pull_secret
      k8s_container_registry: *k8s_container_registry
      k8s_container_registry_username: *k8s_container_registry_username
      k8s_container_registry_password: *k8s_container_registry_password

  fetch_logs:
    short_description: Fetch Kubernetes pod logs
    description:
      - Collects pod logs selected by label from the target namespace, writes them on the managed host, and fetches them back to the control node.
      - Log collection tolerates missing pods or missing log content and still attempts artifact retrieval.
    options:
      k8s_namespace: *k8s_namespace
      k8s_pod_label_selectors: *k8s_pod_label_selectors
      k8s_pod_container: *k8s_pod_container
      remote_node_dir: *remote_node_dir
      fetched_artifacts_dir: *fetched_artifacts_dir
      k8s_remote_logs_dir: *k8s_remote_logs_dir
      k8s_remote_logs_file: *k8s_remote_logs_file
      k8s_fetched_logs_dir: *k8s_fetched_logs_dir
      k8s_fetched_logs_file: *k8s_fetched_logs_file
