- name: Create imagePullSecret "{{ k8s_image_pull_secret }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default(omit) }}"
    template:
      path: registry/image_pull_secret.yaml.j2
