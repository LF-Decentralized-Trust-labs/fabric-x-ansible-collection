- name: Start Alloy container
  ansible.builtin.include_tasks: container/start.yaml
  when:
    - alloy_use_container

- name: Start Alloy on Kubernetes
  ansible.builtin.include_tasks: k8s/start.yaml
  when:
    - alloy_use_k8s

- name: Start Alloy on OpenShift
  ansible.builtin.include_tasks: openshift/start.yaml
  when:
    - alloy_use_openshift
