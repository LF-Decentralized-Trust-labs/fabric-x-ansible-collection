- name: Delete Alloy data PVC
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolumeClaim
    name: "data-{{ alloy_k8s_resource_name }}-0"
    namespace: "{{ k8s_namespace | default('default') }}"
