- name: Initialize Alloy TLS SAN hosts
  ansible.builtin.set_fact:
    alloy_tls_san_hosts:
      - "{{ ansible_host }}"
      - "{{ actual_host }}"

- name: Append Alloy OpenShift route to TLS SAN hosts
  ansible.builtin.set_fact:
    alloy_tls_san_hosts: "{{ alloy_tls_san_hosts + [alloy_openshift_route] }}"
  when:
    - alloy_openshift_route is defined

- name: Generate the Alloy TLS crypto material with OpenSSL
  vars:
    openssl_common_name: "{{ inventory_hostname }}"
    openssl_organization: "{{ organization.domain | default(inventory_hostname) }}"
    openssl_private_key_path: "{{ alloy_remote_config_dir }}/tls/{{ alloy_tls_private_key_file }}"
    openssl_cert_path: "{{ alloy_remote_config_dir }}/tls/{{ alloy_tls_cert_file }}"
    openssl_san_hosts: "{{ alloy_tls_san_hosts | unique }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openssl
    tasks_from: generate_self_signed_cert
