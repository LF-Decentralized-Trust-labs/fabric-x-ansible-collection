- name: Fetch the Alloy TLS CA certificate
  ansible.builtin.fetch:
    src: "{{ alloy_remote_config_dir }}/tls/ca.crt"
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/tls/ca.crt"
    flat: true
  when:
    - alloy_use_tls

- name: Fetch the Alloy TLS certificate
  ansible.builtin.fetch:
    src: "{{ alloy_remote_config_dir }}/tls/{{ alloy_tls_cert_file }}"
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/tls/{{ alloy_tls_cert_file }}"
    flat: true
  when:
    - alloy_use_tls
