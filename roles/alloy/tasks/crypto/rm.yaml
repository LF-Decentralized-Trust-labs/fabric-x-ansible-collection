- name: Remove Alloy TLS directory
  ansible.builtin.file:
    path: "{{ alloy_remote_config_dir }}/tls"
    state: absent
  when:
    - alloy_use_tls

- name: Delete Alloy k8s Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: k8s/crypto/rm
  when: alloy_use_k8s or alloy_use_openshift
