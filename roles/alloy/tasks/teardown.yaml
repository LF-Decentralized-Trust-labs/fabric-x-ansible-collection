- name: Remove Alloy container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: container/rm
  when: alloy_use_container

- name: Remove Alloy Kubernetes workload
  ansible.builtin.include_tasks: k8s/rm.yaml
  when: alloy_use_k8s

- name: Remove Alloy OpenShift workload
  ansible.builtin.include_tasks: openshift/rm.yaml
  when: alloy_use_openshift

- name: Remove Alloy data directory
  ansible.builtin.include_tasks: data/rm.yaml
  when: alloy_use_container  

