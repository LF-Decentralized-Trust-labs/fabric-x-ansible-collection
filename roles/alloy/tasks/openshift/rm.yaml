- name: Delete Alloy http OpenShift Route
  vars:
    openshift_route_name: "{{ alloy_k8s_resource_name }}-http"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: alloy_openshift_route is defined

- name: Remove Alloy workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: k8s/rm
