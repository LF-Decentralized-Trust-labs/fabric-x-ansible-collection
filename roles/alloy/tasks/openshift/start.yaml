- name: Start Alloy workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: k8s/start

- name: Apply Alloy http OpenShift Route
  vars:
    openshift_route_name: "{{ alloy_k8s_resource_name }}-http"
    openshift_route_host: "{{ alloy_openshift_route }}"
    openshift_route_service_name: "{{ alloy_k8s_resource_name }}"
    openshift_route_service_port: http
    openshift_route_use_tls: "{{ alloy_use_tls }}"
    openshift_route_labels:
      app.kubernetes.io/name: "{{ alloy_k8s_resource_name }}"
      app.kubernetes.io/part-of: "{{ alloy_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: alloy_openshift_route is defined
