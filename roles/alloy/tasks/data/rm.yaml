- name: Remove Alloy data volume
  vars:
    container_volume_path: "{{ alloy_remote_data_dir }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.container
    tasks_from: volume/rm
  when:
    - alloy_use_container

- name: Delete Alloy k8s data PVC
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: k8s/data/rm
  when: alloy_use_k8s or alloy_use_openshift
