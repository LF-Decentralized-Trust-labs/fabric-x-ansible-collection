- name: Remove Alloy data directory
  ansible.builtin.file:
    path: "{{ alloy_remote_data_dir }}"
    state: absent
  when:
    - alloy_use_container is defined

- name: Delete Alloy k8s data PVC
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: k8s/data/rm
  when: alloy_use_k8s or alloy_use_openshift
