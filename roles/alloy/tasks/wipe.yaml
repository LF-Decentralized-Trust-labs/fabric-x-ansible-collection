- name: Teardown Alloy
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: teardown

- name: Remove Alloy crypto files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: crypto/rm

- name: Remove Alloy configuration files
  ansible.builtin.include_role:
    name: hyperledger.fabricx.alloy
    tasks_from: config/rm
