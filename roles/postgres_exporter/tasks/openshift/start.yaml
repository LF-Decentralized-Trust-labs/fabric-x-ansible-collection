- name: Start Postgres Exporter workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: k8s/start

- name: Apply Postgres Exporter metrics OpenShift Route
  vars:
    openshift_route_name: "{{ postgres_exporter_k8s_resource_name }}-metrics"
    openshift_route_host: "{{ postgres_exporter_openshift_route }}"
    openshift_route_service_name: "{{ postgres_exporter_k8s_resource_name }}"
    openshift_route_service_port: metrics
    openshift_route_use_tls: "{{ postgres_exporter_use_tls }}"
    openshift_route_labels:
      app.kubernetes.io/name: "{{ postgres_exporter_k8s_resource_name }}"
      app.kubernetes.io/component: "postgres-exporter"
      app.kubernetes.io/part-of: "{{ postgres_exporter_k8s_part_of }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: postgres_exporter_openshift_route is defined
