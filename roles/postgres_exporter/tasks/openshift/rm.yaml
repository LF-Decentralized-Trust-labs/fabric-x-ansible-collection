- name: Delete Postgres Exporter metrics OpenShift Route
  vars:
    openshift_route_name: "{{ postgres_exporter_k8s_resource_name }}-metrics"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: postgres_exporter_openshift_route is defined

- name: Remove Postgres Exporter workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: k8s/rm
