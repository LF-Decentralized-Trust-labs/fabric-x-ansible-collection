- name: Remove Postgres Exporter Sidecar container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: container/rm
  when: postgres_exporter_use_container

- name: Remove Postgres Exporter Kubernetes resources
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: k8s/rm
  when: postgres_exporter_use_k8s
