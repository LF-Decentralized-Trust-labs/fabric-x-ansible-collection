# =======================
# bin / container
# =======================
- name: Check that the Postgres Exporter port is open
  vars:
    utils_ports_to_ping:
      - "{{ postgres_exporter_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not (postgres_exporter_use_k8s or postgres_exporter_use_openshift)

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: k8s/ping
  when: postgres_exporter_use_k8s

# =======================
# openshift
# =======================
- name: Check that the OpenShift routes and Kubernetes services are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.postgres_exporter
    tasks_from: openshift/ping
  when: postgres_exporter_use_openshift
