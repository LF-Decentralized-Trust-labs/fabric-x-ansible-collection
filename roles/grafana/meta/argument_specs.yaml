---
argument_specs:

  start:
    short_description: Start Grafana in the selected deployment mode
    description:
      - Starts the Grafana deployment by dispatching to the container or Kubernetes entry point.
      - Set exactly one deployment mode flag to true for the target host.
    options:
      grafana_use_container:
        type: bool
        required: false
        default: "{{ not grafana_use_k8s }}"
        description:
          - Controls whether the role starts Grafana in container mode.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role starts Grafana on Kubernetes.

  stop:
    short_description: Stop Grafana in container mode
    description:
      - Stops the Grafana container when container mode is enabled.
    options:
      grafana_use_container:
        type: bool
        required: false
        default: "{{ not grafana_use_k8s }}"
        description:
          - Controls whether the stop dispatcher targets the container entry point.

  teardown:
    short_description: Remove Grafana in the selected deployment mode
    description:
      - Removes the Grafana container or Kubernetes workload by dispatching to the matching entry point.
    options:
      grafana_use_container:
        type: bool
        required: false
        default: "{{ not grafana_use_k8s }}"
        description:
          - Controls whether the teardown dispatcher removes the container deployment.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the teardown dispatcher removes the Kubernetes deployment.

  wipe:
    short_description: Remove all Grafana data
    description:
      - Removes the Grafana workload, TLS material, and generated configuration.
    options: {}

  fetch_logs:
    short_description: Collect Grafana logs for the selected deployment mode
    description:
      - Collects Grafana logs from the container deployment or from the Kubernetes pod.
    options:
      grafana_use_container:
        type: bool
        required: false
        default: "{{ not grafana_use_k8s }}"
        description:
          - Controls whether the log collection dispatcher targets the container entry point.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the log collection dispatcher targets the Kubernetes entry point.

  ping:
    short_description: Check that the Grafana web port is reachable
    description:
      - Verifies that the Grafana web interface port is reachable on the target host.
    options:
      grafana_web_port:
        type: int
        required: false
        default: 3000
        description:
          - "Sets the Grafana web interface port to probe. Example: C(3000)."

  container/start:
    short_description: Start the Grafana container
    description:
      - Builds the Grafana container environment and starts the containerized deployment.
      - When TLS is enabled, the generated certificate and key are mounted from the Grafana config directory.
    options:
      grafana_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the container name used for the Grafana instance.
      grafana_image:
        type: str
        required: false
        default: "{{ grafana_registry_endpoint }}/{{ grafana_image_name }}:{{ grafana_image_tag }}"
        description:
          - Sets the Grafana container image reference.
      grafana_username:
        type: str
        required: true
        description:
          - Sets the Grafana admin username injected into the container environment.
      grafana_password:
        type: str
        required: true
        description:
          - Sets the Grafana admin password injected into the container environment.
          - This value should be stored in an Ansible Vault.
      grafana_web_port:
        type: int
        required: false
        default: 3000
        description:
          - "Sets the Grafana web interface port exposed by the container. Example: C(3000)."
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the Grafana provisioning files and TLS material.
      grafana_container_config_dir:
        type: path
        required: false
        default: /etc/grafana/provisioning
        description:
          - Sets the path inside the container where provisioning files are mounted.
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Enables HTTPS configuration for the container health check and server settings.
      grafana_tls_private_key_file:
        type: str
        required: false
        default: server.key
        description:
          - Sets the TLS private key filename under the Grafana TLS directory when TLS is enabled.
      grafana_tls_cert_file:
        type: str
        required: false
        default: server.crt
        description:
          - Sets the TLS certificate filename under the Grafana TLS directory when TLS is enabled.

  container/stop:
    short_description: Stop the Grafana container
    description:
      - Stops the running Grafana container by name.
    options:
      grafana_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the container name to stop.

  container/rm:
    short_description: Remove the Grafana container
    description:
      - Removes the Grafana container by name.
    options:
      grafana_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the container name to remove.

  container/fetch_logs:
    short_description: Fetch logs from the Grafana container
    description:
      - Collects logs from the named Grafana container.
    options:
      grafana_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the container name whose logs are collected.

  config/transfer:
    short_description: Transfer Grafana configuration files
    description:
      - Writes Grafana datasource and dashboard provisioning files to the remote host.
      - When Kubernetes mode is enabled, this entry point also applies the Kubernetes ConfigMap.
    options:
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the Grafana provisioning files and TLS material.
      grafana_datasource_file:
        type: str
        required: false
        default: datasources.yaml
        description:
          - Sets the datasource provisioning filename generated for Grafana.
      grafana_dashboards_file:
        type: str
        required: false
        default: dashboards.yaml
        description:
          - Sets the dashboard provider provisioning filename generated for Grafana.
      grafana_container_config_dir:
        type: path
        required: false
        default: /etc/grafana/provisioning
        description:
          - Sets the provisioning path referenced inside generated Grafana configuration files.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role also applies the Kubernetes ConfigMap after writing local files.
      prometheus_host:
        type: str
        required: true
        description:
          - Sets the inventory host name of the Prometheus instance used as the Grafana datasource.

  config/rm:
    short_description: Remove Grafana configuration files
    description:
      - Removes the remote Grafana provisioning directory.
      - When Kubernetes mode is enabled, this entry point also deletes the Kubernetes ConfigMap.
    options:
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory to remove.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role also deletes Grafana Kubernetes ConfigMaps.

  config/copy_dashboard:
    short_description: Copy a Grafana dashboard JSON file
    description:
      - Copies a Grafana dashboard JSON file into the remote dashboards directory.
      - When Kubernetes mode is enabled, this entry point also applies the dashboard ConfigMap.
    options:
      grafana_dashboard_path:
        type: path
        required: true
        description:
          - Sets the local path to the Grafana dashboard JSON file to copy.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores copied dashboard files.
      grafana_dashboard_file:
        type: str
        required: false
        default: dashboard.json
        description:
          - Sets the destination filename used for the copied Grafana dashboard JSON file.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role also applies the dashboard ConfigMap on Kubernetes.

  crypto/setup:
    short_description: Prepare Grafana TLS material
    description:
      - Generates Grafana TLS material when TLS is enabled.
      - When Kubernetes mode is enabled, this entry point also applies the Kubernetes Secret.
    options:
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role generates Grafana TLS material.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role also applies the Kubernetes Secret for Grafana.

  crypto/fetch:
    short_description: Fetch the Grafana TLS CA certificate
    description:
      - Fetches the Grafana TLS CA certificate from the remote host when TLS is enabled.
    options:
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role fetches the Grafana TLS CA certificate.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the Grafana TLS material.

  crypto/rm:
    short_description: Remove Grafana TLS material
    description:
      - Removes the Grafana TLS directory when TLS is enabled.
      - When Kubernetes mode is enabled, this entry point also deletes the Kubernetes Secret.
    options:
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role removes the Grafana TLS directory.
      grafana_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Controls whether the role also deletes the Grafana Kubernetes Secret.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the Grafana TLS material.

  crypto/openssl/generate_cert:
    short_description: Generate a self-signed certificate for Grafana
    description:
      - Generates the Grafana TLS key pair and certificate using the OpenSSL helper role.
    options:
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the generated Grafana TLS material.
      grafana_tls_private_key_file:
        type: str
        required: false
        default: server.key
        description:
          - Sets the TLS private key filename generated for Grafana.
      grafana_tls_cert_file:
        type: str
        required: false
        default: server.crt
        description:
          - Sets the TLS certificate filename generated for Grafana.

  k8s/start:
    short_description: Start Grafana on Kubernetes
    description:
      - Applies the Grafana Service, NodePort Service, and Deployment resources on Kubernetes.
      - Generated provisioning files and optional dashboard ConfigMaps must already exist before this entry point runs.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the base Kubernetes resource name used for Grafana objects.
      grafana_web_port:
        type: int
        required: false
        default: 3000
        description:
          - Sets the Grafana web port exposed by the Services and Deployment.
      grafana_k8s_web_node_port:
        type: int
        required: false
        default: "{{ grafana_web_port }}"
        description:
          - Sets the NodePort value exposed for the Grafana web service.
      grafana_k8s_wait_timeout:
        type: int
        required: false
        default: 120
        description:
          - Sets how many seconds Ansible waits for the Grafana Deployment rollout.
      grafana_k8s_fs_group:
        type: int
        required: false
        default: 472
        description:
          - Sets the filesystem group applied to the Grafana pod security context.
      grafana_image:
        type: str
        required: false
        default: "{{ grafana_registry_endpoint }}/{{ grafana_image_name }}:{{ grafana_image_tag }}"
        description:
          - Sets the Grafana container image reference used by the Deployment.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory where generated dashboard JSON files are discovered.
      grafana_container_config_dir:
        type: path
        required: false
        default: /etc/grafana/provisioning
        description:
          - Sets the path inside the Grafana container where provisioning files are mounted.
      grafana_datasource_file:
        type: str
        required: false
        default: datasources.yaml
        description:
          - Sets the datasource provisioning filename mounted into the Deployment.
      grafana_dashboards_file:
        type: str
        required: false
        default: dashboards.yaml
        description:
          - Sets the dashboard provider provisioning filename mounted into the Deployment.
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Enables HTTPS listener settings and probe scheme changes for the Grafana Deployment.
      grafana_tls_private_key_file:
        type: str
        required: false
        default: server.key
        description:
          - Sets the TLS private key filename mounted into the pod when TLS is enabled.
      grafana_tls_cert_file:
        type: str
        required: false
        default: server.crt
        description:
          - Sets the TLS certificate filename mounted into the pod when TLS is enabled.
      grafana_username:
        type: str
        required: true
        description:
          - Sets the Grafana admin username read from the Kubernetes Secret.
      grafana_password:
        type: str
        required: true
        description:
          - Sets the Grafana admin password read from the Kubernetes Secret.
          - This value should be stored in an Ansible Vault.
      prometheus_host:
        type: str
        required: true
        description:
          - Sets the inventory host name of the Prometheus instance used as the Grafana datasource.
      k8s_readiness_probe_initial_delay_seconds:
        type: int
        required: false
        default: 10
        description:
          - Sets the readiness probe initial delay override when a non-default value is needed.
      k8s_readiness_probe_period_seconds:
        type: int
        required: false
        default: 10
        description:
          - Sets the readiness probe period override when a non-default value is needed.
      k8s_readiness_probe_timeout_seconds:
        type: int
        required: false
        default: 5
        description:
          - Sets the readiness probe timeout override when a non-default value is needed.
      k8s_readiness_probe_failure_threshold:
        type: int
        required: false
        default: 3
        description:
          - Sets the readiness probe failure threshold override when a non-default value is needed.
      k8s_liveness_probe_initial_delay_seconds:
        type: int
        required: false
        default: 30
        description:
          - Sets the liveness probe initial delay override when a non-default value is needed.
      k8s_liveness_probe_period_seconds:
        type: int
        required: false
        default: 15
        description:
          - Sets the liveness probe period override when a non-default value is needed.
      k8s_liveness_probe_timeout_seconds:
        type: int
        required: false
        default: 5
        description:
          - Sets the liveness probe timeout override when a non-default value is needed.
      k8s_liveness_probe_failure_threshold:
        type: int
        required: false
        default: 5
        description:
          - Sets the liveness probe failure threshold override when a non-default value is needed.

  k8s/rm:
    short_description: Remove Grafana Kubernetes resources
    description:
      - Deletes the Grafana Deployment, Service, and NodePort Service from Kubernetes.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the base Kubernetes resource name removed by this entry point.

  k8s/fetch_logs:
    short_description: Fetch logs from the Grafana pod
    description:
      - Collects logs from the Grafana pod selected by the Grafana application label.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Kubernetes application label used to select the Grafana pod logs.

  k8s/config/transfer:
    short_description: Apply the Grafana Kubernetes ConfigMap
    description:
      - Applies the Kubernetes ConfigMap that contains the Grafana datasource and dashboard provisioning files.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the ConfigMap name used for Grafana provisioning data.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the local files copied into the ConfigMap.
      grafana_datasource_file:
        type: str
        required: false
        default: datasources.yaml
        description:
          - Sets the datasource provisioning filename read into the ConfigMap.
      grafana_dashboards_file:
        type: str
        required: false
        default: dashboards.yaml
        description:
          - Sets the dashboard provider provisioning filename read into the ConfigMap.
      prometheus_host:
        type: str
        required: true
        description:
          - Sets the inventory host name of the Prometheus instance used to resolve the optional CA bundle path.

  k8s/config/rm:
    short_description: Delete Grafana Kubernetes ConfigMaps
    description:
      - Deletes the Grafana provisioning ConfigMap and any dashboard ConfigMaps discovered on disk.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the base ConfigMap name removed by this entry point.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory used to discover dashboard JSON files whose ConfigMaps should be deleted.

  k8s/config/copy_dashboard:
    short_description: Apply a Grafana dashboard Kubernetes ConfigMap
    description:
      - Applies a dashboard ConfigMap that exposes a single Grafana dashboard JSON file to the Deployment.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the base Kubernetes resource name used to build the dashboard ConfigMap name.
      grafana_dashboard_file:
        type: str
        required: false
        default: dashboard.json
        description:
          - Sets the dashboard filename exposed by the ConfigMap.
      grafana_dashboard_path:
        type: path
        required: true
        description:
          - Sets the local path to the Grafana dashboard JSON file embedded into the ConfigMap.

  k8s/crypto/transfer:
    short_description: Apply the Grafana Kubernetes Secret
    description:
      - Applies the Grafana Kubernetes Secret that holds admin credentials and optional TLS material.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Secret name used for Grafana credentials and TLS material.
      grafana_remote_config_dir:
        type: path
        required: true
        description:
          - Sets the remote directory that stores the TLS files embedded into the Secret.
      grafana_username:
        type: str
        required: true
        description:
          - Sets the Grafana admin username stored in the Kubernetes Secret.
      grafana_password:
        type: str
        required: true
        description:
          - Sets the Grafana admin password stored in the Kubernetes Secret.
          - This value should be stored in an Ansible Vault.
      grafana_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Controls whether TLS key and certificate data are embedded into the Secret.
      grafana_tls_private_key_file:
        type: str
        required: false
        default: server.key
        description:
          - Sets the TLS private key filename read into the Secret when TLS is enabled.
      grafana_tls_cert_file:
        type: str
        required: false
        default: server.crt
        description:
          - Sets the TLS certificate filename read into the Secret when TLS is enabled.

  k8s/crypto/rm:
    short_description: Delete the Grafana Kubernetes Secret
    description:
      - Deletes the Grafana Kubernetes Secret.
    options:
      grafana_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Sets the Secret name removed by this entry point.
