# =======================
# bin / container
# =======================
- name: Check that the Grafana UI port is open
  vars:
    utils_ports_to_ping:
      - "{{ grafana_web_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not (grafana_use_k8s or grafana_use_openshift)

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: k8s/ping
  when: grafana_use_k8s

# =======================
# openshift
# =======================
- name: Check that the OpenShift routes and Kubernetes services are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: openshift/ping
  when: grafana_use_openshift
