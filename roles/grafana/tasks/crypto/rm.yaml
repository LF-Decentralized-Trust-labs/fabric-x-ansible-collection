- name: Remove Grafana TLS directory
  ansible.builtin.file:
    path: "{{ grafana_remote_config_dir }}/tls"
    state: absent
  when:
    - grafana_use_tls

- name: Delete Grafana Kubernetes Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: k8s/crypto/rm
  when: grafana_use_k8s or grafana_use_openshift
