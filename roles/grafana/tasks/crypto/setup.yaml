# =========================
# With OpenSSL
# =========================
- name: Generate the Grafana TLS crypto material with OpenSSL
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: crypto/openssl/generate_cert
  when:
    - grafana_use_tls

- name: Transfer Grafana Kubernetes crypto
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: k8s/crypto/transfer
  when:
    - grafana_use_k8s
