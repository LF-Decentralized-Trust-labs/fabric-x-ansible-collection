- name: Remove Grafana config directory
  ansible.builtin.file:
    path: "{{ grafana_remote_config_dir }}"
    state: absent

- name: Delete Grafana Kubernetes ConfigMap
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ConfigMap
    name: "{{ grafana_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"
  when: grafana_use_k8s
