- name: Ensure Grafana datasources directory exists
  ansible.builtin.file:
    path: "{{ grafana_remote_config_dir }}/datasources"
    state: directory
    mode: "0o755"

- name: Transfer {{ grafana_datasource_file }}
  ansible.builtin.template:
    src: datasources.yaml.j2
    dest: "{{ grafana_remote_config_dir }}/datasources/{{ grafana_datasource_file }}"
    mode: "0o644"

- name: Ensure Grafana dashboards directory exists
  ansible.builtin.file:
    path: "{{ grafana_remote_config_dir }}/dashboards"
    state: directory
    mode: "0o755"

- name: Transfer {{ grafana_dashboards_file }}
  ansible.builtin.template:
    src: dashboards.yaml.j2
    dest: "{{ grafana_remote_config_dir }}/dashboards/{{ grafana_dashboards_file }}"
    mode: "0o644"

- name: Transfer Prometheus TLS CA certificate
  when:
    - prometheus_host is defined
    - hostvars[prometheus_host].prometheus_use_tls is defined
    - hostvars[prometheus_host].prometheus_use_tls
  block:
    - name: Ensure Grafana TLS directory for Prometheus TLS CA exists
      ansible.builtin.file:
        path: "{{ grafana_remote_config_dir }}/tls/{{ prometheus_host }}"
        state: directory
        mode: "0o755"
    - name: Transfer Prometheus TLS CA certificate
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ prometheus_host }}/tls/ca.crt"
        dest: "{{ grafana_remote_config_dir }}/tls/{{ prometheus_host }}/ca.crt"
        mode: "0o644"

- name: Transfer Loki TLS CA certificate
  when:
    - loki_host is defined
    - hostvars[loki_host].loki_use_tls is defined
    - hostvars[loki_host].loki_use_tls
  block:
    - name: Ensure Grafana TLS directory for Loki TLS CA exists
      ansible.builtin.file:
        path: "{{ grafana_remote_config_dir }}/tls/{{ loki_host }}"
        state: directory
        mode: "0o755"
    - name: Transfer Loki TLS CA certificate
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ loki_host }}/tls/ca.crt"
        dest: "{{ grafana_remote_config_dir }}/tls/{{ loki_host }}/ca.crt"
        mode: "0o644"

- name: Transfer Grafana Kubernetes configuration
  ansible.builtin.include_role:
    name: hyperledger.fabricx.grafana
    tasks_from: k8s/config/transfer
  when: grafana_use_k8s or grafana_use_openshift
