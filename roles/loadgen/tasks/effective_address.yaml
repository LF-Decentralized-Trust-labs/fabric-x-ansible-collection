# =======================
# Metrics Address
# =======================
- name: Set effective loadgen metrics address as OpenShift Route
  vars:
    loadgen_host_monitoring_use_tls: "{{ hostvars[loadgen_host].loadgen_monitoring_use_tls | default(hostvars[loadgen_host].loadgen_use_tls) | default(false) }}"
    loadgen_host_http_protocol: "{{ 'https' if loadgen_host_monitoring_use_tls else 'http' }}"
  ansible.builtin.set_fact:
    loadgen_effective_metrics_address: "{{ loadgen_host_http_protocol }}://{{ hostvars[loadgen_host].loadgen_openshift_metrics_route }}"
  when:
    - hostvars[loadgen_host].loadgen_use_openshift is defined
    - hostvars[loadgen_host].loadgen_use_openshift
    - hostvars[loadgen_host].loadgen_openshift_metrics_route is defined

- name: Set effective loadgen metrics address as k8s NodePort
  ansible.builtin.set_fact:
    loadgen_effective_metrics_address: "{{ hostvars[loadgen_host].actual_host }}:{{ hostvars[loadgen_host].loadgen_k8s_metrics_node_port }}"
  when:
    - hostvars[loadgen_host].loadgen_openshift_metrics_route is not defined
    - hostvars[loadgen_host].loadgen_k8s_metrics_node_port is defined

- name: Set effective loadgen metrics address
  ansible.builtin.set_fact:
    loadgen_effective_metrics_address: "{{ hostvars[loadgen_host].actual_host }}:{{ hostvars[loadgen_host].loadgen_metrics_port }}"
  when:
    - hostvars[loadgen_host].loadgen_openshift_metrics_route is not defined
    - hostvars[loadgen_host].loadgen_k8s_metrics_node_port is not defined

# =======================
# Web Address
# =======================
- name: Set effective loadgen web address as OpenShift Route
  ansible.builtin.set_fact:
    loadgen_effective_web_address: "http://{{ hostvars[loadgen_host].loadgen_openshift_web_route }}"
  when:
    - hostvars[loadgen_host].loadgen_use_openshift is defined
    - hostvars[loadgen_host].loadgen_use_openshift
    - hostvars[loadgen_host].loadgen_openshift_web_route is defined

- name: Set effective loadgen web address as k8s NodePort
  ansible.builtin.set_fact:
    loadgen_effective_web_address: "http://{{ hostvars[loadgen_host].actual_host }}:{{ hostvars[loadgen_host].loadgen_k8s_web_node_port }}"
  when:
    - hostvars[loadgen_host].loadgen_openshift_web_route is not defined
    - hostvars[loadgen_host].loadgen_k8s_web_node_port is defined

- name: Set effective loadgen web address
  ansible.builtin.set_fact:
    loadgen_effective_web_address: "http://{{ hostvars[loadgen_host].actual_host }}:{{ hostvars[loadgen_host].loadgen_web_port }}"
  when:
    - hostvars[loadgen_host].loadgen_openshift_web_route is not defined
    - hostvars[loadgen_host].loadgen_k8s_web_node_port is not defined
