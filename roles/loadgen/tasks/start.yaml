- name: Start Fabric-X Loadgen container
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: container/start
  when: loadgen_use_container

- name: Start Fabric-X Loadgen binary
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: bin/start
  when: loadgen_use_bin

- name: Start Fabric-X Loadgen on Kubernetes
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: k8s/start
  when: loadgen_use_k8s

- name: Start Loadgen on OpenShift
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: openshift/start
  when: loadgen_use_openshift
