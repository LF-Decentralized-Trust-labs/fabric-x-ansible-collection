# =========================
# Loadgen
# =========================
- name: Transfer the Hyperledger Fabric-X Loadgen config files
  vars:
    committer_sidecar_host: >-
      {{
        committer_hosts
        | map('extract', hostvars)
        | selectattr('committer_component_type', 'defined')
        | selectattr('committer_component_type', '==', 'sidecar')
        | map(attribute='inventory_hostname')
        | list
        | first
      }}
    orderer_router_hosts: >-
      {{
        orderer_hosts
        | map('extract', hostvars)
        | selectattr('orderer_component_type', '==', 'router')
        | map(attribute='inventory_hostname')
        | list
      }}
    orderer_assembler_hosts: >-
      {{
        orderer_hosts
        | map('extract', hostvars)
        | selectattr('orderer_component_type', '==', 'assembler')
        | map(attribute='inventory_hostname')
        | list
      }}
    orderer_ref_host: >-
      {{
        orderer_router_hosts
        | first
      }}
  block:
    - name: Ensure the Hyperledger Fabric-X Loadgen config directory exists
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}"
        state: directory
        mode: "0o755"
    - name: Generate the config for the Hyperledger Fabric-X Loadgen
      ansible.builtin.template:
        src: "loadgen.yaml.j2"
        dest: "{{ loadgen_remote_config_dir }}/{{ loadgen_config_file }}"
        mode: "0o644"
    # =========================
    # HLFX Orderer Routers TLS
    # =========================
    - name: Ensure Hyperledger Fabric-X Orderer Routers TLS folders exist
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_router }}"
        state: directory
        mode: "0o755"
      loop: "{{ orderer_router_hosts }}"
      loop_control:
        loop_var: current_orderer_router
        label: "{{ current_orderer_router }}"
      when:
        - hostvars[current_orderer_router].orderer_use_tls is defined
        - hostvars[current_orderer_router].orderer_use_tls
    - name: Transfer Hyperledger Fabric-X Orderer Routers TLS CA certificates
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ current_orderer_router }}/tls/ca.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_router }}/ca.crt"
        mode: "0o644"
      loop: "{{ orderer_router_hosts }}"
      loop_control:
        loop_var: current_orderer_router
        label: "{{ current_orderer_router }}"
      when:
        - hostvars[current_orderer_router].orderer_use_tls is defined
        - hostvars[current_orderer_router].orderer_use_tls
    - name: Transfer Hyperledger Fabric-X Orderer Routers TLS server certificates
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ current_orderer_router }}/tls/server.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_router }}/server.crt"
        mode: "0o644"
      loop: "{{ orderer_router_hosts }}"
      loop_control:
        loop_var: current_orderer_router
        label: "{{ current_orderer_router }}"
      when:
        - hostvars[current_orderer_router].orderer_use_tls is defined
        - hostvars[current_orderer_router].orderer_use_tls
    # =========================
    # HLFX Orderer Assemblers TLS
    # =========================
    - name: Ensure Hyperledger Fabric-X Orderer Assemblers TLS folders exist
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_assembler }}"
        state: directory
        mode: "0o755"
      loop: "{{ orderer_assembler_hosts }}"
      loop_control:
        loop_var: current_orderer_assembler
        label: "{{ current_orderer_assembler }}"
      when:
        - orderer_assembler_hosts is defined
        - hostvars[current_orderer_assembler].orderer_use_tls is defined
        - hostvars[current_orderer_assembler].orderer_use_tls
    - name: Transfer Hyperledger Fabric-X Orderer Assemblers TLS CA certificates
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ current_orderer_assembler }}/tls/ca.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_assembler }}/ca.crt"
        mode: "0o644"
      loop: "{{ orderer_assembler_hosts }}"
      loop_control:
        loop_var: current_orderer_assembler
        label: "{{ current_orderer_assembler }}"
      when:
        - orderer_assembler_hosts is defined
        - hostvars[current_orderer_assembler].orderer_use_tls is defined
        - hostvars[current_orderer_assembler].orderer_use_tls
    - name: Transfer Hyperledger Fabric-X Orderer Assemblers TLS server certificates
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ current_orderer_assembler }}/tls/server.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/orderers/{{ current_orderer_assembler }}/server.crt"
        mode: "0o644"
      loop: "{{ orderer_assembler_hosts }}"
      loop_control:
        loop_var: current_orderer_assembler
        label: "{{ current_orderer_assembler }}"
      when:
        - orderer_assembler_hosts is defined
        - hostvars[current_orderer_assembler].orderer_use_tls is defined
        - hostvars[current_orderer_assembler].orderer_use_tls
    # =========================
    # HLFX Committer Sidecar TLS
    # =========================
    - name: Ensure Hyperledger Fabric-X Committer Sidecar TLS folder exist
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}/tls/sidecar"
        state: directory
        mode: "0o755"
      when:
        - committer_sidecar_host is defined
        - hostvars[committer_sidecar_host].committer_use_tls is defined
        - hostvars[committer_sidecar_host].committer_use_tls
    - name: Transfer Hyperledger Fabric-X Committer Sidecar TLS CA certificate
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ committer_sidecar_host }}/tls/ca.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/sidecar/ca.crt"
        mode: "0o644"
      when:
        - committer_sidecar_host is defined
        - hostvars[committer_sidecar_host].committer_use_tls is defined
        - hostvars[committer_sidecar_host].committer_use_tls
    # =========================
    # mTLS
    # =========================
    - name: Transfer Monitoring mTLS certificates
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loadgen
        tasks_from: config/mtls/monitoring/transfer
      when:
        - loadgen_monitoring_use_mtls
    # =========================
    # Kubernetes ConfigMap
    # =========================
    - name: Transfer Fabric-X Loadgen Kubernetes ConfigMap
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loadgen
        tasks_from: k8s/config/transfer
      when: loadgen_use_k8s or loadgen_use_openshift
