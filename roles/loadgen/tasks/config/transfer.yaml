# =========================
# Loadgen
# =========================
- name: Transfer the Hyperledger Fabric-X Loadgen config files
  vars:
    committer_sidecar_host: >-
      {{
        committer_hosts
        | map('extract', hostvars)
        | selectattr('committer_component_type', 'defined')
        | selectattr('committer_component_type', '==', 'sidecar')
        | map(attribute='inventory_hostname')
        | list
        | first
      }}
    orderer_ref_host: >-
      {{
        orderer_hosts
        | map('extract', hostvars)
        | selectattr('orderer_component_type', '==', 'router')
        | map(attribute='inventory_hostname')
        | list
        | first
      }}
  block:
    - name: Ensure the Hyperledger Fabric-X Loadgen config directory exists
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}"
        state: directory
        mode: "0o755"
    - name: Generate the config for the Hyperledger Fabric-X Loadgen
      ansible.builtin.template:
        src: "loadgen.yaml.j2"
        dest: "{{ loadgen_remote_config_dir }}/{{ loadgen_config_file }}"
        mode: "0o644"
    # =========================
    # Genesis config block
    # =========================
    - name: Copy genesis config block for Fabric-X Loadgen
      ansible.builtin.copy:
        src: "{{ configtxgen_artifacts_dir }}/{{ channel_id }}_block.pb"
        dest: "{{ loadgen_remote_config_dir }}/{{ loadgen_config_block_file }}"
        mode: "0o644"
    # =========================
    # HLFX Committer Sidecar TLS
    # =========================
    - name: Ensure Hyperledger Fabric-X Committer Sidecar TLS folder exist
      ansible.builtin.file:
        path: "{{ loadgen_remote_config_dir }}/tls/sidecar"
        state: directory
        mode: "0o755"
      when:
        - hostvars[committer_sidecar_host].committer_use_tls is defined
        - hostvars[committer_sidecar_host].committer_use_tls
    - name: Transfer Hyperledger Fabric-X Committer Sidecar TLS CA certificate
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ committer_sidecar_host }}/tls/ca.crt"
        dest: "{{ loadgen_remote_config_dir }}/tls/sidecar/ca.crt"
        mode: "0o644"
      when:
        - hostvars[committer_sidecar_host].committer_use_tls is defined
        - hostvars[committer_sidecar_host].committer_use_tls
    # =========================
    # mTLS
    # =========================
    - name: Transfer Monitoring mTLS certificates
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loadgen
        tasks_from: config/mtls/monitoring/transfer
      when:
        - loadgen_monitoring_use_mtls
    # =========================
    # Kubernetes ConfigMap
    # =========================
    - name: Transfer Fabric-X Loadgen Kubernetes ConfigMap
      ansible.builtin.include_role:
        name: hyperledger.fabricx.loadgen
        tasks_from: k8s/config/transfer
      when: loadgen_use_k8s
