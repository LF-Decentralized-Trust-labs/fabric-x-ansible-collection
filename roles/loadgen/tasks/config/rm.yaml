- name: Remove Fabric-X Loadgen binary configuration files
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}"
    state: absent

- name: Remove Fabric-X Loadgen Kubernetes ConfigMap
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: k8s/config/rm
  when: loadgen_use_k8s or loadgen_use_openshift
