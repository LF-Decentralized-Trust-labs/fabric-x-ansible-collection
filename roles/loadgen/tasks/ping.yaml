# =======================
# bin / container
# =======================
- name: Check that the HTTP port is open
  vars:
    utils_ports_to_ping:
      - "{{ loadgen_web_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not loadgen_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: k8s/ping
  when: loadgen_use_k8s
