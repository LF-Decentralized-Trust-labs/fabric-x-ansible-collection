- name: Build the binary {{ loadgen_bin_name }}
  vars:
    # Git vars
    git_hub_url: "{{ loadgen_git_hub_url }}"
    git_repo: "{{ loadgen_git_repo }}"
    git_commit: "{{ loadgen_git_commit }}"
    # Bin vars
    bin_name: "{{ loadgen_bin_name }}"
    # Go vars
    go_source_code_package: "{{ loadgen_source_code_package }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.bin
    tasks_from: go/build
