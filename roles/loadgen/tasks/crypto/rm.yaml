- name: Remove Loadgen MSP directory
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}/users"
    state: absent

- name: Remove Loadgen TLS directory
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}/tls"
    state: absent
  when:
    - loadgen_use_tls or loadgen_monitoring_use_tls
