- name: Remove Fabric-X Loadgen MSP directory
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}/msp"
    state: absent

- name: Remove Fabric-X Loadgen Users directory
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}/users"
    state: absent

- name: Remove Fabric-X Loadgen TLS directory
  ansible.builtin.file:
    path: "{{ loadgen_remote_config_dir }}/tls"
    state: absent
  when:
    - loadgen_use_tls or loadgen_monitoring_use_tls

- name: Remove Fabric-X Loadgen Kubernetes Secret
  ansible.builtin.include_role:
    name: hyperledger.fabricx.loadgen
    tasks_from: k8s/crypto/rm
  when: loadgen_use_k8s or loadgen_use_openshift
