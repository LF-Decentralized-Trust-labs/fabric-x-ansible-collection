# =========================
# MSP certs
# =========================
- name: Fetch Hyperledger Fabric-X loadgen user sign certificates
  ansible.builtin.fetch:
    src: "{{ loadgen_remote_config_dir }}/users/{{ current_user.name }}@{{ organization.domain }}/msp/signcerts/{{ current_user.name }}@{{ organization.domain }}-cert.pem"
    dest: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/users/{{ current_user.name }}@{{ organization.domain }}/msp/signcerts/{{ current_user.name }}@{{ organization.domain }}-cert.pem"
    flat: true
  loop: "{{ organization.users }}"
  loop_control:
    loop_var: current_user
    label: "{{ organization.domain }}:{{ current_user.name }}"
  when:
    - organization.users is defined

- name: Fetch Hyperledger Fabric-X Loadgen peer sign certificate into organization knowncerts
  ansible.builtin.fetch:
    src: "{{ loadgen_remote_config_dir }}/msp/signcerts/{{ loadgen_crypto_name }}.{{ organization.domain }}-cert.pem"
    dest: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/msp/knowncerts/{{ loadgen_crypto_name }}.{{ organization.domain }}-cert.pem"
    flat: true

- name: Fetch Hyperledger Fabric-X Loadgen user sign certificates into organization knowncerts
  ansible.builtin.fetch:
    src: "{{ loadgen_remote_config_dir }}/users/{{ current_user.name }}@{{ organization.domain }}/msp/signcerts/{{ current_user.name }}@{{ organization.domain }}-cert.pem"
    dest: "{{ fetched_artifacts_dir }}/crypto/peerOrganizations/{{ organization.domain }}/msp/knowncerts/{{ current_user.name }}@{{ organization.domain }}-cert.pem"
    flat: true
  loop: "{{ organization.users }}"
  loop_control:
    loop_var: current_user
    label: "{{ organization.domain }}:{{ current_user.name }}"
  when:
    - organization.users is defined

# =========================
# TLS certs
# =========================
- name: Fetch Hyperledger Fabric-X Loadgen TLS CA certificate
  ansible.builtin.fetch:
    src: "{{ loadgen_remote_config_dir }}/tls/ca.crt"
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/tls/ca.crt"
    flat: true
  when:
    - loadgen_use_tls or loadgen_monitoring_use_tls

- name: Fetch Hyperledger Fabric-X Loadgen TLS certificate
  ansible.builtin.fetch:
    src: "{{ loadgen_remote_config_dir }}/tls/server.crt"
    dest: "{{ fetched_artifacts_dir }}/{{ inventory_hostname }}/tls/server.crt"
    flat: true
  when:
    - loadgen_use_tls or loadgen_monitoring_use_tls
