# =========================
# Namespace
# =========================
- name: Ensure Kubernetes namespace exists for Fabric-X Loadgen
  ansible.builtin.include_role:
    name: hyperledger.fabricx.k8s
    tasks_from: namespace/create

# =========================
# Apply ConfigMap
# =========================
- name: Apply Fabric-X Loadgen ConfigMap
  kubernetes.core.k8s:
    state: present
    namespace: "{{ k8s_namespace | default(omit) }}"
    template:
      path: "k8s/configmap-loadgen.yaml.j2"
