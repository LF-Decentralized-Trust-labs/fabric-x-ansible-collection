- name: Remove Fabric-X Loadgen Deployment
  kubernetes.core.k8s:
    state: absent
    kind: Deployment
    name: "{{ loadgen_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Remove Fabric-X Loadgen Service
  kubernetes.core.k8s:
    state: absent
    kind: Service
    name: "{{ loadgen_k8s_resource_name }}"
    namespace: "{{ k8s_namespace }}"

- name: Remove Fabric-X Loadgen NodePort Service
  kubernetes.core.k8s:
    state: absent
    kind: Service
    name: "{{ loadgen_k8s_resource_name }}-nodeport"
    namespace: "{{ k8s_namespace }}"
  when:
    - loadgen_k8s_web_node_port is defined or
      loadgen_k8s_metrics_node_port is defined or
      loadgen_k8s_rpc_node_port is defined

- name: Delete Fabric-X Loadgen LoadBalancer Service
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    name: "{{ loadgen_k8s_resource_name }}-loadbalancer"
    namespace: "{{ k8s_namespace }}"
  when:
    - loadgen_k8s_loadbalancer_expose_web_port or
      loadgen_k8s_loadbalancer_expose_metrics_port or
      loadgen_k8s_loadbalancer_expose_rpc_port
