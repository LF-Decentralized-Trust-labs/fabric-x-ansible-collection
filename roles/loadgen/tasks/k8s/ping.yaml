- name: Check that the loadgen node ports are open
  when: loadgen_k8s_use_node_port
  block:
    - name: Check that the web node port is open
      vars:
        utils_ports_to_ping:
          - "{{ loadgen_k8s_web_node_port }}"
      ansible.builtin.include_role:
        name: hyperledger.fabricx.utils
        tasks_from: ping
      when: loadgen_k8s_web_node_port is defined

    - name: Check that the gRPC node port is open
      vars:
        utils_ports_to_ping:
          - "{{ loadgen_k8s_rpc_node_port }}"
      ansible.builtin.include_role:
        name: hyperledger.fabricx.utils
        tasks_from: ping
      when: loadgen_k8s_rpc_node_port is defined

    - name: Check that the metrics node port is open
      vars:
        utils_ports_to_ping:
          - "{{ loadgen_k8s_metrics_node_port }}"
      ansible.builtin.include_role:
        name: hyperledger.fabricx.utils
        tasks_from: ping
      when: loadgen_k8s_metrics_node_port is defined
