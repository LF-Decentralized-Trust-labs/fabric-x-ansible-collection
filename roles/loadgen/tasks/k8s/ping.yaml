- name: Check that the Fabric-X Loadgen web node port is open
  vars:
    utils_ports_to_ping:
      - "{{ loadgen_k8s_web_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - loadgen_k8s_web_node_port is defined

- name: Check that the Fabric-X Loadgen web load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ loadgen_web_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - loadgen_k8s_loadbalancer_expose_web_port

