- name: Set effective loadgen limit-rate web port (NodePort)
  ansible.builtin.set_fact:
    loadgen_k8s_limit_rate_web_port: "{{ loadgen_k8s_web_node_port }}"
  when:
    - loadgen_use_k8s
    - loadgen_k8s_use_node_port
    - loadgen_k8s_web_node_port is defined

- name: Send HTTP POST request to set the new limit
  vars:
    loadgen_limit_rate_web_port: "{{ loadgen_k8s_limit_rate_web_port | default(loadgen_web_port) }}"
  ansible.builtin.uri:
    url: "http://{{ actual_host }}:{{ loadgen_limit_rate_web_port }}/setRateLimit"
    validate_certs: false
    method: POST
    body_format: json
    body: >-
      {{
        {
          'rate': loadgen_limit_rate | int
        }
      }}
    status_code: 200
