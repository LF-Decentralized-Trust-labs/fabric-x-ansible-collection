- name: Set effective loadgen metrics endpoint as OpenShift Route
  vars:
    loadgen_openshift_metrics_route_port: "{{ 443 if loadgen_monitoring_use_tls else 80 }}"
  ansible.builtin.set_fact:
    loadgen_metrics_endpoint: "{{ loadgen_monitoring_http_protocol }}://{{ loadgen_openshift_metrics_route }}:{{ loadgen_openshift_metrics_route_port }}/metrics"
  when:
    - loadgen_use_openshift
    - loadgen_openshift_metrics_route is defined

- name: Set effective loadgen metrics endpoint as k8s NodePort
  ansible.builtin.set_fact:
    loadgen_metrics_endpoint: "{{ loadgen_monitoring_http_protocol }}://{{ actual_host }}:{{ loadgen_k8s_metrics_node_port }}/metrics"
  when:
    - loadgen_openshift_metrics_route is not defined
    - loadgen_k8s_metrics_node_port is defined

- name: Get Fabric-X Loadgen metrics
  vars:
    loadgen_default_metrics_endpoint: "{{ loadgen_monitoring_http_protocol }}://{{ actual_host }}:{{ loadgen_metrics_port }}/metrics"
    loadgen_effective_metrics_endpoint: "{{ loadgen_metrics_endpoint | default(loadgen_default_metrics_endpoint) }}"
  ansible.builtin.uri:
    url: "{{ loadgen_effective_metrics_endpoint }}"
    validate_certs: false
    method: GET
    return_content: true
  register: loadgen_metrics

- name: Print Fabric-X Loadgen metrics
  ansible.builtin.debug:
    msg: "{{ loadgen_metrics.content }}"
  when:
    - not loadgen_assert_metrics

- name: Set the committed transaction count from Fabric-X Loadgen metrics
  ansible.builtin.set_fact:
    loadgen_tx_committed: >-
      {{
        loadgen_metrics.content
        | regex_findall('loadgen_transaction_committed_total\s+([0-9]+)')
        | default(['0'])
        | first
        | int
      }}
  when:
    - loadgen_assert_metrics

- name: Set the aborted transaction count from Fabric-X Loadgen metrics
  ansible.builtin.set_fact:
    loadgen_tx_aborted: >-
      {{
        loadgen_metrics.content
        | regex_findall('loadgen_transaction_aborted_total\s+([0-9]+)')
        | default(['0'])
        | first
        | int
      }}
  when:
    - loadgen_assert_metrics

- name: Assert the Fabric-X Loadgen committed transaction metric
  ansible.builtin.debug:
    msg:
      - "Transactions committed (>0): {{ loadgen_tx_committed }}"
      - "Transactions aborted: {{ loadgen_tx_aborted }}"
  when:
    - loadgen_assert_metrics
    - loadgen_tx_committed != 0

- name: Fail if no transactions committed
  ansible.builtin.fail:
    msg: "No transactions committed: {{ loadgen_tx_committed }}; transactions aborted: {{ loadgen_tx_aborted }}"
  when:
    - loadgen_assert_metrics
    - loadgen_tx_committed == 0
