---
argument_specs:
  _shared_options:
    options:
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - Base remote config directory that feeds C(loadgen_remote_config_dir).
      loadgen_remote_config_dir: &loadgen_remote_config_dir
        type: path
        required: false
        description:
          - Remote config directory used by Loadgen.
          - The default derives from C(remote_config_dir).
      loadgen_container_config_dir: &loadgen_container_config_dir
        type: path
        required: false
        default: "/config"
        description:
          - Config mount path inside a container or pod.
      loadgen_config_file: &loadgen_config_file
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Rendered Loadgen config filename.
      loadgen_config_dir: &loadgen_config_dir
        type: path
        required: false
        default: "{{ loadgen_remote_config_dir if loadgen_use_bin else loadgen_container_config_dir }}"
        description:
          - Effective config directory used inside rendered Loadgen configuration.
          - The default derives from C(loadgen_remote_config_dir), C(loadgen_use_bin), and C(loadgen_container_config_dir).
      loadgen_use_bin: &loadgen_use_bin
        type: bool
        required: false
        default: false
        description:
          - Run the binary runtime.
      loadgen_use_k8s: &loadgen_use_k8s
        type: bool
        required: false
        default: false
        description:
          - Use Kubernetes resources.
      loadgen_k8s_use_node_port: &loadgen_k8s_use_node_port
        type: bool
        required: false
        default: false
        description:
          - Expose the Kubernetes Service via NodePort when C(loadgen_use_k8s) is enabled.
          - This drives the HTTP, metrics, and gRPC NodePort access paths.
      loadgen_use_container: &loadgen_use_container
        type: bool
        required: false
        default: "{{ (not loadgen_use_bin) and (not loadgen_use_k8s) }}"
        description:
          - Run the container runtime.
          - The default derives from C(loadgen_use_bin) and C(loadgen_use_k8s).
      loadgen_registry_endpoint: &loadgen_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'LOADGEN_REGISTRY_ENDPOINT') or 'docker.io/hyperledger' }}"
        description:
          - Image registry endpoint.
      loadgen_image_name: &loadgen_image_name
        type: str
        required: false
        default: "fabric-x-loadgen"
        description:
          - Image name used by the Loadgen container.
      loadgen_image_tag: &loadgen_image_tag
        type: str
        required: false
        default: "0.1.9"
        description:
          - Image tag used by the Loadgen container.
      loadgen_image: &loadgen_image
        type: str
        required: false
        default: "{{ loadgen_registry_endpoint }}/{{ loadgen_image_name }}:{{ loadgen_image_tag }}"
        description:
          - Loadgen container image.
          - The default derives from C(loadgen_registry_endpoint), C(loadgen_image_name), and C(loadgen_image_tag).
      loadgen_container_name: &loadgen_container_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name used by the runtime.
      loadgen_git_hub_url: &loadgen_git_hub_url
        type: str
        required: false
        default: "github.com"
        description:
          - Git host used for binary builds.
      loadgen_git_repo: &loadgen_git_repo
        type: str
        required: false
        default: "hyperledger/fabric-x-committer"
        description:
          - Git repository that provides the Loadgen source.
      loadgen_git_commit: &loadgen_git_commit
        type: str
        required: false
        default: "v0.1.9"
        description:
          - Git revision used for binary builds and installs.
      loadgen_source_code_package: &loadgen_source_code_package
        type: str
        required: false
        default: "cmd/loadgen"
        description:
          - Go package path for the Loadgen binary.
      loadgen_bin_package: &loadgen_bin_package
        type: str
        required: false
        default: "{{ loadgen_git_hub_url }}/{{ loadgen_git_repo }}/{{ loadgen_source_code_package }}"
        description:
          - Go package used for binary installation.
          - The default derives from C(loadgen_git_hub_url), C(loadgen_git_repo), and C(loadgen_source_code_package).
      loadgen_bin_name: &loadgen_bin_name
        type: str
        required: false
        default: "loadgen"
        description:
          - Binary name used by the shared bin role.
      loadgen_type: &loadgen_type
        type: str
        required: true
        choices:
          - orderer-client
          - coordinator-client
          - verifier-client
          - validator-client
          - sidecar-client
        description:
          - Loadgen adapter type.
      loadgen_web_port: &loadgen_web_port
        type: int
        required: true
        description:
          - HTTP control port exposed by Loadgen.
      loadgen_metrics_port: &loadgen_metrics_port
        type: int
        required: true
        description:
          - Prometheus metrics port exposed by Loadgen.
      loadgen_rpc_port: &loadgen_rpc_port
        type: int
        required: true
        description:
          - gRPC control port exposed by Loadgen.
      loadgen_use_tls: &loadgen_use_tls
        type: bool
        required: false
        default: false
        description:
          - Enable TLS for the main endpoint.
      loadgen_use_mtls: &loadgen_use_mtls
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main endpoint.
      loadgen_monitoring_use_tls: &loadgen_monitoring_use_tls
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Enable TLS for the monitoring endpoint.
          - The default mirrors C(loadgen_use_tls).
      loadgen_monitoring_use_mtls: &loadgen_monitoring_use_mtls
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint.
          - The default mirrors C(loadgen_use_mtls).
      loadgen_monitoring_http_protocol: &loadgen_monitoring_http_protocol
        type: str
        required: false
        default: "{{ 'https' if loadgen_monitoring_use_tls else 'http' }}"
        description:
          - Protocol used to reach the monitoring endpoint.
      loadgen_assert_metrics: &loadgen_assert_metrics
        type: bool
        required: false
        default: false
        description:
          - Assert the latency metric when fetching metrics.
      loadgen_generate_config_block: &loadgen_generate_config_block
        type: bool
        required: false
        default: false
        description:
          - Render the config transaction block section.
      loadgen_generate_namespace: &loadgen_generate_namespace
        type: bool
        required: false
        description:
          - Render the namespace creation section.
      loadgen_generate_load: &loadgen_generate_load
        type: bool
        required: false
        description:
          - Render the transaction load section.
      loadgen_crypto_name: &loadgen_crypto_name
        type: str
        required: false
        default: "{{ organization.peer.name | default(inventory_hostname) }}"
        description:
          - Crypto identity name used for MSP and TLS file names.
          - The default derives from C(organization.peer.name) with C(inventory_hostname) fallback.
      loadgen_log_level: &loadgen_log_level
        type: str
        required: false
        default: "info"
        description:
          - Log level specification.
      loadgen_log_format: &loadgen_log_format
        type: str
        required: false
        default: "%{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc} -> %{level:.4s}%{color:reset} %{message}"
        description:
          - Log message format template.
      loadgen_broadcast_parallelism: &loadgen_broadcast_parallelism
        type: int
        required: false
        description:
          - Broadcast goroutine count used by the orderer client.
      loadgen_key_size: &loadgen_key_size
        type: int
        required: false
        description:
          - Generated key size in bytes.
      loadgen_tx_seed: &loadgen_tx_seed
        type: int
        required: false
        description:
          - Random seed used to build repeatable transaction streams.
      loadgen_workers: &loadgen_workers
        type: int
        required: false
        description:
          - Worker goroutine count used by the load profile.
      loadgen_block_max_size: &loadgen_block_max_size
        type: int
        required: false
        description:
          - Maximum generated block size.
      loadgen_block_min_size: &loadgen_block_min_size
        type: int
        required: false
        description:
          - Minimum generated block size.
      loadgen_block_preferred_rate: &loadgen_block_preferred_rate
        type: str
        required: false
        description:
          - Preferred block flush interval.
      loadgen_generate_read_only_tx: &loadgen_generate_read_only_tx
        type: bool
        required: false
        description:
          - Enable read-only transactions in the load profile.
      loadgen_read_only_tx_keys: &loadgen_read_only_tx_keys
        type: int
        required: false
        description:
          - Read-only key count per transaction.
      loadgen_generate_write_only_tx: &loadgen_generate_write_only_tx
        type: bool
        required: false
        description:
          - Enable write-only transactions in the load profile.
      loadgen_write_only_tx_keys: &loadgen_write_only_tx_keys
        type: int
        required: false
        description:
          - Write-only key count per transaction.
      loadgen_write_only_tx_val_size: &loadgen_write_only_tx_val_size
        type: int
        required: false
        description:
          - Write-only value size in bytes.
      loadgen_generate_read_write_tx: &loadgen_generate_read_write_tx
        type: bool
        required: false
        description:
          - Enable read-write transactions in the load profile.
      loadgen_read_write_tx_keys: &loadgen_read_write_tx_keys
        type: int
        required: false
        description:
          - Read-write key count per transaction.
      loadgen_read_write_tx_val_size: &loadgen_read_write_tx_val_size
        type: int
        required: false
        description:
          - Read-write value size in bytes.
      loadgen_key_scheme: &loadgen_key_scheme
        type: str
        required: false
        description:
          - Signature scheme used for generated identities.
      loadgen_query_settings: &loadgen_query_settings
        type: dict
        required: false
        description:
          - Optional query tuning block consumed by the load profile.
      loadgen_conflicts_settings: &loadgen_conflicts_settings
        type: dict
        required: false
        description:
          - Optional conflict injection block consumed by the load profile.
      loadgen_monitoring_rate_limit_requests_per_second:
        &loadgen_monitoring_rate_limit_requests_per_second
        type: int
        required: false
        description:
          - Monitoring endpoint rate limit in requests per second.
      loadgen_monitoring_rate_limit_burst: &loadgen_monitoring_rate_limit_burst
        type: int
        required: false
        description:
          - Monitoring endpoint rate limit burst size.
      loadgen_latency_sampler_prefix: &loadgen_latency_sampler_prefix
        type: str
        required: false
        description:
          - Prefix used by the latency sampler.
      loadgen_latency_sampler_portion: &loadgen_latency_sampler_portion
        type: float
        required: false
        description:
          - Portion of transactions sampled for latency tracking.
      loadgen_latency_distribution: &loadgen_latency_distribution
        type: str
        required: false
        description:
          - Histogram distribution used for latency buckets.
      loadgen_max_latency: &loadgen_max_latency
        type: str
        required: false
        description:
          - Upper latency bound tracked by the histogram.
      loadgen_latency_buckets: &loadgen_latency_buckets
        type: int
        required: false
        description:
          - Number of latency histogram buckets.
      loadgen_limit_rate: &loadgen_limit_rate
        type: int
        required: false
        default: 10
        description:
          - Maximum generated transaction rate.
      loadgen_limit_blocks: &loadgen_limit_blocks
        type: int
        required: false
        description:
          - Optional stopping limit for generated blocks.
      loadgen_limit_transactions: &loadgen_limit_transactions
        type: int
        required: false
        description:
          - Optional stopping limit for generated transactions.
      loadgen_stream_batches: &loadgen_stream_batches
        type: int
        required: false
        description:
          - Batch size used by the stream pipeline.
      loadgen_stream_buffers_size: &loadgen_stream_buffers_size
        type: int
        required: false
        description:
          - Channel buffer size used by the stream pipeline.
      loadgen_mock_orderer_ports: &loadgen_mock_orderer_ports
        type: list
        required: true
        description:
          - Mock orderer ports used by the sidecar client.
      loadgen_hosts: &loadgen_hosts
        type: list
        elements: str
        required: true
        description:
          - Inventory hosts running Loadgen instances.
      actual_host: &actual_host
        type: str
        required: true
        description:
          - Canonical host name used for metrics and Fabric CA enrollment.
      organization: &organization
        type: dict
        required: true
        description:
          - Organization definition consumed by crypto, config, and Kubernetes templates.
      channel_id: &channel_id
        type: str
        required: true
        description:
          - Channel identifier rendered into generated transactions.
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - Local artifacts directory used for fetched TLS and MSP files.
      cryptogen_artifacts_dir: &cryptogen_artifacts_dir
        type: path
        required: true
        description:
          - Local cryptogen output directory.
      committer_hosts: &committer_hosts
        type: list
        elements: str
        required: true
        description:
          - Committer inventory hosts used by the dispatcher to derive client targets.
      orderer_hosts: &orderer_hosts
        type: list
        elements: str
        required: true
        description:
          - Orderer inventory hosts used by the dispatcher to derive client targets.
      committer_coordinator_host: &committer_coordinator_host
        type: str
        required: true
        description:
          - Coordinator host targeted by the coordinator client.
      committer_validator_hosts: &committer_validator_hosts
        type: list
        elements: str
        required: true
        description:
          - Validator hosts targeted by the validator client.
      committer_verifier_hosts: &committer_verifier_hosts
        type: list
        elements: str
        required: true
        description:
          - Verifier hosts targeted by the verifier client.
      committer_sidecar_host: &committer_sidecar_host
        type: str
        required: false
        description:
          - Sidecar host targeted by the orderer and sidecar clients.
      orderer_router_hosts: &orderer_router_hosts
        type: list
        elements: str
        required: false
        description:
          - Orderer router hosts targeted by the orderer client.
      orderer_assembler_hosts: &orderer_assembler_hosts
        type: list
        elements: str
        required: false
        description:
          - Orderer assembler hosts targeted by the orderer client.
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - Kubernetes namespace used for loadgen resources.
      loadgen_k8s_resource_name: &loadgen_k8s_resource_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Kubernetes resource name used for the Deployment, Service, Secret, and optional NodePort Service.
      loadgen_k8s_wait_timeout: &loadgen_k8s_wait_timeout
        type: int
        required: false
        default: 120
        description:
          - Deployment rollout wait timeout in seconds.
      loadgen_k8s_fs_group: &loadgen_k8s_fs_group
        type: int
        required: false
        default: 10001
        description:
          - Pod FSGroup used for mounted config and secrets.
      loadgen_k8s_web_node_port: &loadgen_k8s_web_node_port
        type: int
        required: false
        default: "{{ loadgen_web_port }}"
        description:
          - NodePort used for the HTTP control port when C(loadgen_use_k8s) and C(loadgen_k8s_use_node_port) are true.
          - The default mirrors C(loadgen_web_port).
      loadgen_k8s_metrics_node_port: &loadgen_k8s_metrics_node_port
        type: int
        required: false
        default: "{{ loadgen_metrics_port }}"
        description:
          - NodePort used for the metrics port when C(loadgen_use_k8s) and C(loadgen_k8s_use_node_port) are true.
          - The default mirrors C(loadgen_metrics_port).
      loadgen_k8s_rpc_node_port: &loadgen_k8s_rpc_node_port
        type: int
        required: false
        default: "{{ loadgen_rpc_port }}"
        description:
          - NodePort used for the gRPC control port when C(loadgen_use_k8s) and C(loadgen_k8s_use_node_port) are true.
          - The default mirrors C(loadgen_rpc_port).
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        required: false
        description:
          - Optional image pull secret used by Kubernetes workloads.
      loadgen_mtls_clients: &loadgen_mtls_clients
        type: list
        elements: str
        required: false
        description:
          - Additional mTLS client identities trusted by the main endpoint.
      loadgen_mtls_orgs: &loadgen_mtls_orgs
        type: list
        elements: dict
        required: false
        description:
          - Additional mTLS organizations trusted by the main endpoint.
      loadgen_monitoring_mtls_clients: &loadgen_monitoring_mtls_clients
        type: list
        elements: str
        required: false
        description:
          - Additional mTLS client identities trusted by the monitoring endpoint.
      loadgen_monitoring_mtls_orgs: &loadgen_monitoring_mtls_orgs
        type: list
        elements: dict
        required: false
        description:
          - Additional mTLS organizations trusted by the monitoring endpoint.
      committer_validator_ref_host: &committer_validator_ref_host
        type: str
        required: false
        description:
          - Reference validator host used by the validator-client ConfigMap.
      committer_verifier_ref_host: &committer_verifier_ref_host
        type: str
        required: false
        description:
          - Reference verifier host used by the verifier-client ConfigMap.

  start:
    short_description: Start the load generator
    description:
      - Start the Loadgen runtime selected by the runtime mode flags.
    options:
      loadgen_use_container: *loadgen_use_container
      loadgen_use_bin: *loadgen_use_bin
      loadgen_use_k8s: *loadgen_use_k8s

  stop:
    short_description: Stop the load generator
    description:
      - Stop the active Loadgen runtime selected by the runtime mode flags.
    options:
      loadgen_use_container: *loadgen_use_container
      loadgen_use_bin: *loadgen_use_bin

  teardown:
    short_description: Remove runtime artifacts
    description:
      - Remove runtime resources for the active Loadgen deployment mode.
    options:
      loadgen_use_container: *loadgen_use_container
      loadgen_use_bin: *loadgen_use_bin
      loadgen_use_k8s: *loadgen_use_k8s

  wipe:
    short_description: Remove all load generator data
    description:
      - Remove runtime resources, binary artifacts, crypto material, and generated configuration.
    options:
      loadgen_use_bin: *loadgen_use_bin

  fetch_logs:
    short_description: Collect runtime logs
    description:
      - Collect Loadgen logs for the active runtime mode.
    options:
      loadgen_use_container: *loadgen_use_container
      loadgen_use_bin: *loadgen_use_bin
      loadgen_use_k8s: *loadgen_use_k8s

  ping:
    short_description: Check the HTTP endpoint
    description:
      - Verify that the Loadgen HTTP control port is reachable.
    options:
      loadgen_web_port: *loadgen_web_port
      loadgen_use_k8s: *loadgen_use_k8s

  get_metrics:
    short_description: Fetch exported metrics
    description:
      - Query the Loadgen metrics endpoint.
    options:
      actual_host: *actual_host
      loadgen_metrics_port: *loadgen_metrics_port
      loadgen_k8s_metrics_node_port: *loadgen_k8s_metrics_node_port
      loadgen_monitoring_http_protocol: *loadgen_monitoring_http_protocol
      loadgen_monitoring_use_tls: *loadgen_monitoring_use_tls
      loadgen_use_tls: *loadgen_use_tls
      loadgen_assert_metrics: *loadgen_assert_metrics
      loadgen_use_k8s: *loadgen_use_k8s
      loadgen_k8s_use_node_port: *loadgen_k8s_use_node_port

  limit_rate:
    short_description: Update the runtime rate limit
    description:
      - Send an HTTP request that updates the generated transaction rate.
    options:
      actual_host: *actual_host
      loadgen_web_port: *loadgen_web_port
      loadgen_k8s_web_node_port: *loadgen_k8s_web_node_port
      loadgen_limit_rate: *loadgen_limit_rate
      loadgen_use_k8s: *loadgen_use_k8s
      loadgen_k8s_use_node_port: *loadgen_k8s_use_node_port

  prometheus/get_scrapers:
    short_description: Build Prometheus scrape targets
    description:
      - Build the Prometheus scrape service definition for all Loadgen hosts.
    options:
      loadgen_hosts: *loadgen_hosts
      fetched_artifacts_dir: *fetched_artifacts_dir
      loadgen_metrics_port: *loadgen_metrics_port

  config/transfer:
    short_description: Dispatch configuration rendering
    description:
      - Render and transfer Loadgen configuration for the selected adapter type.
    options:
      loadgen_type: *loadgen_type
      committer_hosts: *committer_hosts
      orderer_hosts: *orderer_hosts
      loadgen_monitoring_use_mtls: *loadgen_monitoring_use_mtls

  config/orderer-client/transfer:
    short_description: Render orderer client configuration
    description:
      - Render the orderer-client Loadgen configuration and related TLS assets.
    options:
      remote_config_dir: *remote_config_dir
      loadgen_remote_config_dir: *loadgen_remote_config_dir
      loadgen_container_config_dir: *loadgen_container_config_dir
      loadgen_config_dir: *loadgen_config_dir
      loadgen_config_file: *loadgen_config_file
      loadgen_use_bin: *loadgen_use_bin
      loadgen_use_k8s: *loadgen_use_k8s
      loadgen_use_tls: *loadgen_use_tls
      loadgen_monitoring_use_tls: *loadgen_monitoring_use_tls
      loadgen_use_mtls: *loadgen_use_mtls
      loadgen_monitoring_use_mtls: *loadgen_monitoring_use_mtls
      loadgen_mtls_clients: *loadgen_mtls_clients
      loadgen_mtls_orgs: *loadgen_mtls_orgs
      loadgen_monitoring_mtls_clients: *loadgen_monitoring_mtls_clients
      loadgen_monitoring_mtls_orgs: *loadgen_monitoring_mtls_orgs
      loadgen_web_port: *loadgen_web_port
      loadgen_metrics_port: *loadgen_metrics_port
      loadgen_rpc_port: *loadgen_rpc_port
      loadgen_generate_config_block: *loadgen_generate_config_block
      loadgen_generate_namespace: *loadgen_generate_namespace
      loadgen_generate_load: *loadgen_generate_load
      loadgen_key_size: *loadgen_key_size
      loadgen_tx_seed: *loadgen_tx_seed
      loadgen_workers: *loadgen_workers
      loadgen_block_max_size: *loadgen_block_max_size
      loadgen_block_min_size: *loadgen_block_min_size
      loadgen_block_preferred_rate: *loadgen_block_preferred_rate
      loadgen_generate_read_only_tx: *loadgen_generate_read_only_tx
      loadgen_read_only_tx_keys: *loadgen_read_only_tx_keys
      loadgen_generate_write_only_tx: *loadgen_generate_write_only_tx
      loadgen_write_only_tx_keys: *loadgen_write_only_tx_keys
      loadgen_write_only_tx_val_size: *loadgen_write_only_tx_val_size
      loadgen_generate_read_write_tx: *loadgen_generate_read_write_tx
      loadgen_read_write_tx_keys: *loadgen_read_write_tx_keys
      loadgen_read_write_tx_val_size: *loadgen_read_write_tx_val_size
      loadgen_key_scheme: *loadgen_key_scheme
      loadgen_monitoring_rate_limit_requests_per_second: *loadgen_monitoring_rate_limit_requests_per_second
      loadgen_monitoring_rate_limit_burst: *loadgen_monitoring_rate_limit_burst
      loadgen_latency_sampler_prefix: *loadgen_latency_sampler_prefix
      loadgen_latency_sampler_portion: *loadgen_latency_sampler_portion
      loadgen_latency_distribution: *loadgen_latency_distribution
      loadgen_max_latency: *loadgen_max_latency
      loadgen_latency_buckets: *loadgen_latency_buckets
      loadgen_limit_rate: *loadgen_limit_rate
      loadgen_stream_batches: *loadgen_stream_batches
      loadgen_stream_buffers_size: *loadgen_stream_buffers_size
      loadgen_log_level: *loadgen_log_level
      loadgen_log_format: *loadgen_log_format
      fetched_artifacts_dir: *fetched_artifacts_dir
      channel_id: *channel_id
      organization: *organization
      orderer_router_hosts: *orderer_router_hosts
      orderer_assembler_hosts: *orderer_assembler_hosts
      committer_sidecar_host: *committer_sidecar_host
      loadgen_broadcast_parallelism: *loadgen_broadcast_parallelism
