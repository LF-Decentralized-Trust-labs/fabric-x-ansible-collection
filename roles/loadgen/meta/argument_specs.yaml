        required: false
        default: "/config"
        description:
          - Config path used inside a container or pod.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Render host paths suitable for a binary deployment.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also publish the rendered configuration as a Kubernetes ConfigMap.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port rendered into the config.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port rendered into the config.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port rendered into the config.
      channel_id:
        type: str
        required: true
        description:
          - "Channel identifier used in generated transactions. Example: C(system-channel)."
      committer_verifier_hosts:
        type: list
        elements: str
        required: true
        description:
          - Verifier hosts targeted by the verifier client.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched verifier TLS artifacts.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main gRPC endpoint in the generated config.
      loadgen_monitoring_use_mtls:
