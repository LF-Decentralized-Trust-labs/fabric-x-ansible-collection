      loadgen_use_openshift: *loadgen_use_openshift

  bin/build:
    short_description: Build the load generator binary
    description:
      - Build the C(loadgen) binary from the configured Fabric-X source repository.
      - Uses the shared binary helper role and the configured Git host, repository, revision, and Go package path.
