      - Does not remove generated configuration, crypto material, or runtime logs.
    options:
      loadgen_bin_name: *loadgen_bin_name

  bin/start:
    short_description: Start the binary runtime
    description:
      - Start Loadgen as a local binary process using the rendered config file.
      - Waits on the HTTP control port after invoking C(loadgen start --config=...).
