        required: false
        default: "/config"
        description:
          - Config path used inside a container or pod.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Render host paths suitable for a binary deployment.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also publish the rendered configuration as a Kubernetes ConfigMap.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port rendered into the config.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port rendered into the config.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port rendered into the config.
      channel_id:
        type: str
        required: true
        description:
          - "Channel identifier used in generated transactions. Example: C(system-channel)."
      committer_coordinator_host:
        type: str
        required: false
        description:
          - Coordinator host to target when TLS artifacts are required.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched coordinator TLS artifacts.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main gRPC endpoint in the generated config.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint in the generated config.

  config/verifier-client/transfer:
    short_description: Render verifier client configuration
    description:
      - Render the verifier-client load generator configuration and related TLS assets.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory where the configuration is written.
      loadgen_container_config_dir:
