      loadgen_bin_name: *loadgen_bin_name
      loadgen_git_hub_url: *loadgen_git_hub_url
      loadgen_git_repo: *loadgen_git_repo
      loadgen_git_commit: *loadgen_git_commit
      loadgen_source_code_package: *loadgen_source_code_package
      loadgen_bin_package: *loadgen_bin_package

  bin/install:
    short_description: Install the load generator binary
    description:
      - Install the C(loadgen) binary through the shared binary helper role.
      - Consumes the configured Go package and source revision so binary deployments can start the local process.
    options:
      loadgen_bin_name: *loadgen_bin_name
      loadgen_bin_package: *loadgen_bin_package
