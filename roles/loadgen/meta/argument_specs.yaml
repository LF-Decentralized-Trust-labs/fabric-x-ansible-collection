---
argument_specs:

  start:
    short_description: Start the load generator
    description:
      - Start the Fabric-X load generator using the configured runtime mode.
      - Exactly one runtime mode should be enabled for predictable execution.
    options:
      loadgen_use_container:
        type: bool
        required: false
        default: true
        description:
          - Run the load generator as a local container.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Run the load generator as a local binary.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Run the load generator on Kubernetes.

  stop:
    short_description: Stop the load generator
    description:
      - Stop the Fabric-X load generator in the configured runtime mode.
    options:
      loadgen_use_container:
        type: bool
        required: false
        default: true
        description:
          - Stop a containerized load generator.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Stop a binary load generator.

  teardown:
    short_description: Remove runtime artifacts
    description:
      - Remove runtime resources for the configured load generator deployment.
    options:
      loadgen_use_container:
        type: bool
        required: false
        default: true
        description:
          - Remove the container runtime resources.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Stop the binary runtime before cleanup.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Remove Kubernetes resources.

  wipe:
    short_description: Remove all load generator data
    description:
      - Remove runtime resources, binary artifacts, crypto material, and generated configuration.
    options:
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Remove the installed binary during cleanup.

  fetch_logs:
    short_description: Collect runtime logs
    description:
      - Collect load generator logs from the configured runtime mode.
    options:
      loadgen_use_container:
        type: bool
        required: false
        default: true
        description:
          - Collect logs from the container runtime.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Collect logs from the binary runtime.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Collect logs from Kubernetes pods.

  get_metrics:
    short_description: Fetch exported metrics
    description:
      - Query the load generator metrics endpoint over HTTP or HTTPS.
    options:
      actual_host:
        type: str
        required: true
        description:
          - "Hostname or address of the target load generator. Example: C(loadgen01.example.com)."
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Port exposing Prometheus metrics.
      loadgen_monitoring_http_protocol:
        type: str
        required: false
        default: "{{ 'https' if loadgen_monitoring_use_tls else 'http' }}"
        description:
          - Protocol used to reach the monitoring endpoint.
      loadgen_assert_metrics:
        type: bool
        required: false
        default: false
        description:
          - Assert that the latency metric is greater than zero instead of just printing metrics.

  limit_rate:
    short_description: Update the runtime rate limit
    description:
      - Send an HTTP request to update the load generation rate.
    options:
      actual_host:
        type: str
        required: true
        description:
          - "Hostname or address of the target load generator. Example: C(loadgen01.example.com)."
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port exposed by the load generator.
      loadgen_limit_rate:
        type: int
        required: true
        description:
          - New transaction rate limit to apply per second.

  ping:
    short_description: Check the HTTP endpoint
    description:
      - Verify that the load generator HTTP control port is reachable.
    options:
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port to probe.

  prometheus/get_scrapers:
    short_description: Build Prometheus scrape targets
    description:
      - Build the Prometheus scrape service definition for all load generator hosts.
    options:
      loadgen_hosts:
        type: list
        elements: str
        required: true
        description:
          - Inventory hosts running the load generator.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory that stores fetched TLS artifacts.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port to scrape on each load generator host.

  bin/build:
    short_description: Build the load generator binary
    description:
      - Build the Fabric-X load generator binary from source through the shared bin role.
    options:
      loadgen_bin_name:
        type: str
        required: false
        default: "loadgen"
        description:
          - Name of the generated binary.
      loadgen_git_hub_url:
        type: str
        required: false
        default: "github.com"
        description:
          - Git hosting endpoint for the source repository.
      loadgen_git_repo:
        type: str
        required: false
        default: "hyperledger/fabric-x-committer"
        description:
          - Source repository containing the load generator package.
      loadgen_git_commit:
        type: str
        required: false
        default: "v0.1.9"
        description:
          - Git reference to build.
      loadgen_source_code_package:
        type: str
        required: false
        default: "cmd/loadgen"
        description:
          - Go package path to build from the repository.

  bin/install:
    short_description: Install the load generator binary
    description:
      - Install the Fabric-X load generator binary through the shared bin role.
    options:
      loadgen_bin_name:
        type: str
        required: false
        default: "loadgen"
        description:
          - Name of the installed binary.
      loadgen_bin_package:
        type: str
        required: false
        default: "{{ loadgen_git_hub_url }}/{{ loadgen_git_repo }}/{{ loadgen_source_code_package }}"
        description:
          - Go package used for installation.
      loadgen_git_commit:
        type: str
        required: false
        default: "v0.1.9"
        description:
          - Git reference to install.

  bin/rm:
    short_description: Remove the load generator binary
    description:
      - Remove the installed Fabric-X load generator binary.
    options:
      loadgen_bin_name:
        type: str
        required: false
        default: "loadgen"
        description:
          - Name of the binary to remove.

  bin/start:
    short_description: Start the binary runtime
    description:
      - Start the Fabric-X load generator as a local binary process.
    options:
      loadgen_bin_name:
        type: str
        required: false
        default: "loadgen"
        description:
          - Executable name used to start the process.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory containing the rendered load generator configuration.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port to wait for after startup.

  bin/stop:
    short_description: Stop the binary runtime
    description:
      - Stop the Fabric-X load generator binary process.
    options: {}

  bin/transfer:
    short_description: Transfer the load generator binary
    description:
      - Transfer the Fabric-X load generator binary through the shared bin role.
    options:
      loadgen_bin_name:
        type: str
        required: false
        default: "loadgen"
        description:
          - Name of the binary to transfer.

  bin/fetch_logs:
    short_description: Fetch binary logs
    description:
      - Collect logs from a binary-based load generator runtime.
    options: {}

  container/start:
    short_description: Start the container runtime
    description:
      - Start the Fabric-X load generator as a local container.
    options:
      loadgen_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name to create or replace.
      loadgen_image:
        type: str
        required: false
        default: "{{ loadgen_registry_endpoint }}/{{ loadgen_image_name }}:{{ loadgen_image_tag }}"
        description:
          - Container image used for the load generator.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Host directory containing the rendered load generator configuration.
      loadgen_container_config_dir:
        type: path
        required: false
        default: "/config"
        description:
          - Config mount path inside the container.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port exposed by the container.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port exposed by the container.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port exposed by the container.

  container/stop:
    short_description: Stop the container runtime
    description:
      - Stop the Fabric-X load generator container.
    options:
      loadgen_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name to stop.
      loadgen_image:
        type: str
        required: false
        default: "{{ loadgen_registry_endpoint }}/{{ loadgen_image_name }}:{{ loadgen_image_tag }}"
        description:
          - Container image recorded for the runtime.

  container/rm:
    short_description: Remove the container runtime
    description:
      - Remove the Fabric-X load generator container and image reference.
    options:
      loadgen_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name to remove.
      loadgen_image:
        type: str
        required: false
        default: "{{ loadgen_registry_endpoint }}/{{ loadgen_image_name }}:{{ loadgen_image_tag }}"
        description:
          - Container image recorded for the runtime.

  container/fetch_logs:
    short_description: Fetch container logs
    description:
      - Collect logs from a containerized load generator runtime.
    options:
      loadgen_container_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Container name to collect logs from.

  crypto/setup:
    short_description: Prepare crypto material
    description:
      - Prepare the load generator MSP and TLS artifacts using cryptogen or Fabric CA.
    options:
      organization:
        type: dict
        required: true
        description:
          - Organization definition assigned to the load generator. It must describe a peer organization.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also create a Kubernetes Secret after preparing crypto material.

  crypto/cryptogen/transfer:
    short_description: Transfer cryptogen artifacts
    description:
      - Transfer MSP and TLS artifacts generated by cryptogen to the load generator host.
    options:
      organization:
        type: dict
        required: true
        description:
          - Peer organization definition used to locate generated artifacts.
      cryptogen_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing cryptogen output.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory where MSP and TLS artifacts are stored.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Transfer TLS artifacts for the main gRPC endpoint.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Transfer TLS artifacts for the monitoring endpoint.

  crypto/fabric_ca/enroll:
    short_description: Enroll identities with Fabric CA
    description:
      - Enroll the load generator peer and user identities against Fabric CA.
    options:
      organization:
        type: dict
        required: true
        description:
          - Peer organization definition containing Fabric CA connection data.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched TLS CA certificates.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory where MSP and TLS artifacts are stored.
      actual_host:
        type: str
        required: true
        description:
          - "Canonical hostname or address used in TLS CSR host lists. Example: C(loadgen01.example.com)."
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Enroll a TLS identity for the main gRPC endpoint.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Enroll a TLS identity for the monitoring endpoint.

  crypto/fetch:
    short_description: Fetch generated certificates
    description:
      - Fetch load generator MSP signcerts and TLS certificates back to the control node.
    options:
      organization:
        type: dict
        required: false
        description:
          - Organization definition used when fetching user signcerts.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory where fetched artifacts are written.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory containing generated MSP and TLS artifacts.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Fetch TLS artifacts for the main gRPC endpoint.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Fetch TLS artifacts for the monitoring endpoint.

  crypto/rm:
    short_description: Remove crypto material
    description:
      - Remove load generator MSP and TLS artifacts from the host and optionally from Kubernetes.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory containing generated MSP and TLS artifacts.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Remove TLS artifacts for the main gRPC endpoint.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Remove TLS artifacts for the monitoring endpoint.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also remove the Kubernetes Secret.

  config/transfer:
    short_description: Dispatch configuration rendering
    description:
      - Render and transfer load generator configuration for the selected adapter type.
    options:
      loadgen_type:
        type: str
        required: true
        choices:
          - orderer-client
          - coordinator-client
          - verifier-client
          - validator-client
          - sidecar-client
        description:
          - Adapter configuration to render.
      committer_hosts:
        type: list
        elements: str
        required: false
        description:
          - Committer hosts used to derive coordinator, sidecar, validator, and verifier targets.
      orderer_hosts:
        type: list
        elements: str
        required: false
        description:
          - Orderer hosts used to derive router and assembler targets for the orderer client.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Transfer additional monitoring mTLS CA bundles after rendering the config.

  config/orderer-client/transfer:
    short_description: Render orderer client configuration
    description:
      - Render the orderer-client load generator configuration and related TLS assets.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory where the configuration is written.
      loadgen_container_config_dir:
        type: path
        required: false
        default: "/config"
        description:
          - Config path used inside a container or pod.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Render host paths suitable for a binary deployment.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also publish the rendered configuration as a Kubernetes ConfigMap.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port rendered into the config.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port rendered into the config.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port rendered into the config.
      channel_id:
        type: str
        required: true
        description:
          - "Channel identifier used in generated transactions. Example: C(system-channel)."
      organization:
        type: dict
        required: true
        description:
          - Organization definition used to render MSP settings and orderer endpoints.
      orderer_router_hosts:
        type: list
        elements: str
        required: true
        description:
          - Orderer router hosts targeted by the orderer client.
      orderer_assembler_hosts:
        type: list
        elements: str
        required: false
        description:
          - Orderer assembler hosts used for deliver endpoints.
      committer_sidecar_host:
        type: str
        required: false
        description:
          - Optional sidecar host used for block delivery.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched orderer and sidecar TLS artifacts.
      loadgen_generate_config_block:
        type: bool
        required: false
        default: false
        description:
          - Render the config-transaction generation phase into the config.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main gRPC endpoint in the generated config.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint in the generated config.

  config/coordinator-client/transfer:
    short_description: Render coordinator client configuration
    description:
      - Render the coordinator-client load generator configuration and related TLS assets.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
