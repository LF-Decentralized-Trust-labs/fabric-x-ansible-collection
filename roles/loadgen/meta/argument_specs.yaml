        description:
          - "Channel identifier used in generated transactions. Example: C(system-channel)."
      committer_validator_hosts:
        type: list
        elements: str
        required: true
        description:
          - Validator hosts targeted by the validator client.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched validator TLS artifacts.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main gRPC endpoint in the generated config.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint in the generated config.

  config/sidecar-client/transfer:
    short_description: Render sidecar client configuration
    description:
      - Render the sidecar-client load generator configuration and related TLS assets.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory where the configuration is written.
      loadgen_container_config_dir:
        type: path
        required: false
        default: "/config"
        description:
          - Config path used inside a container or pod.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_use_bin:
        type: bool
        required: false
        default: false
        description:
          - Render host paths suitable for a binary deployment.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also publish the rendered configuration as a Kubernetes ConfigMap.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port rendered into the config.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port rendered into the config.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port rendered into the config.
      channel_id:
        type: str
        required: true
        description:
          - "Channel identifier used in generated transactions. Example: C(system-channel)."
      committer_verifier_hosts:
        type: list
        elements: str
        required: true
        description:
          - Verifier hosts used to derive the sidecar target.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched sidecar TLS artifacts.
      loadgen_mock_orderer_ports:
        type: list
        elements: int
        required: true
        description:
          - Mock orderer ports exposed by the sidecar client configuration.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Enable mTLS for the main gRPC endpoint in the generated config.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Enable mTLS for the monitoring endpoint in the generated config.

  config/mtls/monitoring/transfer:
    short_description: Transfer monitoring mTLS CA bundles
    description:
      - Transfer CA bundles trusted by the monitoring endpoint for mTLS clients and organizations.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory containing monitoring mTLS CA bundles.
      fetched_artifacts_dir:
        type: path
        required: true
        description:
          - Local directory containing fetched TLS artifacts.
      loadgen_monitoring_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - Additional client identities trusted by the monitoring endpoint.
      loadgen_monitoring_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - Additional organizations trusted by the monitoring endpoint.

  config/rm:
    short_description: Remove rendered configuration
    description:
      - Remove host-side configuration files and optionally the Kubernetes ConfigMap.
    options:
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Remote directory containing rendered configuration files.
      loadgen_use_k8s:
        type: bool
        required: false
        default: false
        description:
          - Also remove the Kubernetes ConfigMap.

  k8s/start:
    short_description: Start the Kubernetes deployment
    description:
      - Create the Kubernetes Service, NodePort Service, and Deployment for the load generator.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where resources are created.
      loadgen_type:
        type: str
        required: true
        choices:
          - orderer-client
          - coordinator-client
          - verifier-client
          - validator-client
          - sidecar-client
        description:
          - Adapter deployment to render.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name used for Kubernetes resources.
      loadgen_image:
        type: str
        required: false
        default: "{{ loadgen_registry_endpoint }}/{{ loadgen_image_name }}:{{ loadgen_image_tag }}"
        description:
          - Container image used by the Deployment.
      loadgen_container_config_dir:
        type: path
        required: false
        default: "/config"
        description:
          - Config mount path inside the pod.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_web_port:
        type: int
        required: true
        description:
          - HTTP control port exposed by the Services and Deployment.
      loadgen_metrics_port:
        type: int
        required: true
        description:
          - Metrics port exposed by the Services and Deployment.
      loadgen_rpc_port:
        type: int
        required: true
        description:
          - gRPC control port exposed by the Services and Deployment.
      loadgen_k8s_web_node_port:
        type: int
        required: false
        default: "{{ loadgen_web_port }}"
        description:
          - NodePort used for the HTTP control port.
      loadgen_k8s_metrics_node_port:
        type: int
        required: false
        default: "{{ loadgen_metrics_port }}"
        description:
          - NodePort used for the metrics port.
      loadgen_k8s_rpc_node_port:
        type: int
        required: false
        default: "{{ loadgen_rpc_port }}"
        description:
          - NodePort used for the gRPC control port.
      loadgen_k8s_wait:
        type: bool
        required: false
        default: true
        description:
          - Wait for the Deployment rollout to complete.
      loadgen_k8s_wait_timeout:
        type: int
        required: false
        default: 120
        description:
          - Deployment wait timeout in seconds.
      loadgen_k8s_fs_group:
        type: int
        required: false
        default: 10001
        description:
          - Pod filesystem group used to read mounted config and secrets.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Mount TLS material for the main gRPC endpoint.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Mount TLS material for the monitoring endpoint.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Mount mTLS CA bundles for the main gRPC endpoint.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Mount mTLS CA bundles for the monitoring endpoint.
      loadgen_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - Additional client identities trusted by the main gRPC endpoint.
      loadgen_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - Additional organizations trusted by the main gRPC endpoint.
      loadgen_monitoring_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - Additional client identities trusted by the monitoring endpoint.
      loadgen_monitoring_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - Additional organizations trusted by the monitoring endpoint.
      committer_hosts:
        type: list
        elements: str
        required: false
        description:
          - Committer hosts used to derive coordinator, sidecar, validator, and verifier targets.
      orderer_hosts:
        type: list
        elements: str
        required: false
        description:
          - Orderer hosts used to derive router and assembler targets for the orderer client.
      organization:
        type: dict
        required: false
        description:
          - Organization definition used by templates that mount MSP user artifacts.
      k8s_image_pull_secret:
        type: str
        required: false
        description:
          - Optional image pull secret used by the pod.

  k8s/rm:
    short_description: Remove Kubernetes resources
    description:
      - Remove the Kubernetes Deployment and Services created for the load generator.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where resources are removed.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name of the Kubernetes resources to remove.

  k8s/fetch_logs:
    short_description: Fetch pod logs
    description:
      - Collect logs from the Kubernetes pod running the load generator.
    options:
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base label used to select the target pod.

  k8s/config/transfer:
    short_description: Publish the Kubernetes ConfigMap
    description:
      - Publish the rendered load generator configuration and CA bundles as a ConfigMap.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where the ConfigMap is created.
      loadgen_type:
        type: str
        required: true
        choices:
          - orderer-client
          - coordinator-client
          - verifier-client
          - validator-client
          - sidecar-client
        description:
          - Adapter configuration to publish.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name used for the ConfigMap.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Host directory containing the rendered configuration and CA bundles.
      loadgen_config_file:
        type: str
        required: false
        default: "config-loadgen.yaml"
        description:
          - Load generator configuration filename.
      loadgen_use_mtls:
        type: bool
        required: false
        default: false
        description:
          - Include main endpoint mTLS CA bundles in the ConfigMap.
      loadgen_monitoring_use_mtls:
        type: bool
        required: false
        default: "{{ loadgen_use_mtls }}"
        description:
          - Include monitoring mTLS CA bundles in the ConfigMap.
      loadgen_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - Additional client identities trusted by the main gRPC endpoint.
      loadgen_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - Additional organizations trusted by the main gRPC endpoint.
      loadgen_monitoring_mtls_clients:
        type: list
        elements: str
        required: false
        description:
          - Additional client identities trusted by the monitoring endpoint.
      loadgen_monitoring_mtls_orgs:
        type: list
        elements: dict
        required: false
        description:
          - Additional organizations trusted by the monitoring endpoint.
      orderer_router_hosts:
        type: list
        elements: str
        required: false
        description:
          - Orderer router hosts referenced by the orderer-client ConfigMap.
      orderer_assembler_hosts:
        type: list
        elements: str
        required: false
        description:
          - Orderer assembler hosts referenced by the orderer-client ConfigMap.
      committer_sidecar_host:
        type: str
        required: false
        description:
          - Sidecar host referenced by orderer-client or sidecar-client ConfigMaps.
      committer_coordinator_host:
        type: str
        required: false
        description:
          - Coordinator host referenced by the coordinator-client ConfigMap.
      committer_verifier_ref_host:
        type: str
        required: false
        description:
          - Reference verifier host referenced by the verifier-client ConfigMap.
      committer_validator_ref_host:
        type: str
        required: false
        description:
          - Reference validator host referenced by the validator-client ConfigMap.

  k8s/config/rm:
    short_description: Remove the Kubernetes ConfigMap
    description:
      - Remove the ConfigMap created for the load generator configuration.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where the ConfigMap is removed.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name used for the ConfigMap.

  k8s/crypto/transfer:
    short_description: Publish the Kubernetes Secret
    description:
      - Publish the load generator MSP and TLS material as a Kubernetes Secret.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where the Secret is created.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name used for the Secret.
      loadgen_remote_config_dir:
        type: path
        required: true
        description:
          - Host directory containing the generated MSP and TLS material.
      organization:
        type: dict
        required: true
        description:
          - Organization definition used to resolve MSP files and user artifacts.
      loadgen_crypto_name:
        type: str
        required: false
        default: "{{ organization.peer.name | default(inventory_hostname) }}"
        description:
          - Crypto identity name used to build the cryptogen signcert filename.
      loadgen_type:
        type: str
        required: true
        choices:
          - orderer-client
          - coordinator-client
          - verifier-client
          - validator-client
          - sidecar-client
        description:
          - Adapter deployment associated with the Secret.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Include TLS server material in the Secret.
      loadgen_monitoring_use_tls:
        type: bool
        required: false
        default: "{{ loadgen_use_tls }}"
        description:
          - Include monitoring TLS material in the Secret.

  k8s/crypto/rm:
    short_description: Remove the Kubernetes Secret
    description:
      - Remove the Secret created for load generator MSP and TLS material.
    options:
      k8s_namespace:
        type: str
        required: true
        description:
          - Kubernetes namespace where the Secret is removed.
      loadgen_k8s_resource_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - Base name used for the Secret.
      loadgen_use_tls:
        type: bool
        required: false
        default: false
        description:
          - Remove the Secret only when TLS material was created.
