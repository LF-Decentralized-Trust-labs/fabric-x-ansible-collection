- name: Check that the Jaeger UI node port is open
  vars:
    utils_ports_to_ping:
      - "{{ jaeger_k8s_ui_node_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - jaeger_k8s_ui_node_port is defined

- name: Check that the Jaeger UI load balancer port is open
  vars:
    utils_ports_to_ping:
      - "{{ jaeger_ui_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when:
    - jaeger_k8s_loadbalancer_expose_ui_port

