- name: Start Jaeger workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.jaeger
    tasks_from: k8s/start

- name: Apply Jaeger ui OpenShift Route
  vars:
    openshift_route_name: "{{ jaeger_k8s_resource_name }}-ui"
    openshift_route_host: "{{ jaeger_openshift_ui_route }}"
    openshift_route_service_name: "{{ jaeger_k8s_resource_name }}"
    openshift_route_service_port: ui
    openshift_route_use_tls: false
    openshift_route_labels:
      app.kubernetes.io/name: "{{ jaeger_k8s_resource_name }}"
      app.kubernetes.io/component: "jaeger"
      app.kubernetes.io/part-of: "monitoring"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/apply
  when: jaeger_openshift_ui_route is defined

