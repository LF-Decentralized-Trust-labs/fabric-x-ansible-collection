- name: Delete Jaeger collector OpenShift Route
  vars:
    openshift_route_name: "{{ jaeger_k8s_resource_name }}-collector"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.openshift
    tasks_from: route/rm
  when: jaeger_openshift_collector_route is defined

- name: Remove Jaeger workload using generic k8s flow
  ansible.builtin.include_role:
    name: hyperledger.fabricx.jaeger
    tasks_from: k8s/rm
