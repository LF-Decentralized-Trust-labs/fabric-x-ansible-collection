# =======================
# bin / container
# =======================
- name: Check that the Jaeger ports are open
  vars:
    utils_ports_to_ping:
      - "{{ jaeger_ui_port }}"
      - "{{ jaeger_admin_port }}"
      - "{{ jaeger_http_server_port }}"
      - "{{ jaeger_http_collector_port }}"
      - "{{ jaeger_grpc_server_port }}"
      - "{{ jaeger_collector_port }}"
  ansible.builtin.include_role:
    name: hyperledger.fabricx.utils
    tasks_from: ping
  when: not jaeger_use_k8s

# =======================
# k8s
# =======================
- name: Check that the node ports are open
  ansible.builtin.include_role:
    name: hyperledger.fabricx.jaeger
    tasks_from: k8s/ping
  when: jaeger_use_k8s
