- name: Ensure Jaeger config directory exists
  ansible.builtin.file:
    path: "{{ jaeger_remote_config_dir }}"
    state: directory
    mode: "0o755"

- name: Transfer the ElasticSearch TLS CA certificate
  when:
    - hostvars[elasticsearch_host].elasticsearch_use_tls is defined
    - hostvars[elasticsearch_host].elasticsearch_use_tls
  block:
    - name: Ensure the TLS directory for ElasticSearch CA cert exists
      ansible.builtin.file:
        path: "{{ jaeger_remote_config_dir }}/tls/{{ elasticsearch_host }}"
        state: directory
        mode: "0o755"
    - name: Copy the ElasticSearch TLS CA certificate
      ansible.builtin.copy:
        src: "{{ fetched_artifacts_dir }}/{{ elasticsearch_host }}/tls/ca.crt"
        dest: "{{ jaeger_remote_config_dir }}/tls/{{ elasticsearch_host }}/ca.crt"
        mode: preserve

- name: Transfer Jaeger Kubernetes ConfigMap
  ansible.builtin.include_role:
    name: hyperledger.fabricx.jaeger
    tasks_from: k8s/config/transfer
  when: jaeger_use_k8s or jaeger_use_openshift
