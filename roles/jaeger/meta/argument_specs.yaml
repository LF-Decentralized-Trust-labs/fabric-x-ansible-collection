---
argument_specs:
  role-options:
    short_description: Shared option catalog for jaeger role entry points
    options:
      jaeger_use_container: &jaeger_use_container
        type: bool
        required: false
        default: "{{ (not jaeger_use_k8s) and (not jaeger_use_openshift) }}"
        description:
          - "Runs the container-based Jaeger path when set to C(true)."
      jaeger_use_k8s: &jaeger_use_k8s
        type: bool
        required: false
        default: false
        description:
          - "Runs the Kubernetes Jaeger path when set to C(true)."
      jaeger_registry_endpoint: &jaeger_registry_endpoint
        type: str
        required: false
        default: "{{ lookup('env', 'JAEGER_REGISTRY_ENDPOINT') or 'docker.io/jaegertracing' }}"
        description:
          - "Sets the registry endpoint for the Jaeger image."
      jaeger_image_name: &jaeger_image_name
        type: str
        required: false
        default: "all-in-one"
        description:
          - "Sets the Jaeger image name."
      jaeger_image_tag: &jaeger_image_tag
        type: str
        required: false
        default: "latest"
        description:
          - "Sets the Jaeger image tag."
      jaeger_image: &jaeger_image
        type: str
        required: false
        default: "{{ jaeger_registry_endpoint }}/{{ jaeger_image_name }}:{{ jaeger_image_tag }}"
        description:
          - "Sets the Jaeger container image."
      jaeger_container_name: &jaeger_container_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the Jaeger container name."
      remote_config_dir: &remote_config_dir
        type: path
        required: false
        description:
          - "Sets the shared remote configuration base directory."
          - "Example: C(/var/lib/fabricx/jaeger/config) on the control or remote host."
      jaeger_remote_config_dir: &jaeger_remote_config_dir
        type: path
        required: false
        default: "{{ remote_config_dir }}"
        description:
          - "Sets the remote directory mounted into the Jaeger container for configuration and certificates."
      jaeger_container_config_dir: &jaeger_container_config_dir
        type: path
        required: false
        default: "/var/config"
        description:
          - "Sets the in-container directory where Jaeger reads configuration and certificates."
      fetched_artifacts_dir: &fetched_artifacts_dir
        type: path
        required: true
        description:
          - "Sets the local directory containing fetched artifacts used by Jaeger."
          - "Example: C(/tmp/fabricx-artifacts) when copying the ElasticSearch CA certificate into Jaeger config."
      elasticsearch_host: &elasticsearch_host
        type: str
        required: true
        description:
          - "Names the inventory host running ElasticSearch for Jaeger span storage."
          - "Example: C(elasticsearch-0) when Jaeger should send spans to that inventory host."
      jaeger_ui_port: &jaeger_ui_port
        type: int
        required: false
        default: 16686
        description:
          - "Sets the Jaeger query UI port."
      jaeger_admin_port: &jaeger_admin_port
        type: int
        required: false
        default: 14269
        description:
          - "Sets the Jaeger admin HTTP port."
      jaeger_http_server_port: &jaeger_http_server_port
        type: int
        required: false
        default: 14268
        description:
          - "Sets the Jaeger collector HTTP server port."
      jaeger_http_collector_port: &jaeger_http_collector_port
        type: int
        required: false
        default: 4318
        description:
          - "Sets the Jaeger OTLP HTTP collector port."
      jaeger_grpc_server_port: &jaeger_grpc_server_port
        type: int
        required: false
        default: 14250
        description:
          - "Sets the Jaeger gRPC server port."
      jaeger_collector_port: &jaeger_collector_port
        type: int
        required: false
        default: 4317
        description:
          - "Sets the Jaeger OTLP gRPC collector port."
      jaeger_k8s_resource_name: &jaeger_k8s_resource_name
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description:
          - "Sets the Kubernetes resource name used for Jaeger objects."
      jaeger_k8s_wait_timeout: &jaeger_k8s_wait_timeout
        type: int
        required: false
        default: 120
        description:
          - "Sets the rollout wait timeout for the Jaeger Kubernetes deployment."
      jaeger_k8s_fs_group: &jaeger_k8s_fs_group
        type: int
        required: false
        default: 0
        description:
          - "Sets the pod filesystem group for the Jaeger Kubernetes workload."
      jaeger_k8s_ui_node_port: &jaeger_k8s_ui_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external UI Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30686)."
      jaeger_k8s_loadbalancer_expose_ui_port:
        &jaeger_k8s_loadbalancer_expose_ui_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the UI port externally.
          - When undefined or C(false), the UI port is not included in the LoadBalancer Service.
      jaeger_k8s_admin_node_port: &jaeger_k8s_admin_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external admin Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30669)."
      jaeger_k8s_loadbalancer_expose_admin_port:
        &jaeger_k8s_loadbalancer_expose_admin_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the admin port externally.
          - When undefined or C(false), the admin port is not included in the LoadBalancer Service.
      jaeger_k8s_http_server_node_port: &jaeger_k8s_http_server_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external HTTP server Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30668)."
      jaeger_k8s_loadbalancer_expose_http_server_port:
        &jaeger_k8s_loadbalancer_expose_http_server_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the HTTP server port externally.
          - When undefined or C(false), the HTTP server port is not included in the LoadBalancer Service.
      jaeger_k8s_http_collector_node_port: &jaeger_k8s_http_collector_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external HTTP collector Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30418)."
      jaeger_k8s_loadbalancer_expose_http_collector_port:
        &jaeger_k8s_loadbalancer_expose_http_collector_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the HTTP collector port externally.
          - When undefined or C(false), the HTTP collector port is not included in the LoadBalancer Service.
      jaeger_k8s_grpc_server_node_port: &jaeger_k8s_grpc_server_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external gRPC server Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(31450)."
      jaeger_k8s_loadbalancer_expose_grpc_server_port:
        &jaeger_k8s_loadbalancer_expose_grpc_server_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the gRPC server port externally.
          - When undefined or C(false), the gRPC server port is not included in the LoadBalancer Service.
      jaeger_k8s_collector_node_port: &jaeger_k8s_collector_node_port
        type: int
        required: false
        description:
          - Kubernetes NodePort value used by the external collector Service port.
          - Defining this variable enables the NodePort Service; the value is set as the static C(nodePort) in the Service spec.
          - "Example: C(30417)."
      jaeger_k8s_loadbalancer_expose_collector_port:
        &jaeger_k8s_loadbalancer_expose_collector_port
        type: bool
        required: false
        default: false
        description:
          - Set to C(true) to create a LoadBalancer Service entry that exposes the collector port externally.
          - When undefined or C(false), the collector port is not included in the LoadBalancer Service.
      k8s_namespace: &k8s_namespace
        type: str
        required: true
        description:
          - "Sets the Kubernetes namespace used for Jaeger resources."
          - "Example: C(tracing) when Jaeger shares a namespace with other observability services."
      k8s_image_pull_secret: &k8s_image_pull_secret
        type: str
        required: false
        description:
          - "Sets the Kubernetes imagePullSecret name when the deployment needs one."
          - "Example: C(registry-pull-secret) when the Jaeger image comes from a private registry."
      k8s_readiness_probe_initial_delay_seconds:
        &k8s_readiness_probe_initial_delay_seconds
        type: int
        required: false
        description:
          - "Sets the readiness probe initial delay used by the Jaeger deployment template."
          - "Example: C(5)."
      k8s_readiness_probe_period_seconds: &k8s_readiness_probe_period_seconds
        type: int
        required: false
        description:
          - "Sets the readiness probe period used by the Jaeger deployment template."
          - "Example: C(10)."
      k8s_readiness_probe_timeout_seconds: &k8s_readiness_probe_timeout_seconds
        type: int
        required: false
        description:
          - "Sets the readiness probe timeout used by the Jaeger deployment template."
          - "Example: C(2)."
      k8s_readiness_probe_failure_threshold:
        &k8s_readiness_probe_failure_threshold
        type: int
        required: false
        description:
          - "Sets the readiness probe failure threshold used by the Jaeger deployment template."
          - "Example: C(3)."
      k8s_liveness_probe_initial_delay_seconds:
        &k8s_liveness_probe_initial_delay_seconds
        type: int
        required: false
        description:
          - "Sets the liveness probe initial delay used by the Jaeger deployment template."
          - "Example: C(15)."
      k8s_liveness_probe_period_seconds: &k8s_liveness_probe_period_seconds
        type: int
        required: false
        description:
          - "Sets the liveness probe period used by the Jaeger deployment template."
          - "Example: C(20)."
      k8s_liveness_probe_timeout_seconds: &k8s_liveness_probe_timeout_seconds
        type: int
        required: false
        description:
          - "Sets the liveness probe timeout used by the Jaeger deployment template."
          - "Example: C(2)."
      k8s_liveness_probe_failure_threshold:
        &k8s_liveness_probe_failure_threshold
        type: int
        required: false
        description:
          - "Sets the liveness probe failure threshold used by the Jaeger deployment template."
          - "Example: C(3)."

      jaeger_use_openshift: &jaeger_use_openshift
        type: bool
        required: false
        default: false
        description:
          - Selects the OpenShift deployment branch.
      jaeger_openshift_ui_route: &jaeger_openshift_ui_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-ui.apps.example.com)."
      jaeger_openshift_admin_route: &jaeger_openshift_admin_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-admin.apps.example.com)."
      jaeger_openshift_http_server_route: &jaeger_openshift_http_server_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-http-server.apps.example.com)."
      jaeger_openshift_http_collector_route: &jaeger_openshift_http_collector_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-http-collector.apps.example.com)."
      jaeger_openshift_grpc_server_route: &jaeger_openshift_grpc_server_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-grpc-server.apps.example.com)."
      jaeger_openshift_collector_route: &jaeger_openshift_collector_route
        type: str
        required: false
        description:
          - Specifies the OpenShift Route host.
          - "Example: C(jaeger-collector.apps.example.com)."
  start:
    short_description: Select the Jaeger deployment mode to start
    description:
      - "Starts Jaeger in container mode or applies the Kubernetes Service and Deployment manifests."
      - "Container mode configures the image, ports, and ElasticSearch connection before the container role starts the workload."
      - "Kubernetes mode creates the namespace, service objects, optional NodePort service, and deployment."
    options:
      jaeger_use_container: *jaeger_use_container
      jaeger_use_k8s: *jaeger_use_k8s
      jaeger_use_openshift: *jaeger_use_openshift

  stop:
    short_description: Select the Jaeger deployment mode to stop
    description:
      - "Stops the running Jaeger container without removing configuration assets."
    options:
      jaeger_use_container: *jaeger_use_container

  teardown:
    short_description: Select the Jaeger deployment mode to remove
    description:
      - "Removes the container workload or Kubernetes resources for the active Jaeger deployment."
      - "Kubernetes teardown deletes the deployment, service, and optional NodePort service."
    options:
      jaeger_use_container: *jaeger_use_container
      jaeger_use_k8s: *jaeger_use_k8s
      jaeger_use_openshift: *jaeger_use_openshift

  wipe:
    short_description: Remove the Jaeger deployment and configuration
    description:
      - "Runs the teardown and configuration cleanup entry points for Jaeger."
    options: {}

  fetch_logs:
    short_description: Select the Jaeger deployment mode to collect logs from
    description:
      - "Collects logs from the running Jaeger container or from the Jaeger pods in Kubernetes."
    options:
      jaeger_use_container: *jaeger_use_container
      jaeger_use_k8s: *jaeger_use_k8s
      jaeger_use_openshift: *jaeger_use_openshift

  ping:
    short_description: Check that Jaeger service ports are reachable
    description:
      - "Checks the Jaeger query, admin, collector, and OTLP endpoints with the utils ping helper."
      - "Container mode pings the published host ports, while Kubernetes mode checks the service ports and optional NodePort values."
    options:
      jaeger_use_k8s: *jaeger_use_k8s
      jaeger_use_openshift: *jaeger_use_openshift
      jaeger_ui_port: *jaeger_ui_port
      jaeger_admin_port: *jaeger_admin_port
      jaeger_http_server_port: *jaeger_http_server_port
      jaeger_http_collector_port: *jaeger_http_collector_port
      jaeger_grpc_server_port: *jaeger_grpc_server_port
      jaeger_collector_port: *jaeger_collector_port

  container/start:
    short_description: Start Jaeger in a container runtime
    description:
      - "Builds the Jaeger container environment, publishes the query and collector ports, and mounts the remote config directory."
      - "Starts the all-in-one container and waits for the query UI port to answer before returning."
      - "This entry point requires the ElasticSearch host inventory to be available."
    options:
      elasticsearch_host: *elasticsearch_host
      jaeger_container_name: *jaeger_container_name
      jaeger_registry_endpoint: *jaeger_registry_endpoint
      jaeger_image_name: *jaeger_image_name
      jaeger_image_tag: *jaeger_image_tag
      jaeger_image: *jaeger_image
      remote_config_dir: *remote_config_dir
      jaeger_remote_config_dir: *jaeger_remote_config_dir
      jaeger_container_config_dir: *jaeger_container_config_dir
      jaeger_ui_port: *jaeger_ui_port
      jaeger_admin_port: *jaeger_admin_port
      jaeger_http_server_port: *jaeger_http_server_port
      jaeger_http_collector_port: *jaeger_http_collector_port
      jaeger_grpc_server_port: *jaeger_grpc_server_port
      jaeger_collector_port: *jaeger_collector_port

  container/stop:
    short_description: Stop the Jaeger container
    description:
      - "Stops the named Jaeger container without changing image or configuration settings."
    options:
      jaeger_container_name: *jaeger_container_name
      jaeger_registry_endpoint: *jaeger_registry_endpoint
      jaeger_image_name: *jaeger_image_name
      jaeger_image_tag: *jaeger_image_tag
      jaeger_image: *jaeger_image

  container/rm:
    short_description: Remove the Jaeger container
    description:
      - "Removes the Jaeger container and its runtime state from the container host."
    options:
      jaeger_container_name: *jaeger_container_name
      jaeger_registry_endpoint: *jaeger_registry_endpoint
      jaeger_image_name: *jaeger_image_name
      jaeger_image_tag: *jaeger_image_tag
      jaeger_image: *jaeger_image

  container/fetch_logs:
    short_description: Fetch logs from the Jaeger container
    description:
      - "Collects the container logs for the Jaeger runtime from the named container."
    options:
      jaeger_container_name: *jaeger_container_name

  k8s/start:
    short_description: Start Jaeger on Kubernetes
    description:
      - "Applies the Jaeger Service, optional NodePort and LoadBalancer Services, and Deployment resources to Kubernetes."
      - "The deployment template mounts the configuration path, wires the ElasticSearch CA certificate, and uses the provided probe and port settings."
      - "This entry point requires the ElasticSearch host inventory to be available."
    options:
      elasticsearch_host: *elasticsearch_host
      jaeger_k8s_resource_name: *jaeger_k8s_resource_name
      jaeger_k8s_wait_timeout: *jaeger_k8s_wait_timeout
      jaeger_k8s_fs_group: *jaeger_k8s_fs_group
      jaeger_registry_endpoint: *jaeger_registry_endpoint
      jaeger_image_name: *jaeger_image_name
      jaeger_image_tag: *jaeger_image_tag
      jaeger_image: *jaeger_image
      jaeger_container_config_dir: *jaeger_container_config_dir
      jaeger_ui_port: *jaeger_ui_port
      jaeger_admin_port: *jaeger_admin_port
      jaeger_http_server_port: *jaeger_http_server_port
      jaeger_http_collector_port: *jaeger_http_collector_port
      jaeger_grpc_server_port: *jaeger_grpc_server_port
      jaeger_collector_port: *jaeger_collector_port
      jaeger_k8s_ui_node_port: *jaeger_k8s_ui_node_port
      jaeger_k8s_admin_node_port: *jaeger_k8s_admin_node_port
      jaeger_k8s_http_server_node_port: *jaeger_k8s_http_server_node_port
      jaeger_k8s_http_collector_node_port: *jaeger_k8s_http_collector_node_port
      jaeger_k8s_grpc_server_node_port: *jaeger_k8s_grpc_server_node_port
      jaeger_k8s_collector_node_port: *jaeger_k8s_collector_node_port
      k8s_namespace: *k8s_namespace
      k8s_image_pull_secret: *k8s_image_pull_secret
      k8s_readiness_probe_initial_delay_seconds: *k8s_readiness_probe_initial_delay_seconds
      k8s_readiness_probe_period_seconds: *k8s_readiness_probe_period_seconds
      k8s_readiness_probe_timeout_seconds: *k8s_readiness_probe_timeout_seconds
      k8s_readiness_probe_failure_threshold: *k8s_readiness_probe_failure_threshold
      k8s_liveness_probe_initial_delay_seconds: *k8s_liveness_probe_initial_delay_seconds
      k8s_liveness_probe_period_seconds: *k8s_liveness_probe_period_seconds
      k8s_liveness_probe_timeout_seconds: *k8s_liveness_probe_timeout_seconds
      k8s_liveness_probe_failure_threshold: *k8s_liveness_probe_failure_threshold
      jaeger_k8s_loadbalancer_expose_ui_port: *jaeger_k8s_loadbalancer_expose_ui_port
      jaeger_k8s_loadbalancer_expose_admin_port: *jaeger_k8s_loadbalancer_expose_admin_port
      jaeger_k8s_loadbalancer_expose_http_server_port: *jaeger_k8s_loadbalancer_expose_http_server_port
      jaeger_k8s_loadbalancer_expose_http_collector_port: *jaeger_k8s_loadbalancer_expose_http_collector_port
      jaeger_k8s_loadbalancer_expose_grpc_server_port: *jaeger_k8s_loadbalancer_expose_grpc_server_port
      jaeger_k8s_loadbalancer_expose_collector_port: *jaeger_k8s_loadbalancer_expose_collector_port

  k8s/rm:
    short_description: Remove Jaeger Kubernetes resources
    description:
      - "Deletes the Jaeger Deployment, Service, and NodePort Service from the target namespace."
    options:
      jaeger_k8s_resource_name: *jaeger_k8s_resource_name
      k8s_namespace: *k8s_namespace
      jaeger_k8s_ui_node_port: *jaeger_k8s_ui_node_port
      jaeger_k8s_loadbalancer_expose_ui_port: *jaeger_k8s_loadbalancer_expose_ui_port
      jaeger_k8s_admin_node_port: *jaeger_k8s_admin_node_port
      jaeger_k8s_loadbalancer_expose_admin_port: *jaeger_k8s_loadbalancer_expose_admin_port
      jaeger_k8s_http_server_node_port: *jaeger_k8s_http_server_node_port
      jaeger_k8s_loadbalancer_expose_http_server_port: *jaeger_k8s_loadbalancer_expose_http_server_port
      jaeger_k8s_http_collector_node_port: *jaeger_k8s_http_collector_node_port
      jaeger_k8s_loadbalancer_expose_http_collector_port: *jaeger_k8s_loadbalancer_expose_http_collector_port
      jaeger_k8s_grpc_server_node_port: *jaeger_k8s_grpc_server_node_port
      jaeger_k8s_loadbalancer_expose_grpc_server_port: *jaeger_k8s_loadbalancer_expose_grpc_server_port
      jaeger_k8s_collector_node_port: *jaeger_k8s_collector_node_port
      jaeger_k8s_loadbalancer_expose_collector_port: *jaeger_k8s_loadbalancer_expose_collector_port

  k8s/fetch_logs:
    short_description: Fetch logs from Jaeger pods
    description:
      - "Collects logs from Jaeger pods using the resource label selector for the Kubernetes deployment."
    options:
      jaeger_k8s_resource_name: *jaeger_k8s_resource_name

  k8s/ping:
    short_description: Check that Jaeger Kubernetes service is reachable
    description:
      - Probes configured Kubernetes NodePort values and LoadBalancer-exposed service ports for external reachability.
    options:
      jaeger_ui_port: *jaeger_ui_port
      jaeger_admin_port: *jaeger_admin_port
      jaeger_http_server_port: *jaeger_http_server_port
      jaeger_http_collector_port: *jaeger_http_collector_port
      jaeger_grpc_server_port: *jaeger_grpc_server_port
      jaeger_collector_port: *jaeger_collector_port
      jaeger_k8s_ui_node_port: *jaeger_k8s_ui_node_port
      jaeger_k8s_admin_node_port: *jaeger_k8s_admin_node_port
      jaeger_k8s_http_server_node_port: *jaeger_k8s_http_server_node_port
      jaeger_k8s_http_collector_node_port: *jaeger_k8s_http_collector_node_port
      jaeger_k8s_grpc_server_node_port: *jaeger_k8s_grpc_server_node_port
      jaeger_k8s_collector_node_port: *jaeger_k8s_collector_node_port
      jaeger_k8s_loadbalancer_expose_ui_port: *jaeger_k8s_loadbalancer_expose_ui_port
      jaeger_k8s_loadbalancer_expose_admin_port: *jaeger_k8s_loadbalancer_expose_admin_port
      jaeger_k8s_loadbalancer_expose_http_server_port: *jaeger_k8s_loadbalancer_expose_http_server_port
      jaeger_k8s_loadbalancer_expose_http_collector_port: *jaeger_k8s_loadbalancer_expose_http_collector_port
      jaeger_k8s_loadbalancer_expose_grpc_server_port: *jaeger_k8s_loadbalancer_expose_grpc_server_port
      jaeger_k8s_loadbalancer_expose_collector_port: *jaeger_k8s_loadbalancer_expose_collector_port

  config/transfer:
    short_description: Transfer Jaeger configuration assets
    description:
      - "Creates the remote Jaeger config path, copies the ElasticSearch CA certificate when TLS is enabled, and prepares the runtime config directory."
      - "In Kubernetes mode, also delegates ConfigMap creation to the Kubernetes config entry point."
    options:
      elasticsearch_host: *elasticsearch_host
      fetched_artifacts_dir: *fetched_artifacts_dir
      remote_config_dir: *remote_config_dir
      jaeger_remote_config_dir: *jaeger_remote_config_dir
      jaeger_use_k8s: *jaeger_use_k8s
      jaeger_use_openshift: *jaeger_use_openshift

  config/rm:
    short_description: Remove Jaeger configuration assets
    description:
