---
argument_specs:
  _shared_options:
    short_description: Shared option catalog for openssl role entry points
    options:
      remote_node_dir: &remote_node_dir
        type: path
        required: false
        description:
          - Base directory for remote role state.
          - The default for C(openssl_remote_config_dir) derives from this value.
      actual_host: &actual_host
        type: str
        required: false
        description:
          - Inventory host address used in SAN defaults.
      ansible_host: &ansible_host
        type: str
        required: false
        description:
          - Inventory host address used in SAN defaults.
      openssl_private_key_path: &openssl_private_key_path
        type: path
        required: true
        description:
          - Path to the private key file to create.
      openssl_public_key_path: &openssl_public_key_path
        type: path
        required: true
        description:
          - Path to the public key file to create.
      openssl_cert_path: &openssl_cert_path
        type: path
        required: true
        description:
          - Path to the certificate file to create.
      openssl_csr_path: &openssl_csr_path
        type: path
        required: true
        description:
          - Path to the CSR file to create.
      openssl_ca_private_key_path: &openssl_ca_private_key_path
        type: path
        required: true
        description:
          - Path to the CA private key used to sign the certificate.
          - Store this value in Ansible Vault.
      openssl_ca_cert_path: &openssl_ca_cert_path
        type: path
        required: true
        description:
          - Path to the CA certificate used to sign the certificate.
      openssl_remote_config_dir: &openssl_remote_config_dir
        type: path
        required: false
        default: "{{ remote_node_dir }}/openssl"
        description:
          - Directory for the temporary OpenSSL config file.
          - The default derives from C(remote_node_dir).
      openssl_ext_file_path: &openssl_ext_file_path
        type: path
        required: false
        description:
          - Optional extension file path passed to C(openssl x509 -extfile).
      openssl_clean_after_gen: &openssl_clean_after_gen
        type: bool
        default: false
        description:
          - Remove the rendered OpenSSL config directory after generation.
      openssl_ca_cert_file: &openssl_ca_cert_file
        type: str
        default: ca.crt
        description:
          - Filename used when copying the self-signed certificate as the CA certificate.
      openssl_key_alg: &openssl_key_alg
        type: str
        default: RSA
        description:
          - OpenSSL algorithm passed to C(openssl genpkey).
      openssl_key_type: &openssl_key_type
        type: str
        default: rsa:4096
        description:
          - Key type passed to C(openssl req -newkey).
      openssl_key_opt: &openssl_key_opt
        type: str
        required: false
        description:
          - Optional key-generation option passed with C(-pkeyopt).
      openssl_cert_duration: &openssl_cert_duration
        type: int
        default: 365
        description:
          - Number of days the generated certificate remains valid.
      openssl_default_md: &openssl_default_md
        type: str
        default: sha256
        description:
          - Message digest written into the generated OpenSSL request config.
      openssl_country: &openssl_country
        type: str
        default: US
        description:
          - Country code written into the certificate subject.
      openssl_state: &openssl_state
        type: str
        default: California
        description:
          - State or province written into the certificate subject.
      openssl_locality: &openssl_locality
        type: str
        required: false
        description:
          - Optional locality or city written into the certificate subject.
      openssl_organization: &openssl_organization
        type: str
        default: MyOrg Inc.
        description:
          - Organization name written into the certificate subject.
      openssl_organizational_unit: &openssl_organizational_unit
        type: str
        required: false
        description:
          - Optional organizational unit written into the certificate subject.
      openssl_common_name: &openssl_common_name
        type: str
        default: example.com
        description:
          - Common Name written into the certificate subject.
      openssl_basic_constraints: &openssl_basic_constraints
        type: str
        default: CA:false
        description:
          - Basic constraints value written into the X.509 v3 extensions.
      openssl_key_usage: &openssl_key_usage
        type: str
        default: keyEncipherment, digitalSignature
        description:
          - Key usage written into the X.509 v3 extensions.
      openssl_extended_key_usage: &openssl_extended_key_usage
        type: str
        default: serverAuth, clientAuth
        description:
          - Extended key usage written into the X.509 v3 extensions.
      openssl_san_ipv4_regex: &openssl_san_ipv4_regex
        type: str
        default: '^[0-9]{1,3}(\.[0-9]{1,3}){3}$'
        description:
          - Regex used to split SAN hosts into DNS and IP entries.
      openssl_san_hosts: &openssl_san_hosts
        type: list
        elements: str
        default: >-
          {{
            [ansible_host, actual_host]
            | unique
            | list
          }}
        description:
          - Hosts used to derive SAN entries.
          - The default derives from C(ansible_host) and C(actual_host).
      openssl_san_dns_entries: &openssl_san_dns_entries
        type: list
        elements: str
        default: >-
          {{
            openssl_san_hosts
            | reject('match', openssl_san_ipv4_regex)
            | map('regex_replace', '^', 'DNS:')
            | list
          }}
        description:
          - DNS SAN entries derived from C(openssl_san_hosts).
          - The default also uses C(openssl_san_ipv4_regex).
      openssl_san_ip_entries: &openssl_san_ip_entries
        type: list
        elements: str
        default: >-
          {{
            (
              openssl_san_hosts | select('match', openssl_san_ipv4_regex) | list
              + (ansible_facts.all_ipv4_addresses | default([]))
            )
            | unique
            | map('regex_replace', '^', 'IP:')
            | list
          }}
        description:
          - IP SAN entries derived from C(openssl_san_hosts).
          - The default also uses C(openssl_san_ipv4_regex) and C(ansible_facts.all_ipv4_addresses).
      openssl_san_entries: &openssl_san_entries
        type: list
        elements: str
        default: "{{ openssl_san_dns_entries + openssl_san_ip_entries }}"
        description:
          - Final SAN list derived from C(openssl_san_dns_entries) and C(openssl_san_ip_entries).

  install:
    short_description: Install the OpenSSL CLI
    description:
      - Install the C(openssl) package on the target host by delegating to the package role.
    options: {}

  generate_keypair:
    short_description: Generate an asymmetric key pair
    description:
      - Generate a private key and the matching public key on the target host.
    options:
      openssl_private_key_path: *openssl_private_key_path
      openssl_public_key_path: *openssl_public_key_path
      openssl_key_alg: *openssl_key_alg
      openssl_key_opt: *openssl_key_opt

  generate_self_signed_cert:
    short_description: Generate a self-signed certificate
    description:
      - Generate a private key and a self-signed X.509 certificate.
      - The role also renders a temporary OpenSSL config file and copies the certificate to the CA filename.
    options:
      remote_node_dir: *remote_node_dir
      actual_host: *actual_host
      ansible_host: *ansible_host
      openssl_private_key_path: *openssl_private_key_path
      openssl_cert_path: *openssl_cert_path
      openssl_remote_config_dir: *openssl_remote_config_dir
      openssl_clean_after_gen: *openssl_clean_after_gen
      openssl_ca_cert_file: *openssl_ca_cert_file
      openssl_key_type: *openssl_key_type
      openssl_key_opt: *openssl_key_opt
      openssl_cert_duration: *openssl_cert_duration
      openssl_default_md: *openssl_default_md
      openssl_country: *openssl_country
      openssl_state: *openssl_state
      openssl_locality: *openssl_locality
      openssl_organization: *openssl_organization
      openssl_organizational_unit: *openssl_organizational_unit
      openssl_common_name: *openssl_common_name
      openssl_basic_constraints: *openssl_basic_constraints
      openssl_key_usage: *openssl_key_usage
      openssl_extended_key_usage: *openssl_extended_key_usage
      openssl_san_ipv4_regex: *openssl_san_ipv4_regex
      openssl_san_hosts: *openssl_san_hosts
      openssl_san_dns_entries: *openssl_san_dns_entries
      openssl_san_ip_entries: *openssl_san_ip_entries
      openssl_san_entries: *openssl_san_entries

  generate_csr:
    short_description: Generate a certificate signing request
    description:
      - Generate a private key and a certificate signing request using a rendered OpenSSL config file.
    options:
      remote_node_dir: *remote_node_dir
      actual_host: *actual_host
      ansible_host: *ansible_host
      openssl_private_key_path: *openssl_private_key_path
      openssl_csr_path: *openssl_csr_path
      openssl_remote_config_dir: *openssl_remote_config_dir
      openssl_ext_file_path: *openssl_ext_file_path
      openssl_clean_after_gen: *openssl_clean_after_gen
      openssl_key_type: *openssl_key_type
      openssl_key_opt: *openssl_key_opt
      openssl_cert_duration: *openssl_cert_duration
      openssl_default_md: *openssl_default_md
      openssl_country: *openssl_country
      openssl_state: *openssl_state
      openssl_locality: *openssl_locality
      openssl_organization: *openssl_organization
      openssl_organizational_unit: *openssl_organizational_unit
      openssl_common_name: *openssl_common_name
      openssl_basic_constraints: *openssl_basic_constraints
      openssl_key_usage: *openssl_key_usage
      openssl_extended_key_usage: *openssl_extended_key_usage
      openssl_san_ipv4_regex: *openssl_san_ipv4_regex
      openssl_san_hosts: *openssl_san_hosts
      openssl_san_dns_entries: *openssl_san_dns_entries
      openssl_san_ip_entries: *openssl_san_ip_entries
      openssl_san_entries: *openssl_san_entries

  generate_cert:
    short_description: Sign a certificate from a CSR
    description:
      - Generate a certificate from an existing CSR using the provided CA certificate and private key.
    options:
      openssl_ca_private_key_path: *openssl_ca_private_key_path
      openssl_ca_cert_path: *openssl_ca_cert_path
      openssl_csr_path: *openssl_csr_path
      openssl_cert_path: *openssl_cert_path
      openssl_cert_duration: *openssl_cert_duration
      openssl_ext_file_path: *openssl_ext_file_path
