name: Publish Ansible collection

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment for Ansible
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Install ansible-core
      - name: Install dependencies
        run: |
          pip install ansible-core yq

      # Read the collection version from galaxy.yml
      - name: Read collection version
        id: collection_version
        run: |
          VERSION=$(yq -r .version galaxy.yml)
          echo "tarball=hyperledger-fabricx-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      # Build the collection
      - name: Build collection
        run: |
          ansible-galaxy collection build

      # Upload the collection tarball to the matching GitHub release
      - name: Upload collection tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.collection_version.outputs.tarball }}
          fail_on_unmatched_files: true

      # Publish the collection to Ansible Galaxy
      - name: Publish collection to Ansible Galaxy
        run: |
          ansible-galaxy collection publish ${{ steps.collection_version.outputs.tarball }} --api-key ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
