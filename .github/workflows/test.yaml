name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Enable manual triggering
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - inventory: "fabric-x"
          - inventory: "fabric-x-yugabyte"
          - inventory: "fabric-x-bin"
          - inventory: "fabric-x-cryptogen"
          - inventory: "fabric-x-no-tls"
          - inventory: "fabric-x-no-mtls"
      fail-fast: false

    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install make
      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      # Install pinned Golang version
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      # Check that go is installed
      - name: Verify Go installation
        run: |
          go version
          echo "GOPATH: $GOPATH"
          echo "GOROOT: $GOROOT"

      # Install pinned Python and enable pip cache
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      # Cache Ansible Galaxy collections by dependency set
      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-galaxy-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-galaxy-

      # Install the required packages
      - name: Install all the required packages and collections
        env:
          CONTAINER_CLIENT: docker
          ANSIBLE_CACHE_PLUGIN: jsonfile
          ANSIBLE_CACHE_PLUGIN_CONNECTION: /tmp/ansible_fact_cache
        run: |
          make install install-remote-node-deps

      # Run the Hyperledger Fabric-X inventory
      - name: Test the (${{ matrix.inventory }}) inventory
        env:
          PROJECT_DIR: ${{ github.workspace }}
          CONTAINER_CLIENT: docker
          ANSIBLE_INVENTORY: ./examples/inventory/local/${{ matrix.inventory }}.yaml
          ANSIBLE_CACHE_PLUGIN: jsonfile
          ANSIBLE_CACHE_PLUGIN_CONNECTION: /tmp/ansible_fact_cache
        run: |
          ./ci/run_ci_test.sh
