name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Enable manual triggering
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment for Ansible
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Run the lint target from your Makefile
      - name: Run lint
        run: make install lint check-trailing-spaces

      # Check that all the files have the license header
      - name: Run the license check
        run: make check-license-header

      # Check that argument specs are up to date with the code
      - name: Check that argument specs are up to date
        run: make check-argument-specs

      # Check that generated docs are in sync with argument_specs.yaml
      - name: Check generated docs are up to date
        run: make check-docs
