name: Bug report
description: Report a bug for `hyperledger.fabricx` Ansible collection
title: "[BUG] Title"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: |
        List exact steps triggering the bug, including inventory and playbook snippets if possible.

        **Tip**: Include relevant playbook YAML for faster debugging.
      placeholder: Command `make start` fails with inventory `fabric-x.yaml` when running the playbook...
    validations:
      required: true
  - type: input
    id: ansible_version
    attributes:
      label: Ansible and collection versions
      description: |
        **Tip**: `ansible --version`

        **Tip**: `ansible-galaxy collection list | grep "hyperledger.fabricx"`
      placeholder: ansible [core 2.20.0], hyperledger.fabricx 0.5.11
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Target OS/platform
      description: |
        **Linux**: `cat /etc/os-release`

        **macOS**: `sw_vers`
      placeholder: Ubuntu 22.04, RHEL 9, macOS 26.3.0
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Logs and screenshots
      description: |
        Paste logs (e.g., `ansible-playbook -vvv`) or drag-drop files/images (.log, .txt, .png, .jpg).

        **How**: Click to highlight this area, then drag files—they auto-upload and link.
      render: shell
      placeholder: Paste verbose logs here or drag screenshot/logfile...
    validations:
      required: true
