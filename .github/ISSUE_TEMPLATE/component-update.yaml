name: Component Update
description: Request support for a newer version of a component
title: "[UPDATE] Update to `<component>:<version>`"
labels: ["enhancement", "version-support"]
body:
  - type: input
    id: component
    attributes:
      label: Component name
      description: Which component needs version support?
      placeholder: |
        `fabric-x-orderer`, `fabric-x-committer`, etc.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Target version
      description: What version should be supported?
      placeholder: v2.5.0
    validations:
      required: true
  - type: checkboxes
    id: breaking_changes
    attributes:
      label: Breaking changes
      description: Are there breaking configuration changes in the new version?
      options:
        - label: Yes, this new version is not backward compatible and I will provide details on how to port it in the `Configuration changes` section
        - label: No breaking changes - the new version is backward compatible with current configuration
    validations:
      required: true
  - type: textarea
    id: config_changes
    attributes:
      label: Configuration changes
      description: |
        **Set to "N/A" this section if you check "No breaking changes" above.**

        Otherwise, describe all configuration changes needed to support the new version:
        - New configuration parameters
        - Deprecated/removed parameters
        - Changed parameter formats or values
        - Template updates required
        - Links to release notes or documentation
      render: markdown
    validations:
      required: true
